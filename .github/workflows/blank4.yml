          Write-Host "║    ║  🔧 CONNECTION PROTOCOL                                                              ║ ║" -ForegroundColor Green
          Write-Host "║    ║  ═══════════════════════════════════════════════════════════════════════════════════ ║ ║" -ForegroundColor Green
