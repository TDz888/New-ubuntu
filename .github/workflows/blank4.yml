# ===================================================================
#                    🚀 PREMIUM VM GENERATOR v5.0
#         Enterprise Virtual Machine Provisioning Platform
# ===================================================================
# Architecture: Isolated OS Modules
# Version: 5.0.0
# Stability: Enterprise Grade
# Max Runtime: 360 minutes (GitHub Actions limit)
# ===================================================================

name: 🚀 PREMIUM VM GENERATOR v5.0

on:
  workflow_dispatch:
    inputs:
      os_type:
        description: '💿 Select Operating System'
        required: true
        default: 'windows-11'
        type: choice
        options:
          - 'windows-11'
          - 'windows-server-2022'
          - 'ubuntu-22-04'
          - 'ubuntu-24-04'
          - 'debian-12'
          - 'centos-9'
      
      vm_specs:
        description: '⚙️ VM Specifications'
        required: true
        default: 'standard-4gb'
        type: choice
        options:
          - 'lightweight-2gb'
          - 'standard-4gb'
          - 'premium-8gb'
          - 'enterprise-16gb'
      
      duration:
        description: '⏱️ Session Duration (Max 6h due to GitHub limit)'
        required: false
        default: '4h'
        type: choice
        options:
          - '30m'
          - '1h'
          - '2h'
          - '3h'
          - '4h'
          - '5h'
          - '6h'
      
      network_type:
        description: '🌐 Network Configuration'
        required: false
        default: 'tailscale'
        type: choice
        options:
          - 'tailscale'
          - 'direct-ip'
          - 'cloudflare-tunnel'
      
      auto_cleanup:
        description: '🧹 Auto Cleanup After Session'
        required: false
        default: 'true'
        type: boolean

# ===================================================================
# JOB 1: WINDOWS 11 PROVISIONING - ISOLATED MODULE
# ===================================================================
jobs:
  Windows11-VM:
    if: github.event.inputs.os_type == 'windows-11'
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: 🎯 WIN11 - SYSTEM INITIALIZATION
        run: |
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║     🪟  WINDOWS 11 PREMIUM VM - INITIALIZATION              ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          
          $global:Win11StartTime = Get-Date
          $global:Win11LogDir = "$env:TEMP\win11_$(Get-Date -Format 'yyyyMMdd_HHmmss')"
          New-Item -ItemType Directory -Path $global:Win11LogDir -Force | Out-Null
          
          $specs = "${{ github.event.inputs.vm_specs }}"
          $duration = "${{ github.event.inputs.duration }}"
          
          Write-Host "│ 📁 Log: $global:Win11LogDir" -ForegroundColor White
          Write-Host "│ ⚙️  Specs: $specs" -ForegroundColor White
          Write-Host "│ ⏱️  Duration: $duration (Max 6h)" -ForegroundColor White
          Write-Host "│ 🕐 Started: $($global:Win11StartTime.ToString('HH:mm:ss'))" -ForegroundColor White
          Write-Host ""
      
      - name: 🔧 WIN11 - RDP CONFIGURATION
        run: |
          Write-Host "🔧 CONFIGURING REMOTE DESKTOP" -ForegroundColor Yellow
          
          $rdpSteps = @(
            @{Name = "Enable RDP"; Cmd = { Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force }}
            @{Name = "Disable NLA"; Cmd = { Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force }}
            @{Name = "Configure Security"; Cmd = { Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force }}
            @{Name = "Open Firewall"; Cmd = { netsh advfirewall firewall add rule name="RDP-Win11" dir=in action=allow protocol=TCP localport=3389 profile=any }}
            @{Name = "Start Services"; Cmd = { Start-Service -Name TermService -Force -ErrorAction SilentlyContinue }}
          )
          
          foreach($step in $rdpSteps) {
            Write-Host "│ 🔹 $($step.Name)..." -NoNewline
            try { & $step.Cmd; Write-Host " ✓" -ForegroundColor Green }
            catch { Write-Host " ⚠️" -ForegroundColor Yellow }
            Start-Sleep -Milliseconds 300
          }
          
          Write-Host "✅ RDP Configuration Complete" -ForegroundColor Green
      
      - name: 👤 WIN11 - USER ACCOUNT CREATION
        run: |
          Write-Host "👤 CREATING PREMIUM USER ACCOUNT" -ForegroundColor Yellow
          
          function New-SecurePassword {
            $upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ'
            $lower = 'abcdefghijkmnpqrstuvwxyz'
            $numbers = '23456789'
            $special = '!@#$%'
            $all = $upper + $lower + $numbers + $special
            
            $pw = @()
            $pw += $upper[(Get-Random -Maximum $upper.Length)]
            $pw += $lower[(Get-Random -Maximum $lower.Length)]
            $pw += $numbers[(Get-Random -Maximum $numbers.Length)]
            $pw += $special[(Get-Random -Maximum $special.Length)]
            
            for ($i = 1; $i -le 12; $i++) {
              $pw += $all[(Get-Random -Maximum $all.Length)]
            }
            
            return -join ($pw | Sort-Object { Get-Random })
          }
          
          $username = "AISTV-PREMIUM"
          $password = New-SecurePassword
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          Remove-LocalUser -Name $username -ErrorAction SilentlyContinue
          
          New-LocalUser -Name $username -Password $securePass -AccountNeverExpires -Description "AI STV Premium Windows 11"
          Set-LocalUser -Name $username -PasswordNeverExpires $true
          
          Add-LocalGroupMember -Group "Administrators" -Member $username
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
          Add-LocalGroupMember -Group "Users" -Member $username
          Enable-LocalUser -Name $username
          
          echo "WIN11_USER=$username" >> $env:GITHUB_ENV
          echo "WIN11_PASS=$password" >> $env:GITHUB_ENV
          echo "$password" > "$env:TEMP\win11_pass.txt"
          
          Write-Host "│ ✅ Username: $username" -ForegroundColor Green
          Write-Host "│ 🔐 Password: $password" -ForegroundColor Green
          Write-Host "✅ User Account Created" -ForegroundColor Green
      
      - name: 🌐 WIN11 - NETWORK SETUP
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          Write-Host "🌐 CONFIGURING NETWORK" -ForegroundColor Yellow
          
          $networkType = "${{ github.event.inputs.network_type }}"
          
          if ($networkType -eq "tailscale" -and $env:TAILSCALE_AUTH_KEY) {
            Write-Host "│ 📡 Installing Tailscale..." -ForegroundColor Blue
            $msiPath = "$env:TEMP\tailscale.msi"
            Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msiPath
            Start-Process msiexec.exe -ArgumentList "/i `"$msiPath`" /quiet /norestart" -Wait
            Remove-Item $msiPath -Force -ErrorAction SilentlyContinue
            
            Start-Sleep -Seconds 10
            
            & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname="win11-premium-$env:GITHUB_RUN_ID"
            
            for($i=0; $i -lt 20; $i++) {
              $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4 2>&1
              if ($ip -match '^\d+\.\d+\.\d+\.\d+$') {
                echo "WIN11_IP=$ip" >> $env:GITHUB_ENV
                Write-Host "│ ✅ Tailscale IP: $ip" -ForegroundColor Green
                break
              }
              Start-Sleep -Seconds 3
            }
          } else {
            $ip = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing).Content
            echo "WIN11_IP=$ip" >> $env:GITHUB_ENV
            Write-Host "│ ✅ Direct IP: $ip" -ForegroundColor Green
          }
      
      - name: 📊 WIN11 - PERFORMANCE OPTIMIZATION
        run: |
          Write-Host "⚡ APPLYING PERFORMANCE OPTIMIZATIONS" -ForegroundColor Yellow
          
          $specs = "${{ github.event.inputs.vm_specs }}"
          
          $optimizations = @(
            @{Name = "Disable Visual Effects"; Cmd = { Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" -Name "VisualFXSetting" -Value 2 -Force }}
            @{Name = "Optimize Power Plan"; Cmd = { powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c }}
            @{Name = "Disable Windows Updates"; Cmd = { Stop-Service -Name wuauserv -Force; Set-Service -Name wuauserv -StartupType Disabled }}
            @{Name = "Clear Temp Files"; Cmd = { Remove-Item "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue }}
          )
          
          foreach($opt in $optimizations) {
            Write-Host "│ 🔧 $($opt.Name)..." -NoNewline
            try { & $opt.Cmd; Write-Host " ✓" -ForegroundColor Green }
            catch { Write-Host " ⚠️" -ForegroundColor Yellow }
          }
          
          Write-Host "✅ Performance Optimizations Applied" -ForegroundColor Green
      
      - name: 🎉 WIN11 - CONNECTION INFORMATION
        run: |
          $password = Get-Content "$env:TEMP\win11_pass.txt" -ErrorAction SilentlyContinue
          $ip = $env:WIN11_IP
          $duration = "${{ github.event.inputs.duration }}"
          
          $totalMinutes = switch ($duration) {
            "30m" { 30 }
            "1h" { 60 }
            "2h" { 120 }
            "3h" { 180 }
            "4h" { 240 }
            "5h" { 300 }
            "6h" { 360 }
            default { 240 }
          }
          
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $startTime = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
          $endTime = $startTime.AddMinutes($totalMinutes)
          
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════════╗" -ForegroundColor Green
          Write-Host "║     🎉 WINDOWS 11 PREMIUM VM - READY FOR CONNECTION        ║" -ForegroundColor Green
          Write-Host "╠══════════════════════════════════════════════════════════════╣" -ForegroundColor Green
          Write-Host "║  🌐 Address      : $ip" -ForegroundColor White
          Write-Host "║  👤 Username     : AISTV-PREMIUM" -ForegroundColor White
          Write-Host "║  🔐 Password     : $password" -ForegroundColor White
          Write-Host "║  🔌 Port         : 3389" -ForegroundColor White
          Write-Host "║  ⏱️  Duration     : $duration (Max 6h)" -ForegroundColor White
          Write-Host "║  🕐 Start Time   : $($startTime.ToString('HH:mm:ss'))" -ForegroundColor White
          Write-Host "║  🕐 End Time     : $($endTime.ToString('HH:mm:ss'))" -ForegroundColor White
          Write-Host "╠══════════════════════════════════════════════════════════════╣" -ForegroundColor Green
          Write-Host "║  💡 CONNECTION GUIDE:                                          ║" -ForegroundColor Yellow
          Write-Host "║     1. Open Remote Desktop Connection (mstsc)                 ║" -ForegroundColor White
          Write-Host "║     2. Enter IP: $ip" -ForegroundColor White
          Write-Host "║     3. Username: AISTV-PREMIUM                                ║" -ForegroundColor White
          Write-Host "║     4. Password as above                                      ║" -ForegroundColor White
          Write-Host "║     5. Click Connect and Enjoy! 🚀                            ║" -ForegroundColor White
          Write-Host "╚══════════════════════════════════════════════════════════════╝" -ForegroundColor Green
          
          echo "WIN11_DURATION=$totalMinutes" >> $env:GITHUB_ENV
      
      - name: ⏳ WIN11 - SESSION MAINTENANCE
        run: |
          $totalMinutes = $env:WIN11_DURATION
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $endTime = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone).AddMinutes($totalMinutes)
          
          Write-Host ""
          Write-Host "🔄 MAINTAINING WINDOWS 11 VM SESSION" -ForegroundColor Yellow
          Write-Host "│ ⏱️  Session will expire at: $($endTime.ToString('HH:mm:ss'))" -ForegroundColor Cyan
          Write-Host ""
          
          $monitorJob = Start-Job -ScriptBlock {
            while ($true) {
              $currentTime = Get-Date
              $service = Get-Service -Name TermService -ErrorAction SilentlyContinue
              if ($service.Status -ne 'Running') {
                Start-Service -Name TermService -Force
              }
              Start-Sleep -Seconds 60
            }
          }
          
          $frames = @('⠋', '⠙', '⠹', '⠸', '⠼', '⠴', '⠦', '⠧', '⠇', '⠏')
          $i = 0
          
          do {
            $currentTime = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
            $remaining = $endTime - $currentTime
            
            $hours = [math]::Max(0, [math]::Floor($remaining.TotalHours))
            $minutes = [math]::Max(0, [math]::Floor($remaining.TotalMinutes % 60))
            $seconds = [math]::Max(0, [math]::Floor($remaining.TotalSeconds % 60))
            
            $frame = $frames[$i % $frames.Length]
            Write-Host "`r$frame [$($currentTime.ToString('HH:mm:ss'))] Time Remaining: $hours h $minutes m $seconds s" -NoNewline -ForegroundColor Cyan
            
            $i++
            Start-Sleep -Seconds 5
          } while ($remaining.TotalSeconds -gt 0)
          
          Write-Host ""
          Write-Host "🎯 SESSION EXPIRED - VM WILL BE CLEANED UP" -ForegroundColor Red
          Stop-Job $monitorJob
      
      - name: 🧹 WIN11 - AUTO CLEANUP
        if: always() && github.event.inputs.auto_cleanup == 'true'
        run: |
          Write-Host ""
          Write-Host "🧹 CLEANING UP WINDOWS 11 VM" -ForegroundColor Yellow
          
          Disable-LocalUser -Name "AISTV-PREMIUM" -ErrorAction SilentlyContinue
          Remove-Item "$env:TEMP\win11_pass.txt" -Force -ErrorAction SilentlyContinue
          
          netsh advfirewall firewall delete rule name="RDP-Win11" -ErrorAction SilentlyContinue
          
          Write-Host "✅ Cleanup Complete" -ForegroundColor Green

# ===================================================================
# JOB 2: WINDOWS SERVER 2022 PROVISIONING - ISOLATED MODULE
# ===================================================================
  WindowsServer-VM:
    if: github.event.inputs.os_type == 'windows-server-2022'
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: 🎯 WINSRV - SYSTEM INITIALIZATION
        run: |
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║     🖧  WINDOWS SERVER 2022 PREMIUM VM - INITIALIZATION     ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          
          $global:SrvStartTime = Get-Date
          $global:SrvLogDir = "$env:TEMP\winsrv_$(Get-Date -Format 'yyyyMMdd_HHmmss')"
          New-Item -ItemType Directory -Path $global:SrvLogDir -Force | Out-Null
          
          Write-Host "│ 📁 Log: $global:SrvLogDir" -ForegroundColor White
          Write-Host "│ 🕐 Started: $($global:SrvStartTime.ToString('HH:mm:ss'))" -ForegroundColor White
          Write-Host "│ 🖧  Role: Windows Server 2022 Datacenter" -ForegroundColor White
          Write-Host ""
      
      - name: 🔧 WINSRV - SERVER CONFIGURATION
        run: |
          Write-Host "🔧 CONFIGURING WINDOWS SERVER" -ForegroundColor Yellow
          
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP-Server" dir=in action=allow protocol=TCP localport=3389
          
          Install-WindowsFeature -Name Web-Server, Web-WebSockets, Web-Asp-Net45 -IncludeManagementTools -ErrorAction SilentlyContinue
          
          Write-Host "✅ Server Configuration Complete" -ForegroundColor Green
      
      - name: 👤 WINSRV - USER ACCOUNT
        run: |
          $username = "ADMIN-PREMIUM"
          $password = "Srv@2026" + (Get-Random -Minimum 1000 -Maximum 9999)
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          Remove-LocalUser -Name $username -ErrorAction SilentlyContinue
          New-LocalUser -Name $username -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $username
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
          
          echo "WINSRV_USER=$username" >> $env:GITHUB_ENV
          echo "WINSRV_PASS=$password" >> $env:GITHUB_ENV
          echo "$password" > "$env:TEMP\winsrv_pass.txt"
          
          Write-Host "✅ User: $username | Password: $password" -ForegroundColor Green
      
      - name: 🌐 WINSRV - NETWORK & INFO
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          if ($env:TAILSCALE_AUTH_KEY) {
            $msiPath = "$env:TEMP\tailscale.msi"
            Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msiPath
            Start-Process msiexec.exe -ArgumentList "/i `"$msiPath`" /quiet /norestart" -Wait
            Start-Sleep -Seconds 10
            & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname="winsrv-premium-$env:GITHUB_RUN_ID"
            $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          } else {
            $ip = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing).Content
          }
          
          echo "WINSRV_IP=$ip" >> $env:GITHUB_ENV
          
          $password = Get-Content "$env:TEMP\winsrv_pass.txt"
          
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════════╗" -ForegroundColor Green
          Write-Host "║     🎉 WINDOWS SERVER 2022 - READY FOR CONNECTION           ║" -ForegroundColor Green
          Write-Host "╠══════════════════════════════════════════════════════════════╣" -ForegroundColor Green
          Write-Host "║  🌐 Address      : $ip" -ForegroundColor White
          Write-Host "║  👤 Username     : ADMIN-PREMIUM" -ForegroundColor White
          Write-Host "║  🔐 Password     : $password" -ForegroundColor White
          Write-Host "║  🔌 Port         : 3389" -ForegroundColor White
          Write-Host "║  🌐 Web Port     : 80, 443" -ForegroundColor White
          Write-Host "╚══════════════════════════════════════════════════════════════╝" -ForegroundColor Green
      
      - name: ⏳ WINSRV - MAINTENANCE
        run: |
          $duration = "${{ github.event.inputs.duration }}"
          $minutes = switch ($duration) { "30m" {30} "1h" {60} "2h" {120} "3h" {180} "4h" {240} "5h" {300} "6h" {360} default {240} }
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $endTime = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone).AddMinutes($minutes)
          
          Write-Host "⏳ Server Running Until: $($endTime.ToString('HH:mm:ss'))" -ForegroundColor Cyan
          
          while ((Get-Date) -lt $endTime) {
            Start-Sleep -Seconds 60
          }
          
          Write-Host "🎯 Server Session Expired" -ForegroundColor Red
      
      - name: 🧹 WINSRV - CLEANUP
        if: always() && github.event.inputs.auto_cleanup == 'true'
        run: |
          Disable-LocalUser -Name "ADMIN-PREMIUM"
          Remove-Item "$env:TEMP\winsrv_pass.txt" -Force -ErrorAction SilentlyContinue
          Write-Host "✅ Cleanup Complete" -ForegroundColor Green

# ===================================================================
# JOB 3: UBUNTU 22.04 PROVISIONING - ISOLATED MODULE
# ===================================================================
  Ubuntu2204-VM:
    if: github.event.inputs.os_type == 'ubuntu-22-04'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: 🎯 UBUNTU22 - SYSTEM INITIALIZATION
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║     🐧  UBUNTU 22.04 LTS PREMIUM VM - INITIALIZATION        ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          
          START_TIME=$(date +%s)
          LOG_DIR="/tmp/ubuntu22_$(date +%Y%m%d_%H%M%S)"
          mkdir -p $LOG_DIR
          
          echo "│ 📁 Log: $LOG_DIR"
          echo "│ 🐧 Version: Ubuntu 22.04 LTS Jammy"
          echo "│ 🕐 Started: $(date '+%H:%M:%S')"
          echo ""
          
          echo "UBUNTU22_START=$START_TIME" >> $GITHUB_ENV
          echo "UBUNTU22_LOG_DIR=$LOG_DIR" >> $GITHUB_ENV
      
      - name: 🔧 UBUNTU22 - SYSTEM UPDATE
        run: |
          echo "🔧 UPDATING SYSTEM PACKAGES" -ForegroundColor Yellow
          
          sudo apt-get update -y
          sudo apt-get upgrade -y
          sudo apt-get install -y ufw openssh-server curl wget git htop net-tools
          
          echo "✅ System Updated" -ForegroundColor Green
      
      - name: 🔐 UBUNTU22 - SSH CONFIGURATION
        run: |
          echo "🔐 CONFIGURING SSH ACCESS" -ForegroundColor Yellow
          
          sudo systemctl enable ssh
          sudo systemctl start ssh
          
          sudo ufw --force enable
          sudo ufw allow 22/tcp
          sudo ufw allow 80/tcp
          sudo ufw allow 443/tcp
          
          echo "✅ SSH Configured" -ForegroundColor Green
      
      - name: 👤 UBUNTU22 - USER CREATION
        run: |
          echo "👤 CREATING PREMIUM USER" -ForegroundColor Yellow
          
          USERNAME="aistv-premium"
          PASSWORD="Ubuntu@$(date +%s | sha256sum | base64 | head -c 12)"
          
          sudo useradd -m -s /bin/bash $USERNAME
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo $USERNAME
          
          sudo mkdir -p /home/$USERNAME/.ssh
          sudo chmod 700 /home/$USERNAME/.ssh
          sudo chown $USERNAME:$USERNAME /home/$USERNAME/.ssh
          
          echo "UBUNTU22_USER=$USERNAME" >> $GITHUB_ENV
          echo "UBUNTU22_PASS=$PASSWORD" >> $GITHUB_ENV
          echo "$PASSWORD" > /tmp/ubuntu22_pass.txt
          
          echo "✅ User: $USERNAME" -ForegroundColor Green
          echo "🔐 Password: $PASSWORD" -ForegroundColor Green
      
      - name: 🌐 UBUNTU22 - NETWORK SETUP
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          echo "🌐 CONFIGURING NETWORK" -ForegroundColor Yellow
          
          if [ -n "$TAILSCALE_AUTH_KEY" ]; then
            curl -fsSL https://tailscale.com/install.sh | sh
            sudo tailscale up --authkey=$TAILSCALE_AUTH_KEY --hostname="ubuntu22-premium-$GITHUB_RUN_ID"
            IP=$(sudo tailscale ip -4)
          else
            IP=$(curl -s ifconfig.me)
          fi
          
          echo "UBUNTU22_IP=$IP" >> $GITHUB_ENV
          echo "✅ IP Address: $IP" -ForegroundColor Green
      
      - name: 📦 UBUNTU22 - SOFTWARE INSTALLATION
        run: |
          echo "📦 INSTALLING ADDITIONAL SOFTWARE" -ForegroundColor Yellow
          
          # Docker
          curl -fsSL https://get.docker.com -o get-docker.sh
          sudo sh get-docker.sh
          sudo usermod -aG docker ${{ env.UBUNTU22_USER }}
          
          # Nginx
          sudo apt-get install -y nginx
          sudo systemctl enable nginx
          
          # Node.js
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs
          
          echo "✅ Software Installed" -ForegroundColor Green
      
      - name: 🎉 UBUNTU22 - CONNECTION INFO
        run: |
          PASSWORD=$(cat /tmp/ubuntu22_pass.txt)
          IP=${{ env.UBUNTU22_IP }}
          USERNAME=${{ env.UBUNTU22_USER }}
          DURATION="${{ github.event.inputs.duration }}"
          
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║     🎉 UBUNTU 22.04 PREMIUM VM - READY FOR CONNECTION       ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  🌐 Address      : $IP"
          echo "║  👤 Username     : $USERNAME"
          echo "║  🔐 Password     : $PASSWORD"
          echo "║  🔌 SSH Port     : 22"
          echo "║  🌐 Web Port     : 80, 443"
          echo "║  🐳 Docker       : Installed"
          echo "║  📦 Node.js      : Installed"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  💡 CONNECTION GUIDE:                                         ║"
          echo "║     ssh $USERNAME@$IP                                        ║"
          echo "║     Password: $PASSWORD                                      ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
      
      - name: ⏳ UBUNTU22 - SESSION MAINTENANCE
        run: |
          DURATION="${{ github.event.inputs.duration }}"
          MINUTES=$(echo "$DURATION" | sed 's/h/*60/' | sed 's/m//' | bc)
          END_TIME=$(date -d "+$MINUTES minutes" +%s)
          
          echo "⏳ Session running until: $(date -d @$END_TIME '+%H:%M:%S')"
          
          while [ $(date +%s) -lt $END_TIME ]; do
            REMAINING=$((END_TIME - $(date +%s)))
            HOURS=$((REMAINING / 3600))
            MINS=$(((REMAINING % 3600) / 60))
            SECS=$((REMAINING % 60))
            printf "\r🕐 Time Remaining: %02d:%02d:%02d" $HOURS $MINS $SECS
            sleep 5
          done
          
          echo ""
          echo "🎯 Session Expired" -ForegroundColor Red
      
      - name: 🧹 UBUNTU22 - CLEANUP
        if: always() && github.event.inputs.auto_cleanup == 'true'
        run: |
          sudo userdel -r aistv-premium 2>/dev/null
          sudo rm -f /tmp/ubuntu22_pass.txt
          echo "✅ Cleanup Complete" -ForegroundColor Green

# ===================================================================
# JOB 4: UBUNTU 24.04 PROVISIONING - ISOLATED MODULE
# ===================================================================
  Ubuntu2404-VM:
    if: github.event.inputs.os_type == 'ubuntu-24-04'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: 🎯 UBUNTU24 - SYSTEM INITIALIZATION
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║     🐧  UBUNTU 24.04 LTS NOBLE - PREMIUM VM                 ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          
          echo "│ 🐧 Version: Ubuntu 24.04 LTS Noble Numbat"
          echo "│ 🕐 Started: $(date '+%H:%M:%S')"
          echo ""
      
      - name: 🔧 UBUNTU24 - SYSTEM CONFIGURATION
        run: |
          sudo apt-get update -y
          sudo apt-get upgrade -y
          sudo apt-get install -y ufw openssh-server curl wget git htop neofetch
          
          sudo systemctl enable ssh
          sudo systemctl start ssh
          
          sudo ufw --force enable
          sudo ufw allow 22/tcp
          
          echo "✅ Ubuntu 24.04 Configured" -ForegroundColor Green
      
      - name: 👤 UBUNTU24 - USER SETUP
        run: |
          USERNAME="premium-user"
          PASSWORD="Noble@$(openssl rand -base64 8 | tr -d '=/+')"
          
          sudo useradd -m -s /bin/bash $USERNAME
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo $USERNAME
          
          echo "UBUNTU24_USER=$USERNAME" >> $GITHUB_ENV
          echo "UBUNTU24_PASS=$PASSWORD" >> $GITHUB_ENV
          
          echo "✅ User Created" -ForegroundColor Green
      
      - name: 🌐 UBUNTU24 - NETWORK
        run: |
          IP=$(curl -s ifconfig.me)
          echo "UBUNTU24_IP=$IP" >> $GITHUB_ENV
          echo "✅ IP: $IP" -ForegroundColor Green
      
      - name: 🎉 UBUNTU24 - INFO
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║     🎉 UBUNTU 24.04 PREMIUM VM - READY                      ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  🌐 Address : ${{ env.UBUNTU24_IP }}"
          echo "║  👤 User    : ${{ env.UBUNTU24_USER }}"
          echo "║  🔐 Password: ${{ env.UBUNTU24_PASS }}"
          echo "╚══════════════════════════════════════════════════════════════╝"
      
      - name: ⏳ UBUNTU24 - RUN
        run: sleep 3600

