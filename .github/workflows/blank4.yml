#!/usr/bin/env pwsh
# =====================================================================
#                    🚀 VPS PROVISIONING SCRIPT v3.0
#                    Hoàn chỉnh - Không lỗi - Tối ưu
# =====================================================================

# Cấu hình an toàn
$ErrorActionPreference = "Stop"
$ProgressPreference = "SilentlyContinue"

# Biến toàn cục
$script:StepCurrent = 0
$script:StepTotal = 7
$script:LogFile = "/tmp/vps_setup_$(Get-Date -Format 'yyyyMMdd_HHmmss').log"

# =====================================================================
# 📋 HÀM TIỆN ÍCH
# =====================================================================

function Write-Step {
    param(
        [string]$Title,
        [string]$Icon = "📌"
    )
    $script:StepCurrent++
    $percent = [math]::Round(($script:StepCurrent / $script:StepTotal) * 100)
    
    Write-Host ""
    Write-Host "╔══════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
    Write-Host "║ $Icon  Bước $($script:StepCurrent)/$($script:StepTotal): $Title" -ForegroundColor Yellow
    Write-Host "║  Tiến độ: [$percent%] Hoàn thành" -ForegroundColor White
    Write-Host "╚══════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
    Write-Host ""
    
    # Ghi log
    $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
    "[$timestamp] START: $Title" | Out-File -FilePath $script:LogFile -Append
}

function Write-Success {
    param([string]$Message)
    Write-Host "✅ $Message" -ForegroundColor Green
    $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
    "[$timestamp] SUCCESS: $Message" | Out-File -FilePath $script:LogFile -Append
}

function Write-Error {
    param([string]$Message)
    Write-Host "❌ $Message" -ForegroundColor Red
    $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
    "[$timestamp] ERROR: $Message" | Out-File -FilePath $script:LogFile -Append
}

function Write-Warning {
    param([string]$Message)
    Write-Host "⚠️  $Message" -ForegroundColor Yellow
    $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
    "[$timestamp] WARNING: $Message" | Out-File -FilePath $script:LogFile -Append
}

function Write-Info {
    param([string]$Message)
    Write-Host "ℹ️  $Message" -ForegroundColor White
    $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
    "[$timestamp] INFO: $Message" | Out-File -FilePath $script:LogFile -Append
}

