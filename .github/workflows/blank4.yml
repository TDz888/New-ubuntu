            @{Name = "Ultimate Power Plan"; Script = { powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c }}
            @{Name = "Disable Defender"; Script = { Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue }}
            @{Name = "Clear Neural Cache"; Script = { Remove-Item "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue }}
            @{Name = "Optimize Network Stack"; Script = { netsh int tcp set global autotuninglevel=normal }}
            @{Name = "Enable Large System Cache"; Script = { Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management" -Name "LargeSystemCache" -Value 1 -Force }}
          )
          
          foreach ($opt in $optimizations) {
            Write-Host "│ 🔧 $($opt.Name)..." -NoNewline
            try {
              & $opt.Script
              Write-Host " ✓" -ForegroundColor Green
            } catch {
              Write-Host " ⚠️" -ForegroundColor Yellow
            }
          }
          
          Write-Host "│ ✅ Quantum performance boosted" -ForegroundColor Green
          Write-Host ""
      
      - name: 📱 WIN11 - QUANTUM TELEGRAM NOTIFICATION
        if: github.event.inputs.telegram_notify == 'true'
        env:
