  # ==============================================================================
  # JOB 9: RUNTIME MANAGER - QUẢN LÝ THỜI GIAN CHẠY
  # ==============================================================================
  runtime_manager:
    needs: [master_brain, windows_cortex, ubuntu22_cortex, ubuntu24_cortex, debian_cortex, centos_cortex, almalinux_cortex]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: ⏱️ RUNTIME MANAGER - DUY TRÌ HOẠT ĐỘNG
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════════════════════════════════════════╗"
          echo "║  ⏱️ RUNTIME MANAGER - ĐANG DUY TRÌ KẾT NỐI THẦN KINH                                                   ║"
          echo "╚════════════════════════════════════════════════════════════════════════════════════════════════════════╝"
          echo ""
          
          DUR=${{ needs.master_brain.outputs.duration_minutes }}
          START=${{ needs.master_brain.outputs.start_timestamp }}
          CURRENT=$(date +%s)
          ELAPSED=$((CURRENT - START))
          REMAINING=$((DUR * 60 - ELAPSED))
          
          if [ $REMAINING -le 0 ]; then
            echo "[WARN] Runtime already expired, continuing cleanup"
          else
            echo "[INFO] Runtime will keep neural network alive for $REMAINING seconds"
            echo "[INFO] Termination time: ${{ needs.master_brain.outputs.termination_time }}"
            
            END=$(( $(date +%s) + REMAINING ))
            while [ $(date +%s) -lt $END ]; do
              REMAIN=$((END - $(date +%s)))
              echo "[KEEPALIVE] Neural network active - remaining: $((REMAIN / 60)) minutes $((REMAIN % 60)) seconds"
              sleep 60
            done
          fi
          
          echo ""
          echo "[COMPLETE] Runtime manager completed"
          echo ""

