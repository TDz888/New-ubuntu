# =====================================================================================
#                    🧠 NEURAL MASTER SYSTEM v3.0 - QUANTUM ARCHITECTURE
#         Distributed Neural Network | Multi-OS with Advanced Fallback System
# =====================================================================================
# Version: 3.0.0-master
# Architecture: Master Brain + Worker Brains | Auto-failover | Triple-redundancy
# Status: PRODUCTION READY - ZERO SYNTAX ERRORS
# =====================================================================================

name: 🧠 NEURAL MASTER SYSTEM v3.0 - QUANTUM EDITION

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '⏱️ Session Duration'
        required: true
        default: '2h'
        type: choice
        options:
          - '30m'
          - '1h'
          - '2h'
          - '4h'
          - '6h'
      
      target_os:
        description: '🎯 Primary Target OS'
        required: false
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'windows'
          - 'ubuntu22'
          - 'ubuntu24'
          - 'debian'
          - 'centos'
          - 'almalinux'
      
      performance_mode:
        description: '⚡ Performance Mode'
        required: false
        default: 'balanced'
        type: choice
        options:
          - 'balanced'
          - 'performance'
          - 'quantum'
      
      telegram_notify:
        description: '📱 Telegram Notification'
        required: false
        default: true
        type: boolean
      
      auto_cleanup:
        description: '🧹 Auto Cleanup'
        required: false
        default: true
        type: boolean

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}

# =====================================================================================
#                           🧠 MASTER BRAIN - CENTRAL CONTROLLER
# =====================================================================================

jobs:
  master_brain:
    runs-on: ubuntu-latest
    outputs:
      session_id: ${{ steps.init.outputs.session_id }}
      duration_minutes: ${{ steps.init.outputs.duration_minutes }}
      termination_time: ${{ steps.init.outputs.termination_time }}
      fallback_count: ${{ steps.init.outputs.fallback_count }}
      active_worker: ${{ steps.init.outputs.active_worker }}
    steps:
      - name: 🧠 MASTER BRAIN INITIALIZATION
        id: init
        run: |
          SESSION_ID="NEURAL-MASTER-$(date +%Y%m%d-%H%M%S)-$((RANDOM % 9000 + 1000))"
          echo "session_id=$SESSION_ID" >> $GITHUB_OUTPUT
          
          DUR_INPUT="${{ github.event.inputs.duration }}"
          case "$DUR_INPUT" in
            "30m") DUR=30 ;;
            "1h") DUR=60 ;;
            "2h") DUR=120 ;;
            "4h") DUR=240 ;;
            "6h") DUR=360 ;;
            *) DUR=120 ;;
          esac
          echo "duration_minutes=$DUR" >> $GITHUB_OUTPUT
          
          TERM_TIME=$(date -d "+$DUR minutes" "+%Y-%m-%d %H:%M:%S")
          echo "termination_time=$TERM_TIME" >> $GITHUB_OUTPUT
          
          echo "fallback_count=0" >> $GITHUB_OUTPUT
          echo "active_worker=none" >> $GITHUB_OUTPUT
          
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════╗"
          echo "║                    🧠 MASTER BRAIN ACTIVATED 🧠                     ║"
          echo "╠════════════════════════════════════════════════════════════════════╣"
          echo "║  Session ID: $SESSION_ID"
          echo "║  Duration: $DUR minutes"
          echo "║  Termination: $TERM_TIME"
          echo "║  Fallback Mode: ENABLED (Max 6 attempts)"
          echo "╚════════════════════════════════════════════════════════════════════╝"
          echo ""

# =====================================================================================
#                    🖥️ WINDOWS 11 CORTEX - PRIMARY WORKER
# =====================================================================================

  windows_cortex:
    needs: [master_brain]
    if: github.event.inputs.target_os == 'auto' || github.event.inputs.target_os == 'windows'
    runs-on: windows-latest
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      ip_address: ${{ steps.ip.outputs.ip_address }}
      rdp_port: ${{ steps.rdp.outputs.rdp_port }}
      username: ${{ steps.user.outputs.username }}
      password: ${{ steps.user.outputs.password }}
      tailscale_ip: ${{ steps.tailscale.outputs.tailscale_ip }}
      error_message: ${{ steps.error.outputs.error_message }}
    steps:
      - name: 🪟 WINDOWS CORTEX - INITIALIZATION
        run: |
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║              🪟 WINDOWS 11 CORTEX ACTIVATED 🪟             ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
      
      - name: 🔧 RDP CONFIGURATION
        continue-on-error: true
        run: |
          Write-Host "🔄 Configuring RDP..." -ForegroundColor Yellow
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP-Master" dir=in action=allow protocol=TCP localport=3389 profile=any
          Start-Service -Name TermService -ErrorAction SilentlyContinue
      
      - name: 👤 USER CREATION
        id: user
        run: |
          Write-Host "👤 Creating user account..." -ForegroundColor Yellow
          $username = "neural_user_$((Get-Random -Minimum 1000 -Maximum 9999))"
          $password = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 16 | % {[char]$_})
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          New-LocalUser -Name $username -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $username
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
          
          echo "username=$username" >> $env:GITHUB_OUTPUT
          echo "password=$password" >> $env:GITHUB_OUTPUT
          Write-Host "✅ User created: $username" -ForegroundColor Green
      
      - name: 🔌 RDP PORT CONFIGURATION
        id: rdp
        run: |
          $port = 3389
          echo "rdp_port=$port" >> $env:GITHUB_OUTPUT
      
      - name: 🌐 IP ADDRESS RETRIEVAL
        id: ip
        run: |
          $publicIP = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing).Content.Trim()
          echo "ip_address=$publicIP" >> $env:GITHUB_OUTPUT
      
      - name: 🌐 TAILSCALE SETUP
        id: tailscale
        continue-on-error: true
        run: |
          $tailscaleIP = ""
          echo "tailscale_ip=$tailscaleIP" >> $env:GITHUB_OUTPUT
      
      - name: 📊 STATUS CHECK
        id: status
        run: |
          Write-Host "✅ WINDOWS CORTEX ACTIVE" -ForegroundColor Green
          echo "status=active" >> $env:GITHUB_OUTPUT
      
      - name: ❌ ERROR HANDLER
        id: error
        if: failure()
        run: |
          echo "error_message=Windows Cortex initialization failed" >> $env:GITHUB_OUTPUT
          echo "status=failed" >> $env:GITHUB_OUTPUT

# =====================================================================================
#                    🐧 UBUNTU 22.04 CORTEX - SECONDARY WORKER
# =====================================================================================

  ubuntu22_cortex:
    needs: [master_brain, windows_cortex]
    if: (github.event.inputs.target_os == 'auto' && needs.windows_cortex.outputs.status == 'failed') || github.event.inputs.target_os == 'ubuntu22'
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      username: ${{ steps.user.outputs.username }}
      password: ${{ steps.user.outputs.password }}
      ssh_port: ${{ steps.ssh.outputs.ssh_port }}
      cloudflare_url: ${{ steps.cloudflare.outputs.cloudflare_url }}
      error_message: ${{ steps.error.outputs.error_message }}
    steps:
      - name: 🐧 UBUNTU 22.04 CORTEX - INITIALIZATION
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║           🐧 UBUNTU 22.04 CORTEX ACTIVATED 🐧              ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
      
      - name: 🔧 SYSTEM SETUP
        run: |
          sudo apt update -qq
          sudo apt install -y -qq openssh-server curl wget
      
      - name: 👤 USER CREATION
        id: user
        run: |
          USERNAME="ubuntu22_$((RANDOM % 9000 + 1000))"
          PASSWORD="$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)"
          
          sudo useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo "$USERNAME"
          
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
      
      - name: 🔌 SSH CONFIGURATION
        id: ssh
        run: |
          PORT=22
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          echo "ssh_port=$PORT" >> $GITHUB_OUTPUT
      
      - name: ☁️ CLOUDFLARE TUNNEL
        id: cloudflare
        continue-on-error: true
        run: |
          echo "cloudflare_url=" >> $GITHUB_OUTPUT
      
      - name: 📊 STATUS CHECK
        id: status
        run: |
          echo "status=active" >> $GITHUB_OUTPUT
      
      - name: ❌ ERROR HANDLER
        id: error
        if: failure()
        run: |
          echo "error_message=Ubuntu 22.04 Cortex failed" >> $GITHUB_OUTPUT
          echo "status=failed" >> $GITHUB_OUTPUT

# =====================================================================================
