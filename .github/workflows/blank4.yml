          sudo userdel -r ${{ env.NEURAL_USERNAME }} 2>/dev/null
          sudo rm -f /tmp/neural_password.txt
          echo "✅ Cleanup complete"

# =====================================================================================
# 🧠 JOB 5: DEBIAN 12 NEURAL BRAIN
# =====================================================================================
  Debian12-NeuralBrain:
    if: github.event.inputs.os_type == 'debian-12'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: 🧠 DEBIAN12 - NEURAL BOOTSTRAP
        run: |
          NEURAL_SESSION_ID="DEB12-$(openssl rand -hex 6)"
          echo "NEURAL_SESSION_ID=$NEURAL_SESSION_ID" >> $GITHUB_ENV
          
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════════╗"
          echo "║  🔷  D E B I A N   1 2   N E U R A L   C O R E                      ║"
          echo "╠════════════════════════════════════════════════════════════════════════╣"
          echo "║  🧠 Neural Cortex: Debian 12 Bookworm                                ║"
          echo "║  ⚡ Processing Power: ${{ github.event.inputs.vm_specs }}"
          echo "║  🕐 Session ID: $NEURAL_SESSION_ID"
          echo "╚════════════════════════════════════════════════════════════════════════╝"
          echo ""
      
      - name: ⚡ DEBIAN12 - SYSTEM UPDATE
        run: |
          sudo apt-get update -y
          sudo apt-get upgrade -y
          sudo apt-get install -y ufw openssh-server curl wget git htop neofetch
          echo "✅ System updated"
      
      - name: 🔐 DEBIAN12 - NEURAL IDENTITY
        run: |
          NEURAL_USERNAME="neural-debian"
          NEURAL_PASSWORD="Neural@$(openssl rand -base64 12 | tr -d '=/+' | head -c 14)"
          
          sudo useradd -m -s /bin/bash $NEURAL_USERNAME
          echo "$NEURAL_USERNAME:$NEURAL_PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo $NEURAL_USERNAME
          
          echo "NEURAL_USERNAME=$NEURAL_USERNAME" >> $GITHUB_ENV
          echo "NEURAL_PASSWORD=$NEURAL_PASSWORD" >> $GITHUB_ENV
          echo "$NEURAL_PASSWORD" > /tmp/neural_password.txt
          
          echo "✅ Neural identity: $NEURAL_USERNAME"
      
      - name: 🌐 DEBIAN12 - NETWORK ACTIVATION
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          sudo ufw --force enable
          sudo ufw allow 22/tcp
          sudo systemctl enable ssh && sudo systemctl start ssh
          
          if [ -n "$TAILSCALE_AUTH_KEY" ]; then
            curl -fsSL https://tailscale.com/install.sh | sh
            sudo tailscale up --authkey=$TAILSCALE_AUTH_KEY --hostname="neural-deb12-$GITHUB_RUN_ID"
            NEURAL_IP=$(sudo tailscale ip -4)
          else
            NEURAL_IP=$(curl -s ifconfig.me)
          fi
          
          echo "NEURAL_IP=$NEURAL_IP" >> $GITHUB_ENV
          echo "✅ Neural network: $NEURAL_IP"
      
      - name: 🎉 DEBIAN12 - CONNECTION DISPLAY
        run: |
          PASSWORD=$(cat /tmp/neural_password.txt)
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════════╗"
          echo "║  🔷 DEBIAN 12 NEURAL BRAIN - ACTIVE                                  ║"
          echo "╠════════════════════════════════════════════════════════════════════════╣"
          echo "║  🌐 IP: ${{ env.NEURAL_IP }}"
          echo "║  👤 User: ${{ env.NEURAL_USERNAME }}"
          echo "║  🔐 Pass: $PASSWORD"
          echo "╠════════════════════════════════════════════════════════════════════════╣"
          echo "║  🔧 ssh ${{ env.NEURAL_USERNAME }}@${{ env.NEURAL_IP }}"
          echo "╚════════════════════════════════════════════════════════════════════════╝"
          echo ""
      
      - name: ⏳ DEBIAN12 - MAINTENANCE
        run: |
          MINUTES=$(echo "${{ github.event.inputs.duration }}" | sed 's/h/*60/' | sed 's/m//' | bc)
          sleep $((MINUTES * 60))
      
      - name: 🧹 DEBIAN12 - CLEANUP
        if: always() && github.event.inputs.auto_cleanup == 'true'
        run: |
          sudo userdel -r ${{ env.NEURAL_USERNAME }} 2>/dev/null
          sudo rm -f /tmp/neural_password.txt
          echo "✅ Cleanup complete"

