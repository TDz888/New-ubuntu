            MSG="$MSG"$'\n'"🌐 \`ssh ${{ needs.ubuntu24_deploy.outputs.username }}@${{ needs.ubuntu24_deploy.outputs.ip }} -p ${{ needs.ubuntu24_deploy.outputs.port }}\`"
