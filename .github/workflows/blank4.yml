          echo "╔════════════════════════════════════════════════════════════════════╗"
          echo "║                    📦 CENTOS 9 DEPLOYMENT 📦                        ║"
          echo "╚════════════════════════════════════════════════════════════════════╝"
          echo ""

      - name: 📋 Get OS Info
        id: os_info
        run: |
          echo "os_type=CentOS Stream 9" >> $GITHUB_OUTPUT
          echo "✅ OS: CentOS Stream 9"

      - name: 🔧 Method 1 - Install wget (avoid curl conflict)
        run: |
          echo "[1/8] Installing wget (alternative to curl)..."
          dnf install -y wget
          echo "✅ wget installed"

      - name: 📦 Method 2 - Install SSH Server (skip curl)
        run: |
          echo "[2/8] Installing OpenSSH server..."
          dnf install -y openssh-server --skip-broken
          echo "✅ OpenSSH server installed"

      - name: 🔧 Method 3 - Install sudo
        run: |
          echo "[3/8] Installing sudo..."
          dnf install -y sudo --skip-broken
          echo "✅ sudo installed"

      - name: 👤 Method 4 - Create User
        id: create_user
        run: |
          echo "[4/8] Creating user account..."
          USERNAME="centos_$((RANDOM % 9000 + 1000))"
          PASSWORD=$(openssl rand -base64 20 | tr -d '=+/' | cut -c1-24)
          useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | chpasswd
          usermod -aG wheel "$USERNAME"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "✅ User created: $USERNAME"

      - name: ⚙️ Method 5 - Configure SSH (No systemd)
        id: ssh_port
        run: |
          echo "[5/8] Configuring SSH service..."
          sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "port=22" >> $GITHUB_OUTPUT
          
          # Start SSH directly without systemd
          /usr/sbin/sshd
          echo "✅ SSH configured and started on port 22"

      - name: 🌐 Method 6 - Get IP using wget
        id: get_ip
        run: |
          echo "[6/8] Getting public IP using wget..."
          IP=$(wget -qO- --timeout=10 https://api.ipify.org 2>/dev/null)
          if [ -z "$IP" ]; then
            IP=$(wget -qO- --timeout=10 https://ifconfig.me/ip 2>/dev/null)
          fi
          if [ -z "$IP" ]; then
            IP="IP_UNAVAILABLE"
          fi
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "✅ Public IP: $IP"

      - name: 🔍 Method 7 - Verify SSH Process
        id: status
        run: |
          echo "[7/8] Verifying SSH service..."
          if pgrep sshd > /dev/null 2>&1; then
            echo "status=active" >> $GITHUB_OUTPUT
            echo "✅ SSH daemon is running"
          else
            # Try to start again
            /usr/sbin/sshd
            sleep 2
            if pgrep sshd > /dev/null 2>&1; then
              echo "status=active" >> $GITHUB_OUTPUT
              echo "✅ SSH daemon started successfully"
            else
              echo "status=failed" >> $GITHUB_OUTPUT
              echo "❌ SSH daemon failed to start"
            fi
          fi

      - name: 📊 Method 8 - Show SSH Status
        run: |
          echo "[8/8] Final status check..."
          ps aux | grep sshd | grep -v grep || echo "No SSH process found"
          
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════╗"
          echo "║  ✅ CENTOS 9 DEPLOYMENT COMPLETE                                    ║"
          echo "╠════════════════════════════════════════════════════════════════════╣"
          echo "║  🌐 SSH: ssh ${{ steps.create_user.outputs.username }}@${{ steps.get_ip.outputs.ip }} -p 22"
          echo "║  👤 User: ${{ steps.create_user.outputs.username }}"
          echo "║  🔐 Pass: ${{ steps.create_user.outputs.password }}"
          echo "╚════════════════════════════════════════════════════════════════════╝"
          echo ""

  # ==============================================================================
  # 🔷 ALMALINUX 9 - SSH ACCESS (FIXED: NO SYSTEMD)
  # ==============================================================================
  almalinux_deploy:
    needs: [master_brain]
    if: github.event.inputs.target_os == 'almalinux' || github.event.inputs.target_os == 'all'
    runs-on: ubuntu-latest
    container:
      image: almalinux:9
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      port: ${{ steps.ssh_port.outputs.port }}
      ip: ${{ steps.get_ip.outputs.ip }}
      os_type: ${{ steps.os_info.outputs.os_type }}
    steps:
      - name: 🔷 AlmaLinux 9 Deployment Start
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════╗"
          echo "║                    🔷 ALMALINUX 9 DEPLOYMENT 🔷                     ║"
          echo "╚════════════════════════════════════════════════════════════════════╝"
          echo ""

      - name: 📋 Get OS Info
        id: os_info
        run: |
          echo "os_type=AlmaLinux 9" >> $GITHUB_OUTPUT
          echo "✅ OS: AlmaLinux 9"

      - name: 📦 Method 1 - Install SSH Server
        run: |
          echo "[1/7] Installing OpenSSH server..."
          dnf install -y openssh-server
          echo "✅ OpenSSH server installed"

      - name: 🔧 Method 2 - Install sudo and curl
        run: |
          echo "[2/7] Installing sudo and curl..."
          dnf install -y sudo curl
          echo "✅ sudo and curl installed"

      - name: 👤 Method 3 - Create User
        id: create_user
        run: |
          echo "[3/7] Creating user account..."
          USERNAME="alma_$((RANDOM % 9000 + 1000))"
          PASSWORD=$(openssl rand -base64 20 | tr -d '=+/' | cut -c1-24)
          useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | chpasswd
          usermod -aG wheel "$USERNAME"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "✅ User created: $USERNAME"

      - name: ⚙️ Method 4 - Configure SSH (No systemd)
        id: ssh_port
        run: |
          echo "[4/7] Configuring SSH service..."
          sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "port=22" >> $GITHUB_OUTPUT
          
          # Start SSH directly without systemd
          /usr/sbin/sshd
          echo "✅ SSH configured and started on port 22"

      - name: 🌐 Method 5 - Get Public IP
        id: get_ip
        run: |
          echo "[5/7] Getting public IP..."
          IP=$(curl -s --max-time 10 https://api.ipify.org)
          if [ -z "$IP" ]; then
            IP=$(curl -s --max-time 10 https://ifconfig.me/ip)
          fi
          if [ -z "$IP" ]; then
            IP="IP_UNAVAILABLE"
          fi
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "✅ Public IP: $IP"

      - name: 🔍 Method 6 - Verify SSH
        id: status
        run: |
          echo "[6/7] Verifying SSH service..."
          if pgrep sshd > /dev/null 2>&1; then
            echo "status=active" >> $GITHUB_OUTPUT
            echo "✅ SSH daemon is running"
          else
            /usr/sbin/sshd
            sleep 2
            if pgrep sshd > /dev/null 2>&1; then
              echo "status=active" >> $GITHUB_OUTPUT
              echo "✅ SSH daemon started successfully"
            else
              echo "status=failed" >> $GITHUB_OUTPUT
              echo "❌ SSH daemon failed to start"
            fi
          fi

      - name: 📊 Method 7 - Show Final Status
        run: |
          echo "[7/7] Final status check..."
          
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════╗"
          echo "║  ✅ ALMALINUX 9 DEPLOYMENT COMPLETE                                 ║"
          echo "╠════════════════════════════════════════════════════════════════════╣"
          echo "║  🌐 SSH: ssh ${{ steps.create_user.outputs.username }}@${{ steps.get_ip.outputs.ip }} -p 22"
          echo "║  👤 User: ${{ steps.create_user.outputs.username }}"
          echo "║  🔐 Pass: ${{ steps.create_user.outputs.password }}"
          echo "╚════════════════════════════════════════════════════════════════════╝"
          echo ""

  # ==============================================================================
  # 📱 TELEGRAM NOTIFICATION
  # ==============================================================================
  telegram_notify:
    needs: [master_brain, windows_deploy, ubuntu22_deploy, ubuntu24_deploy, debian_deploy, centos_deploy, almalinux_deploy]
    if: always() && github.event.inputs.telegram_notify == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 📱 Send Telegram Notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="🧠 NEURAL MASTER SYSTEM v3.0"
          MSG="$MSG"$'\n'
          MSG="$MSG"$'\n╔════════════════════════════════════════╗'
          MSG="$MSG"$'\n📋 Session: '"${{ needs.master_brain.outputs.session_id }}"
          MSG="$MSG"$'\n⏱️ Duration: '"${{ github.event.inputs.duration }}"
          MSG="$MSG"$'\n⏰ Ends: '"${{ needs.master_brain.outputs.termination_time }}"
          MSG="$MSG"$'\n⚡ Mode: '"${{ github.event.inputs.performance_mode }}"
          MSG="$MSG"$'\n╚════════════════════════════════════════╝'
          
          if [ "${{ needs.windows_deploy.outputs.status }}" = "active" ]; then
            MSG="$MSG"$'\n\n🪟 WINDOWS 11'
            MSG="$MSG"$'\n──────────────────'
            MSG="$MSG"$'\n🌐 IP: '"${{ needs.windows_deploy.outputs.ip }}:3389"
            MSG="$MSG"$'\n👤 User: '"${{ needs.windows_deploy.outputs.username }}"
            MSG="$MSG"$'\n🔐 Pass: '"${{ needs.windows_deploy.outputs.password }}"
            MSG="$MSG"$'\n💻 RDP: Remote Desktop Connection'
          fi
          
          if [ "${{ needs.ubuntu22_deploy.outputs.status }}" = "active" ]; then
            MSG="$MSG"$'\n\n🐧 UBUNTU 22.04'
            MSG="$MSG"$'\n──────────────────'
            MSG="$MSG"$'\n🌐 SSH: ssh '"${{ needs.ubuntu22_deploy.outputs.username }}@${{ needs.ubuntu22_deploy.outputs.ip }} -p 22"
            MSG="$MSG"$'\n🔐 Pass: '"${{ needs.ubuntu22_deploy.outputs.password }}"
          fi
          
          if [ "${{ needs.ubuntu24_deploy.outputs.status }}" = "active" ]; then
            MSG="$MSG"$'\n\n🐧 UBUNTU 24.04'
            MSG="$MSG"$'\n──────────────────'
            MSG="$MSG"$'\n🌐 SSH: ssh '"${{ needs.ubuntu24_deploy.outputs.username }}@${{ needs.ubuntu24_deploy.outputs.ip }} -p 22"
            MSG="$MSG"$'\n🔐 Pass: '"${{ needs.ubuntu24_deploy.outputs.password }}"
          fi
          
          if [ "${{ needs.debian_deploy.outputs.status }}" = "active" ]; then
            MSG="$MSG"$'\n\n🐍 DEBIAN 12'
            MSG="$MSG"$'\n──────────────────'
            MSG="$MSG"$'\n🌐 SSH: ssh '"${{ needs.debian_deploy.outputs.username }}@${{ needs.debian_deploy.outputs.ip }} -p 22"
            MSG="$MSG"$'\n🔐 Pass: '"${{ needs.debian_deploy.outputs.password }}"
          fi
          
          if [ "${{ needs.centos_deploy.outputs.status }}" = "active" ]; then
            MSG="$MSG"$'\n\n📦 CENTOS 9'
            MSG="$MSG"$'\n──────────────────'
            MSG="$MSG"$'\n🌐 SSH: ssh '"${{ needs.centos_deploy.outputs.username }}@${{ needs.centos_deploy.outputs.ip }} -p 22"
            MSG="$MSG"$'\n🔐 Pass: '"${{ needs.centos_deploy.outputs.password }}"
          fi
          
          if [ "${{ needs.almalinux_deploy.outputs.status }}" = "active" ]; then
            MSG="$MSG"$'\n\n🔷 ALMALINUX 9'
            MSG="$MSG"$'\n──────────────────'
            MSG="$MSG"$'\n🌐 SSH: ssh '"${{ needs.almalinux_deploy.outputs.username }}@${{ needs.almalinux_deploy.outputs.ip }} -p 22"
            MSG="$MSG"$'\n🔐 Pass: '"${{ needs.almalinux_deploy.outputs.password }}"
          fi
          
          MSG="$MSG"$'\n\n✨ Neural System Online ✨'
          
          if [ -n "$BOT_TOKEN" ] && [ -n "$CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="$MSG" \
              -d disable_web_page_preview="true" > /dev/null 2>&1
            echo "✅ Telegram sent"
          fi

  # ==============================================================================
  # ⏱️ RUNTIME MANAGER
  # ==============================================================================
  runtime_manager:
    needs: [master_brain, windows_deploy, ubuntu22_deploy, ubuntu24_deploy, debian_deploy, centos_deploy, almalinux_deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: ⏱️ Maintain Runtime
        run: |
          DUR=${{ needs.master_brain.outputs.duration_minutes }}
          START=${{ needs.master_brain.outputs.start_timestamp }}
          CURRENT=$(date +%s)
          ELAPSED=$((CURRENT - START))
          REMAINING=$((DUR * 60 - ELAPSED))
          
          if [ $REMAINING -le 0 ]; then
            echo "⏱️ Runtime already expired"
            exit 0
          fi
          
          echo "╔════════════════════════════════════════════════════════════════════╗"
          echo "║  ⏱️ RUNTIME MANAGER - SYSTEM ACTIVE                                 ║"
          echo "╠════════════════════════════════════════════════════════════════════╣"
          echo "║  ⏰ Remaining: $((REMAINING / 60)) minutes $((REMAINING % 60)) seconds"
          echo "║  ⏰ Termination: ${{ needs.master_brain.outputs.termination_time }}"
          echo "╚════════════════════════════════════════════════════════════════════╝"
          
          END=$((CURRENT + REMAINING))
          while [ $(date +%s) -lt $END ]; do
            sleep 60
          done

  # ==============================================================================
  # 🧹 MEMORY PURGE
  # ==============================================================================
  memory_purge:
    needs: [runtime_manager]
    if: always() && github.event.inputs.auto_cleanup == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🧹 Cleanup System
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════╗"
          echo "║  🧹 MEMORY PURGE - CLEANING UP                                      ║"
          echo "╠════════════════════════════════════════════════════════════════════╣"
          echo "║  🗑️ Session credentials destroyed                                   ║"
          echo "║  🌐 Network connections terminated                                  ║"
          echo "║  🧹 All temporary data removed                                      ║"
          echo "╚════════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "✅ NEURAL MASTER SYSTEM - SESSION ENDED"
