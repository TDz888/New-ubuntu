    container:
      image: debian:12
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      username: ${{ steps.user.outputs.username }}
      password: ${{ steps.user.outputs.password }}
      ssh_port: ${{ steps.ssh.outputs.ssh_port }}
      error_message: ${{ steps.error.outputs.error_message }}
    steps:
      - name: 🐍 DEBIAN 12 CORTEX - INITIALIZATION
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║            🐍 DEBIAN 12 CORTEX ACTIVATED 🐍                ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
      
      - name: 🔧 SYSTEM SETUP
        run: |
          apt update -qq
          apt install -y -qq openssh-server sudo curl wget
      
      - name: 👤 USER CREATION
        id: user
        run: |
          USERNAME="debian_$((RANDOM % 9000 + 1000))"
          PASSWORD="$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)"
          
          useradd -m -s /bin/bash "$USERNAME"
