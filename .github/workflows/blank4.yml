function Write-Step {
    param(
        [string]$Title,
        [string]$Icon = "рџ“Њ"
    )
    
    $script:StepCurrent++
    $percent = [math]::Round(($script:StepCurrent / $script:StepTotal) * 100)
    
    Write-Host ""
    Write-Host "в•”в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•—" -ForegroundColor Cyan
    Write-Host "в•‘ $Icon BЖ°б»›c $($script:StepCurrent)/$($script:StepTotal): $Title" -ForegroundColor Yellow
    Write-Host "в•‘  Tiбєїn Д‘б»™: [$percent%] HoГ n thГ nh" -ForegroundColor White
    Write-Host "в•љв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ќ" -ForegroundColor Cyan
    Write-Host ""
    
    # Ghi log vб»›i -Append
    $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
    "[$timestamp] START: $Title" | Out-File -FilePath $script:LogFilePath -Append
}

function Write-Success {
    param([string]$Message)
    
    Write-Host "вњ… $Message" -ForegroundColor Green
    $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
    "[$timestamp] SUCCESS: $Message" | Out-File -FilePath $script:SuccessFilePath -Append
}

function Write-Error {
    param([string]$Message)
    
    Write-Host "вќЊ $Message" -ForegroundColor Red
    $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
    "[$timestamp] FAILED: $Message" | Out-File -FilePath $script:ErrorFilePath -Append
}

function Write-Warning {
    param([string]$Message)
    
    Write-Host "вљ пёЏ  $Message" -ForegroundColor Yellow
    $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
    "[$timestamp] WARNING: $Message" | Out-File -FilePath $script:LogFilePath -Append
}

function Write-Info {
    param([string]$Message)
    
    Write-Host "в„№пёЏ  $Message" -ForegroundColor White
    $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
    "[$timestamp] INFO: $Message" | Out-File -FilePath $script:LogFilePath -Append
}

