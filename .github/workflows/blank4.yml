          $g.Dispose(); $bmp.Dispose()
          
      - name: Install Tailscale
        if: github.event.inputs.instances >= matrix.instance
        shell: pwsh
        env:
          KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          $msi = "$env:TEMP\ts.msi"
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msi
          Start-Process msiexec.exe -ArgumentList "/i", "`"$msi`"", "/quiet", "/norestart" -Wait
          Remove-Item $msi -Force
          
      - name: Connect Tailscale
        if: github.event.inputs.instances >= matrix.instance
        shell: pwsh
        env:
          KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:KEY --hostname="win10-${{ matrix.instance }}"
          Start-Sleep -Seconds 5
