# =====================================================================================
#                    ⏱️ RUNTIME MANAGER - SESSION KEEPER
# =====================================================================================

  runtime_manager:
    needs: [master_brain, windows_cortex, ubuntu22_cortex, ubuntu24_cortex, debian_cortex, centos_cortex, almalinux_cortex]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: ⏱️ RUNTIME MANAGEMENT
        run: |
          DUR=${{ needs.master_brain.outputs.duration_minutes }}
          END=$(( $(date +%s) + DUR * 60 ))
          
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║              ⏱️  RUNTIME MANAGER ACTIVE ⏱️                 ║"
          echo "╠════════════════════════════════════════════════════════════╣"
          echo "║  📅 Start: $(date)"
          echo "║  ⏰ End:   $(date -d @$END)"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          
          while [ $(date +%s) -lt $END ]; do
            REMAIN=$((END - $(date +%s)))
            H=$((REMAIN / 3600))
            M=$(((REMAIN % 3600) / 60))
            S=$((REMAIN % 60))
            printf "\r⏳ [ACTIVE] Time remaining: %02d:%02d:%02d" $H $M $S
            sleep 10
          done
          
          echo ""
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║         ✅ SESSION COMPLETED - SYSTEM SHUTDOWN ✅          ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""

