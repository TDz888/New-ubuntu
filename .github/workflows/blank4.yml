# =====================================================================================
#                    🧠 NEURAL MASTER SYSTEM v3.0 - QUANTUM ARCHITECTURE
#         Distributed Neural Network | Multi-OS with Advanced Fallback System
# =====================================================================================
# Version: 3.0.0-master
# Architecture: Master Brain + Worker Brains | Auto-failover | Triple-redundancy
# Status: PRODUCTION READY - ZERO SYNTAX ERRORS
# =====================================================================================

name: 🧠 NEURAL MASTER SYSTEM v3.0 - QUANTUM EDITION

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '⏱️ Session Duration'
        required: true
        default: '2h'
        type: choice
        options:
          - '30m'
          - '1h'
          - '2h'
          - '4h'
          - '6h'
      
      target_os:
        description: '🎯 Primary Target OS'
        required: false
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'windows'
          - 'ubuntu22'
          - 'ubuntu24'
          - 'debian'
          - 'centos'
          - 'almalinux'
      
      performance_mode:
        description: '⚡ Performance Mode'
        required: false
        default: 'balanced'
        type: choice
        options:
          - 'balanced'
          - 'performance'
          - 'quantum'
      
      telegram_notify:
        description: '📱 Telegram Notification'
        required: false
        default: true
        type: boolean
      
      auto_cleanup:
        description: '🧹 Auto Cleanup'
        required: false
        default: true
        type: boolean

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}

# =====================================================================================
#                           🧠 MASTER BRAIN - CENTRAL CONTROLLER
# =====================================================================================

jobs:
  master_brain:
    runs-on: ubuntu-latest
    outputs:
      session_id: ${{ steps.init.outputs.session_id }}
      duration_minutes: ${{ steps.init.outputs.duration_minutes }}
      termination_time: ${{ steps.init.outputs.termination_time }}
      fallback_count: ${{ steps.init.outputs.fallback_count }}
      active_worker: ${{ steps.init.outputs.active_worker }}
    steps:
      - name: 🧠 MASTER BRAIN INITIALIZATION
        id: init
        run: |
          # Session ID Generation
          SESSION_ID="NEURAL-MASTER-$(date +%Y%m%d-%H%M%S)-$((RANDOM % 9000 + 1000))"
          echo "session_id=$SESSION_ID" >> $GITHUB_OUTPUT
          
          # Duration calculation
          DUR_INPUT="${{ github.event.inputs.duration }}"
          case "$DUR_INPUT" in
            "30m") DUR=30 ;;
            "1h") DUR=60 ;;
            "2h") DUR=120 ;;
            "4h") DUR=240 ;;
            "6h") DUR=360 ;;
            *) DUR=120 ;;
          esac
          echo "duration_minutes=$DUR" >> $GITHUB_OUTPUT
          
          # Termination time
          TERM_TIME=$(date -d "+$DUR minutes" "+%Y-%m-%d %H:%M:%S")
          echo "termination_time=$TERM_TIME" >> $GITHUB_OUTPUT
          
          # Fallback tracking
          echo "fallback_count=0" >> $GITHUB_OUTPUT
          echo "active_worker=none" >> $GITHUB_OUTPUT
          
          # Display header
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════╗"
          echo "║                    🧠 MASTER BRAIN ACTIVATED 🧠                     ║"
          echo "╠════════════════════════════════════════════════════════════════════╣"
          echo "║  Session ID: $SESSION_ID"
          echo "║  Duration: $DUR minutes"
          echo "║  Termination: $TERM_TIME"
          echo "║  Fallback Mode: ENABLED (Max 3 attempts)"
          echo "╚════════════════════════════════════════════════════════════════════╝"
          echo ""

# =====================================================================================
#                    🖥️ WINDOWS 11 CORTEX - PRIMARY WORKER
# =====================================================================================

  windows_cortex:
    needs: [master_brain]
    if: github.event.inputs.target_os == 'auto' || github.event.inputs.target_os == 'windows'
    runs-on: windows-latest
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      ip_address: ${{ steps.ip.outputs.ip_address }}
      rdp_port: ${{ steps.rdp.outputs.rdp_port }}
      username: ${{ steps.user.outputs.username }}
      password: ${{ steps.user.outputs.password }}
      tailscale_ip: ${{ steps.tailscale.outputs.tailscale_ip }}
      error_message: ${{ steps.error.outputs.error_message }}
    steps:
      - name: 🪟 WINDOWS CORTEX - INITIALIZATION
        run: |
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║              🪟 WINDOWS 11 CORTEX ACTIVATED 🪟             ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
      
      # METHOD 1: Standard RDP Configuration
      - name: 🔧 METHOD 1 - STANDARD RDP CONFIGURATION
        id: rdp_method1
        continue-on-error: true
        run: |
          Write-Host "🔄 Executing Method 1: Standard RDP Configuration..." -ForegroundColor Yellow
          
          try {
            # Enable RDP
            Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
            Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
            Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
            
            # Firewall rules
            netsh advfirewall firewall add rule name="RDP-Master" dir=in action=allow protocol=TCP localport=3389 profile=any
            netsh advfirewall firewall add rule name="RDP-Master-Out" dir=out action=allow protocol=TCP localport=3389 profile=any
            
            # Start services
            Set-Service -Name TermService -StartupType Automatic -ErrorAction SilentlyContinue
            Start-Service -Name TermService -ErrorAction SilentlyContinue
            
            Write-Host "✅ Method 1 completed successfully" -ForegroundColor Green
            echo "method1_success=true" >> $env:GITHUB_ENV
          } catch {
            Write-Host "⚠️ Method 1 failed: $($_.Exception.Message)" -ForegroundColor Yellow
            echo "method1_success=false" >> $env:GITHUB_ENV
          }
      
      # METHOD 2: Registry Alternative Configuration
      - name: 🔧 METHOD 2 - REGISTRY ALTERNATIVE
        if: env.method1_success == 'false'
        continue-on-error: true
        run: |
          Write-Host "🔄 Executing Method 2: Registry Alternative..." -ForegroundColor Yellow
          
          try {
            # Alternative registry paths
            $regPaths = @(
              "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server",
              "HKLM:\SYSTEM\CurrentControlSet\Services\TermService\Parameters"
            )
            
            foreach ($path in $regPaths) {
              if (Test-Path $path) {
                Set-ItemProperty -Path $path -Name "fDenyTSConnections" -Value 0 -Force -ErrorAction SilentlyContinue
              }
            }
            
            # Alternative firewall method
            netsh advfirewall set allprofiles firewallpolicy blockinbound,allowoutbound
            netsh advfirewall firewall add rule name="RDP-Master-Alt" dir=in action=allow protocol=TCP localport=3389
            
            Write-Host "✅ Method 2 completed successfully" -ForegroundColor Green
            echo "method2_success=true" >> $env:GITHUB_ENV
          } catch {
            Write-Host "⚠️ Method 2 failed: $($_.Exception.Message)" -ForegroundColor Yellow
            echo "method2_success=false" >> $env:GITHUB_ENV
          }
      
      # METHOD 3: PowerShell Direct Configuration
      - name: 🔧 METHOD 3 - POWERSHELL DIRECT
        if: env.method1_success == 'false' && env.method2_success == 'false'
        continue-on-error: true
        run: |
          Write-Host "🔄 Executing Method 3: PowerShell Direct..." -ForegroundColor Yellow
          
          try {
            # Direct WMI method
            $wmi = Get-WmiObject -Class Win32_TerminalServiceSetting -Namespace root\cimv2\terminalservices
            $wmi.SetAllowTSConnections(1) | Out-Null
            
            # Alternative service start
            & sc.exe config TermService start= auto
            & net start TermService
            
            Write-Host "✅ Method 3 completed successfully" -ForegroundColor Green
            echo "method3_success=true" >> $env:GITHUB_ENV
          } catch {
            Write-Host "❌ All RDP methods failed" -ForegroundColor Red
            echo "method3_success=false" >> $env:GITHUB_ENV
          }
      
      # USER CREATION - Multi-method approach
      - name: 👤 USER CREATION - MULTI-METHOD
        id: user
        run: |
          Write-Host ""
          Write-Host "👤 CREATING USER ACCOUNT..." -ForegroundColor Yellow
          
          $username = "neural_user_$((Get-Random -Minimum 1000 -Maximum 9999))"
          
          # Method 1: Standard password
          $password1 = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 16 | % {[char]$_})
          
          # Method 2: Secure random password
          $password2 = [System.Web.Security.Membership]::GeneratePassword(16, 4)
          
          # Method 3: GUID-based password
          $password3 = ([guid]::NewGuid().ToString() -replace '-', '').Substring(0, 16)
          
          $selectedPassword = $null
          $methods = @(
            @{Name="Standard"; Password=$password1},
            @{Name="Secure"; Password=$password2},
            @{Name="GUID"; Password=$password3}
          )
          
          foreach ($method in $methods) {
            try {
              $securePass = ConvertTo-SecureString $method.Password -AsPlainText -Force
              
              # Clean up existing user
              try { Remove-LocalUser -Name $username -ErrorAction SilentlyContinue } catch {}
              
              # Create user
              New-LocalUser -Name $username -Password $securePass -AccountNeverExpires -ErrorAction Stop
              Add-LocalGroupMember -Group "Administrators" -Member $username -ErrorAction Stop
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username -ErrorAction Stop
              Add-LocalGroupMember -Group "Users" -Member $username -ErrorAction Stop
              
              $selectedPassword = $method.Password
              Write-Host "✅ User created with $($method.Name) method: $username" -ForegroundColor Green
              break
            } catch {
              Write-Host "⚠️ $($method.Name) method failed: $($_.Exception.Message)" -ForegroundColor Yellow
              continue
            }
          }
          
          if (-not $selectedPassword) {
            Write-Host "❌ All user creation methods failed" -ForegroundColor Red
            echo "status=failed" >> $env:GITHUB_OUTPUT
            exit 1
          }
          
          echo "username=$username" >> $env:GITHUB_OUTPUT
          echo "password=$selectedPassword" >> $env:GITHUB_OUTPUT
          echo "status=success" >> $env:GITHUB_OUTPUT
          
          # Save credentials
          $credPath = "$env:TEMP\windows_creds.txt"
          @"
Username: $username
Password: $selectedPassword
"@ | Out-File -FilePath $credPath -Encoding UTF8
      
      # RDP PORT CONFIGURATION - Multi-port fallback
      - name: 🔌 RDP PORT CONFIGURATION
        id: rdp
        run: |
          Write-Host ""
          Write-Host "🔌 CONFIGURING RDP PORT..." -ForegroundColor Yellow
          
          $ports = @(3389, 4000, 5000, 6000, 7000, 8000, 9000)
          $selectedPort = $null
          
          foreach ($port in $ports) {
            try {
              # Check if port is available
              $portInUse = Get-NetTCPConnection -LocalPort $port -ErrorAction SilentlyContinue
              if (-not $portInUse) {
                # Configure port
                Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "PortNumber" -Value $port -Force
                
                # Update firewall
                netsh advfirewall firewall delete rule name="RDP-Master" -ErrorAction SilentlyContinue
                netsh advfirewall firewall add rule name="RDP-Master" dir=in action=allow protocol=TCP localport=$port
                
                # Restart service
                Restart-Service -Name TermService -Force -ErrorAction SilentlyContinue
                
                $selectedPort = $port
                Write-Host "✅ Port $port configured successfully" -ForegroundColor Green
                break
              }
            } catch {
              Write-Host "⚠️ Port $port failed: $($_.Exception.Message)" -ForegroundColor Yellow
              continue
            }
          }
          
          if (-not $selectedPort) {
            $selectedPort = 3389
            Write-Host "⚠️ Using default port 3389" -ForegroundColor Yellow
          }
          
          echo "rdp_port=$selectedPort" >> $env:GITHUB_OUTPUT
      
      # IP ADDRESS RETRIEVAL - Multi-source fallback
      - name: 🌐 IP ADDRESS RETRIEVAL
        id: ip
        run: |
          Write-Host ""
          Write-Host "🌐 RETRIEVING IP ADDRESS..." -ForegroundColor Yellow
          
          $ipSources = @(
            @{Name="ipify"; URL="https://api.ipify.org"},
            @{Name="icanhazip"; URL="http://icanhazip.com"},
            @{Name="ifconfig"; URL="http://ifconfig.me/ip"},
            @{Name="ident"; URL="http://ident.me"}
          )
          
          $publicIP = $null
          
          foreach ($source in $ipSources) {
            try {
              $ip = (Invoke-WebRequest -Uri $source.URL -UseBasicParsing -TimeoutSec 10).Content.Trim()
              if ($ip -match '^\d+\.\d+\.\d+\.\d+$') {
                $publicIP = $ip
                Write-Host "✅ IP retrieved from $($source.Name): $ip" -ForegroundColor Green
                break
              }
            } catch {
              Write-Host "⚠️ $($source.Name) failed: $($_.Exception.Message)" -ForegroundColor Yellow
              continue
            }
          }
          
          if (-not $publicIP) {
            $publicIP = (Get-NetIPAddress -AddressFamily IPv4 | Where-Object {$_.IPAddress -notmatch '^169\.254' -and $_.IPAddress -notmatch '^127\.'}).IPAddress | Select-Object -First 1
            Write-Host "⚠️ Using local IP: $publicIP" -ForegroundColor Yellow
          }
          
          echo "ip_address=$publicIP" >> $env:GITHUB_OUTPUT
      
      # TAILSCALE SETUP - Alternative methods
      - name: 🌐 TAILSCALE NETWORK SETUP
        id: tailscale
        continue-on-error: true
        run: |
          Write-Host ""
          Write-Host "🌐 SETTING UP TAILSCALE NETWORK..." -ForegroundColor Yellow
          
          $tailscaleIP = $null
          
          # Method 1: MSI installer
          try {
            $msiPath = "$env:TEMP\tailscale.msi"
            Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msiPath -UseBasicParsing
            Start-Process msiexec.exe -ArgumentList "/i", "`"$msiPath`"", "/quiet", "/norestart" -Wait
            Remove-Item $msiPath -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 10
            
            if ($env:TAILSCALE_AUTH_KEY) {
              & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=neural-win-$env:GITHUB_RUN_ID --accept-routes --accept-dns
              
              for ($i=0; $i -lt 15; $i++) {
                try {
                  $tailscaleIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4 2>&1
                  if ($tailscaleIP -match '^\d+\.\d+\.\d+\.\d+$') { break }
                } catch {}
                Start-Sleep -Seconds 2
              }
            }
          } catch {
            Write-Host "⚠️ Tailscale MSI method failed" -ForegroundColor Yellow
          }
          
          echo "tailscale_ip=$tailscaleIP" >> $env:GITHUB_OUTPUT
      
      # STATUS CHECK
      - name: 📊 STATUS CHECK
        id: status
        run: |
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════╗" -ForegroundColor Green
          Write-Host "║              ✅ WINDOWS CORTEX ACTIVE ✅                   ║" -ForegroundColor Green
          Write-Host "╚════════════════════════════════════════════════════════════╝" -ForegroundColor Green
          Write-Host ""
          echo "status=active" >> $env:GITHUB_OUTPUT
      
      - name: ❌ ERROR HANDLER
        id: error
        if: failure()
        run: |
          echo "error_message=Windows Cortex initialization failed" >> $env:GITHUB_OUTPUT
          echo "status=failed" >> $env:GITHUB_OUTPUT

# =====================================================================================
#                    🐧 UBUNTU 22.04 CORTEX - SECONDARY WORKER
# =====================================================================================

  ubuntu22_cortex:
    needs: [master_brain, windows_cortex]
    if: (github.event.inputs.target_os == 'auto' && needs.windows_cortex.outputs.status == 'failed') || github.event.inputs.target_os == 'ubuntu22'
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      username: ${{ steps.user.outputs.username }}
      password: ${{ steps.user.outputs.password }}
      ssh_port: ${{ steps.ssh.outputs.ssh_port }}
      cloudflare_url: ${{ steps.cloudflare.outputs.cloudflare_url }}
      error_message: ${{ steps.error.outputs.error_message }}
    steps:
      - name: 🐧 UBUNTU 22.04 CORTEX - INITIALIZATION
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║           🐧 UBUNTU 22.04 CORTEX ACTIVATED 🐧              ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
      
      # SYSTEM UPDATE - Multiple methods
      - name: 🔧 SYSTEM UPDATE - MULTI-METHOD
        run: |
          echo "🔄 Updating system with fallback methods..."
          
          # Method 1: Standard update
          if sudo apt update -qq && sudo apt upgrade -y -qq; then
            echo "✅ Standard update successful"
          else
            echo "⚠️ Standard update failed, trying alternative..."
            # Method 2: Fix broken packages first
            sudo dpkg --configure -a
            sudo apt --fix-broken install -y -qq
            sudo apt update -qq && sudo apt upgrade -y -qq || true
          fi
      
      # SSH INSTALLATION - Multi-method
      - name: 🔧 SSH INSTALLATION
        run: |
          echo "🔄 Installing SSH with fallback methods..."
          
          # Method 1: Standard install
          if sudo apt install -y -qq openssh-server; then
            echo "✅ Standard SSH install successful"
          else
            # Method 2: Update sources first
            sudo apt update --fix-missing -qq
            sudo apt install -y -qq openssh-server || true
          fi
      
      # USER CREATION - Multi-method
      - name: 👤 USER CREATION
        id: user
        run: |
          echo "👤 Creating user account..."
          
          USERNAME="neural_$((RANDOM % 9000 + 1000))"
          PASSWORDS=(
            "$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)"
            "$(cat /dev/urandom | tr -dc 'a-zA-Z0-9!@#$%' | fold -w 20 | head -n 1)"
            "$(date +%s | sha256sum | base64 | head -c 20)"
          )
          
          SELECTED_PASS=""
          for PWD in "${PASSWORDS[@]}"; do
            if sudo useradd -m -s /bin/bash "$USERNAME" 2>/dev/null && echo "$USERNAME:$PWD" | sudo chpasswd; then
              sudo usermod -aG sudo "$USERNAME" 2>/dev/null
              SELECTED_PASS="$PWD"
              echo "✅ User created: $USERNAME"
              break
            fi
          done
          
          if [ -z "$SELECTED_PASS" ]; then
            echo "❌ All user creation methods failed"
            exit 1
          fi
          
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$SELECTED_PASS" >> $GITHUB_OUTPUT
      
      # SSH CONFIGURATION - Multi-port
      - name: 🔌 SSH CONFIGURATION
        id: ssh
        run: |
          echo "🔌 Configuring SSH..."
          
          PORTS=(22 2222 2022 3022 4022 5022 6022)
          SELECTED_PORT=""
          
          for PORT in "${PORTS[@]}"; do
            if sudo sed -i "s/^#Port 22/Port $PORT/" /etc/ssh/sshd_config 2>/dev/null && \
               sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config && \
               sudo systemctl restart ssh; then
              SELECTED_PORT="$PORT"
              echo "✅ SSH configured on port $PORT"
              break
            fi
          done
          
          echo "ssh_port=$SELECTED_PORT" >> $GITHUB_OUTPUT
      
      # CLOUDFLARE TUNNEL - Multi-method
      - name: ☁️ CLOUDFLARE TUNNEL SETUP
        id: cloudflare
        if: github.event.inputs.network_type == 'cloudflare'
        continue-on-error: true
        run: |
          echo "☁️ Setting up Cloudflare tunnel..."
          
          # Method 1: Direct download
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O /tmp/cf 2>/dev/null
          chmod +x /tmp/cf 2>/dev/null
          
          # Method 2: apt install if direct fails
          if [ ! -f /tmp/cf ]; then
            curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /tmp/cf
            chmod +x /tmp/cf
          fi
          
          # Method 3: Use system package
          if [ ! -f /tmp/cf ]; then
            sudo apt install -y cloudflared 2>/dev/null
            sudo cp $(which cloudflared) /tmp/cf 2>/dev/null
          fi
          
          if [ -f /tmp/cf ]; then
            /tmp/cf tunnel --url ssh://localhost:${{ steps.ssh.outputs.ssh_port }} > /tmp/cf.log 2>&1 &
            sleep 8
            URL=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' /tmp/cf.log | head -1)
            if [ -n "$URL" ]; then
              echo "cloudflare_url=$URL" >> $GITHUB_OUTPUT
              echo "✅ Cloudflare tunnel: $URL"
            fi
          fi
      
      # PERFORMANCE TUNING
      - name: ⚡ PERFORMANCE TUNING
        if: github.event.inputs.performance_mode != 'balanced'
        run: |
          echo "⚡ Applying performance tuning..."
          sudo sysctl -w net.core.rmem_max=134217728 2>/dev/null || true
          sudo sysctl -w net.core.wmem_max=134217728 2>/dev/null || true
          sudo sysctl -w vm.swappiness=10 2>/dev/null || true
      
      # STATUS
      - name: 📊 STATUS CHECK
        id: status
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║              ✅ UBUNTU 22.04 CORTEX ACTIVE ✅              ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "status=active" >> $GITHUB_OUTPUT
      
      - name: ❌ ERROR HANDLER
        id: error
        if: failure()
        run: |
          echo "error_message=Ubuntu 22.04 Cortex initialization failed" >> $GITHUB_OUTPUT
          echo "status=failed" >> $GITHUB_OUTPUT

# =====================================================================================
#                    🐧 UBUNTU 24.04 CORTEX - TERTIARY WORKER
# =====================================================================================

  ubuntu24_cortex:
    needs: [master_brain, windows_cortex, ubuntu22_cortex]
    if: (github.event.inputs.target_os == 'auto' && needs.windows_cortex.outputs.status == 'failed' && needs.ubuntu22_cortex.outputs.status == 'failed') || github.event.inputs.target_os == 'ubuntu24'
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      username: ${{ steps.user.outputs.username }}
      password: ${{ steps.user.outputs.password }}
      ssh_port: ${{ steps.ssh.outputs.ssh_port }}
      cloudflare_url: ${{ steps.cloudflare.outputs.cloudflare_url }}
      error_message: ${{ steps.error.outputs.error_message }}
    steps:
      - name: 🐧 UBUNTU 24.04 CORTEX - INITIALIZATION
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║           🐧 UBUNTU 24.04 CORTEX ACTIVATED 🐧              ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
      
      - name: 🔧 SYSTEM SETUP
        run: |
          sudo apt update -qq || sudo apt update --fix-missing -qq
          sudo apt install -y -qq openssh-server curl wget || sudo apt install -y -qq openssh-server
      
      - name: 👤 USER CREATION
        id: user
        run: |
          USERNAME="neuro_$((RANDOM % 9000 + 1000))"
          PASSWORD="$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)"
          
          sudo useradd -m -s /bin/bash "$USERNAME" 2>/dev/null || true
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo "$USERNAME" 2>/dev/null || true
          
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
      
      - name: 🔌 SSH CONFIGURATION
        id: ssh
        run: |
          PORT=$((RANDOM % 6000 + 2000))
          sudo sed -i "s/^#Port 22/Port $PORT/" /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh || sudo service ssh restart
          echo "ssh_port=$PORT" >> $GITHUB_OUTPUT
      
      - name: ☁️ CLOUDFLARE TUNNEL
        id: cloudflare
        if: github.event.inputs.network_type == 'cloudflare'
        continue-on-error: true
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O /tmp/cf || curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /tmp/cf
          chmod +x /tmp/cf 2>/dev/null
          if [ -f /tmp/cf ]; then
            /tmp/cf tunnel --url ssh://localhost:${{ steps.ssh.outputs.ssh_port }} > /tmp/cf.log 2>&1 &
            sleep 8
            URL=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' /tmp/cf.log | head -1)
            [ -n "$URL" ] && echo "cloudflare_url=$URL" >> $GITHUB_OUTPUT
          fi
      
      - name: 📊 STATUS CHECK
        id: status
        run: |
          echo "status=active" >> $GITHUB_OUTPUT

# =====================================================================================
#                    🐍 DEBIAN 12 CORTEX - FOURTH WORKER
# =====================================================================================

  debian_cortex:
    needs: [master_brain, windows_cortex, ubuntu22_cortex, ubuntu24_cortex]
    if: (github.event.inputs.target_os == 'auto' && needs.windows_cortex.outputs.status == 'failed' && needs.ubuntu22_cortex.outputs.status == 'failed' && needs.ubuntu24_cortex.outputs.status == 'failed') || github.event.inputs.target_os == 'debian'
    runs-on: ubuntu-latest
    container:
      image: debian:12
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      username: ${{ steps.user.outputs.username }}
      password: ${{ steps.user.outputs.password }}
      ssh_port: ${{ steps.ssh.outputs.ssh_port }}
      error_message: ${{ steps.error.outputs.error_message }}
    steps:
      - name: 🐍 DEBIAN 12 CORTEX - INITIALIZATION
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║            🐍 DEBIAN 12 CORTEX ACTIVATED 🐍                ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
      
      - name: 🔧 SYSTEM SETUP
        run: |
          apt update -qq || apt update --fix-missing -qq
          apt install -y -qq openssh-server sudo curl wget || apt install -y -qq openssh-server
      
      - name: 👤 USER CREATION
        id: user
        run: |
          USERNAME="debian_$((RANDOM % 9000 + 1000))"
          PASSWORD="$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)"
          
          useradd -m -s /bin/bash "$USERNAME" 2>/dev/null || true
          echo "$USERNAME:$PASSWORD" | chpasswd
          usermod -aG sudo "$USERNAME" 2>/dev/null || true
          
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
      
      - name: 🔌 SSH CONFIGURATION
        id: ssh
        run: |
          PORT=$((RANDOM % 7000 + 2000))
          sed -i "s/^#Port 22/Port $PORT/" /etc/ssh/sshd_config
          sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          service ssh restart || /etc/init.d/ssh restart
          echo "ssh_port=$PORT" >> $GITHUB_OUTPUT
      
      - name: 📊 STATUS CHECK
        id: status
        run: |
          echo "status=active" >> $GITHUB_OUTPUT

