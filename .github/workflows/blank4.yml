name: 🚀 VPS CREATOR PRO

on:
  workflow_dispatch:
    inputs:
      os_type:
        description: 🖥️ Operating System
        required: true
        default: windows11
        type: choice
        options:
          - windows11
          - windows10
          - ubuntu-desktop
      username:
        description: 👤 Username
        required: true
        default: vpsuser
      password:
        description: 🔑 Password
        required: true
        default: Vps123456
      cpu_cores:
        description: ⚡ CPU Cores
        required: true
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
      ram_gb:
        description: 💾 RAM GB
        required: true
        default: '4'
        type: choice
        options:
          - '2'
          - '4'
          - '8'
          - '12'
          - '16'
      connection_mode:
        description: 🔌 Connection Mode
        required: true
        default: rdp
        type: choice
        options:
          - rdp
          - novnc
          - both
      duration:
        description: ⏱️ Hours
        required: true
        default: '6'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
          - '6'

jobs:
  vps:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: 🎯 SYSTEM INIT
        shell: pwsh
        run: |
          $os = "${{ github.event.inputs.os_type }}"
          if ($os -eq "windows11") { $osIcon = "🪟✨" ; $osName = "Windows 11 Pro" }
          elseif ($os -eq "windows10") { $osIcon = "🪟" ; $osName = "Windows 10 Pro" }
          else { $osIcon = "🐧" ; $osName = "Ubuntu Desktop" }
          
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════════╗"
          Write-Host "║          🚀 VPS CREATOR PRO - PREMIUM EDITION 🚀             ║"
          Write-Host "║                ⚡ Powered by Tailscale ⚡                     ║"
          Write-Host "╚══════════════════════════════════════════════════════════════╝"
          Write-Host ""
          Write-Host "  $osIcon $osName"
          Write-Host "  ⚡ CPU       : ${{ github.event.inputs.cpu_cores }} cores"
          Write-Host "  💾 RAM       : ${{ github.event.inputs.ram_gb }} GB"
          Write-Host "  🔌 Mode      : ${{ github.event.inputs.connection_mode }}"
          Write-Host "  ⏱️  Duration  : ${{ github.event.inputs.duration }} hours"
          Write-Host ""
          
      - name: 🔧 CONFIGURE RDP
        shell: pwsh
        run: |
          Write-Host "┌─────────────────────────────────────────────────────────────┐"
          Write-Host "│  🔧 CONFIGURING REMOTE DESKTOP                              │"
          Write-Host "└─────────────────────────────────────────────────────────────┘"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP-In" dir=in action=allow protocol=TCP localport=3389
          Set-Service -Name TermService -StartupType Automatic
          Start-Service -Name TermService
          Write-Host "  ✅ RDP configured"
          Write-Host ""
          
      - name: 👤 CREATE USER
        shell: pwsh
        run: |
          Write-Host "┌─────────────────────────────────────────────────────────────┐"
          Write-Host "│  👤 CREATING USER ACCOUNT                                   │"
          Write-Host "└─────────────────────────────────────────────────────────────┘"
          $user = "${{ github.event.inputs.username }}"
          $pass = "${{ github.event.inputs.password }}"
          $secpass = ConvertTo-SecureString $pass -AsPlainText -Force
          try { Remove-LocalUser -Name $user -ErrorAction SilentlyContinue } catch {}
          New-LocalUser -Name $user -Password $secpass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $user
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $user
          Enable-LocalUser -Name $user
          $pass | Out-File -FilePath $env:TEMP\vps_pass.txt
          Write-Host "  ✅ User created: $user"
          Write-Host ""
          
      - name: 🌐 INSTALL TAILSCALE
        shell: pwsh
        env:
          TS_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          Write-Host "┌─────────────────────────────────────────────────────────────┐"
          Write-Host "│  🌐 INSTALLING TAILSCALE                                    │"
          Write-Host "└─────────────────────────────────────────────────────────────┘"
          $msi = "$env:TEMP\ts.msi"
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msi
          Start-Process msiexec.exe -ArgumentList "/i", "`"$msi`"", "/quiet", "/norestart" -Wait
          Remove-Item $msi -Force
          Write-Host "  ✅ Tailscale installed"
          Write-Host ""
          
      - name: 🔗 CONNECT TAILSCALE
        shell: pwsh
        env:
          TS_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          Write-Host "┌─────────────────────────────────────────────────────────────┐"
          Write-Host "│  🔗 CONNECTING TO TAILSCALE                                 │"
          Write-Host "└─────────────────────────────────────────────────────────────┘"
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TS_KEY --hostname="vps-pro"
          Start-Sleep -Seconds 5
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "TS_IP=$ip" >> $env:GITHUB_ENV
          Write-Host "  ✅ Connected - IP: $ip"
          Write-Host ""
          
      - name: 🖥️ SETUP NOVNC
        if: github.event.inputs.connection_mode == 'novnc' || github.event.inputs.connection_mode == 'both'
        shell: pwsh
        run: |
          Write-Host "┌─────────────────────────────────────────────────────────────┐"
          Write-Host "│  🖥️ SETTING UP NOVNC                                        │"
          Write-Host "└─────────────────────────────────────────────────────────────┘"
          choco install python3 -y
          pip install numpy websockify
          Invoke-WebRequest -Uri "https://github.com/novnc/noVNC/archive/refs/tags/v1.4.0.zip" -OutFile "$env:TEMP\novnc.zip"
          Expand-Archive -Path "$env:TEMP\novnc.zip" -DestinationPath "C:\novnc" -Force
          Remove-Item "$env:TEMP\novnc.zip"
          Start-Process -NoNewWindow -FilePath "websockify" -ArgumentList "--web=C:\novnc\noVNC-1.4.0", "6080", "localhost:3389"
          Write-Host "  ✅ noVNC ready on port 6080"
          Write-Host ""
          
      - name: 🎉 DISPLAY INFO
        shell: pwsh
        run: |
          $pass = Get-Content $env:TEMP\vps_pass.txt
          $mode = "${{ github.event.inputs.connection_mode }}"
          $ip = "$env:TS_IP"
          $user = "${{ github.event.inputs.username }}"
          $hours = "${{ github.event.inputs.duration }}"
          $os = "${{ github.event.inputs.os_type }}"
          
          if ($os -eq "windows11") { $osIcon = "🪟✨" ; $osName = "Windows 11 Pro" }
          elseif ($os -eq "windows10") { $osIcon = "🪟" ; $osName = "Windows 10 Pro" }
          else { $osIcon = "🐧" ; $osName = "Ubuntu Desktop" }
          
          $start = (Get-Date).ToString('HH:mm:ss')
          $end = (Get-Date).AddHours($hours).ToString('HH:mm:ss')
          
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════════╗"
          Write-Host "║              🎉 CONNECTION SUCCESS 🎉                         ║"
          Write-Host "╠══════════════════════════════════════════════════════════════╣"
          Write-Host "║  $osIcon $osName"
          Write-Host "║  🌐 Tailscale IP : $ip"
          Write-Host "║  👤 Username     : $user"
          Write-Host "║  🔑 Password     : $pass"
          Write-Host "╠══════════════════════════════════════════════════════════════╣"
          
          if ($mode -eq 'rdp' -or $mode -eq 'both') {
            Write-Host "║  🔌 RDP          : $ip`:3389"
          }
          if ($mode -eq 'novnc' -or $mode -eq 'both') {
            Write-Host "║  🌐 noVNC        : http://$ip`:6080/vnc.html"
          }
          
          Write-Host "╠══════════════════════════════════════════════════════════════╣"
          Write-Host "║  🕐 Started : $start"
          Write-Host "║  🕐 Expires : $end"
          Write-Host "╚══════════════════════════════════════════════════════════════╝"
          Write-Host ""
          
          $infoLines = @()
          $infoLines += "╔══════════════════════════════════════════════════════════════╗"
          $infoLines += "║              🎉 VPS CONNECTION INFO 🎉                         ║"
          $infoLines += "╠══════════════════════════════════════════════════════════════╣"
          $infoLines += "║  $osIcon OS      : $osName"
          $infoLines += "║  ⚡ CPU      : ${{ github.event.inputs.cpu_cores }} cores"
          $infoLines += "║  💾 RAM      : ${{ github.event.inputs.ram_gb }} GB"
          $infoLines += "╠══════════════════════════════════════════════════════════════╣"
          $infoLines += "║  🌐 Host     : $ip"
          $infoLines += "║  👤 User     : $user"
          $infoLines += "║  🔑 Pass     : $pass"
          $infoLines += "╠══════════════════════════════════════════════════════════════╣"
          
          if ($mode -eq 'rdp' -or $mode -eq 'both') {
            $infoLines += "║  🔌 RDP      : $ip`:3389"
          }
          if ($mode -eq 'novnc' -or $mode -eq 'both') {
            $infoLines += "║  🌐 noVNC    : http://$ip`:6080/vnc.html"
          }
          
          $infoLines += "╠══════════════════════════════════════════════════════════════╣"
          $infoLines += "║  🕐 Started : $start"
          $infoLines += "║  🕐 Expires : $end"
          $infoLines += "╚══════════════════════════════════════════════════════════════╝"
          
          $infoLines | Out-File -FilePath vps-info.txt -Encoding ascii
          
      - name: 📤 UPLOAD INFO
        uses: actions/upload-artifact@v4
        with:
          name: vps-connection
          path: vps-info.txt
          retention-days: 7
          
      - name: ⏳ KEEP ALIVE
        shell: pwsh
        run: |
          $hours = ${{ github.event.inputs.duration }}
          $end = (Get-Date).AddHours($hours)
          $os = "${{ github.event.inputs.os_type }}"
          if ($os -eq "windows11") { $osIcon = "🪟✨" }
          elseif ($os -eq "windows10") { $osIcon = "🪟" }
          else { $osIcon = "🐧" }
          
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════════╗"
          Write-Host "║              🟢 VPS IS RUNNING 🟢                             ║"
          Write-Host "╠══════════════════════════════════════════════════════════════╣"
          Write-Host "║  $osIcon $os"
          Write-Host "║  🌐 Tailscale IP : $env:TS_IP"
          Write-Host "║  👤 Username     : ${{ github.event.inputs.username }}"
          Write-Host "║  🔑 Password     : ${{ github.event.inputs.password }}"
          Write-Host "╠══════════════════════════════════════════════════════════════╣"
          Write-Host "║  ⏱️  Auto shutdown at: $($end.ToString('HH:mm:ss'))"
          Write-Host "╚══════════════════════════════════════════════════════════════╝"
          Write-Host ""
          
          $frames = @('⣾', '⣽', '⣻', '⢿', '⡿', '⣟', '⣯', '⣷')
          $i = 0
          while ((Get-Date) -lt $end) {
            $remaining = $end - (Get-Date)
            $h = [math]::Floor($remaining.TotalHours)
            $m = [math]::Floor($remaining.TotalMinutes % 60)
            $s = [math]::Floor($remaining.TotalSeconds % 60)
            $frame = $frames[$i % $frames.Length]
            Write-Host "`r  $frame Time remaining: $h`:$m`:$s" -NoNewline
            $i++
            Start-Sleep -Seconds 1
          }
          Write-Host "`r  ✅ Time expired - Shutting down    "
          
      - name: 🧹 CLEANUP
        if: always()
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "┌─────────────────────────────────────────────────────────────┐"
          Write-Host "│  🧹 CLEANING UP                                              │"
          Write-Host "└─────────────────────────────────────────────────────────────┘"
          Remove-Item $env:TEMP\vps_pass.txt -ErrorAction SilentlyContinue
          & "$env:ProgramFiles\Tailscale\tailscale.exe" down --accept-risk=all -ErrorAction SilentlyContinue
          netsh advfirewall firewall delete rule name="RDP-In" -ErrorAction SilentlyContinue
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 1 -Force
          Write-Host "  ✅ Cleanup completed"
          Write-Host ""
