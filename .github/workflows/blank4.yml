            MSG="$MSG"$'\n'"👤 \`${{ needs.centos_deploy.outputs.username }}\`"
            MSG="$MSG"$'\n'"🔐 \`${{ needs.centos_deploy.outputs.password }}\`"
            MSG="$MSG"$'\n'"⚠️ *Container mode*"
          fi
          
          # AlmaLinux
          if [ "${{ needs.almalinux_deploy.outputs.status }}" = "active" ]; then
            MSG="$MSG"$'\n\n'"🔷 *ALMALINUX 9*"
            MSG="$MSG"$'\n'"━━━━━━━━━━━━━━━━━━━━━"
