          echo "============================================================"

  # ==============================================================================
  # CENTOS 9 - SSH ACCESS (FIXED CURL CONFLICT)
  # ==============================================================================
  centos_deploy:
    needs: [master_brain]
    if: github.event.inputs.target_os == 'centos' || github.event.inputs.target_os == 'all'
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream9
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      port: ${{ steps.ssh_port.outputs.port }}
      os_type: ${{ steps.os_info.outputs.os_type }}
    steps:
      - name: CentOS 9 Deployment Start
        run: |
          echo ""
          echo "============================================================"
          echo "        CENTOS 9 DEPLOYMENT"
          echo "============================================================"
          echo ""

      - name: Get OS Info
        id: os_info
        run: |
          echo "os_type=CentOS Stream 9" >> $GITHUB_OUTPUT
          echo "OS: CentOS Stream 9"

      - name: Method 1 - Install wget first
        run: |
          echo "[1/7] Installing wget (alternative to curl)..."
          dnf install -y wget
          echo "[OK] wget installed"

      - name: Method 2 - Install SSH without curl
        run: |
          echo "[2/7] Installing OpenSSH server (skip curl)..."
          dnf install -y openssh-server --skip-broken
          echo "[OK] OpenSSH server installed"

      - name: Method 3 - Install minimal sudo
        run: |
          echo "[3/7] Installing sudo..."
          dnf install -y sudo --skip-broken
          echo "[OK] sudo installed"

      - name: Method 4 - Create User
        id: create_user
        run: |
          echo "[4/7] Creating user account..."
          
          USERNAME="centos_$((RANDOM % 9000 + 1000))"
          PASSWORD=$(openssl rand -base64 20 | tr -d '=+/' | cut -c1-24)
          
          useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | chpasswd
          usermod -aG wheel "$USERNAME"
          
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          
          echo "[OK] User created: $USERNAME"

      - name: Method 5 - Configure SSH
        id: ssh_port
        run: |
          echo "[5/7] Configuring SSH service..."
          
          sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          
          echo "port=22" >> $GITHUB_OUTPUT
          
          systemctl restart sshd
          systemctl enable sshd
          
          echo "[OK] SSH configured on port 22"

      - name: Method 6 - Get IP using wget
        id: get_ip
        run: |
          echo "[6/7] Getting public IP using wget..."
          
          IP=$(wget -qO- --timeout=10 https://api.ipify.org 2>/dev/null)
          if [ -z "$IP" ]; then
            IP=$(wget -qO- --timeout=10 https://ifconfig.me/ip 2>/dev/null)
          fi
          if [ -z "$IP" ]; then
            IP=$(wget -qO- --timeout=10 http://ipinfo.io/ip 2>/dev/null)
          fi
          if [ -z "$IP" ]; then
            IP="IP_UNAVAILABLE"
          fi
          
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "[OK] Public IP: $IP"

      - name: Method 7 - Verify SSH
        id: status
        run: |
          echo "[7/7] Verifying SSH service..."
          
          if systemctl is-active sshd > /dev/null 2>&1; then
            echo "status=active" >> $GITHUB_OUTPUT
            echo "[OK] SSH service is running"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "[ERROR] SSH service is not running"
          fi
          
          echo ""
          echo "============================================================"
          echo "  CENTOS 9 DEPLOYMENT COMPLETE"
          echo "============================================================"
          echo "OS: CentOS Stream 9"
          echo "SSH: ssh ${{ steps.create_user.outputs.username }}@${{ steps.get_ip.outputs.ip }} -p 22"
          echo "User: ${{ steps.create_user.outputs.username }}"
          echo "Pass: ${{ steps.create_user.outputs.password }}"
