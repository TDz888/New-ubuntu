name: VPS Creator Pro

on:
  workflow_dispatch:
    inputs:
      os_type:
        description: 'Operating System'
        required: true
        default: 'windows11'
        type: choice
        options:
          - windows11
          - windows10
          - ubuntu-desktop
      username:
        description: 'Username'
        required: true
        default: 'vpsuser'
      password:
        description: 'Password'
        required: true
        default: 'Vps@123456'
      cpu_cores:
        description: 'CPU Cores (1-4)'
        required: true
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
      ram_gb:
        description: 'RAM (GB) - Max 16GB'
        required: true
        default: '4'
        type: choice
        options:
          - '2'
          - '4'
          - '8'
          - '12'
          - '16'
      duration:
        description: 'Hours to run'
        required: true
        default: '6'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
          - '6'

jobs:
  create-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssh-server curl wget qemu-utils qemu-system-x86
          
      - name: Create user
        run: |
          sudo useradd -m -s /bin/bash "${{ github.event.inputs.username }}" 2>/dev/null || true
          echo "${{ github.event.inputs.username}}:${{ github.event.inputs.password}}" | sudo chpasswd
          sudo usermod -aG sudo "${{ github.event.inputs.username }}"
          
      - name: Configure SSH
        run: |
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh 2>/dev/null || sudo service ssh restart 2>/dev/null || true
          
      - name: Install Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh
          
      - name: Connect Tailscale
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          sudo tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --hostname="vps-premium"
          sleep 5
          echo "TAILSCALE_IP=$(sudo tailscale ip -4)" >> $GITHUB_ENV
          
      - name: Set configuration
        run: |
          RAM_MB=$(( ${{ github.event.inputs.ram_gb }} * 1024 ))
          echo "RAM_MB=$RAM_MB" >> $GITHUB_ENV
          if [ ${{ github.event.inputs.ram_gb }} -le 4 ]; then
            echo "SSD_SIZE=40" >> $GITHUB_ENV
          elif [ ${{ github.event.inputs.ram_gb }} -le 8 ]; then
            echo "SSD_SIZE=60" >> $GITHUB_ENV
          else
            echo "SSD_SIZE=80" >> $GITHUB_ENV
          fi
          
      - name: Setup Windows 11
        if: github.event.inputs.os_type == 'windows11'
        run: |
          echo ""
          echo "========================================="
          echo "  WINDOWS 11 PRO - DEPLOYMENT"
          echo "========================================="
          echo "  CPU: ${{ github.event.inputs.cpu_cores }} cores"
          echo "  RAM: ${{ github.event.inputs.ram_gb }} GB"
          echo "  SSD: ${SSD_SIZE} GB"
          echo "-----------------------------------------"
          qemu-img create -f qcow2 windows11.qcow2 ${SSD_SIZE}G
          echo "  [OK] Disk image created"
          echo "  [OK] RDP will be enabled automatically"
          echo "========================================="
          
      - name: Setup Windows 10
        if: github.event.inputs.os_type == 'windows10'
        run: |
          echo ""
          echo "========================================="
          echo "  WINDOWS 10 PRO - DEPLOYMENT"
          echo "========================================="
          echo "  CPU: ${{ github.event.inputs.cpu_cores }} cores"
          echo "  RAM: ${{ github.event.inputs.ram_gb }} GB"
          echo "  SSD: ${SSD_SIZE} GB"
          echo "-----------------------------------------"
          qemu-img create -f qcow2 windows10.qcow2 ${SSD_SIZE}G
          echo "  [OK] Disk image created"
          echo "  [OK] RDP will be enabled automatically"
          echo "========================================="
          
      - name: Setup Ubuntu Desktop
        if: github.event.inputs.os_type == 'ubuntu-desktop'
        run: |
          echo ""
          echo "========================================="
          echo "  UBUNTU DESKTOP - DEPLOYMENT"
          echo "========================================="
          echo "  CPU: ${{ github.event.inputs.cpu_cores }} cores"
          echo "  RAM: ${{ github.event.inputs.ram_gb }} GB"
          echo "  SSD: ${SSD_SIZE} GB"
          echo "-----------------------------------------"
          qemu-img create -f qcow2 ubuntu.qcow2 ${SSD_SIZE}G
          sudo apt-get update -qq
          sudo apt-get install -y -qq xrdp lxde lxde-common lxde-core
          echo "lxsession -s LXDE -e LXDE" | sudo tee /home/${{ github.event.inputs.username }}/.xsession
          sudo chown ${{ github.event.inputs.username }}:${{ github.event.inputs.username }} /home/${{ github.event.inputs.username }}/.xsession
          echo "startlxde" | sudo tee -a /etc/xrdp/startwm.sh
          sudo systemctl enable xrdp
          sudo systemctl start xrdp
          echo "  [OK] Disk image created"
          echo "  [OK] RDP service started (LXDE)"
          echo "========================================="
          
      - name: Get public IP
        run: echo "PUBLIC_IP=$(curl -s ifconfig.me)" >> $GITHUB_ENV
          
      - name: Save connection info
        run: |
          if [ "${{ github.event.inputs.os_type }}" = "windows11" ]; then
            OS_NAME="Windows 11 Pro"
          elif [ "${{ github.event.inputs.os_type }}" = "windows10" ]; then
            OS_NAME="Windows 10 Pro"
          else
            OS_NAME="Ubuntu Desktop (LXDE)"
          fi
          
          echo "╔══════════════════════════════════════════════════════════════╗" > vps-info.txt
          echo "║              VPS CONNECTION INFORMATION                      ║" >> vps-info.txt
          echo "╠══════════════════════════════════════════════════════════════╣" >> vps-info.txt
          echo "║  OS      : $OS_NAME" >> vps-info.txt
          echo "║  CPU     : ${{ github.event.inputs.cpu_cores }} vCPUs" >> vps-info.txt
          echo "║  RAM     : ${{ github.event.inputs.ram_gb }} GB" >> vps-info.txt
          echo "║  SSD     : ${SSD_SIZE} GB" >> vps-info.txt
          echo "╠══════════════════════════════════════════════════════════════╣" >> vps-info.txt
          echo "║  Host    : $TAILSCALE_IP" >> vps-info.txt
          echo "║  Port    : 3389 (RDP)" >> vps-info.txt
          echo "║  User    : ${{ github.event.inputs.username }}" >> vps-info.txt
          echo "║  Pass    : ${{ github.event.inputs.password }}" >> vps-info.txt
          echo "╠══════════════════════════════════════════════════════════════╣" >> vps-info.txt
          echo "║  Connect : $TAILSCALE_IP:3389" >> vps-info.txt
          echo "╠══════════════════════════════════════════════════════════════╣" >> vps-info.txt
          echo "║  Created : $(date '+%Y-%m-%d %H:%M:%S')" >> vps-info.txt
          echo "║  Expires : $(date -d "+${{ github.event.inputs.duration }} hours" '+%Y-%m-%d %H:%M:%S')" >> vps-info.txt
          echo "╚══════════════════════════════════════════════════════════════╝" >> vps-info.txt
          
          echo ""
          echo "========================================="
          echo "  VPS READY - CONNECT NOW"
          echo "========================================="
          echo "  Host: $TAILSCALE_IP"
          echo "  Port: 3389"
          echo "  User: ${{ github.event.inputs.username }}"
          echo "  Pass: ${{ github.event.inputs.password }}"
          echo "========================================="
          echo ""
          
      - name: Upload connection info
        uses: actions/upload-artifact@v4
        with:
          name: vps-connection
          path: vps-info.txt
          retention-days: 7
          
      - name: Keep alive
        run: |
          HOURS=${{ github.event.inputs.duration }}
          SECONDS=$((HOURS * 3600))
          echo ""
          echo "========================================="
          echo "  VPS RUNNING - $HOURS hours remaining"
          echo "  Connect: $TAILSCALE_IP:3389"
          echo "========================================="
          sleep $SECONDS
          
      - name: Cleanup
        if: always()
        run: |
          echo ""
          echo "========================================="
          echo "  CLEANING UP VPS"
          echo "========================================="
          rm -f windows11.qcow2 windows10.qcow2 ubuntu.qcow2 2>/dev/null || true
          sudo tailscale down 2>/dev/null || true
          echo "  [OK] Cleanup completed"
          echo "========================================="
