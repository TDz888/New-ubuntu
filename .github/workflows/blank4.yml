name: 🧠 PREMIUM VM GENERATOR v6.0 - ULTIMATE EDITION

on:
  workflow_dispatch:
    inputs:
      os_type:
        description: '🧠 Select Neural Operating System'
        required: true
        default: 'windows-11'
        type: choice
        options:
          - 'windows-11'
          - 'windows-server-2022'
          - 'ubuntu-22-04'
          - 'ubuntu-24-04'
          - 'debian-12'
          - 'centos-9'
      
      vm_specs:
        description: '⚡ Neural Processing Power'
        required: true
        default: 'standard-4gb'
        type: choice
        options:
          - 'lightning-2gb'
          - 'standard-4gb'
          - 'turbo-8gb'
          - 'quantum-16gb'
      
      duration:
        description: '⏱️ Session Duration (Neural Processing Time)'
        required: false
        default: '4h'
        type: choice
        options:
          - '30m'
          - '1h'
          - '2h'
          - '3h'
          - '4h'
          - '5h'
          - '6h'
      
      network_type:
        description: '🌐 Neural Network Protocol'
        required: false
        default: 'tailscale'
        type: choice
        options:
          - 'tailscale'
          - 'direct-ip'
          - 'cloudflare-tunnel'
      
      telegram_notify:
        description: '📱 Telegram Auto-Notify'
        required: false
        default: 'true'
        type: boolean
      
      auto_backup:
        description: '💾 Neural Backup System'
        required: false
        default: 'false'
        type: boolean
      
      monitoring_level:
        description: '📊 Neural Monitoring Depth'
        required: false
        default: 'advanced'
        type: choice
        options:
          - 'basic'
          - 'standard'
          - 'advanced'
          - 'quantum'

# =====================================================================================
#                         📡 TELEGRAM NOTIFICATION SYSTEM
# =====================================================================================
env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

# =====================================================================================
# 🧠 JOB 1: WINDOWS 11 NEURAL BRAIN - ISOLATED CORTEX
# =====================================================================================
jobs:
  Windows11-NeuralBrain:
    if: github.event.inputs.os_type == 'windows-11'
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      # ============================================================
      # PHASE 1: NEURAL BOOTSTRAP - INITIALIZATION
      # ============================================================
      - name: 🧠 WIN11 - NEURAL BOOTSTRAP
        run: |
          # Neural Configuration
          $global:NeuralStartTime = Get-Date
          $global:NeuralSessionId = "WIN11-$(Get-Random -Minimum 100000 -Maximum 999999)"
          $global:NeuralLogPath = "$env:TEMP\neural_win11_$(Get-Date -Format 'yyyyMMdd_HHmmss')"
          New-Item -ItemType Directory -Path $global:NeuralLogPath -Force | Out-Null
          
          # Quantum Banner
          Write-Host @"
          
╔══════════════════════════════════════════════════════════════════════════════════════════════╗
║                                                                                              ║
║    🧠  N E U R A L   B R A I N   A C T I V A T E D                                          ║
║    ═════════════════════════════════════════════════════════════════════════════════════    ║
║                                                                                              ║
║    ██╗    ██╗██╗███╗   ██╗██████╗  ██████╗ ██╗    ██╗███████╗                             ║
║    ██║    ██║██║████╗  ██║██╔══██╗██╔═══██╗██║    ██║██╔════╝                             ║
║    ██║ █╗ ██║██║██╔██╗ ██║██████╔╝██║   ██║██║ █╗ ██║███████╗                             ║
║    ██║███╗██║██║██║╚██╗██║██╔══██╗██║   ██║██║███╗██║╚════██║                             ║
║    ╚███╔███╔╝██║██║ ╚████║██║  ██║╚██████╔╝╚███╔███╔╝███████║                             ║
║     ╚══╝╚══╝ ╚═╝╚═╝  ╚═══╝╚═╝  ╚═╝ ╚═════╝  ╚══╝╚══╝ ╚══════╝                             ║
║                                                                                              ║
║    ╔══════════════════════════════════════════════════════════════════════════════════════╗ ║
║    ║  🧠 NEURAL CORTEX    : Windows 11 Professional x64                                   ║ ║
║    ║  ⚡ PROCESSING POWER : ${{ github.event.inputs.vm_specs }}                                         ║ ║
║    ║  🕐 SESSION ID      : $global:NeuralSessionId                                        ║ ║
║    ║  📡 NEURAL LINK     : ${{ github.event.inputs.network_type }}                                    ║ ║
║    ╚══════════════════════════════════════════════════════════════════════════════════════╝ ║
║                                                                                              ║
╚══════════════════════════════════════════════════════════════════════════════════════════════╝
"@ -ForegroundColor Cyan
          
          # Save neural data
          echo "NEURAL_SESSION_ID=$global:NeuralSessionId" >> $env:GITHUB_ENV
          echo "NEURAL_START_TIME=$global:NeuralStartTime" >> $env:GITHUB_ENV
          echo "NEURAL_LOG_PATH=$global:NeuralLogPath" >> $env:GITHUB_ENV
          
          Start-Sleep -Seconds 2
      
      # ============================================================
      # PHASE 2: NEURAL SYNAPSE - RDP CONFIGURATION
      # ============================================================
      - name: ⚡ WIN11 - NEURAL SYNAPSE CONFIGURATION
        run: |
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════════════════╗" -ForegroundColor Magenta
          Write-Host "║  ⚡ ESTABLISHING NEURAL SYNAPSES - RDP PROTOCOL                      ║" -ForegroundColor Magenta
          Write-Host "╚════════════════════════════════════════════════════════════════════════╝" -ForegroundColor Magenta
          
          # Parallel neural processing
          $jobs = @()
          
          $jobs += Start-Job -ScriptBlock {
            Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          }
          
          $jobs += Start-Job -ScriptBlock {
            Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
            Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          }
          
          $jobs += Start-Job -ScriptBlock {
            netsh advfirewall firewall add rule name="Neural-RDP-In" dir=in action=allow protocol=TCP localport=3389 profile=any
            netsh advfirewall firewall add rule name="Neural-RDP-Out" dir=out action=allow protocol=TCP localport=3389 profile=any
          }
          
          $jobs | Wait-Job | Receive-Job
          $jobs | Remove-Job
          
          Write-Host "│ ✅ Neural synapses established" -ForegroundColor Green
          Write-Host "│ 🔗 RDP protocol activated" -ForegroundColor Green
      
      # ============================================================
      # PHASE 3: QUANTUM PASSWORD GENERATION
      # ============================================================
      - name: 🔐 WIN11 - QUANTUM PASSWORD GENERATION
        run: |
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════════════════╗" -ForegroundColor Magenta
          Write-Host "║  🔐 QUANTUM PASSWORD GENERATION - SECURE NEURAL ENCRYPTION           ║" -ForegroundColor Magenta
          Write-Host "╚════════════════════════════════════════════════════════════════════════╝" -ForegroundColor Magenta
          
          function New-QuantumPassword {
            param([int]$Length = 16)
            
            # Quantum entropy pools
            $upperPool = 'ABCDEFGHJKLMNPQRSTUVWXYZ'
            $lowerPool = 'abcdefghijkmnpqrstuvwxyz'
            $numberPool = '23456789'
            $symbolPool = '!@#$%&*+=?'
            
            $quantumSeed = [System.BitConverter]::ToUInt32((Get-Random -Count 4), 0)
            $random = [System.Random]::new($quantumSeed)
            
            $password = [System.Collections.ArrayList]::new()
            
            # Ensure complexity
            $password.Add($upperPool[$random.Next(0, $upperPool.Length)]) | Out-Null
            $password.Add($lowerPool[$random.Next(0, $lowerPool.Length)]) | Out-Null
            $password.Add($numberPool[$random.Next(0, $numberPool.Length)]) | Out-Null
            $password.Add($symbolPool[$random.Next(0, $symbolPool.Length)]) | Out-Null
            
            $allChars = $upperPool + $lowerPool + $numberPool + $symbolPool
            for ($i = 4; $i -lt $Length; $i++) {
              $password.Add($allChars[$random.Next(0, $allChars.Length)]) | Out-Null
            }
            
            $shuffled = $password.ToArray() | Sort-Object { Get-Random -Maximum 1000 }
            return -join $shuffled
          }
          
          $global:NeuralUsername = "NEURAL-ADMIN"
          $global:NeuralPassword = New-QuantumPassword
          $securePass = ConvertTo-SecureString $global:NeuralPassword -AsPlainText -Force
          
          Remove-LocalUser -Name $global:NeuralUsername -ErrorAction SilentlyContinue
          
          New-LocalUser -Name $global:NeuralUsername -Password $securePass -AccountNeverExpires -Description "Neural Brain Windows 11"
          Set-LocalUser -Name $global:NeuralUsername -PasswordNeverExpires $true
          
          Add-LocalGroupMember -Group "Administrators" -Member $global:NeuralUsername
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $global:NeuralUsername
          Add-LocalGroupMember -Group "Users" -Member $global:NeuralUsername
          Enable-LocalUser -Name $global:NeuralUsername
          
          echo "NEURAL_USERNAME=$global:NeuralUsername" >> $env:GITHUB_ENV
          echo "NEURAL_PASSWORD=$global:NeuralPassword" >> $env:GITHUB_ENV
          echo "$global:NeuralPassword" > "$env:TEMP\neural_password.txt"
          
          Write-Host "│ 🧠 Neural identity created: $global:NeuralUsername" -ForegroundColor Green
          Write-Host "│ 🔐 Quantum password generated" -ForegroundColor Green
      
      # ============================================================
      # PHASE 4: NEURAL NETWORK CONFIGURATION
      # ============================================================
      - name: 🌐 WIN11 - NEURAL NETWORK CONFIGURATION
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════════════════╗" -ForegroundColor Magenta
          Write-Host "║  🌐 CONFIGURING NEURAL NETWORK INTERFACE                              ║" -ForegroundColor Magenta
          Write-Host "╚════════════════════════════════════════════════════════════════════════╝" -ForegroundColor Magenta
          
          $networkType = "${{ github.event.inputs.network_type }}"
          
          if ($networkType -eq "tailscale" -and $env:TAILSCALE_AUTH_KEY) {
            Write-Host "│ 📡 Establishing Tailscale neural link..." -ForegroundColor Blue
            
            $msiPath = "$env:TEMP\tailscale_neural.msi"
            $downloadJob = Start-Job -ScriptBlock {
              Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $using:msiPath
            }
            $downloadJob | Wait-Job | Out-Null
            
            Start-Process msiexec.exe -ArgumentList "/i `"$msiPath`" /quiet /norestart" -Wait
            Remove-Item $msiPath -Force -ErrorAction SilentlyContinue
            
            Start-Sleep -Seconds 8
            
            $neuralHostname = "neural-win11-$env:GITHUB_RUN_ID"
            & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=$neuralHostname --accept-routes --accept-dns
            
            $retryCount = 0
            while ($retryCount -lt 15) {
              $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4 2>&1
              if ($ip -match '^\d+\.\d+\.\d+\.\d+$') {
                $global:NeuralIP = $ip
                break
              }
              Start-Sleep -Seconds 2
              $retryCount++
            }
          } else {
            $global:NeuralIP = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing).Content
          }
          
          echo "NEURAL_IP=$global:NeuralIP" >> $env:GITHUB_ENV
          Write-Host "│ ✅ Neural network active at: $global:NeuralIP" -ForegroundColor Green
      
      # ============================================================
      # PHASE 5: NEURAL PERFORMANCE OPTIMIZATION
      # ============================================================
      - name: ⚡ WIN11 - NEURAL PERFORMANCE BOOST
        run: |
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════════════════╗" -ForegroundColor Magenta
          Write-Host "║  ⚡ APPLYING NEURAL PERFORMANCE OPTIMIZATIONS                         ║" -ForegroundColor Magenta
          Write-Host "╚════════════════════════════════════════════════════════════════════════╝" -ForegroundColor Magenta
          
          $optimizations = @(
            @{Name = "Disable Visual Effects"; Cmd = { Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" -Name "VisualFXSetting" -Value 2 -Force }}
            @{Name = "Optimize Power Plan"; Cmd = { powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c }}
            @{Name = "Disable Windows Defender"; Cmd = { Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue }}
            @{Name = "Clear Neural Cache"; Cmd = { Remove-Item "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue }}
            @{Name = "Optimize Network Stack"; Cmd = { netsh int tcp set global autotuninglevel=normal }}
          )
          
          $optimizationJobs = @()
          foreach($opt in $optimizations) {
            $optimizationJobs += Start-Job -ScriptBlock { & $using:opt.Cmd }
            Write-Host "│ 🔧 $($opt.Name)..." -NoNewline
            Write-Host " ✓" -ForegroundColor Green
          }
          
          $optimizationJobs | Wait-Job | Out-Null
          $optimizationJobs | Remove-Job
          
          Write-Host "│ ✅ Neural performance boosted" -ForegroundColor Green
      
