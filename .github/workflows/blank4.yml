name: 🚀 VPS CREATOR PRO - PREMIUM

on:
  workflow_dispatch:
    inputs:
      os_type:
        description: 🖥️ Operating System
        required: true
        default: windows11
        type: choice
        options:
          - windows11
          - windows10
          - ubuntu-server
      username:
        description: 👤 Username
        required: true
        default: vpsuser
      password:
        description: 🔑 Password
        required: true
        default: Vps123456
      region:
        description: 🌍 Region
        required: true
        default: us
        type: choice
        options:
          - us
          - eu
          - asia
      instances:
        description: 🔢 Number of VPS (1-3)
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
      wallpaper_url:
        description: 🖼️ Wallpaper URL (Windows only)
        required: false
        default: ''
      duration:
        description: ⏱️ Hours
        required: true
        default: '6'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
          - '6'
      subdomain:
        description: 🌐 Custom subdomain (optional, e.g., myvps)
        required: false
        default: ''

jobs:
  # ============================================
  # UBUNTU SERVER - VỚI DASHBOARD + SUBDOMAIN
  # ============================================
  ubuntu-server-vps:
    runs-on: ubuntu-latest
    if: github.event.inputs.os_type == 'ubuntu-server'
    timeout-minutes: 360
    strategy:
      matrix:
        instance: [1, 2, 3]
      max-parallel: 3
    steps:
      - name: Check instance count
        if: github.event.inputs.instances < matrix.instance
        run: exit 0
          
      - name: 🎯 SYSTEM INIT
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║          🐧⚡ UBUNTU SERVER - INSTANCE ${{ matrix.instance }} 🐧⚡            ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  🌍 Region     : ${{ github.event.inputs.region }}"
          echo "  👤 Username   : ${{ github.event.inputs.username }}"
          echo "  ⏱️  Duration   : ${{ github.event.inputs.duration }} hours"
          echo "  🌐 Subdomain  : ${{ github.event.inputs.subdomain }}"
          echo ""
          
      - name: 🔧 INSTALL SSH & TOOLS
        run: |
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  🔧 INSTALLING SSH & WEB TOOLS                               │"
          echo "└─────────────────────────────────────────────────────────────┘"
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssh-server python3 python3-pip nginx
          sudo systemctl enable ssh
          sudo systemctl start ssh
          echo "  ✅ SSH service started (port 22)"
          echo ""
          
      - name: 👤 CREATE USER
        run: |
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  👤 CREATING USER ACCOUNT                                   │"
          echo "└─────────────────────────────────────────────────────────────┘"
          sudo useradd -m -s /bin/bash "${{ github.event.inputs.username }}" 2>/dev/null || true
          echo "${{ github.event.inputs.username}}:${{ github.event.inputs.password}}" | sudo chpasswd
          sudo usermod -aG sudo "${{ github.event.inputs.username }}"
          echo "${{ github.event.inputs.password}}" > /tmp/pass.txt
          echo "  ✅ User: ${{ github.event.inputs.username }} created"
          echo ""
          
      - name: 🌐 INSTALL TAILSCALE
        run: |
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  🌐 INSTALLING TAILSCALE                                    │"
          echo "└─────────────────────────────────────────────────────────────┘"
          curl -fsSL https://tailscale.com/install.sh | sh > /dev/null 2>&1
          echo "  ✅ Tailscale installed"
          echo ""
          
      - name: 🔗 CONNECT TAILSCALE
        env:
          KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  🔗 CONNECTING TO TAILSCALE                                 │"
          echo "└─────────────────────────────────────────────────────────────┘"
          sudo tailscale up --auth-key="$KEY" --hostname="ubuntu-${{ matrix.instance }}"
          sleep 5
          IP=$(sudo tailscale ip -4)
          echo "IP=$IP" >> $GITHUB_ENV
          echo "  ✅ Connected - IP: $IP"
          echo ""
          
      - name: 🌐 SETUP SUBDOMAIN (Pinggy)
        if: github.event.inputs.subdomain != ''
        run: |
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  🌐 SETUP SUBDOMAIN TUNNEL                                   │"
          echo "└─────────────────────────────────────────────────────────────┘"
          SUB="${{ github.event.inputs.subdomain }}-${{ matrix.instance }}"
          ssh -R 80:localhost:22 $SUB@pinggy.io > /tmp/sub.log 2>&1 &
          sleep 8
          SUB_URL=$(grep -o 'https://[a-z0-9.-]*\.pinggy\.io' /tmp/sub.log | head -1)
          echo "SUB_URL=$SUB_URL" >> $GITHUB_ENV
          echo "  ✅ Subdomain: $SUB_URL"
          echo ""
          
      - name: 🖥️ CREATE REAL-TIME DASHBOARD
        run: |
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  🖥️ CREATING REAL-TIME DASHBOARD                            │"
          echo "└─────────────────────────────────────────────────────────────┘"
          
          cat > /tmp/dashboard.html << 'DASHBOARD'
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>VPS Dashboard - Realtime</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      background: #0a0c10;
                      font-family: 'Courier New', monospace;
                      color: #0f0;
                      padding: 20px;
                  }
                  .container { max-width: 1200px; margin: 0 auto; }
                  .header {
                      text-align: center;
                      border-bottom: 2px solid #0f0;
                      padding-bottom: 20px;
                      margin-bottom: 30px;
                  }
                  .header h1 { font-size: 2rem; text-shadow: 0 0 10px #0f0; }
                  .grid {
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                      gap: 20px;
                      margin-bottom: 30px;
                  }
                  .card {
                      background: #111317;
                      border: 1px solid #0f0;
                      border-radius: 10px;
                      padding: 20px;
                      box-shadow: 0 0 20px rgba(0,255,0,0.1);
                  }
                  .card h3 {
                      color: #0f0;
                      margin-bottom: 15px;
                      border-bottom: 1px solid #0f0;
                      display: inline-block;
                  }
                  .metric {
                      font-size: 2rem;
                      font-weight: bold;
                      margin: 10px 0;
                  }
                  .progress-bar {
                      width: 100%;
                      height: 20px;
                      background: #1a1d24;
                      border-radius: 10px;
                      overflow: hidden;
                      margin: 10px 0;
                  }
                  .progress-fill {
                      height: 100%;
                      background: linear-gradient(90deg, #0f0, #0f0);
                      width: 0%;
                      transition: width 0.5s ease;
                  }
                  .status {
                      color: #0f0;
                      animation: blink 1s infinite;
                  }
                  @keyframes blink {
                      0%, 100% { opacity: 1; }
                      50% { opacity: 0.5; }
                  }
                  .footer {
                      text-align: center;
                      margin-top: 30px;
                      color: #0f0;
                      font-size: 0.8rem;
                  }
                  pre {
                      background: #000;
                      padding: 10px;
                      border-radius: 5px;
                      overflow-x: auto;
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="header">
                      <h1>🔧 VPS DASHBOARD [REALTIME]</h1>
                      <p class="status">🟢 SYSTEM ONLINE</p>
                  </div>
                  
                  <div class="grid">
                      <div class="card">
                          <h3>📊 CPU USAGE</h3>
                          <div class="metric" id="cpu">--%</div>
                          <div class="progress-bar"><div class="progress-fill" id="cpu-bar"></div></div>
                      </div>
                      
                      <div class="card">
                          <h3>💾 RAM USAGE</h3>
                          <div class="metric" id="ram">-- / -- GB</div>
                          <div class="progress-bar"><div class="progress-fill" id="ram-bar"></div></div>
                      </div>
                      
                      <div class="card">
                          <h3>💿 DISK USAGE</h3>
                          <div class="metric" id="disk">-- / -- GB</div>
                          <div class="progress-bar"><div class="progress-fill" id="disk-bar"></div></div>
                      </div>
                  </div>
                  
                  <div class="grid">
                      <div class="card">
                          <h3>⏱️ UPTIME</h3>
                          <div class="metric" id="uptime">--</div>
                      </div>
                      
                      <div class="card">
                          <h3>🌐 NETWORK</h3>
                          <div class="metric" id="network">-- / --</div>
                      </div>
                      
                      <div class="card">
                          <h3>🔌 ACTIVE CONNECTIONS</h3>
                          <div class="metric" id="connections">--</div>
                      </div>
                  </div>
                  
                  <div class="card">
                      <h3>📋 LIVE LOG</h3>
                      <pre id="log">Waiting for data...</pre>
                  </div>
                  
                  <div class="footer">
                      <p>VPS Dashboard v2.0 | Realtime via WebSocket | Powered by Tailscale</p>
                  </div>
              </div>
              
              <script>
                  const ws = new WebSocket(`ws://${window.location.hostname}:8080`);
                  const logElement = document.getElementById('log');
                  
                  ws.onmessage = (event) => {
                      const data = JSON.parse(event.data);
                      
                      document.getElementById('cpu').innerText = `${data.cpu}%`;
                      document.getElementById('cpu-bar').style.width = `${data.cpu}%`;
                      
                      document.getElementById('ram').innerText = `${data.ram_used}/${data.ram_total} GB`;
                      document.getElementById('ram-bar').style.width = `${data.ram_percent}%`;
                      
                      document.getElementById('disk').innerText = `${data.disk_used}/${data.disk_total} GB`;
                      document.getElementById('disk-bar').style.width = `${data.disk_percent}%`;
                      
                      document.getElementById('uptime').innerText = data.uptime;
                      document.getElementById('network').innerText = `${data.network_rx}/${data.network_tx}`;
                      document.getElementById('connections').innerText = data.connections;
                      
                      const timestamp = new Date().toLocaleTimeString();
                      logElement.innerHTML = `[${timestamp}] CPU: ${data.cpu}% | RAM: ${data.ram_percent}% | DISK: ${data.disk_percent}%\n` + logElement.innerHTML;
                      if (logElement.innerHTML.split('\n').length > 20) {
                          logElement.innerHTML = logElement.innerHTML.split('\n').slice(0, 20).join('\n');
                      }
                  };
                  
                  ws.onerror = () => { logElement.innerHTML = '⚠️ WebSocket connection error'; };
              </script>
          </body>
          </html>
DASHBOARD
          
          sudo cp /tmp/dashboard.html /var/www/html/index.html
          echo "  ✅ Dashboard created at /var/www/html/index.html"
          echo ""
          
      - name: 🚀 START WEBSOCKET SERVER
        run: |
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  🚀 STARTING WEBSOCKET SERVER                               │"
          echo "└─────────────────────────────────────────────────────────────┘"
          
          cat > /tmp/ws_server.py << 'PYTHON'
          import asyncio
          import websockets
          import json
          import psutil
          import subprocess
          import time
          
          async def get_stats():
              cpu = psutil.cpu_percent()
              ram = psutil.virtual_memory()
              disk = psutil.disk_usage('/')
              net = psutil.net_io_counters()
              conn = len(psutil.net_connections())
              uptime = int(time.time() - psutil.boot_time())
              hours = uptime // 3600
              minutes = (uptime % 3600) // 60
              
              return {
                  'cpu': cpu,
                  'ram_used': round(ram.used / (1024**3), 1),
                  'ram_total': round(ram.total / (1024**3), 1),
                  'ram_percent': ram.percent,
                  'disk_used': round(disk.used / (1024**3), 1),
                  'disk_total': round(disk.total / (1024**3), 1),
                  'disk_percent': disk.percent,
                  'uptime': f'{hours}h {minutes}m',
                  'network_rx': f'{round(net.bytes_recv / (1024**2), 1)} MB',
                  'network_tx': f'{round(net.bytes_sent / (1024**2), 1)} MB',
                  'connections': conn
              }
          
          async def handler(websocket):
              while True:
                  stats = await get_stats()
                  await websocket.send(json.dumps(stats))
                  await asyncio.sleep(2)
          
          async def main():
              async with websockets.serve(handler, "0.0.0.0", 8080):
                  await asyncio.Future()
          
          asyncio.run(main())
PYTHON
          
          sudo pip3 install websockets psutil > /dev/null 2>&1
          nohup python3 /tmp/ws_server.py > /tmp/ws.log 2>&1 &
          echo "  ✅ WebSocket server running on port 8080"
          echo ""
          
      - name: 📊 PERFORMANCE BENCHMARK
        run: |
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  📊 PERFORMANCE BENCHMARK                                    │"
          echo "└─────────────────────────────────────────────────────────────┘"
          
          start=$(date +%s%N)
          for i in {1..1000000}; do :; done
          end=$(date +%s%N)
          cpu=$(echo "scale=2; 1000000 / (($end - $start) / 1000000000)" | bc)
          echo "  🔵 CPU Score: $cpu ops/sec"
          
          start=$(date +%s%N)
          arr=()
          for i in {1..500000}; do arr+=($i); done
          end=$(date +%s%N)
          mem=$(echo "scale=2; 500000 / (($end - $start) / 1000000000)" | bc)
          echo "  🟢 Memory Score: $mem ops/sec"
          
          start=$(date +%s%N)
          dd if=/dev/zero of=/tmp/disk.tmp bs=1M count=10 2>/dev/null
          end=$(date +%s%N)
          disk=$(echo "scale=2; 10 / (($end - $start) / 1000000000)" | bc)
          rm -f /tmp/disk.tmp
          echo "  💾 Disk Score: $disk MB/s"
          echo ""
          
          echo "CPU: $cpu ops/sec" > /tmp/bench.txt
          echo "Memory: $mem ops/sec" >> /tmp/bench.txt
          echo "Disk: $disk MB/s" >> /tmp/bench.txt
          
      - name: 📈 RESOURCE MONITOR
        run: |
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│  📈 RESOURCE MONITOR                                        │"
          echo "└─────────────────────────────────────────────────────────────┘"
          
          cpu=$(top -bn1 | grep "Cpu(s)" | awk '{print $2 + $4}')
          ram=$(free -h | awk '/^Mem:/ {print $3 "/" $2}')
          disk=$(df -h / | awk 'NR==2 {print $3 "/" $2}')
          uptime=$(uptime -p)
          
          echo "  🔵 CPU  : $cpu%"
          echo "  🟢 RAM  : $ram"
          echo "  💾 DISK : $disk"
          echo "  ⏱️  UPTIME: $uptime"
          echo ""
          
          echo "CPU: $cpu%" > /tmp/res.txt
          echo "RAM: $ram" >> /tmp/res.txt
          echo "DISK: $disk" >> /tmp/res.txt
          echo "UPTIME: $uptime" >> /tmp/res.txt
          
      - name: 🎉 DISPLAY CONNECTION INFO
        run: |
          pass=$(cat /tmp/pass.txt)
          bench=$(cat /tmp/bench.txt)
          res=$(cat /tmp/res.txt)
          ip="$IP"
          user="${{ github.event.inputs.username }}"
          hours="${{ github.event.inputs.duration }}"
          start=$(date '+%H:%M:%S')
          end=$(date -d "+$hours hours" '+%H:%M:%S')
          sub="$SUB_URL"
          
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║              🎉 UBUNTU SERVER READY - INSTANCE ${{ matrix.instance }} 🎉            ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║                                                              ║"
          echo "║  🔐 SSH CONNECTION                                           ║"
          echo "║  ┌────────────────────────────────────────────────────────┐ ║"
          echo "║  │  🌐 Host     │  $ip"
          echo "║  │  🔌 Port     │  22"
          echo "║  │  👤 User     │  $user"
          echo "║  │  🔑 Password │  $pass"
          echo "║  └────────────────────────────────────────────────────────┘ ║"
          echo "║                                                              ║"
          
          if [ -n "$sub" ]; then
            echo "║  🌐 SUBDOMAIN ACCESS                                        ║"
            echo "║  ┌────────────────────────────────────────────────────────┐ ║"
            echo "║  │  🔗 Public URL │  $sub"
            echo "║  │  📊 Dashboard  │  $sub:8080/dashboard.html"
            echo "║  └────────────────────────────────────────────────────────┘ ║"
            echo "║                                                              ║"
          fi
          
          echo "║  📊 BENCHMARK SCORES                                         ║"
          echo "║  ┌────────────────────────────────────────────────────────┐ ║"
          while IFS= read -r line; do
            echo "║  │  $line"
          done <<< "$bench"
          echo "║  └────────────────────────────────────────────────────────┘ ║"
          echo "║                                                              ║"
          echo "║  📈 CURRENT RESOURCES                                        ║"
          echo "║  ┌────────────────────────────────────────────────────────┐ ║"
          while IFS= read -r line; do
            echo "║  │  $line"
          done <<< "$res"
          echo "║  └────────────────────────────────────────────────────────┘ ║"
          echo "║                                                              ║"
          echo "║  ⏱️  TIME INFORMATION                                        ║"
          echo "║  ┌────────────────────────────────────────────────────────┐ ║"
          echo "║  │  🕐 Started  │  $start"
          echo "║  │  🕐 Expires  │  $end"
          echo "║  └────────────────────────────────────────────────────────┘ ║"
          echo "║                                                              ║"
          echo "║  💡 QUICK CONNECT (iPhone)                                   ║"
          echo "║  ┌────────────────────────────────────────────────────────┐ ║"
          echo "║  │  1. Install Tailscale → Turn ON VPN                    │ ║"
          echo "║  │  2. Install Termius / Shelly from App Store            │ ║"
          echo "║  │  3. Add new host → Host: $ip, Port: 22                 │ ║"
          echo "║  │  4. Username: $user, Password: $pass                   │ ║"
          echo "║  │  5. Connect and enjoy! 🚀                              │ ║"
          echo "║  └────────────────────────────────────────────────────────┘ ║"
          echo "║                                                              ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          
          {
            echo "Host: $ip"
            echo "Port: 22"
            echo "User: $user"
            echo "Pass: $pass"
            if [ -n "$sub" ]; then
              echo "Subdomain: $sub"
              echo "Dashboard: $sub:8080"
            fi
          } > vps-info.txt
          
      - name: 📤 UPLOAD CONNECTION INFO
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-instance-${{ matrix.instance }}
          path: |
            vps-info.txt
            /tmp/bench.txt
            /tmp/res.txt
          retention-days: 7
          
      - name: ⏳ KEEP ALIVE
        run: |
          h=${{ github.event.inputs.duration }}
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║  🟢 UBUNTU SERVER INSTANCE ${{ matrix.instance }} RUNNING 🟢                ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  🌐 SSH : ssh ${{ github.event.inputs.username }}@$IP -p 22"
          if [ -n "$SUB_URL" ]; then
            echo "║  🌐 Web  : $SUB_URL"
          fi
          echo "║  ⏱️  Will shutdown after $h hours"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          sleep $((h * 3600))

  # ============================================
  # WINDOWS 11 - VỚI DASHBOARD + SUBDOMAIN
  # ============================================
  windows11-vps:
    runs-on: windows-latest
    if: github.event.inputs.os_type == 'windows11'
    timeout-minutes: 360
    strategy:
      matrix:
        instance: [1, 2, 3]
      max-parallel: 3
    steps:
      - name: Check instance count
        if: github.event.inputs.instances < matrix.instance
        shell: pwsh
        run: exit 0
          
      - name: 🎯 SYSTEM INIT
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════════╗"
          Write-Host "║          🪟✨ WINDOWS 11 PRO - INSTANCE ${{ matrix.instance }} 🪟✨          ║"
          Write-Host "╚══════════════════════════════════════════════════════════════╝"
          Write-Host ""
          Write-Host "  🌍 Region     : ${{ github.event.inputs.region }}"
          Write-Host "  👤 Username   : ${{ github.event.inputs.username }}"
          Write-Host "  ⏱️  Duration   : ${{ github.event.inputs.duration }} hours"
          if ("${{ github.event.inputs.subdomain }}" -ne '') {
            Write-Host "  🌐 Subdomain  : ${{ github.event.inputs.subdomain }}"
          }
          Write-Host ""
          
      - name: 🔧 CONFIGURE RDP
        shell: pwsh
        run: |
          Write-Host "┌─────────────────────────────────────────────────────────────┐"
          Write-Host "│  🔧 CONFIGURING REMOTE DESKTOP                              │"
          Write-Host "└─────────────────────────────────────────────────────────────┘"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP-In" dir=in action=allow protocol=TCP localport=3389
          Set-Service -Name TermService -StartupType Automatic
          Start-Service -Name TermService
          Write-Host "  ✅ RDP configured"
          Write-Host ""
          
      - name: 👤 CREATE USER
        shell: pwsh
        run: |
          Write-Host "┌─────────────────────────────────────────────────────────────┐"
          Write-Host "│  👤 CREATING USER ACCOUNT                                   │"
          Write-Host "└─────────────────────────────────────────────────────────────┘"
          $u = "${{ github.event.inputs.username }}"
          $p = "${{ github.event.inputs.password }}"
          $sec = ConvertTo-SecureString $p -AsPlainText -Force
          try { Remove-LocalUser -Name $u -ErrorAction SilentlyContinue } catch {}
          New-LocalUser -Name $u -Password $sec -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $u
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u
          Enable-LocalUser -Name $u
          $p | Out-File -FilePath $env:TEMP\pass.txt
          Write-Host "  ✅ User: $u created"
          Write-Host ""
          
      - name: 🖼️ SET WALLPAPER
        if: github.event.inputs.wallpaper_url != ''
        shell: pwsh
        run: |
          Write-Host "┌─────────────────────────────────────────────────────────────┐"
          Write-Host "│  🖼️ SETTING CUSTOM WALLPAPER                                │"
          Write-Host "└─────────────────────────────────────────────────────────────┘"
          $url = "${{ github.event.inputs.wallpaper_url }}"
          $img = "$env:TEMP\wall.jpg"
          Invoke-WebRequest -Uri $url -OutFile $img
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name Wallpaper -Value $img
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name WallpaperStyle -Value 2
          Write-Host "  ✅ Wallpaper applied"
          Write-Host ""
          
      - name: 📸 CAPTURE SCREENSHOT
        shell: pwsh
        run: |
          Write-Host "┌─────────────────────────────────────────────────────────────┐"
          Write-Host "│  📸 CAPTURING SCREENSHOT                                    │"
          Write-Host "└─────────────────────────────────────────────────────────────┘"
