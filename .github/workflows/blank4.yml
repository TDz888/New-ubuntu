          Write-Host "║  🧠 Neural Processing until: $($endTime.ToString('HH:mm:ss dd/MM/yyyy'))" -ForegroundColor Cyan
          Write-Host "║  ⚡ Quantum Core: Active | 🧬 Neural Synapses: Stable                 ║" -ForegroundColor Cyan
