  # Các job cho OS khác được cấu hình tương tự với cấu trúc mới
  WindowsServer-NeuralBrain:
    if: github.event.inputs.os_type == 'windows-server-2022'
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: 🧠 WINSRV - QUANTUM BOOTSTRAP
        run: |
          $global:NeuralSessionId = "WINSRV-$(Get-Random -Minimum 100000 -Maximum 999999)"
          echo "NEURAL_SESSION_ID=$global:NeuralSessionId" >> $env:GITHUB_ENV
          
          $durationInput = "${{ github.event.inputs.duration }}"
          $totalMinutes = switch ($durationInput) {
            "30m" { 30 } "1h" { 60 } "2h" { 120 } "3h" { 180 }
            "4h" { 240 } "5h" { 300 } "6h" { 360 }
            default { 240 }
          }
          
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $startTime = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
          $endTime = $startTime.AddMinutes($totalMinutes)
          
          echo "NEURAL_DURATION_MINUTES=$totalMinutes" >> $env:GITHUB_ENV
          echo "NEURAL_START_TIME_STR=$($startTime.ToString('HH:mm:ss dd/MM/yyyy'))" >> $env:GITHUB_ENV
          echo "NEURAL_END_TIME_STR=$($endTime.ToString('HH:mm:ss dd/MM/yyyy'))" >> $env:GITHUB_ENV
          
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║  🖧  W I N D O W S   S E R V E R   2 0 2 2   Q U A N T U M   C O R E ║" -ForegroundColor Cyan
          Write-Host "╠════════════════════════════════════════════════════════════════════════╣" -ForegroundColor Cyan
          Write-Host "║  🧠 Role: Enterprise Datacenter | ⚡ Quantum Power: Unlimited          ║" -ForegroundColor Cyan
          Write-Host "║  🔐 Security: AES-256 | 📡 Quantum Link: Active                        ║" -ForegroundColor Cyan
          Write-Host "║  🕐 Session: $($startTime.ToString('HH:mm:ss')) -> $($endTime.ToString('HH:mm:ss'))" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
      
      - name: 🔧 WINSRV - QUANTUM CONFIGURATION
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════════════╗" -ForegroundColor Magenta
          Write-Host "║  ⚡ CONFIGURING QUANTUM SYNAPSES - ENTERPRISE MODE                    ║" -ForegroundColor Magenta
          Write-Host "╚════════════════════════════════════════════════════════════════════════╝" -ForegroundColor Magenta
          Write-Host ""
          
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="Quantum-RDP" dir=in action=allow protocol=TCP localport=3389
          
          Install-WindowsFeature -Name Web-Server, Web-WebSockets, Web-Asp-Net45 -IncludeManagementTools -ErrorAction SilentlyContinue
          
          Write-Host "│ ✅ Quantum configuration complete" -ForegroundColor Green
          Write-Host ""
      
      - name: 👤 WINSRV - QUANTUM IDENTITY
        run: |
          Write-Host "╔════════════════════════════════════════════════════════════════════════╗" -ForegroundColor Magenta
          Write-Host "║  🔐 GENERATING QUANTUM IDENTITY - ENTERPRISE SECURITY                ║" -ForegroundColor Magenta
          Write-Host "╚════════════════════════════════════════════════════════════════════════╝" -ForegroundColor Magenta
          Write-Host ""
          
          $username = "QUANTUM-ADMIN"
          $password = "Quantum@$(Get-Random -Minimum 10000 -Maximum 99999)"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          Remove-LocalUser -Name $username -ErrorAction SilentlyContinue
          New-LocalUser -Name $username -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $username
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
          
          echo "NEURAL_USERNAME=$username" >> $env:GITHUB_ENV
          echo "NEURAL_PASSWORD=$password" >> $env:GITHUB_ENV
          echo "$password" > "$env:TEMP\quantum_password.txt"
          
          Write-Host "│ ✅ Quantum identity: $username" -ForegroundColor Green
          Write-Host "│ 🔐 Quantum key generated" -ForegroundColor Green
          Write-Host ""
      
