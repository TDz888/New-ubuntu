          $messageLines += "**🌐 QUANTUM CONNECTION MATRIX**"
          $messageLines += "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          $messageLines += "🖥️ **System**: Windows 11 Professional x64"
          $messageLines += "🧠 **Session ID**: \`$sessionId\`"
          $messageLines += "🌍 **Neural IP**: \`$neuralIP\`"
