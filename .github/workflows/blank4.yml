          sudo useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo "$USERNAME"
          
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "$PASSWORD" > /tmp/ubuntu24_pass.txt
          echo "User created: $USERNAME"
      
      - name: Configure SSH
        id: ssh_config
        run: |
          PORT=$((RANDOM % 7000 + 2000))
          
          sudo sed -i "s/^#Port 22/Port $PORT/" /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          
          echo "ssh_port=$PORT" >> $GITHUB_OUTPUT
          echo "SSH Port: $PORT"
      
      - name: Cloudflare Tunnel
        id: cloudflare
        if: github.event.inputs.network_type == 'cloudflare'
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O /tmp/cf
          chmod +x /tmp/cf
          /tmp/cf tunnel --url ssh://localhost:${{ steps.ssh_config.outputs.ssh_port }} > /tmp/cf.log 2>&1 &
          sleep 10
          URL=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' /tmp/cf.log | head -1)
          if [ -n "$URL" ]; then
            echo "cloudflare_url=$URL" >> $GITHUB_OUTPUT
            echo "Cloudflare URL: $URL"
          fi
      
      - name: Performance Tuning
        if: github.event.inputs.performance_mode != 'balanced'
        run: |
          sudo sysctl -w net.core.rmem_max=134217728
          sudo sysctl -w net.core.wmem_max=134217728
          sudo sysctl -w vm.swappiness=10
      
      - name: Watchdog
        run: |
          nohup bash -c 'while true; do sleep 30; sudo systemctl restart ssh; done' > /dev/null 2>&1 &

  debian_cortex:
    needs: [main_brain]
    if: github.event.inputs.debian_enabled == 'true'
    runs-on: ubuntu-latest
    container:
      image: debian:12
    timeout-minutes: 360
    outputs:
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      ssh_port: ${{ steps.ssh_config.outputs.ssh_port }}
    steps:
      - name: System Setup
        run: |
          echo ""
          echo "DEBIAN 12 CORTEX - INITIALIZING"
          echo ""
          apt update -qq
          apt install -y -qq openssh-server sudo curl wget
      
      - name: Create Neural User
        id: create_user
        run: |
          USERNAME="deb$((RANDOM % 9000 + 1000))"
          PASSWORD=$(openssl rand -base64 16 | tr -d "=+/" | cut -c1-20)
          
          useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | chpasswd
          usermod -aG sudo "$USERNAME"
          
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "User created: $USERNAME"
      
      - name: Configure SSH
        id: ssh_config
        run: |
          PORT=$((RANDOM % 7000 + 2000))
          
          sed -i "s/^#Port 22/Port $PORT/" /etc/ssh/sshd_config
          sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          service ssh restart
          
          echo "ssh_port=$PORT" >> $GITHUB_OUTPUT
          echo "SSH Port: $PORT"
      
      - name: Watchdog
        run: |
          nohup bash -c 'while true; do sleep 30; service ssh restart; done' > /dev/null 2>&1 &

  centos_cortex:
    needs: [main_brain]
    if: github.event.inputs.centos_enabled == 'true'
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream9
    timeout-minutes: 360
    outputs:
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      ssh_port: ${{ steps.ssh_config.outputs.ssh_port }}
    steps:
      - name: System Setup
        run: |
          echo ""
          echo "CENTOS 9 CORTEX - INITIALIZING"
          echo ""
          dnf install -y epel-release
          dnf install -y openssh-server sudo curl wget
      
      - name: Create Neural User
        id: create_user
        run: |
          USERNAME="cen$((RANDOM % 9000 + 1000))"
          PASSWORD=$(openssl rand -base64 16 | tr -d "=+/" | cut -c1-20)
          
          useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | chpasswd
          usermod -aG wheel "$USERNAME"
          
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "User created: $USERNAME"
      
      - name: Configure SSH
        id: ssh_config
        run: |
          PORT=$((RANDOM % 7000 + 2000))
          
          sed -i "s/^#Port 22/Port $PORT/" /etc/ssh/sshd_config
          sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          systemctl restart sshd
          
          echo "ssh_port=$PORT" >> $GITHUB_OUTPUT
          echo "SSH Port: $PORT"
      
      - name: Watchdog
        run: |
          nohup bash -c 'while true; do sleep 30; systemctl restart sshd; done' > /dev/null 2>&1 &

  almalinux_cortex:
    needs: [main_brain]
    if: github.event.inputs.almalinux_enabled == 'true'
    runs-on: ubuntu-latest
    container:
      image: almalinux:9
    timeout-minutes: 360
    outputs:
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      ssh_port: ${{ steps.ssh_config.outputs.ssh_port }}
    steps:
      - name: System Setup
        run: |
          echo ""
          echo "ALMALINUX 9 CORTEX - INITIALIZING"
          echo ""
          dnf install -y epel-release
          dnf install -y openssh-server sudo curl wget
      
      - name: Create Neural User
        id: create_user
        run: |
          USERNAME="alm$((RANDOM % 9000 + 1000))"
          PASSWORD=$(openssl rand -base64 16 | tr -d "=+/" | cut -c1-20)
          
          useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | chpasswd
          usermod -aG wheel "$USERNAME"
          
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "User created: $USERNAME"
      
      - name: Configure SSH
        id: ssh_config
        run: |
          PORT=$((RANDOM % 7000 + 2000))
          
          sed -i "s/^#Port 22/Port $PORT/" /etc/ssh/sshd_config
          sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          systemctl restart sshd
          
          echo "ssh_port=$PORT" >> $GITHUB_OUTPUT
          echo "SSH Port: $PORT"
      
      - name: Watchdog
        run: |
          nohup bash -c 'while true; do sleep 30; systemctl restart sshd; done' > /dev/null 2>&1 &

  control_hub:
    needs: [main_brain, windows_cortex, ubuntu_cortex, ubuntu24_cortex, debian_cortex, centos_cortex, almalinux_cortex]
    if: always() && github.event.inputs.telegram_notify == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="NEURAL VPS QUANTUM SYSTEM v1.0
          
SESSION: ${{ needs.main_brain.outputs.session_id }}
DURATION: ${{ github.event.inputs.duration }}
TERMINATION: ${{ needs.main_brain.outputs.termination_time }}

WINDOWS:
IP: ${{ needs.windows_cortex.outputs.ip_address }}
PORT: ${{ needs.windows_cortex.outputs.rdp_port }}
USER: ${{ needs.windows_cortex.outputs.username }}
PASS: ${{ needs.windows_cortex.outputs.password }}

UBUNTU 22.04:
USER: ${{ needs.ubuntu_cortex.outputs.username }}
PASS: ${{ needs.ubuntu_cortex.outputs.password }}
PORT: ${{ needs.ubuntu_cortex.outputs.ssh_port }}
CF: ${{ needs.ubuntu_cortex.outputs.cloudflare_url }}

UBUNTU 24.04:
USER: ${{ needs.ubuntu24_cortex.outputs.username }}
PASS: ${{ needs.ubuntu24_cortex.outputs.password }}
PORT: ${{ needs.ubuntu24_cortex.outputs.ssh_port }}
CF: ${{ needs.ubuntu24_cortex.outputs.cloudflare_url }}

DEBIAN 12:
USER: ${{ needs.debian_cortex.outputs.username }}
PASS: ${{ needs.debian_cortex.outputs.password }}
PORT: ${{ needs.debian_cortex.outputs.ssh_port }}

CENTOS 9:
USER: ${{ needs.centos_cortex.outputs.username }}
PASS: ${{ needs.centos_cortex.outputs.password }}
PORT: ${{ needs.centos_cortex.outputs.ssh_port }}

ALMALINUX 9:
USER: ${{ needs.almalinux_cortex.outputs.username }}
PASS: ${{ needs.almalinux_cortex.outputs.password }}
PORT: ${{ needs.almalinux_cortex.outputs.ssh_port }}

STATUS: ACTIVE
AUTO-HEAL: ENABLED"
          
          if [ -n "$BOT_TOKEN" ] && [ -n "$CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="$MSG" \
              -d parse_mode="Markdown" || true
            echo "Telegram sent"
          fi

  runtime_manager:
    needs: [main_brain, windows_cortex, ubuntu_cortex, ubuntu24_cortex, debian_cortex, centos_cortex, almalinux_cortex]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Keep Alive
        run: |
          DUR=${{ needs.main_brain.outputs.duration_minutes }}
          END=$(( $(date +%s) + DUR * 60 ))
          
          echo ""
          echo "RUNTIME ACTIVE - $(date)"
          echo "Will terminate at: $(date -d @$END)"
          echo ""
          
          while [ $(date +%s) -lt $END ]; do
            REMAIN=$((END - $(date +%s)))
            H=$((REMAIN / 3600))
            M=$(((REMAIN % 3600) / 60))
            S=$((REMAIN % 60))
            echo -ne "\r[ACTIVE] Time remaining: ${H}h ${M}m ${S}s"
            sleep 10
          done
          
          echo ""
          echo ""
          echo "RUNTIME COMPLETED"

  memory_purge:
    needs: [runtime_manager]
    if: always() && github.event.inputs.auto_cleanup == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup
        run: |
          echo ""
          echo "MEMORY PURGE - COMPLETE"
          echo "All neural data destroyed"
          echo "System ready for next activation"
          echo ""
