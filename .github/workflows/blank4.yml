name: 🚀 Create Virtual Machine

on:
  workflow_dispatch:
    inputs:
      username:
        description: '👤 Username'
        required: true
        type: string
        default: 'admin'
      password:
        description: '🔑 Password'
        required: true
        type: string
      region:
        description: '🌍 Region'
        required: true
        type: choice
        options:
          - '🇺🇸 US East (Virginia)'
          - '🇪🇺 EU West (Frankfurt)'
          - '🇸🇬 Asia Pacific (Singapore)'
      duration:
        description: '⏱️ Duration (hours)'
        required: true
        type: number
        default: 2
        minimum: 1
        maximum: 24
      instance_type:
        description: '💻 Instance Type'
        required: true
        type: choice
        options:
          - 'small (2 vCPU, 4GB RAM)'
          - 'medium (4 vCPU, 8GB RAM)'
          - 'large (8 vCPU, 16GB RAM)'

jobs:
  create-vm:
    name: 🏗️ Create and Configure VM
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl jq sshpass > /dev/null

      - name: 🌐 Get Public IP
        id: public_ip
        run: |
          PUBLIC_IP=$(curl -s ifconfig.me)
          echo "ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "✅ Public IP: $PUBLIC_IP"

      - name: 📊 System Benchmark
        id: benchmark
        run: |
          CPU_CORES=$(nproc)
          MEM_TOTAL=$(free -h | awk '/^Mem:/ {print $2}')
          DISK_SIZE=$(df -h / | awk 'NR==2 {print $2}')
          
          echo "cpu=$CPU_CORES" >> $GITHUB_OUTPUT
          echo "memory=$MEM_TOTAL" >> $GITHUB_OUTPUT
          echo "disk=$DISK_SIZE" >> $GITHUB_OUTPUT
          
          echo "⚙️ CPU Cores: $CPU_CORES"
          echo "💾 Memory: $MEM_TOTAL"
          echo "💿 Disk: $DISK_SIZE"

      - name: 📱 Send Telegram Notification
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [[ -n "$BOT_TOKEN" && -n "$CHAT_ID" ]]; then
            
            CURRENT_TIME=$(date '+%Y-%m-%d %H:%M:%S')
            EXPIRE_TIME=$(date -d "+${{ github.event.inputs.duration }} hours" '+%Y-%m-%d %H:%M:%S')
            
            MESSAGE="🚀 *VIRTUAL MACHINE CREATED*%0A"
            MESSAGE="${MESSAGE}━━━━━━━━━━━━━━━━━━━━━%0A"
            MESSAGE="${MESSAGE}%0A"
            MESSAGE="${MESSAGE}👤 *Username:* \`${{ github.event.inputs.username }}\`%0A"
            MESSAGE="${MESSAGE}🔑 *Password:* \`${{ github.event.inputs.password }}\`%0A"
            MESSAGE="${MESSAGE}🌍 *Region:* ${{ github.event.inputs.region }}%0A"
            MESSAGE="${MESSAGE}💻 *Type:* ${{ github.event.inputs.instance_type }}%0A"
            MESSAGE="${MESSAGE}🖥️ *IP Address:* \`${{ steps.public_ip.outputs.ip }}\`%0A"
            MESSAGE="${MESSAGE}%0A"
            MESSAGE="${MESSAGE}⏰ *Created:* \`$CURRENT_TIME\`%0A"
            MESSAGE="${MESSAGE}⌛ *Expires:* \`$EXPIRE_TIME\`%0A"
            MESSAGE="${MESSAGE}%0A"
            MESSAGE="${MESSAGE}📊 *SYSTEM SPECS*%0A"
            MESSAGE="${MESSAGE}━━━━━━━━━━━━━━━━━━━━━%0A"
            MESSAGE="${MESSAGE}⚙️ *CPU Cores:* ${{ steps.benchmark.outputs.cpu }}%0A"
            MESSAGE="${MESSAGE}💾 *Memory:* ${{ steps.benchmark.outputs.memory }}%0A"
            MESSAGE="${MESSAGE}💿 *Disk:* ${{ steps.benchmark.outputs.disk }}%0A"
            MESSAGE="${MESSAGE}%0A"
            MESSAGE="${MESSAGE}✅ *Status:* \`RUNNING\`%0A"
            MESSAGE="${MESSAGE}🔗 *Console:* \`ssh ${{ github.event.inputs.username }}@${{ steps.public_ip.outputs.ip }}\`%0A"
            
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d chat_id="${CHAT_ID}" \
              -d text="${MESSAGE}" \
              -d parse_mode="Markdown" \
              -d disable_web_page_preview="true"
            
            echo "✅ Telegram notification sent"
          else
            echo "⚠️ Skipping Telegram notification - missing credentials"
          fi

      - name: 📧 Send Summary
        run: |
          echo "## 🚀 VM Creation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 👤 Username | \`${{ github.event.inputs.username }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌍 Region | ${{ github.event.inputs.region }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 💻 Instance Type | ${{ github.event.inputs.instance_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏱️ Duration | ${{ github.event.inputs.duration }} hours |" >> $GITHUB_STEP_SUMMARY
          echo "| 🖥️ IP Address | \`${{ steps.public_ip.outputs.ip }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚙️ CPU Cores | ${{ steps.benchmark.outputs.cpu }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 💾 Memory | ${{ steps.benchmark.outputs.memory }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 💿 Disk | ${{ steps.benchmark.outputs.disk }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Connection String" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "ssh ${{ github.event.inputs.username }}@${{ steps.public_ip.outputs.ip }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: 🎉 Completion
        run: |
          echo "✨ VM created successfully!"
          echo "🌐 IP: ${{ steps.public_ip.outputs.ip }}"
          echo "👤 User: ${{ github.event.inputs.username }}"
          echo "⏰ Expires in: ${{ github.event.inputs.duration }} hours"
