# =====================================================================
# 🔧 HÀM XỬ LÝ CHÍNH - THEO TRÌNH TỰ LOGIC
# =====================================================================

function Test-SystemRequirements {
    Write-Step -Title "Kiểm tra yêu cầu hệ thống" -Icon "🔍"
    
    $checks = @(
        @{Name = "Quyền root/Sudo"; Test = { (id -u) -eq 0 }}
        @{Name = "Kết nối Internet"; Test = { Test-Connection -ComputerName "8.8.8.8" -Count 1 -Quiet }}
        @{Name = "Hệ điều hành Linux"; Test = { $IsLinux }}
        @{Name = "Package Manager APT"; Test = { Get-Command apt -ErrorAction SilentlyContinue }}
    )
    
    $failed = 0
    foreach ($check in $checks) {
        $result = & $check.Test
        if ($result) {
            Write-Success "✓ $($check.Name)"
        } else {
            Write-Error "✗ $($check.Name)"
            $failed++
        }
    }
    
    if ($failed -gt 0) {
        Write-Error "Không đáp ứng yêu cầu hệ thống. Dừng quá trình."
        exit 1
    }
    
    Write-Success "Tất cả yêu cầu hệ thống đã được đáp ứng"
}

function Update-System {
    Write-Step -Title "Cập nhật hệ thống" -Icon "🔄"
    
    try {
        Write-Info "Đang cập nhật danh sách package..."
        sudo apt-get update -y 2>&1 | Out-Null
        
        Write-Info "Đang nâng cấp package..."
        sudo apt-get upgrade -y 2>&1 | Out-Null
        
        Write-Info "Đang cài đặt package cần thiết..."
        $packages = @("ufw", "curl", "wget", "git", "htop", "nano", "unzip")
        foreach ($pkg in $packages) {
            Write-Info "  → Cài đặt: $pkg"
            sudo apt-get install -y $pkg 2>&1 | Out-Null
        }
        
        Write-Success "Hệ thống đã được cập nhật thành công"
    }
    catch {
        Write-Error "Lỗi cập nhật hệ thống: $_"
        exit 1
    }
}

function Configure-Firewall {
    Write-Step -Title "Cấu hình tường lửa" -Icon "🛡️"
    
    try {
        Write-Info "Đang kích hoạt UFW..."
        sudo ufw --force enable 2>&1 | Out-Null
        
        $rules = @(
            @{Port = "22"; Proto = "tcp"; Desc = "SSH"}
            @{Port = "80"; Proto = "tcp"; Desc = "HTTP"}
            @{Port = "443"; Proto = "tcp"; Desc = "HTTPS"}
            @{Port = "27015"; Proto = "udp"; Desc = "Game Server"}
        )
        
        foreach ($rule in $rules) {
            Write-Info "  → Thêm rule: $($rule.Desc) - $($rule.Port)/$($rule.Proto)"
            sudo ufw allow $($rule.Port)/$($rule.Proto) comment $($rule.Desc) 2>&1 | Out-Null
        }
        
        Write-Success "Tường lửa đã được cấu hình thành công"
    }
    catch {
        Write-Error "Lỗi cấu hình tường lửa: $_"
        exit 1
    }
}

function Create-UserAccount {
    Write-Step -Title "Tạo tài khoản người dùng" -Icon "👤"
    
    try {
        $username = "vpsadmin"
        $password = "Vps@2026Secure"
        
        Write-Info "Tên người dùng: $username"
        
        # Kiểm tra user đã tồn tại
        $checkUser = getent passwd $username 2>&1
        if ($LASTEXITCODE -eq 0) {
            Write-Warning "Người dùng $username đã tồn tại, bỏ qua"
            return
        }
        
        # Tạo user
        Write-Info "Đang tạo tài khoản..."
        sudo useradd -m -s /bin/bash $username
        
        # Đặt mật khẩu - SỬ DỤNG printf để tránh lỗi
        Write-Info "Đang đặt mật khẩu..."
        printf "%s\n%s\n" "$password" "$password" | sudo passwd $username
        
        # Thêm vào nhóm sudo
        Write-Info "Thêm vào nhóm sudo..."
        sudo usermod -aG sudo $username
        
        # Tạo thư mục .ssh
        Write-Info "Tạo thư mục SSH..."
        sudo mkdir -p "/home/$username/.ssh"
        sudo chmod 700 "/home/$username/.ssh"
        sudo chown "$username:$username" "/home/$username/.ssh"
        
        Write-Success "Tài khoản đã được tạo thành công"
        
        # Hiển thị thông tin
        Write-Host ""
        Write-Host "╔══════════════════════════════════════════════════════════════╗" -ForegroundColor Green
        Write-Host "║  📝 THÔNG TIN ĐĂNG NHẬP                                      ║" -ForegroundColor Green
        Write-Host "║  Username : $username" -ForegroundColor White
        Write-Host "║  Password : $password" -ForegroundColor White
        Write-Host "║  ⚠️  VUI LÒNG ĐỔI MẬT KHẨU SAU KHI ĐĂNG NHẬP              ║" -ForegroundColor Yellow
        Write-Host "╚══════════════════════════════════════════════════════════════╝" -ForegroundColor Green
        Write-Host ""
    }
    catch {
        Write-Error "Lỗi tạo tài khoản: $_"
        exit 1
    }
}

function Configure-SSH {
    Write-Step -Title "Cấu hình SSH bảo mật" -Icon "🔐"
    
    try {
        Write-Info "Đang backup cấu hình SSH..."
        sudo cp /etc/ssh/sshd_config /etc/ssh/sshd_config.backup
        
        Write-Info "Đang áp dụng cấu hình bảo mật..."
        
        $sshConfig = @"
# ==========================================
# SSH Hardening Configuration
# Generated by VPS Provisioning Script
# ==========================================

Port 22
Protocol 2
PermitRootLogin prohibit-password
PubkeyAuthentication yes
PasswordAuthentication yes
PermitEmptyPasswords no
MaxAuthTries 3
MaxSessions 10
ClientAliveInterval 300
ClientAliveCountMax 2
UseDNS no
PrintMotd no
"@
        
        echo "$sshConfig" | sudo tee /etc/ssh/sshd_config.d/99-vps.conf > $null
        
        Write-Info "Đang khởi động lại SSH service..."
        sudo systemctl restart sshd
        
        Write-Success "SSH đã được cấu hình bảo mật"
    }
    catch {
        Write-Error "Lỗi cấu hình SSH: $_"
        Write-Info "Đang khôi phục cấu hình cũ..."
        sudo cp /etc/ssh/sshd_config.backup /etc/ssh/sshd_config
        sudo systemctl restart sshd
        exit 1
    }
}

function Install-Software {
    Write-Step -Title "Cài đặt phần mềm" -Icon "📦"
    
    try {
        $software = @(
            @{Name = "Nginx Web Server"; Package = "nginx"}
            @{Name = "Docker Engine"; Package = "docker.io"}
            @{Name = "Docker Compose"; Package = "docker-compose"}
            @{Name = "Node.js Runtime"; Package = "nodejs"}
            @{Name = "NPM Package Manager"; Package = "npm"}
        )
        
        foreach ($app in $software) {
            Write-Info "Đang cài đặt: $($app.Name)..."
            sudo apt-get install -y $($app.Package) 2>&1 | Out-Null
            Write-Success "  ✓ $($app.Name) đã cài đặt"
        }
        
        Write-Success "Tất cả phần mềm đã được cài đặt"
    }
    catch {
        Write-Error "Lỗi cài đặt phần mềm: $_"
        exit 1
    }
}

function Setup-GameServer {
    Write-Step -Title "Cấu hình Game Server" -Icon "🎮"
    
    try {
        $gameDir = "/opt/gameserver"
        Write-Info "Tạo thư mục game server: $gameDir"
        sudo mkdir -p $gameDir
        sudo chmod 755 $gameDir
        
        $configFile = "$gameDir/server-config.json"
        $configJson = @"
{
    "serverName": "VPS Game Server",
    "version": "1.0",
    "maxPlayers": 32,
    "port": 27015,
    "gameMode": "competitive",
    "tickRate": 128,
    "created": "$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
}
"@
        
        echo "$configJson" | sudo tee $configFile > $null
        Write-Success "File cấu hình game server đã tạo"
        
        $startScript = "$gameDir/start-server.sh"
        $scriptContent = @"#!/bin/bash
echo "Starting Game Server..."
echo "Port: 27015"
echo "Config: $configFile"
# Add game server command here
"@
        
        echo "$scriptContent" | sudo tee $startScript > $null
        sudo chmod +x $startScript
        
        Write-Success "Game server đã được cấu hình"
    }
    catch {
        Write-Error "Lỗi cấu hình game server: $_"
        exit 1
    }
}

