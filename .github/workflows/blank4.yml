function Configure-SSH {
    Write-Step -Title "SSH Hardening" -Icon "рџ”ђ"
    
    try {
        Write-Info "Backing up SSH configuration..."
        sudo cp /etc/ssh/sshd_config /etc/ssh/sshd_config.backup
        
        Write-Info "Applying security settings..."
        
        $sshConfig = @"
# ==========================================
# SSH Hardening Configuration
# Generated by VPS Provisioning Script
# ==========================================

Port 22
Protocol 2
HostKey /etc/ssh/ssh_host_rsa_key
HostKey /etc/ssh/ssh_host_ecdsa_key
HostKey /etc/ssh/ssh_host_ed25519_key

# Authentication Security
PermitRootLogin prohibit-password
PubkeyAuthentication yes
PasswordAuthentication yes
PermitEmptyPasswords no
MaxAuthTries 3
MaxSessions 10

# Connection Settings
ClientAliveInterval 300
ClientAliveCountMax 2
UseDNS no
PrintMotd no
AcceptEnv LANG LC_*

# Performance Optimization
TCPKeepAlive yes
Compression delayed
"@
        
        echo "$sshConfig" | sudo tee /etc/ssh/sshd_config.d/99-vps-hardening.conf > $null
        
        Write-Info "Restarting SSH service..."
        sudo systemctl restart sshd
        
        Write-Success "SSH configured successfully"
    }
    catch {
        Write-Error "SSH configuration failed: $_"
        Write-Info "Restoring original configuration..."
        sudo cp /etc/ssh/sshd_config.backup /etc/ssh/sshd_config
        sudo systemctl restart sshd
        exit 1
    }
}

function Install-Software {
    Write-Step -Title "Software Installation" -Icon "рџ“¦"
    
    try {
        $software = @(
            @{Name = "Nginx Web Server"; Package = "nginx"}
            @{Name = "Docker Engine"; Package = "docker.io"}
            @{Name = "Docker Compose"; Package = "docker-compose"}
            @{Name = "Node.js Runtime"; Package = "nodejs"}
            @{Name = "NPM Package Manager"; Package = "npm"}
        )
        
        foreach ($app in $software) {
            Write-Info "Installing: $($app.Name)..."
            sudo apt-get install -y $($app.Package) 2>&1 | Out-Null
            Write-Success "  вњ“ $($app.Name) installed"
        }
        
        Write-Info "Installing additional tools..."
        sudo apt-get install -y software-properties-common apt-transport-https ca-certificates 2>&1 | Out-Null
        
        Write-Success "All software installed successfully"
    }
    catch {
        Write-Error "Software installation failed: $_"
        exit 1
    }
}

