name: 🚀 VPS CREATOR PRO

on:
  workflow_dispatch:
    inputs:
      os_type:
        description: 🖥️ Operating System
        required: true
        default: windows11
        type: choice
        options:
          - windows11
          - windows10
          - ubuntu-server
      username:
        description: 👤 Username
        required: true
        default: vpsuser
      password:
        description: 🔑 Password
        required: true
        default: Vps123456
      region:
        description: 🌍 Region
        required: true
        default: us
        type: choice
        options:
          - us
          - eu
          - asia
      instances:
        description: 🔢 Number of VPS (1-3)
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
      wallpaper_url:
        description: 🖼️ Wallpaper URL (Windows only)
        required: false
        default: ''
      duration:
        description: ⏱️ Hours
        required: true
        default: '6'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
          - '6'
      subdomain:
        description: 🌐 Custom subdomain
        required: false
        default: ''

jobs:
  ubuntu-server-vps:
    runs-on: ubuntu-latest
    if: github.event.inputs.os_type == 'ubuntu-server'
    timeout-minutes: 360
    strategy:
      matrix:
        instance: [1, 2, 3]
      max-parallel: 3
    steps:
      - name: Check instance
        if: github.event.inputs.instances < matrix.instance
        run: exit 0
          
      - name: Init
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║          🐧⚡ UBUNTU SERVER - INSTANCE ${{ matrix.instance }} 🐧⚡            ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  🌍 Region  : ${{ github.event.inputs.region }}"
          echo "  👤 User    : ${{ github.event.inputs.username }}"
          echo "  ⏱️ Hours   : ${{ github.event.inputs.duration }}"
          echo ""
          
      - name: Install SSH
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssh-server
          sudo systemctl enable ssh
          sudo systemctl start ssh
          
      - name: Create User
        run: |
          sudo useradd -m -s /bin/bash "${{ github.event.inputs.username }}" 2>/dev/null || true
          echo "${{ github.event.inputs.username}}:${{ github.event.inputs.password}}" | sudo chpasswd
          sudo usermod -aG sudo "${{ github.event.inputs.username }}"
          echo "${{ github.event.inputs.password}}" > /tmp/pass.txt
          
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh > /dev/null 2>&1
          
      - name: Connect Tailscale
        env:
          KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          sudo tailscale up --auth-key="$KEY" --hostname="ubuntu-${{ matrix.instance }}"
          sleep 5
          echo "IP=$(sudo tailscale ip -4)" >> $GITHUB_ENV
          
      - name: Subdomain
        if: github.event.inputs.subdomain != ''
        run: |
          SUB="${{ github.event.inputs.subdomain }}-${{ matrix.instance }}"
          ssh -R 80:localhost:22 $SUB@pinggy.io > /tmp/sub.log 2>&1 &
          sleep 8
          echo "SUB_URL=$(grep -o 'https://[a-z0-9.-]*\.pinggy\.io' /tmp/sub.log | head -1)" >> $GITHUB_ENV
          
      - name: Dashboard
        run: |
          sudo mkdir -p /var/www/html
          sudo bash -c 'cat > /var/www/html/index.html' << EOF
          <!DOCTYPE html>
          <html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VPS Dashboard</title>
          <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0c10;font-family:monospace;color:#0f0;padding:20px}.container{max-width:1200px;margin:0 auto}.header{text-align:center;border-bottom:2px solid #0f0;padding-bottom:20px;margin-bottom:30px}.header h1{font-size:2rem;text-shadow:0 0 10px #0f0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-bottom:30px}.card{background:#111317;border:1px solid #0f0;border-radius:10px;padding:20px}.card h3{color:#0f0;margin-bottom:15px;border-bottom:1px solid #0f0;display:inline-block}.metric{font-size:2rem;font-weight:bold;margin:10px 0}.progress-bar{width:100%;height:20px;background:#1a1d24;border-radius:10px;overflow:hidden;margin:10px 0}.progress-fill{height:100%;background:#0f0;width:0%}.status{color:#0f0;animation:blink 1s infinite}@keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}.footer{text-align:center;margin-top:30px;color:#0f0;font-size:.8rem}pre{background:#000;padding:10px;border-radius:5px;height:200px;overflow-y:auto}</style>
          </head><body><div class="container"><div class="header"><h1>🔧 VPS DASHBOARD</h1><p class="status">🟢 ONLINE</p></div>
          <div class="grid"><div class="card"><h3>📊 CPU</h3><div class="metric" id="cpu">--%</div><div class="progress-bar"><div class="progress-fill" id="cpu-bar"></div></div></div>
          <div class="card"><h3>💾 RAM</h3><div class="metric" id="ram">--/-- GB</div><div class="progress-bar"><div class="progress-fill" id="ram-bar"></div></div></div>
          <div class="card"><h3>💿 DISK</h3><div class="metric" id="disk">--/-- GB</div><div class="progress-bar"><div class="progress-fill" id="disk-bar"></div></div></div></div>
          <div class="grid"><div class="card"><h3>⏱️ UPTIME</h3><div class="metric" id="uptime">--</div></div>
          <div class="card"><h3>🌐 NETWORK</h3><div class="metric" id="network">--/--</div></div>
          <div class="card"><h3>🔌 CONNS</h3><div class="metric" id="connections">--</div></div></div>
          <div class="card"><h3>📋 LOG</h3><pre id="log">Waiting...</pre></div>
          <div class="footer"><p>VPS Dashboard | Realtime</p></div></div>
          <script>let ws;function connect(){ws=new WebSocket(`ws://${location.hostname}:8080`);ws.onmessage=e=>{let d=JSON.parse(e.data);document.getElementById('cpu').innerText=d.cpu+'%';document.getElementById('cpu-bar').style.width=d.cpu+'%';document.getElementById('ram').innerText=d.ram_used+'/'+d.ram_total+' GB';document.getElementById('ram-bar').style.width=d.ram_percent+'%';document.getElementById('disk').innerText=d.disk_used+'/'+d.disk_total+' GB';document.getElementById('disk-bar').style.width=d.disk_percent+'%';document.getElementById('uptime').innerText=d.uptime;document.getElementById('network').innerText=d.network_rx+'/'+d.network_tx;document.getElementById('connections').innerText=d.connections;let log=document.getElementById('log');let t=new Date().toLocaleTimeString();log.innerHTML='['+t+'] CPU:'+d.cpu+'% RAM:'+d.ram_percent+'% DISK:'+d.disk_percent+'%\n'+log.innerHTML;if(log.innerHTML.split('\n').length>20)log.innerHTML=log.innerHTML.split('\n').slice(0,20).join('\n');};ws.onerror=ws.onclose=()=>setTimeout(connect,3000);}connect();</script>
          </body></html>
EOF
          
      - name: WebSocket
        run: |
          sudo pip3 install websockets psutil > /dev/null 2>&1
          sudo bash -c 'cat > /tmp/ws_server.py' << EOF
          import asyncio, websockets, json, psutil, time
          async def handler(ws):
              while True:
                  mem = psutil.virtual_memory()
                  disk = psutil.disk_usage("/")
                  net = psutil.net_io_counters()
                  uptime = int(time.time() - psutil.boot_time())
                  await ws.send(json.dumps({
                      "cpu": psutil.cpu_percent(),
                      "ram_used": round(mem.used/1e9,1),
                      "ram_total": round(mem.total/1e9,1),
                      "ram_percent": mem.percent,
                      "disk_used": round(disk.used/1e9,1),
                      "disk_total": round(disk.total/1e9,1),
                      "disk_percent": disk.percent,
                      "uptime": f"{uptime//3600}h {(uptime%3600)//60}m",
                      "network_rx": f"{round(net.bytes_recv/1e6,1)}MB",
                      "network_tx": f"{round(net.bytes_sent/1e6,1)}MB",
                      "connections": len(psutil.net_connections())
                  }))
                  await asyncio.sleep(2)
          async def main():
              async with websockets.serve(handler, "0.0.0.0", 8080):
                  await asyncio.Future()
          asyncio.run(main())
EOF
          nohup python3 /tmp/ws_server.py > /tmp/ws.log 2>&1 &
          
      - name: Benchmark
        run: |
          start=$(date +%s%N); for i in {1..1000000}; do :; done; end=$(date +%s%N); cpu=$(echo "scale=2; 1000000 / (($end - $start) / 1000000000)" | bc)
          start=$(date +%s%N); arr=(); for i in {1..500000}; do arr+=($i); done; end=$(date +%s%N); mem=$(echo "scale=2; 500000 / (($end - $start) / 1000000000)" | bc)
          start=$(date +%s%N); dd if=/dev/zero of=/tmp/disk.tmp bs=1M count=10 2>/dev/null; end=$(date +%s%N); disk=$(echo "scale=2; 10 / (($end - $start) / 1000000000)" | bc); rm -f /tmp/disk.tmp
          echo "CPU: $cpu ops/sec" > /tmp/bench.txt
          echo "Memory: $mem ops/sec" >> /tmp/bench.txt
          echo "Disk: $disk MB/s" >> /tmp/bench.txt
          
      - name: Monitor
        run: |
          cpu=$(top -bn1 | grep "Cpu(s)" | awk '{print $2 + $4}')
          ram=$(free -h | awk '/^Mem:/ {print $3 "/" $2}')
          disk=$(df -h / | awk 'NR==2 {print $3 "/" $2}')
          uptime=$(uptime -p)
          echo "CPU: $cpu%" > /tmp/res.txt
          echo "RAM: $ram" >> /tmp/res.txt
          echo "DISK: $disk" >> /tmp/res.txt
          echo "UPTIME: $uptime" >> /tmp/res.txt
          
      - name: Info
        run: |
          pass=$(cat /tmp/pass.txt)
          ip="$IP"
          user="${{ github.event.inputs.username }}"
          hours="${{ github.event.inputs.duration }}"
          sub="$SUB_URL"
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║              🎉 UBUNTU SERVER READY - INSTANCE ${{ matrix.instance }} 🎉            ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  🔐 SSH : ssh $user@$ip -p 22"
          echo "║  🔑 Pass: $pass"
          if [ -n "$sub" ]; then echo "║  🌐 URL  : $sub"; fi
          echo "╠══════════════════════════════════════════════════════════════╣"
          cat /tmp/bench.txt | while read l; do echo "║  📊 $l"; done
          cat /tmp/res.txt | while read l; do echo "║  📈 $l"; done
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "Host: $ip" > vps-info.txt
          echo "Port: 22" >> vps-info.txt
          echo "User: $user" >> vps-info.txt
          echo "Pass: $pass" >> vps-info.txt
          [ -n "$sub" ] && echo "URL: $sub" >> vps-info.txt
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-${{ matrix.instance }}
          path: vps-info.txt
          retention-days: 7
          
      - name: Keep
        run: sleep $(( ${{ github.event.inputs.duration }} * 3600 ))

  windows11-vps:
    runs-on: windows-latest
    if: github.event.inputs.os_type == 'windows11'
    timeout-minutes: 360
    strategy:
      matrix:
        instance: [1, 2, 3]
      max-parallel: 3
    steps:
      - name: Check
        if: github.event.inputs.instances < matrix.instance
        shell: pwsh
        run: exit 0
          
      - name: Init
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════════╗"
          Write-Host "║          🪟✨ WINDOWS 11 PRO - INSTANCE ${{ matrix.instance }} 🪟✨          ║"
          Write-Host "╚══════════════════════════════════════════════════════════════╝"
          Write-Host ""
          Write-Host "  🌍 Region  : ${{ github.event.inputs.region }}"
          Write-Host "  👤 User    : ${{ github.event.inputs.username }}"
          Write-Host "  ⏱️ Hours   : ${{ github.event.inputs.duration }}"
          Write-Host ""
          
      - name: RDP
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP-In" dir=in action=allow protocol=TCP localport=3389
          Set-Service -Name TermService -StartupType Automatic
          Start-Service -Name TermService
          
      - name: User
        shell: pwsh
        run: |
          $u = "${{ github.event.inputs.username }}"
          $p = "${{ github.event.inputs.password }}"
          $sec = ConvertTo-SecureString $p -AsPlainText -Force
          try { Remove-LocalUser -Name $u -ErrorAction SilentlyContinue } catch {}
          New-LocalUser -Name $u -Password $sec -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $u
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u
          Enable-LocalUser -Name $u
          $p | Out-File -FilePath $env:TEMP\pass.txt
          
      - name: Wallpaper
        if: github.event.inputs.wallpaper_url != ''
        shell: pwsh
        run: |
          $url = "${{ github.event.inputs.wallpaper_url }}"
          $img = "$env:TEMP\wall.jpg"
          Invoke-WebRequest -Uri $url -OutFile $img
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name Wallpaper -Value $img
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name WallpaperStyle -Value 2
          
      - name: Screenshot
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Windows.Forms,System.Drawing
          $bmp = New-Object System.Drawing.Bitmap ([System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Width), ([System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Height)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.CopyFromScreen(0, 0, 0, 0, $bmp.Size)
          $bmp.Save("$env:TEMP\screen.png")
          $g.Dispose(); $bmp.Dispose()
          
      - name: Tailscale
        shell: pwsh
        env:
          KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          $msi = "$env:TEMP\ts.msi"
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msi
          Start-Process msiexec.exe -ArgumentList "/i", "`"$msi`"", "/quiet", "/norestart" -Wait
          Remove-Item $msi -Force
          
      - name: Connect
        shell: pwsh
        env:
          KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:KEY --hostname="win11-${{ matrix.instance }}"
          Start-Sleep -Seconds 5
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "IP=$ip" >> $env:GITHUB_ENV
          
      - name: Benchmark
        shell: pwsh
        run: |
          $c = Get-Date; $s = 0; for ($i=0; $i -lt 1000000; $i++) { $s += $i }; $cpu = [math]::Round(1000000 / (Get-Date).Subtract($c).TotalMilliseconds * 100, 2)
          $m = Get-Date; $arr = New-Object System.Collections.ArrayList; for ($i=0; $i -lt 500000; $i++) { $arr.Add($i) | Out-Null }; $mem = [math]::Round(500000 / (Get-Date).Subtract($m).TotalMilliseconds * 100, 2)
          $d = Get-Date; "X" * 10485760 | Out-File "$env:TEMP\disk.tmp"; $disk = [math]::Round(10 / (Get-Date).Subtract($d).TotalSeconds, 2); Remove-Item "$env:TEMP\disk.tmp" -Force
          $bench = @(); $bench += "CPU: $cpu ops/sec"; $bench += "Memory: $mem ops/sec"; $bench += "Disk: $disk MB/s"; $bench | Out-File "$env:TEMP\bench.txt"
          
      - name: Monitor
        shell: pwsh
        run: |
          $cpu = (Get-WmiObject Win32_Processor).LoadPercentage
          $ram = Get-WmiObject Win32_OperatingSystem
          $ramU = [math]::Round(($ram.TotalVisibleMemorySize - $ram.FreePhysicalMemory) / 1MB, 2)
          $ramT = [math]::Round($ram.TotalVisibleMemorySize / 1MB, 2)
          $disk = Get-WmiObject Win32_LogicalDisk -Filter "DeviceID='C:'"
          $diskU = [math]::Round(($disk.Size - $disk.FreeSpace) / 1GB, 2)
          $diskT = [math]::Round($disk.Size / 1GB, 2)
          $up = (Get-Date) - (Get-CimInstance Win32_OperatingSystem).LastBootUpTime
          $res = @(); $res += "CPU: $cpu%"; $res += "RAM: $ramU/$ramT GB"; $res += "DISK: $diskU/$diskT GB"; $res += "UPTIME: $($up.Days)d $($up.Hours)h"
          $res | Out-File "$env:TEMP\res.txt"
          
      - name: Info
        shell: pwsh
        run: |
          $pass = Get-Content "$env:TEMP\pass.txt"
          $bench = Get-Content "$env:TEMP\bench.txt"
          $res = Get-Content "$env:TEMP\res.txt"
          $ip = "$env:IP"
          $user = "${{ github.event.inputs.username }}"
          $hours = "${{ github.event.inputs.duration }}"
          $start = (Get-Date).ToString('HH:mm:ss')
          $end = (Get-Date).AddHours($hours).ToString('HH:mm:ss')
          $sub = "${{ github.event.inputs.subdomain }}"
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════════╗"
          Write-Host "║              🎉 WINDOWS 11 READY - INSTANCE ${{ matrix.instance }} 🎉            ║"
          Write-Host "╠══════════════════════════════════════════════════════════════╣"
          Write-Host "║  🔐 RDP : $ip`:3389"
          Write-Host "║  👤 User: $user | 🔑 Pass: $pass"
          if ($sub -ne '') { Write-Host "║  🌐 Subdomain: https://$sub-${{ matrix.instance }}.pinggy.io" }
          Write-Host "╠══════════════════════════════════════════════════════════════╣"
          foreach ($l in $bench) { Write-Host "║  📊 $l" }
          foreach ($l in $res) { Write-Host "║  📈 $l" }
          Write-Host "╠══════════════════════════════════════════════════════════════╣"
          Write-Host "║  🕐 Started: $start | Expires: $end"
          Write-Host "╚══════════════════════════════════════════════════════════════╝"
          Write-Host ""
          $info = @(); $info += "Host: $ip"; $info += "Port: 3389"; $info += "User: $user"; $info += "Pass: $pass"
          if ($sub -ne '') { $info += "Subdomain: https://$sub-${{ matrix.instance }}.pinggy.io" }
          $info | Out-File vps-info.txt -Encoding ascii
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: win11-${{ matrix.instance }}
          path: |
            vps-info.txt
            ${{ env.TEMP }}\screen.png
            ${{ env.TEMP }}\bench.txt
            ${{ env.TEMP }}\res.txt
          retention-days: 7
          
      - name: Keep
        shell: pwsh
        run: Start-Sleep -Seconds (${{ github.event.inputs.duration }} * 3600)

  windows10-vps:
    runs-on: windows-latest
    if: github.event.inputs.os_type == 'windows10'
    timeout-minutes: 360
    strategy:
      matrix:
        instance: [1, 2, 3]
      max-parallel: 3
    steps:
      - name: Check
        if: github.event.inputs.instances < matrix.instance
        shell: pwsh
        run: exit 0
          
      - name: Init
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════════╗"
          Write-Host "║          🪟 WINDOWS 10 PRO - INSTANCE ${{ matrix.instance }} 🪟                 ║"
          Write-Host "╚══════════════════════════════════════════════════════════════╝"
          Write-Host ""
          Write-Host "  🌍 Region  : ${{ github.event.inputs.region }}"
          Write-Host "  👤 User    : ${{ github.event.inputs.username }}"
          Write-Host "  ⏱️ Hours   : ${{ github.event.inputs.duration }}"
          Write-Host ""
          
      - name: RDP
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP-In" dir=in action=allow protocol=TCP localport=3389
          Set-Service -Name TermService -StartupType Automatic
          Start-Service -Name TermService
          
      - name: User
        shell: pwsh
        run: |
          $u = "${{ github.event.inputs.username }}"
          $p = "${{ github.event.inputs.password }}"
          $sec = ConvertTo-SecureString $p -AsPlainText -Force
          try { Remove-LocalUser -Name $u -ErrorAction SilentlyContinue } catch {}
          New-LocalUser -Name $u -Password $sec -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $u
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u
          Enable-LocalUser -Name $u
          $p | Out-File -FilePath $env:TEMP\pass.txt
          
      - name: Wallpaper
        if: github.event.inputs.wallpaper_url != ''
        shell: pwsh
        run: |
          $url = "${{ github.event.inputs.wallpaper_url }}"
          $img = "$env:TEMP\wall.jpg"
          Invoke-WebRequest -Uri $url -OutFile $img
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name Wallpaper -Value $img
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name WallpaperStyle -Value 2
          
      - name: Screenshot
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Windows.Forms,System.Drawing
          $bmp = New-Object System.Drawing.Bitmap ([System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Width), ([System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Height)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.CopyFromScreen(0, 0, 0, 0, $bmp.Size)
          $bmp.Save("$env:TEMP\screen.png")
          $g.Dispose(); $bmp.Dispose()
          
      - name: Tailscale
        shell: pwsh
        env:
          KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          $msi = "$env:TEMP\ts.msi"
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msi
          Start-Process msiexec.exe -ArgumentList "/i", "`"$msi`"", "/quiet", "/norestart" -Wait
          Remove-Item $msi -Force
          
      - name: Connect
        shell: pwsh
        env:
          KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:KEY --hostname="win10-${{ matrix.instance }}"
          Start-Sleep -Seconds 5
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "IP=$ip" >> $env:GITHUB_ENV
          
      - name: Benchmark
        shell: pwsh
        run: |
          $c = Get-Date; $s = 0; for ($i=0; $i -lt 1000000; $i++) { $s += $i }; $cpu = [math]::Round(1000000 / (Get-Date).Subtract($c).TotalMilliseconds * 100, 2)
          $m = Get-Date; $arr = New-Object System.Collections.ArrayList; for ($i=0; $i -lt 500000; $i++) { $arr.Add($i) | Out-Null }; $mem = [math]::Round(500000 / (Get-Date).Subtract($m).TotalMilliseconds * 100, 2)
          $d = Get-Date; "X" * 10485760 | Out-File "$env:TEMP\disk.tmp"; $disk = [math]::Round(10 / (Get-Date).Subtract($d).TotalSeconds, 2); Remove-Item "$env:TEMP\disk.tmp" -Force
          $bench = @(); $bench += "CPU: $cpu ops/sec"; $bench += "Memory: $mem ops/sec"; $bench += "Disk: $disk MB/s"; $bench | Out-File "$env:TEMP\bench.txt"
          
      - name: Monitor
        shell: pwsh
        run: |
          $cpu = (Get-WmiObject Win32_Processor).LoadPercentage
          $ram = Get-WmiObject Win32_OperatingSystem
          $ramU = [math]::Round(($ram.TotalVisibleMemorySize - $ram.FreePhysicalMemory) / 1MB, 2)
          $ramT = [math]::Round($ram.TotalVisibleMemorySize / 1MB, 2)
          $disk = Get-WmiObject Win32_LogicalDisk -Filter "DeviceID='C:'"
          $diskU = [math]::Round(($disk.Size - $disk.FreeSpace) / 1GB, 2)
          $diskT = [math]::Round($disk.Size / 1GB, 2)
          $up = (Get-Date) - (Get-CimInstance Win32_OperatingSystem).LastBootUpTime
          $res = @(); $res += "CPU: $cpu%"; $res += "RAM: $ramU/$ramT GB"; $res += "DISK: $diskU/$diskT GB"; $res += "UPTIME: $($up.Days)d $($up.Hours)h"
          $res | Out-File "$env:TEMP\res.txt"
          
      - name: Info
        shell: pwsh
        run: |
          $pass = Get-Content "$env:TEMP\pass.txt"
          $bench = Get-Content "$env:TEMP\bench.txt"
          $res = Get-Content "$env:TEMP\res.txt"
          $ip = "$env:IP"
          $user = "${{ github.event.inputs.username }}"
          $hours = "${{ github.event.inputs.duration }}"
          $start = (Get-Date).ToString('HH:mm:ss')
          $end = (Get-Date).AddHours($hours).ToString('HH:mm:ss')
          $sub = "${{ github.event.inputs.subdomain }}"
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════════╗"
          Write-Host "║              🎉 WINDOWS 10 READY - INSTANCE ${{ matrix.instance }} 🎉            ║"
          Write-Host "╠══════════════════════════════════════════════════════════════╣"
          Write-Host "║  🔐 RDP : $ip`:3389"
          Write-Host "║  👤 User: $user | 🔑 Pass: $pass"
          if ($sub -ne '') { Write-Host "║  🌐 Subdomain: https://$sub-${{ matrix.instance }}.pinggy.io" }
          Write-Host "╠══════════════════════════════════════════════════════════════╣"
          foreach ($l in $bench) { Write-Host "║  📊 $l" }
          foreach ($l in $res) { Write-Host "║  📈 $l" }
          Write-Host "╠══════════════════════════════════════════════════════════════╣"
          Write-Host "║  🕐 Started: $start | Expires: $end"
          Write-Host "╚══════════════════════════════════════════════════════════════╝"
          Write-Host ""
          $info = @(); $info += "Host: $ip"; $info += "Port: 3389"; $info += "User: $user"; $info += "Pass: $pass"
          if ($sub -ne '') { $info += "Subdomain: https://$sub-${{ matrix.instance }}.pinggy.io" }
          $info | Out-File vps-info.txt -Encoding ascii
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: win10-${{ matrix.instance }}
          path: |
            vps-info.txt
            ${{ env.TEMP }}\screen.png
            ${{ env.TEMP }}\bench.txt
            ${{ env.TEMP }}\res.txt
          retention-days: 7
          
      - name: Keep
        shell: pwsh
        run: Start-Sleep -Seconds (${{ github.event.inputs.duration }} * 3600)
