name: NEURAL VPS QUANTUM SYSTEM v1.0 - FINAL VERSION

on:
  workflow_dispatch:
    inputs:
      duration:
        description: Quantum Session Duration
        required: true
        default: 2h
        type: choice
        options:
          - 30m
          - 1h
          - 2h
          - 4h
          - 6h
      
      windows_enabled:
        description: Enable Windows 11 Cortex
        required: false
        default: true
        type: boolean
      
      ubuntu_enabled:
        description: Enable Ubuntu 22.04 Cortex
        required: false
        default: true
        type: boolean
      
      ubuntu24_enabled:
        description: Enable Ubuntu 24.04 Cortex
        required: false
        default: true
        type: boolean
      
      debian_enabled:
        description: Enable Debian 12 Cortex
        required: false
        default: false
        type: boolean
      
      centos_enabled:
        description: Enable CentOS 9 Cortex
        required: false
        default: false
        type: boolean
      
      almalinux_enabled:
        description: Enable AlmaLinux 9 Cortex
        required: false
        default: false
        type: boolean
      
      network_type:
        description: Neural Network Protocol
        required: false
        default: auto
        type: choice
        options:
          - auto
          - direct
          - cloudflare
          - tailscale
      
      performance_mode:
        description: Neural Performance Mode
        required: false
        default: balanced
        type: choice
        options:
          - balanced
          - performance
          - quantum
      
      telegram_notify:
        description: Telegram Neural Link
        required: false
        default: true
        type: boolean
      
      auto_cleanup:
        description: Neural Memory Purge
        required: false
        default: true
        type: boolean

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}

jobs:
  main_brain:
    runs-on: ubuntu-latest
    outputs:
      session_id: ${{ steps.core.outputs.session_id }}
      duration_minutes: ${{ steps.core.outputs.duration_minutes }}
      termination_time: ${{ steps.core.outputs.termination_time }}
    steps:
      - name: Core Initialization
        id: core
        run: |
          SESSION_ID="NEURAL-VPS-$(date +%Y%m%d-%H%M%S)-$((RANDOM % 9000 + 1000))"
          echo "session_id=$SESSION_ID" >> $GITHUB_OUTPUT
          
          case "${{ github.event.inputs.duration }}" in
            "30m") DUR=30 ;;
            "1h") DUR=60 ;;
            "2h") DUR=120 ;;
            "4h") DUR=240 ;;
            "6h") DUR=360 ;;
            *) DUR=120 ;;
          esac
          echo "duration_minutes=$DUR" >> $GITHUB_OUTPUT
          
          TERM_TIME=$(date -d "+$DUR minutes" "+%Y-%m-%d %H:%M:%S")
          echo "termination_time=$TERM_TIME" >> $GITHUB_OUTPUT
          
          echo ""
          echo "============================================================"
          echo "         MAIN BRAIN ACTIVATED"
          echo "============================================================"
          echo "Session ID: $SESSION_ID"
          echo "Duration: $DUR minutes"
          echo "Termination: $TERM_TIME"
          echo "============================================================"
          echo ""

  windows_cortex:
    needs: [main_brain]
    if: github.event.inputs.windows_enabled == 'true'
    runs-on: windows-latest
    timeout-minutes: 360
    outputs:
      ip_address: ${{ steps.ip.outputs.ip_address }}
      rdp_port: ${{ steps.rdp.outputs.rdp_port }}
      username: ${{ steps.user.outputs.username }}
      password: ${{ steps.user.outputs.password }}
    steps:
      - name: Windows Setup
        run: |
          Write-Host ""
          Write-Host "WINDOWS 11 CORTEX - INITIALIZING" -ForegroundColor Magenta
          Write-Host ""
      
      - name: Create User
        id: user
        run: |
          $Username = "winuser$((Get-Random -Minimum 1000 -Maximum 9999))"
          $Password = -join ((65..90) + (97..122) + (48..57) + (33..38) | Get-Random -Count 20 | % {[char]$_})
          $SecurePass = ConvertTo-SecureString $Password -AsPlainText -Force
          
          New-LocalUser -Name $Username -Password $SecurePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $Username
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $Username
          
          echo "username=$Username" >> $env:GITHUB_OUTPUT
          echo "password=$Password" >> $env:GITHUB_OUTPUT
          Write-Host "User created: $Username" -ForegroundColor Green
      
      - name: Configure RDP
        id: rdp
        run: |
          $Port = Get-Random -Minimum 4000 -Maximum 9000
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=$Port
          
          echo "rdp_port=$Port" >> $env:GITHUB_OUTPUT
          Write-Host "RDP Port: $Port" -ForegroundColor Green
      
      - name: Get IP
        id: ip
        run: |
          $IP = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing).Content
          echo "ip_address=$IP" >> $env:GITHUB_OUTPUT
          Write-Host "Public IP: $IP" -ForegroundColor Green
      
      - name: Watchdog
        run: |
          Start-Job -ScriptBlock {
            while($true) {
              Start-Sleep 30
              $svc = Get-Service TermService
              if($svc.Status -ne 'Running') { Start-Service TermService }
            }
          }

  ubuntu_cortex:
    needs: [main_brain]
    if: github.event.inputs.ubuntu_enabled == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    outputs:
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      ssh_port: ${{ steps.ssh_config.outputs.ssh_port }}
      cloudflare_url: ${{ steps.cloudflare.outputs.cloudflare_url }}
    steps:
      - name: System Setup
        run: |
          echo ""
          echo "UBUNTU 22.04 CORTEX - INITIALIZING"
          echo ""
          sudo apt update -qq
          sudo apt install -y -qq openssh-server curl wget
      
      - name: Create Neural User
        id: create_user
        run: |
          USERNAME="ubt$((RANDOM % 9000 + 1000))"
          PASSWORD=$(openssl rand -base64 16 | tr -d "=+/" | cut -c1-20)
          
          sudo useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo "$USERNAME"
          
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "$PASSWORD" > /tmp/ubuntu_pass.txt
          echo "User created: $USERNAME"
      
      - name: Configure SSH
        id: ssh_config
        run: |
          PORT=$((RANDOM % 7000 + 2000))
          
          sudo sed -i "s/^#Port 22/Port $PORT/" /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          
          echo "ssh_port=$PORT" >> $GITHUB_OUTPUT
          echo "SSH Port: $PORT"
      
      - name: Cloudflare Tunnel
        id: cloudflare
        if: github.event.inputs.network_type == 'cloudflare'
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O /tmp/cf
          chmod +x /tmp/cf
          /tmp/cf tunnel --url ssh://localhost:${{ steps.ssh_config.outputs.ssh_port }} > /tmp/cf.log 2>&1 &
          sleep 10
          URL=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' /tmp/cf.log | head -1)
          if [ -n "$URL" ]; then
            echo "cloudflare_url=$URL" >> $GITHUB_OUTPUT
            echo "Cloudflare URL: $URL"
          fi
      
      - name: Performance Tuning
        if: github.event.inputs.performance_mode != 'balanced'
        run: |
          sudo sysctl -w net.core.rmem_max=134217728
          sudo sysctl -w net.core.wmem_max=134217728
          sudo sysctl -w vm.swappiness=10
      
      - name: Watchdog
        run: |
          nohup bash -c 'while true; do sleep 30; sudo systemctl restart ssh; done' > /dev/null 2>&1 &

  ubuntu24_cortex:
    needs: [main_brain]
    if: github.event.inputs.ubuntu24_enabled == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    outputs:
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      ssh_port: ${{ steps.ssh_config.outputs.ssh_port }}
      cloudflare_url: ${{ steps.cloudflare.outputs.cloudflare_url }}
    steps:
      - name: System Setup
        run: |
          echo ""
          echo "UBUNTU 24.04 CORTEX - INITIALIZING"
          echo ""
          sudo apt update -qq
