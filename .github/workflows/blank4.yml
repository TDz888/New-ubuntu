name: 🧠 PREMIUM VM GENERATOR v7.0 - QUANTUM EDITION

on:
  workflow_dispatch:
    inputs:
      os_type:
        description: '🧠 Select Neural Operating System'
        required: true
        default: 'windows-11'
        type: choice
        options:
          - 'windows-11'
          - 'windows-server-2022'
          - 'ubuntu-22-04'
          - 'ubuntu-24-04'
          - 'debian-12'
          - 'centos-9'
      
      vm_specs:
        description: '⚡ Neural Processing Power'
        required: true
        default: 'standard-4gb'
        type: choice
        options:
          - 'lightning-2gb'
          - 'standard-4gb'
          - 'turbo-8gb'
          - 'quantum-16gb'
      
      duration:
        description: '⏱️ Session Duration (Neural Processing Time)'
        required: false
        default: '4h'
        type: choice
        options:
          - '30m'
          - '1h'
          - '2h'
          - '3h'
          - '4h'
          - '5h'
          - '6h'
      
      network_type:
        description: '🌐 Neural Network Protocol'
        required: false
        default: 'tailscale'
        type: choice
        options:
          - 'tailscale'
          - 'direct-ip'
          - 'cloudflare-tunnel'
      
      telegram_notify:
        description: '📱 Telegram Auto-Notify'
        required: false
        default: 'true'
        type: boolean
      
      auto_cleanup:
        description: '🧹 Auto Cleanup After Session'
        required: false
        default: 'true'
        type: boolean
      
      monitoring_level:
        description: '📊 Neural Monitoring Depth'
        required: false
        default: 'advanced'
        type: choice
        options:
          - 'basic'
          - 'standard'
          - 'advanced'
          - 'quantum'
      
      enhanced_display:
        description: '🎨 Enhanced Neural Display'
        required: false
        default: 'true'
        type: boolean

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  Windows11-NeuralBrain:
    if: github.event.inputs.os_type == 'windows-11'
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: 🧠 WIN11 - QUANTUM BOOTSTRAP
        run: |
          # Neural Configuration
          $global:NeuralStartTime = Get-Date
          $global:NeuralSessionId = "WIN11-$(Get-Random -Minimum 100000 -Maximum 999999)"
          $global:NeuralLogPath = "$env:TEMP\neural_win11_$(Get-Date -Format 'yyyyMMdd_HHmmss')"
          New-Item -ItemType Directory -Path $global:NeuralLogPath -Force | Out-Null
          
          # Calculate duration minutes
          $durationInput = "${{ github.event.inputs.duration }}"
          $totalMinutes = switch ($durationInput) {
            "30m" { 30 }
            "1h" { 60 }
            "2h" { 120 }
            "3h" { 180 }
            "4h" { 240 }
            "5h" { 300 }
            "6h" { 360 }
            default { 240 }
          }
          
          # Calculate end time
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $startTime = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
          $endTime = $startTime.AddMinutes($totalMinutes)
          
          # Display Quantum Banner
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║                                                                                              ║" -ForegroundColor Cyan
          Write-Host "║    🧠  Q U A N T U M   N E U R A L   B R A I N   A C T I V A T E D                         ║" -ForegroundColor Cyan
          Write-Host "║    ═════════════════════════════════════════════════════════════════════════════════════    ║" -ForegroundColor Cyan
          Write-Host "║                                                                                              ║" -ForegroundColor Cyan
          Write-Host "║    ██╗    ██╗██╗███╗   ██╗██████╗  ██████╗ ██╗    ██╗███████╗                             ║" -ForegroundColor Cyan
          Write-Host "║    ██║    ██║██║████╗  ██║██╔══██╗██╔═══██╗██║    ██║██╔════╝                             ║" -ForegroundColor Cyan
          Write-Host "║    ██║ █╗ ██║██║██╔██╗ ██║██████╔╝██║   ██║██║ █╗ ██║███████╗                             ║" -ForegroundColor Cyan
          Write-Host "║    ██║███╗██║██║██║╚██╗██║██╔══██╗██║   ██║██║███╗██║╚════██║                             ║" -ForegroundColor Cyan
          Write-Host "║    ╚███╔███╔╝██║██║ ╚████║██║  ██║╚██████╔╝╚███╔███╔╝███████║                             ║" -ForegroundColor Cyan
          Write-Host "║     ╚══╝╚══╝ ╚═╝╚═╝  ╚═══╝╚═╝  ╚═╝ ╚═════╝  ╚══╝╚══╝ ╚══════╝                             ║" -ForegroundColor Cyan
          Write-Host "║                                                                                              ║" -ForegroundColor Cyan
          Write-Host "║    ╔══════════════════════════════════════════════════════════════════════════════════════╗ ║" -ForegroundColor Cyan
          Write-Host "║    ║  🧠 NEURAL CORTEX    : Windows 11 Professional x64                                   ║ ║" -ForegroundColor Cyan
          Write-Host "║    ║  ⚡ PROCESSING POWER : ${{ github.event.inputs.vm_specs }}                                         ║ ║" -ForegroundColor Cyan
          Write-Host "║    ║  🕐 SESSION ID      : $global:NeuralSessionId                                        ║ ║" -ForegroundColor Cyan
          Write-Host "║    ║  📡 NEURAL LINK     : ${{ github.event.inputs.network_type }}                                    ║ ║" -ForegroundColor Cyan
          Write-Host "║    ║  ⏱️ SESSION START   : $($startTime.ToString('HH:mm:ss dd/MM/yyyy'))                             ║ ║" -ForegroundColor Cyan
          Write-Host "║    ║  ⏱️ SESSION END     : $($endTime.ToString('HH:mm:ss dd/MM/yyyy'))                               ║ ║" -ForegroundColor Cyan
          Write-Host "║    ╚══════════════════════════════════════════════════════════════════════════════════════╝ ║" -ForegroundColor Cyan
          Write-Host "║                                                                                              ║" -ForegroundColor Cyan
          Write-Host "╚══════════════════════════════════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          
          # Save to environment
          echo "NEURAL_SESSION_ID=$global:NeuralSessionId" >> $env:GITHUB_ENV
          echo "NEURAL_START_TIME=$global:NeuralStartTime" >> $env:GITHUB_ENV
          echo "NEURAL_LOG_PATH=$global:NeuralLogPath" >> $env:GITHUB_ENV
          echo "NEURAL_DURATION_MINUTES=$totalMinutes" >> $env:GITHUB_ENV
          echo "NEURAL_START_TIME_STR=$($startTime.ToString('HH:mm:ss dd/MM/yyyy'))" >> $env:GITHUB_ENV
          echo "NEURAL_END_TIME_STR=$($endTime.ToString('HH:mm:ss dd/MM/yyyy'))" >> $env:GITHUB_ENV
          
          Start-Sleep -Seconds 2
      
      - name: ⚡ WIN11 - NEURAL SYNAPSE CONFIGURATION
        run: |
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════════════════╗" -ForegroundColor Magenta
          Write-Host "║  ⚡ ESTABLISHING NEURAL SYNAPSES - QUANTUM PROTOCOL                  ║" -ForegroundColor Magenta
          Write-Host "╚════════════════════════════════════════════════════════════════════════╝" -ForegroundColor Magenta
          Write-Host ""
          
          # Parallel processing with jobs
          $jobs = @()
          
          $jobs += Start-Job -ScriptBlock {
            Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
            Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
            Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          }
          
          $jobs += Start-Job -ScriptBlock {
            netsh advfirewall firewall add rule name="Quantum-RDP-In" dir=in action=allow protocol=TCP localport=3389 profile=any
            netsh advfirewall firewall add rule name="Quantum-RDP-Out" dir=out action=allow protocol=TCP localport=3389 profile=any
            netsh advfirewall firewall add rule name="Quantum-Ping" dir=in action=allow protocol=ICMPv4
          }
          
          $jobs | Wait-Job | Receive-Job
          $jobs | Remove-Job
          
          Write-Host "│ ✅ Neural synapses established" -ForegroundColor Green
          Write-Host "│ 🔗 Quantum RDP protocol activated" -ForegroundColor Green
          Write-Host ""
      
      - name: 🔐 WIN11 - QUANTUM PASSWORD GENERATION
        run: |
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════════════════╗" -ForegroundColor Magenta
          Write-Host "║  🔐 QUANTUM PASSWORD GENERATION - SECURE NEURAL ENCRYPTION           ║" -ForegroundColor Magenta
          Write-Host "╚════════════════════════════════════════════════════════════════════════╝" -ForegroundColor Magenta
          Write-Host ""
          
          function New-QuantumPassword {
            param([int]$Length = 20)
            
            $quantumPool = @{
              Upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ'
              Lower = 'abcdefghijkmnpqrstuvwxyz'
              Numbers = '23456789'
              Symbols = '!@#$%&*+=?'
            }
            
            $quantumSeed = [System.BitConverter]::ToUInt32((Get-Random -Count 4), 0)
            $random = [System.Random]::new($quantumSeed)
            
            $password = [System.Collections.ArrayList]::new()
            
            # Ensure complexity
            $password.Add($quantumPool.Upper[$random.Next(0, $quantumPool.Upper.Length)]) | Out-Null
            $password.Add($quantumPool.Lower[$random.Next(0, $quantumPool.Lower.Length)]) | Out-Null
            $password.Add($quantumPool.Numbers[$random.Next(0, $quantumPool.Numbers.Length)]) | Out-Null
            $password.Add($quantumPool.Symbols[$random.Next(0, $quantumPool.Symbols.Length)]) | Out-Null
            
            $allChars = $quantumPool.Upper + $quantumPool.Lower + $quantumPool.Numbers + $quantumPool.Symbols
            for ($i = 4; $i -lt $Length; $i++) {
              $password.Add($allChars[$random.Next(0, $allChars.Length)]) | Out-Null
            }
            
            $shuffled = $password.ToArray() | Sort-Object { Get-Random -Maximum 1000 }
            return -join $shuffled
          }
          
          $global:NeuralUsername = "QUANTUM-ADMIN"
          $global:NeuralPassword = New-QuantumPassword
          $securePass = ConvertTo-SecureString $global:NeuralPassword -AsPlainText -Force
          
          Remove-LocalUser -Name $global:NeuralUsername -ErrorAction SilentlyContinue
          
          New-LocalUser -Name $global:NeuralUsername -Password $securePass -AccountNeverExpires -Description "Quantum Neural Brain Windows 11"
          Set-LocalUser -Name $global:NeuralUsername -PasswordNeverExpires $true
          
          Add-LocalGroupMember -Group "Administrators" -Member $global:NeuralUsername
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $global:NeuralUsername
          Add-LocalGroupMember -Group "Users" -Member $global:NeuralUsername
          Enable-LocalUser -Name $global:NeuralUsername
          
          echo "NEURAL_USERNAME=$global:NeuralUsername" >> $env:GITHUB_ENV
          echo "NEURAL_PASSWORD=$global:NeuralPassword" >> $env:GITHUB_ENV
          echo "$global:NeuralPassword" > "$env:TEMP\quantum_password.txt"
          
          Write-Host "│ 🧠 Quantum identity created: $global:NeuralUsername" -ForegroundColor Green
          Write-Host "│ 🔐 Quantum password generated (20 chars)" -ForegroundColor Green
          Write-Host "│ 🛡️ Security Level: Enterprise Grade Encryption" -ForegroundColor Green
          Write-Host ""
      
      - name: 🌐 WIN11 - QUANTUM NETWORK CONFIGURATION
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
        run: |
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════════════════╗" -ForegroundColor Magenta
          Write-Host "║  🌐 CONFIGURING QUANTUM NETWORK INTERFACE                             ║" -ForegroundColor Magenta
          Write-Host "╚════════════════════════════════════════════════════════════════════════╝" -ForegroundColor Magenta
          Write-Host ""
          
          $networkType = "${{ github.event.inputs.network_type }}"
          $global:NeuralIP = ""
          
          switch ($networkType) {
            "tailscale" {
              if ($env:TAILSCALE_AUTH_KEY) {
                Write-Host "│ 📡 Establishing Tailscale quantum link..." -ForegroundColor Blue
                
                $msiPath = "$env:TEMP\tailscale_quantum.msi"
                $null = Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msiPath
                $process = Start-Process msiexec.exe -ArgumentList "/i `"$msiPath`" /quiet /norestart" -Wait -PassThru
                Remove-Item $msiPath -Force -ErrorAction SilentlyContinue
                
                Start-Sleep -Seconds 8
                
                $neuralHostname = "quantum-win11-$env:GITHUB_RUN_ID"
                $null = & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=$neuralHostname --accept-routes --accept-dns
                
                for ($retry = 0; $retry -lt 15; $retry++) {
                  $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4 2>&1
                  if ($ip -match '^\d+\.\d+\.\d+\.\d+$') {
                    $global:NeuralIP = $ip
                    break
                  }
                  Start-Sleep -Seconds 2
                }
              }
            }
            "cloudflare-tunnel" {
              Write-Host "│ ☁️ Establishing Cloudflare Tunnel quantum link..." -ForegroundColor Blue
              $global:NeuralIP = "TUNNEL-ACTIVE-VIA-CLOUDFLARE"
            }
            default {
              Write-Host "│ 🌍 Using direct IP quantum link..." -ForegroundColor Blue
              $global:NeuralIP = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing).Content
            }
          }
          
          if ([string]::IsNullOrEmpty($global:NeuralIP)) {
            $global:NeuralIP = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing).Content
          }
          
          echo "NEURAL_IP=$global:NeuralIP" >> $env:GITHUB_ENV
          Write-Host "│ ✅ Quantum network active at: $global:NeuralIP" -ForegroundColor Green
          Write-Host ""
      
      - name: ⚡ WIN11 - QUANTUM PERFORMANCE OPTIMIZATION
        run: |
