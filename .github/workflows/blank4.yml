# =====================================================================================
#                    🧠 NEURAL MASTER SYSTEM v3.0 - STABLE EDITION
#              Multi-OS Remote Access System | Production Ready
# =====================================================================================
# Version: 3.0.2-stable
# Status: FIXED - NO SKIP ISSUES - ALL JOBS INDEPENDENT
# =====================================================================================

name: 🧠 NEURAL MASTER SYSTEM v3.0 - STABLE EDITION

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '⏱️ Session Duration'
        required: true
        default: '2h'
        type: choice
        options:
          - '30m'
          - '1h'
          - '2h'
          - '4h'
          - '6h'
      
      target_os:
        description: '🎯 Select OS to Deploy'
        required: true
        default: 'windows'
        type: choice
        options:
          - 'windows'
          - 'ubuntu22'
          - 'ubuntu24'
          - 'debian'
          - 'centos'
          - 'almalinux'
          - 'all'
      
      performance_mode:
        description: '⚡ Performance Mode'
        required: false
        default: 'balanced'
        type: choice
        options:
          - 'balanced'
          - 'performance'
          - 'quantum'
      
      telegram_notify:
        description: '📱 Telegram Notification'
        required: false
        default: true
        type: boolean
      
      auto_cleanup:
        description: '🧹 Auto Cleanup'
        required: false
        default: true
        type: boolean

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

# =====================================================================================
#                           🧠 MASTER CONTROLLER
# =====================================================================================

jobs:
  # ==============================================================================
  # MASTER BRAIN - KHỞI TẠO VÀ QUẢN LÝ PHIÊN
  # ==============================================================================
  master_brain:
    runs-on: ubuntu-latest
    outputs:
      session_id: ${{ steps.init.outputs.session_id }}
      duration_minutes: ${{ steps.init.outputs.duration_minutes }}
      termination_time: ${{ steps.init.outputs.termination_time }}
      start_timestamp: ${{ steps.init.outputs.start_timestamp }}
    steps:
      - name: 🧠 MASTER BRAIN INITIALIZATION
        id: init
        run: |
          SESSION_ID="NEURAL-$(date +%Y%m%d-%H%M%S)-$((RANDOM % 9000 + 1000))"
          echo "session_id=$SESSION_ID" >> $GITHUB_OUTPUT
          
          START_TS=$(date +%s)
          echo "start_timestamp=$START_TS" >> $GITHUB_OUTPUT
          
          DUR_INPUT="${{ github.event.inputs.duration }}"
          case "$DUR_INPUT" in
            "30m") DUR=30 ;;
            "1h") DUR=60 ;;
            "2h") DUR=120 ;;
            "4h") DUR=240 ;;
            "6h") DUR=360 ;;
            *) DUR=120 ;;
          esac
          echo "duration_minutes=$DUR" >> $GITHUB_OUTPUT
          
          TERM_TIME=$(date -d "+$DUR minutes" "+%Y-%m-%d %H:%M:%S UTC")
          echo "termination_time=$TERM_TIME" >> $GITHUB_OUTPUT
          
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════════════════════════════╗"
          echo "║                                                                                            ║"
          echo "║                    🧠🧠🧠   NEURAL MASTER ACTIVATED   🧠🧠🧠                                 ║"
          echo "║                                                                                            ║"
          echo "╠════════════════════════════════════════════════════════════════════════════════════════════╣"
          echo "║  📋 Session ID:     $SESSION_ID"
          echo "║  ⏱️  Duration:       $DUR minutes ($DUR_INPUT)"
          echo "║  ⏰ Termination:    $TERM_TIME"
          echo "║  🎯 Target OS:      ${{ github.event.inputs.target_os }}"
          echo "║  ⚡ Performance:    ${{ github.event.inputs.performance_mode }}"
          echo "║  📱 Telegram:       ${{ github.event.inputs.telegram_notify }}"
          echo "║  🧹 Auto Cleanup:   ${{ github.event.inputs.auto_cleanup }}"
          echo "║                                                                                            ║"
          echo "╚════════════════════════════════════════════════════════════════════════════════════════════╝"
          echo ""

  # ==============================================================================
  # WINDOWS 11 - RDP ACCESS
  # ==============================================================================
  windows_deploy:
    needs: [master_brain]
    if: github.event.inputs.target_os == 'windows' || github.event.inputs.target_os == 'all'
    runs-on: windows-latest
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      ip: ${{ steps.get_ip.outputs.ip }}
      port: ${{ steps.rdp_port.outputs.port }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
    steps:
      - name: 🪟 WINDOWS DEPLOYMENT START
        run: |
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║                                                                                            ║" -ForegroundColor Cyan
          Write-Host "║                    🪟🪟🪟   WINDOWS 11 DEPLOYMENT   🪟🪟🪟                                   ║" -ForegroundColor Cyan
          Write-Host "║                                                                                            ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""

      - name: 🔧 ENABLE REMOTE DESKTOP
        run: |
          Write-Host "[1/5] Enabling Remote Desktop..." -ForegroundColor Yellow
          
          # Enable RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          
          # Disable NLA for easier connection
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          
          # Add firewall rule
          netsh advfirewall firewall add rule name="RDP-3389" dir=in action=allow protocol=TCP localport=3389 > $null
          
          # Restart RDP service
          Restart-Service -Name TermService -Force -ErrorAction SilentlyContinue
          
          Write-Host "[OK] Remote Desktop enabled on port 3389" -ForegroundColor Green

      - name: 👤 CREATE ADMIN USER
        id: create_user
        run: |
          Write-Host "[2/5] Creating admin user..." -ForegroundColor Yellow
          
          $username = "neural_$((Get-Random -Minimum 1000 -Maximum 9999))"
          $password = -join ((65..90) + (97..122) + (48..57) + (33..43) | Get-Random -Count 20 | % {[char]$_})
          
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name $username -Password $securePass -AccountNeverExpires -PasswordNeverExpires -ErrorAction Stop
          
          Add-LocalGroupMember -Group "Administrators" -Member $username -ErrorAction Stop
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username -ErrorAction Stop
          
          echo "username=$username" >> $env:GITHUB_OUTPUT
          echo "password=$password" >> $env:GITHUB_OUTPUT
          
          Write-Host "[OK] User created: $username" -ForegroundColor Green
          Write-Host "[OK] Password: $password" -ForegroundColor Green

      - name: 🌐 GET PUBLIC IP
        id: get_ip
        run: |
          Write-Host "[3/5] Fetching public IP address..." -ForegroundColor Yellow
          
          try {
            $ip = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing -TimeoutSec 10).Content.Trim()
          }
          catch {
            try {
              $ip = (Invoke-WebRequest -Uri "https://ifconfig.me/ip" -UseBasicParsing -TimeoutSec 10).Content.Trim()
            }
            catch {
              $ip = "UNAVAILABLE"
            }
          }
          
          echo "ip=$ip" >> $env:GITHUB_OUTPUT
          Write-Host "[OK] Public IP: $ip" -ForegroundColor Green

      - name: 🔌 SET RDP PORT
        id: rdp_port
        run: |
          echo "port=3389" >> $env:GITHUB_OUTPUT
          Write-Host "[4/5] RDP Port: 3389" -ForegroundColor Green

      - name: ✅ VERIFY SERVICE
        id: status
        run: |
          Write-Host "[5/5] Verifying services..." -ForegroundColor Yellow
          
          $service = Get-Service -Name TermService -ErrorAction SilentlyContinue
          if ($service.Status -eq 'Running') {
            echo "status=active" >> $env:GITHUB_OUTPUT
            Write-Host "[OK] Terminal Services is RUNNING" -ForegroundColor Green
          } else {
            echo "status=failed" >> $env:GITHUB_OUTPUT
            Write-Host "[ERROR] Terminal Services is NOT running" -ForegroundColor Red
          }
          
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════════════════════════════════════╗" -ForegroundColor Green
          Write-Host "║  ✅ WINDOWS DEPLOYMENT COMPLETE - READY FOR CONNECTION                                      ║" -ForegroundColor Green
          Write-Host "║  🌐 RDP: ${{ steps.get_ip.outputs.ip }}:3389                                                  ║" -ForegroundColor Green
          Write-Host "║  👤 User: ${{ steps.create_user.outputs.username }}                                          ║" -ForegroundColor Green
          Write-Host "║  🔐 Pass: ${{ steps.create_user.outputs.password }}                                          ║" -ForegroundColor Green
          Write-Host "╚════════════════════════════════════════════════════════════════════════════════════════════╝" -ForegroundColor Green
          Write-Host ""

  # ==============================================================================
  # UBUNTU 22.04 - SSH ACCESS
  # ==============================================================================
  ubuntu22_deploy:
    needs: [master_brain]
    if: github.event.inputs.target_os == 'ubuntu22' || github.event.inputs.target_os == 'all'
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      ip: ${{ steps.get_ip.outputs.ip }}
      port: ${{ steps.ssh_port.outputs.port }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
    steps:
      - name: 🐧 UBUNTU 22.04 DEPLOYMENT START
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════════════════════════════╗"
          echo "║                                                                                            ║"
          echo "║                    🐧🐧🐧   UBUNTU 22.04 DEPLOYMENT   🐧🐧🐧                                 ║"
          echo "║                                                                                            ║"
          echo "╚════════════════════════════════════════════════════════════════════════════════════════════╝"
          echo ""

      - name: 📦 INSTALL SSH SERVER
        run: |
          echo "[1/5] Installing OpenSSH Server..." && sleep 1
          sudo apt update -qq
          sudo apt install -y -qq openssh-server curl net-tools
          echo "[OK] OpenSSH Server installed"

      - name: 👤 CREATE SSH USER
        id: create_user
        run: |
          echo "[2/5] Creating SSH user..." && sleep 1
          
          USERNAME="ub22_$((RANDOM % 9000 + 1000))"
          PASSWORD="$(openssl rand -base64 20 | tr -d '=+/' | cut -c1-24)"
          
          sudo useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo "$USERNAME"
          
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          
          echo "[OK] User created: $USERNAME"
          echo "[OK] Password: $PASSWORD"

      - name: 🔧 CONFIGURE SSH SERVICE
        id: ssh_port
        run: |
          echo "[3/5] Configuring SSH..." && sleep 1
          
          # Enable password authentication
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          
          # Set random SSH port (optional: keep 22 for simplicity)
          echo "port=22" >> $GITHUB_OUTPUT
          
          # Restart SSH
          sudo systemctl restart ssh
          sudo systemctl enable ssh
          
          echo "[OK] SSH configured on port 22"

      - name: 🌐 GET PUBLIC IP
        id: get_ip
        run: |
          echo "[4/5] Fetching public IP..." && sleep 1
          
          IP=$(curl -s --max-time 10 https://api.ipify.org 2>/dev/null || curl -s --max-time 10 https://ifconfig.me/ip 2>/dev/null || echo "UNAVAILABLE")
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "[OK] Public IP: $IP"

      - name: ✅ VERIFY SSH SERVICE
        id: status
        run: |
          echo "[5/5] Verifying SSH service..." && sleep 1
          
          if sudo systemctl is-active ssh > /dev/null 2>&1; then
            echo "status=active" >> $GITHUB_OUTPUT
            echo "[OK] SSH service is RUNNING"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "[ERROR] SSH service is NOT running"
          fi
          
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════════════════════════════╗"
          echo "║  ✅ UBUNTU 22.04 DEPLOYMENT COMPLETE - READY FOR CONNECTION                                 ║"
          echo "║  🌐 SSH: ssh ${{ steps.create_user.outputs.username }}@${{ steps.get_ip.outputs.ip }} -p 22   ║"
          echo "║  👤 User: ${{ steps.create_user.outputs.username }}                                          ║"
          echo "║  🔐 Pass: ${{ steps.create_user.outputs.password }}                                          ║"
          echo "╚════════════════════════════════════════════════════════════════════════════════════════════╝"
          echo ""

