name: 🚀 PREMIUM VPS GENERATOR

on:
  workflow_dispatch:
    inputs:
      os_type:
        description: 🖥️ Operating System
        required: true
        type: choice
        default: windows-latest
        options:
          - windows-latest
          - ubuntu-latest
      duration:
        description: ⏱️ Duration
        required: true
        type: choice
        default: 2h
        options:
          - 30m
          - 1h
          - 2h
          - 3h
          - 4h
          - max
      features:
        description: 🎁 Additional Features
        required: false
        type: choice
        default: basic
        options:
          - basic
          - web
          - game
          - full
      install_software:
        description: 📦 Install Software
        required: false
        type: choice
        default: none
        options:
          - none
          - docker
          - lamp
          - nodejs

jobs:
  generate-vps:
    runs-on: ${{ github.event.inputs.os_type }}
    timeout-minutes: 360
    
    steps:
      - name: 🎯 System Initialization
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║     🚀 PREMIUM VPS GENERATOR - INITIALIZING        ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "✅ System ready!" -ForegroundColor Green
          Write-Host "🎁 Features: ${{ github.event.inputs.features }}" -ForegroundColor Magenta
          Write-Host "📦 Software: ${{ github.event.inputs.install_software }}" -ForegroundColor Magenta

      - name: 🔧 Configure Windows RDP
        if: contains(github.event.inputs.os_type, 'windows')
        shell: pwsh
        run: |
          Write-Host "🔧 Configuring Remote Desktop..." -ForegroundColor Yellow
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP-VPS" dir=in action=allow protocol=TCP localport=3389 | Out-Null
          Set-Service -Name TermService -StartupType Automatic
          Start-Service -Name TermService
          Write-Host "✅ RDP configured!" -ForegroundColor Green

      - name: 🔧 Configure Linux SSH
        if: contains(github.event.inputs.os_type, 'ubuntu')
        shell: bash
        run: |
          echo -e "\n🔧 Configuring SSH..."
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart sshd
          sudo ufw allow 22/tcp
          echo "✅ SSH configured!"

      - name: 👤 Create User Account
        shell: pwsh
        run: |
          Write-Host "👤 Creating user account..." -ForegroundColor Yellow
          
          $upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ'
          $lower = 'abcdefghijkmnpqrstuvwxyz'
          $numbers = '23456789'
          $all = $upper + $lower + $numbers
          
          $password = $upper[(Get-Random -Max $upper.Length)]
          $password += $lower[(Get-Random -Max $lower.Length)]
          $password += $numbers[(Get-Random -Max $numbers.Length)]
          
          for ($i = 1; $i -le 5; $i++) {
              $password += $all[(Get-Random -Max $all.Length)]
          }
          
          $chars = $password.ToCharArray()
          $password = -join ($chars | Sort-Object { Get-Random })
          
          $username = "PREMIUM-VPS"
          
          if ($env:OS_TYPE -eq "windows-latest") {
              $securePass = ConvertTo-SecureString $password -AsPlainText -Force
              Remove-LocalUser -Name $username -ErrorAction SilentlyContinue
              New-LocalUser -Name $username -Password $securePass -AccountNeverExpires -FullName "Premium VPS User"
              Add-LocalGroupMember -Group "Administrators" -Member $username
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
              Enable-LocalUser -Name $username
              Write-Host "✅ Windows user created" -ForegroundColor Green
          } else {
              $tempFile = [System.IO.Path]::GetTempFileName()
              $userPass = "$username`:$password"
              [System.IO.File]::WriteAllText($tempFile, $userPass)
              
              sudo useradd -m -s /bin/bash $username 2>$null
              sudo bash -c "chpasswd < $tempFile"
              sudo usermod -aG sudo $username
              Remove-Item $tempFile -Force
              Write-Host "✅ Linux user created" -ForegroundColor Green
          }
          
          echo "VPS_USER=$username" >> $env:GITHUB_ENV
          echo "VPS_PASS=$password" >> $env:GITHUB_ENV
          $password | Out-File -FilePath $env:TEMP\vps_pass.txt
          
          Write-Host "📋 Username: $username" -ForegroundColor White
          Write-Host "📋 Password: $password" -ForegroundColor White
          Write-Host "🎯 User account ready!" -ForegroundColor Green

      - name: 📦 Install Additional Software
        if: contains(github.event.inputs.os_type, 'ubuntu')
        shell: bash
        run: |
          echo -e "\n📦 Installing software..."
          
          if [ "${{ github.event.inputs.install_software }}" = "docker" ]; then
              echo "🐳 Installing Docker..."
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
              sudo usermod -aG docker ${{ env.VPS_USER }}
              echo "✅ Docker installed!" 
          fi
          
          if [ "${{ github.event.inputs.install_software }}" = "lamp" ]; then
              echo "🌐 Installing LAMP stack..."
              sudo apt update -qq
              sudo apt install -y apache2 mysql-server php php-mysql
              echo "✅ LAMP installed!"
          fi
          
          if [ "${{ github.event.inputs.install_software }}" = "nodejs" ]; then
              echo "📜 Installing Node.js..."
              curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
              sudo apt install -y nodejs
              echo "✅ Node.js installed!"
          fi

      - name: 🎮 Setup Game Server
        if: contains(github.event.inputs.features, 'game') && contains(github.event.inputs.os_type, 'ubuntu')
        shell: bash
        run: |
          echo -e "\n🎮 Setting up game server..."
          
          # Minecraft server
          mkdir -p ~/minecraft
          cd ~/minecraft
          wget -O server.jar https://piston-data.mojang.com/v1/objects/.../server.jar
          echo "eula=true" > eula.txt
          nohup java -jar server.jar nogui &
          echo "✅ Minecraft server running on port 25565"
          
          # Open firewall
          sudo ufw allow 25565

      - name: 🌐 Setup Web UI
        if: contains(github.event.inputs.features, 'web') && contains(github.event.inputs.os_type, 'ubuntu')
        shell: bash
        run: |
          echo -e "\n🌐 Setting up Web UI..."
          
          # Create simple status page
          sudo mkdir -p /var/www/vps-status
          sudo tee /var/www/vps-status/index.html > /dev/null << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><title>VPS Status</title></head>
          <body>
          <h1>🚀 Premium VPS is Running</h1>
          <p>Status: Online</p>
          <p>Uptime: <span id="uptime">Loading...</span></p>
          <script>
              setInterval(() => {
                  fetch('/api/status')
                      .then(r => r.json())
                      .then(d => document.getElementById('uptime').innerText = d.uptime);
              }, 5000);
          </script>
          </body>
          </html>
          EOF
          
          # Simple API endpoint
          sudo tee /var/www/vps-status/api/status.php > /dev/null << 'EOF'
          <?php
          header('Content-Type: application/json');
          echo json_encode(['uptime' => shell_exec('uptime -p')]);
          ?>
          EOF
          
          echo "✅ Web UI available at http://${{ env.TAILSCALE_IP }}"

      - name: 📁 Setup File Manager
        if: contains(github.event.inputs.features, 'full') && contains(github.event.inputs.os_type, 'ubuntu')
        shell: bash
        run: |
          echo -e "\n📁 Setting up Filebrowser..."
          curl -fsSL https://raw.githubusercontent.com/filebrowser/get/master/get.sh | bash
          filebrowser -r /home/${{ env.VPS_USER }} -a 0.0.0.0 -p 8080 &
          sudo ufw allow 8080
          echo "✅ File manager at http://${{ env.TAILSCALE_IP }}:8080"
          echo "   Username: admin, Password: admin"

      - name: 🌐 Install Tailscale
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        shell: pwsh
        run: |
          Write-Host "🌐 Installing Tailscale..." -ForegroundColor Yellow
          
          if ($env:OS_TYPE -eq "windows-latest") {
              $msiPath = "$env:TEMP\tailscale.msi"
              Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msiPath -UseBasicParsing
              Start-Process msiexec.exe -ArgumentList "/i `"$msiPath`" /quiet /norestart" -Wait
              Remove-Item $msiPath -Force
              Start-Sleep -Seconds 5
              & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname="premium-vps-$env:GITHUB_RUN_ID" --accept-routes
              Write-Host "✅ Tailscale installed on Windows" -ForegroundColor Green
          } else {
              bash -c "curl -fsSL https://tailscale.com/install.sh | sudo sh"
              bash -c "sudo tailscale up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=premium-vps-$env:GITHUB_RUN_ID --accept-routes"
              Write-Host "✅ Tailscale installed on Linux" -ForegroundColor Green
          }

      - name: 📡 Get Tailscale IP
        shell: pwsh
        run: |
          Write-Host "📡 Getting Tailscale IP..." -ForegroundColor Yellow
          
          $ip = ""
          for ($i = 0; $i -lt 20; $i++) {
              Start-Sleep -Seconds 2
              try {
                  if ($env:OS_TYPE -eq "windows-latest") {
                      $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4 2>&1
                  } else {
                      $ip = bash -c "tailscale ip -4" 2>&1
                  }
                  if ($ip -match '^\d+\.\d+\.\d+\.\d+$') {
                      echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV
                      Write-Host "✅ IP: $ip" -ForegroundColor Green
                      break
                  }
              } catch {
                  Write-Host "⏳ Waiting for IP... ($i/20)" -ForegroundColor Yellow
              }
          }
          
          if ($ip -eq "") {
              echo "TAILSCALE_IP=localhost" >> $env:GITHUB_ENV
              Write-Host "⚠️ Using localhost" -ForegroundColor Yellow
          }

      - name: 📊 Get System Info
        shell: pwsh
        run: |
          Write-Host "📊 Getting system information..." -ForegroundColor Yellow
          
          if ($env:OS_TYPE -eq "windows-latest") {
              $cpu = (Get-CimInstance Win32_Processor).NumberOfCores
              $ram = [math]::Round((Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory / 1GB, 1)
              $disk = Get-PSDrive C | Select-Object -ExpandProperty Used
              $diskGB = [math]::Round($disk / 1GB, 1)
              $diskTotal = [math]::Round((Get-PSDrive C).Size / 1GB, 1)
              
              echo "SYS_CPU=$cpu cores" >> $env:GITHUB_ENV
              echo "SYS_RAM=${ram}GB" >> $env:GITHUB_ENV
              echo "SYS_DISK=${diskGB}GB / ${diskTotal}GB" >> $env:GITHUB_ENV
              
              Write-Host "⚙️ CPU: $cpu cores" -ForegroundColor White
              Write-Host "💾 RAM: ${ram}GB" -ForegroundColor White
              Write-Host "💿 Disk: ${diskGB}GB / ${diskTotal}GB" -ForegroundColor White
          } else {
              $cpu = bash -c "nproc"
              $ram = bash -c "free -h | awk '/^Mem:/ {print \$2}'"
              $disk = bash -c "df -h / | awk 'NR==2 {print \$2}'"
              
              echo "SYS_CPU=$cpu cores" >> $env:GITHUB_ENV
              echo "SYS_RAM=$ram" >> $env:GITHUB_ENV
              echo "SYS_DISK=$disk" >> $env:GITHUB_ENV
              
              Write-Host "⚙️ CPU: $cpu cores" -ForegroundColor White
              Write-Host "💾 RAM: $ram" -ForegroundColor White
              Write-Host "💿 Disk: $disk" -ForegroundColor White
          }
          Write-Host "✅ System info collected!" -ForegroundColor Green

      - name: 📱 Send Telegram Notification
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: pwsh
        run: |
          $bot = $env:BOT_TOKEN
          $chat = $env:CHAT_ID
          
          if ([string]::IsNullOrEmpty($bot) -or [string]::IsNullOrEmpty($chat)) {
              Write-Host "⚠️ No Telegram credentials - skipping" -ForegroundColor Yellow
              exit 0
          }
          
          $pass = Get-Content $env:TEMP\vps_pass.txt
          $duration = "${{ github.event.inputs.duration }}"
          $features = "${{ github.event.inputs.features }}"
          
          $min = 0
          if ($duration -eq "30m") { $min = 30 }
          if ($duration -eq "1h") { $min = 60 }
          if ($duration -eq "2h") { $min = 120 }
          if ($duration -eq "3h") { $min = 180 }
          if ($duration -eq "4h") { $min = 240 }
          if ($duration -eq "max") { $min = 340 }
          
          $now = Get-Date
          $end = $now.AddMinutes($min)
          
          $msg = "🚀 PREMIUM VPS READY%0A"
          $msg = $msg + "━━━━━━━━━━━━━━━━━━━━━%0A"
          $msg = $msg + "🖥️ OS: ${{ github.event.inputs.os_type }}%0A"
          $msg = $msg + "👤 User: $env:VPS_USER%0A"
          $msg = $msg + "🔑 Pass: $pass%0A"
          $msg = $msg + "🌐 IP: $env:TAILSCALE_IP%0A"
          $msg = $msg + "⚙️ CPU: $env:SYS_CPU%0A"
          $msg = $msg + "💾 RAM: $env:SYS_RAM%0A"
          $msg = $msg + "💿 Disk: $env:SYS_DISK%0A"
          $msg = $msg + "🎁 Features: $features%0A"
          $msg = $msg + "⏱️ Duration: $duration%0A"
          $msg = $msg + "🕐 Start: $($now.ToString('HH:mm:ss'))%0A"
          $msg = $msg + "🕐 End: $($end.ToString('HH:mm:ss'))%0A"
          $msg = $msg + "━━━━━━━━━━━━━━━━━━━━━%0A"
          
          if ($env:OS_TYPE -eq "windows-latest") {
              $msg = $msg + "🔌 RDP: mstsc /v:$env:TAILSCALE_IP%0A"
          } else {
              $msg = $msg + "🔌 SSH: ssh $env:VPS_USER@$env:TAILSCALE_IP%0A"
          }
          
          if ($features -eq "web") {
              $msg = $msg + "🌐 Web UI: http://$env:TAILSCALE_IP%0A"
          }
          
          if ($features -eq "full") {
              $msg = $msg + "📁 File Manager: http://$env:TAILSCALE_IP:8080%0A"
          }
          
          $url = "https://api.telegram.org/bot$bot/sendMessage"
          $body = "chat_id=$chat&text=$msg"
          
          try {
              Invoke-RestMethod -Uri $url -Method Post -Body $body
              Write-Host "✅ Telegram notification sent!" -ForegroundColor Green
          } catch {
              Write-Host "⚠️ Failed to send Telegram" -ForegroundColor Yellow
          }

      - name: 🎉 Show Connection Info
        shell: pwsh
        run: |
          $pass = Get-Content $env:TEMP\vps_pass.txt
          $duration = "${{ github.event.inputs.duration }}"
          $features = "${{ github.event.inputs.features }}"
          
          $min = 0
          $display = ""
          if ($duration -eq "30m") { $min = 30; $display = "30 minutes" }
          if ($duration -eq "1h") { $min = 60; $display = "1 hour" }
          if ($duration -eq "2h") { $min = 120; $display = "2 hours" }
          if ($duration -eq "3h") { $min = 180; $display = "3 hours" }
          if ($duration -eq "4h") { $min = 240; $display = "4 hours" }
          if ($duration -eq "max") { $min = 340; $display = "5 hours 40 minutes" }
          
          $now = Get-Date
          $end = $now.AddMinutes($min)
          echo "TOTAL_MIN=$min" >> $env:GITHUB_ENV
          
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║              🎉 PREMIUM VPS READY - CONNECT NOW!            ║" -ForegroundColor Cyan
          Write-Host "╠════════════════════════════════════════════════════════════╣" -ForegroundColor Cyan
          Write-Host "║  🌐 IP Address   │ $env:TAILSCALE_IP" -ForegroundColor White
          Write-Host "║  👤 Username     │ $env:VPS_USER" -ForegroundColor White
          Write-Host "║  🔑 Password     │ $pass" -ForegroundColor White
          Write-Host "║  🖥️  OS          │ ${{ github.event.inputs.os_type }}" -ForegroundColor White
          Write-Host "║  ⚙️  CPU         │ $env:SYS_CPU" -ForegroundColor White
          Write-Host "║  💾 RAM         │ $env:SYS_RAM" -ForegroundColor White
          Write-Host "║  💿 Disk        │ $env:SYS_DISK" -ForegroundColor White
          Write-Host "║  🎁 Features    │ $features" -ForegroundColor Magenta
          Write-Host "╠════════════════════════════════════════════════════════════╣" -ForegroundColor Cyan
          Write-Host "║  ⏱️  Duration    │ $display" -ForegroundColor White
          Write-Host "║  🕐 Start       │ $($now.ToString('HH:mm:ss'))" -ForegroundColor White
          Write-Host "║  🕐 End         │ $($end.ToString('HH:mm:ss'))" -ForegroundColor White
          Write-Host "╠════════════════════════════════════════════════════════════╣" -ForegroundColor Cyan
          
          if ($env:OS_TYPE -eq "windows-latest") {
              Write-Host "║  🔌 RDP Connect │ mstsc /v:$env:TAILSCALE_IP" -ForegroundColor Yellow
          } else {
              Write-Host "║  🔌 SSH Connect │ ssh $env:VPS_USER@$env:TAILSCALE_IP" -ForegroundColor Yellow
          }
          
          if ($features -eq "web") {
              Write-Host "║  🌐 Web UI      │ http://$env:TAILSCALE_IP" -ForegroundColor Yellow
          }
          
          if ($features -eq "full") {
              Write-Host "║  📁 File Manager│ http://$env:TAILSCALE_IP:8080" -ForegroundColor Yellow
          }
          
          Write-Host "╚════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""

      - name: 📝 Generate Summary
        if: success()
        shell: pwsh
        run: |
          $pass = Get-Content $env:TEMP\vps_pass.txt
          $duration = "${{ github.event.inputs.duration }}"
          $features = "${{ github.event.inputs.features }}"
          
          $display = ""
          if ($duration -eq "30m") { $display = "30 minutes" }
          if ($duration -eq "1h") { $display = "1 hour" }
          if ($duration -eq "2h") { $display = "2 hours" }
          if ($duration -eq "3h") { $display = "3 hours" }
          if ($duration -eq "4h") { $display = "4 hours" }
          if ($duration -eq "max") { $display = "5 hours 40 minutes (Max)" }
          
          $connectCmd = ""
          if ($env:OS_TYPE -eq "windows-latest") {
              $connectCmd = "mstsc /v:$env:TAILSCALE_IP"
          } else {
              $connectCmd = "ssh $env:VPS_USER@$env:TAILSCALE_IP"
          }
          
          $startTime = Get-Date -Format "HH:mm:ss"
          $endTime = (Get-Date).AddMinutes($env:TOTAL_MIN).ToString("HH:mm:ss")
          
          $summary = "## 🚀 Premium VPS Created Successfully`n"
          $summary = $summary + "`n"
          $summary = $summary + "| Parameter | Value |`n"
          $summary = $summary + "|-----------|-------|`n"
          $summary = $summary + "| 🖥️ **OS** | ${{ github.event.inputs.os_type }} |`n"
          $summary = $summary + "| 👤 **Username** | $env:VPS_USER |`n"
          $summary = $summary + "| 🔑 **Password** | $pass |`n"
          $summary = $summary + "| 🌐 **Tailscale IP** | $env:TAILSCALE_IP |`n"
          $summary = $summary + "| ⚙️ **CPU Cores** | $env:SYS_CPU |`n"
          $summary = $summary + "| 💾 **Memory** | $env:SYS_RAM |`n"
          $summary = $summary + "| 💿 **Disk** | $env:SYS_DISK |`n"
          $summary = $summary + "| 🎁 **Features** | $features |`n"
          $summary = $summary + "| ⏱️ **Duration** | $display |`n"
          $summary = $summary + "| 🕐 **Start Time** | $startTime |`n"
          $summary = $summary + "| 🕐 **End Time** | $endTime |`n"
          $summary = $summary + "`n"
          $summary = $summary + "### 🔌 Connection Command`n"
          $summary = $summary + "`n"
          $summary = $summary + "    $connectCmd`n"
          $summary = $summary + "`n"
          
          if ($features -eq "web") {
              $summary = $summary + "### 🌐 Web Interface`n"
              $summary = $summary + "`n"
              $summary = $summary + "    http://$env:TAILSCALE_IP`n"
              $summary = $summary + "`n"
          }
          
          if ($features -eq "full") {
              $summary = $summary + "### 📁 File Manager`n"
              $summary = $summary + "`n"
              $summary = $summary + "    http://$env:TAILSCALE_IP:8080`n"
              $summary = $summary + "    Username: admin, Password: admin`n"
              $summary = $summary + "`n"
          }
          
          $summary = $summary + "### 📋 Instructions`n"
          $summary = $summary + "`n"
          $summary = $summary + "1. Make sure you have **Tailscale** installed on your local machine`n"
          $summary = $summary + "2. Use the connection command above to connect`n"
          $summary = $summary + "3. The VPS will automatically shutdown after the duration expires`n"
          $summary = $summary + "`n"
          $summary = $summary + "---`n"
          $summary = $summary + "*Generated by Premium VPS Generator*`n"
          
          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding UTF8
          Write-Host "✅ Summary generated!" -ForegroundColor Green

      - name: 📊 Monitoring Loop
        if: success()
        shell: pwsh
        run: |
          $min = [int]$env:TOTAL_MIN
          $end = (Get-Date).AddMinutes($min)
          $lastMonitor = (Get-Date).AddMinutes(-30)
          
          Write-Host ""
          Write-Host "📊 MONITORING ACTIVE" -ForegroundColor Yellow
          Write-Host "   System stats will be sent every 30 minutes" -ForegroundColor Gray
          Write-Host ""
          
          do {
              $now = Get-Date
              $remain = $end - $now
              
              if ($remain.TotalSeconds -le 0) { break }
              
              if (($now - $lastMonitor).TotalMinutes -ge 30) {
                  # Send monitoring data to Telegram
                  if (-not [string]::IsNullOrEmpty($env:BOT_TOKEN)) {
                      $cpu = "$env:SYS_CPU"
                      $ram = "$env:SYS_RAM"
                      $disk = "$env:SYS_DISK"
                      $uptime = (Get-Date) - $startTime
                      $uptimeStr = "{0:D2}h {1:D2}m" -f $uptime.Hours, $uptime.Minutes
                      
                      $monitorMsg = "📊 *VPS MONITORING REPORT*%0A"
                      $monitorMsg = $monitorMsg + "━━━━━━━━━━━━━━━━━━━━━%0A"
                      $monitorMsg = $monitorMsg + "🕐 Time: $($now.ToString('HH:mm:ss'))%0A"
                      $monitorMsg = $monitorMsg + "⏱️ Uptime: $uptimeStr%0A"
                      $monitorMsg = $monitorMsg + "⚙️ CPU: $cpu%0A"
                      $monitorMsg = $monitorMsg + "💾 RAM: $ram%0A"
                      $monitorMsg = $monitorMsg + "💿 Disk: $disk%0A"
                      $monitorMsg = $monitorMsg + "⏰ Remaining: $([math]::Floor($remain.TotalHours))h $([math]::Floor($remain.TotalMinutes % 60))m%0A"
                      
                      $url = "https://api.telegram.org/bot$env:BOT_TOKEN/sendMessage"
                      $body = "chat_id=$env:CHAT_ID&text=$monitorMsg"
                      try {
                          Invoke-RestMethod -Uri $url -Method Post -Body $body -ErrorAction SilentlyContinue
                          Write-Host "📊 Monitoring report sent!" -ForegroundColor Green
                      } catch {}
                  }
                  $lastMonitor = $now
              }
              
              $hours = [math]::Floor($remain.TotalHours)
              $mins = [math]::Floor($remain.TotalMinutes % 60)
              $secs = [math]::Floor($remain.TotalSeconds % 60)
              
              Write-Host "`r⏳ [$($now.ToString('HH:mm:ss'))] Remaining: ${hours}h ${mins}m ${secs}s" -NoNewline -ForegroundColor Yellow
              
              Start-Sleep -Seconds 10
              
          } while ($remain.TotalSeconds -gt 0)
          
          Write-Host ""
          Write-Host ""
          Write-Host "════════════════════════════════════════════════════════════" -ForegroundColor Red
          Write-Host "  ⏰ TIME EXPIRED - VPS IS SHUTTING DOWN NOW" -ForegroundColor Red
          Write-Host "════════════════════════════════════════════════════════════" -ForegroundColor Red
          Write-Host ""

      - name: 🧹 Cleanup
        if: always()
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "🧹 CLEANING UP..." -ForegroundColor Yellow
          
          Remove-Item "$env:TEMP\vps_pass.txt" -ErrorAction SilentlyContinue
          Write-Host "  ✅ Password file removed" -ForegroundColor Green
          
          if ($env:OS_TYPE -eq "windows-latest") {
              Disable-LocalUser -Name $env:VPS_USER -ErrorAction SilentlyContinue
              Write-Host "  ✅ User disabled" -ForegroundColor Green
              
              netsh advfirewall firewall delete rule name="RDP-VPS" -ErrorAction SilentlyContinue
              Write-Host "  ✅ Firewall rule removed" -ForegroundColor Green
              
              & "$env:ProgramFiles\Tailscale\tailscale.exe" down -ErrorAction SilentlyContinue
              Write-Host "  ✅ Tailscale disconnected" -ForegroundColor Green
          } else {
              sudo tailscale down -ErrorAction SilentlyContinue
              Write-Host "  ✅ Tailscale disconnected" -ForegroundColor Green
              
              # Kill game server processes
              pkill -f "java -jar server.jar" 2>/dev/null || true
              pkill -f filebrowser 2>/dev/null || true
          }
          
          Write-Host ""
          Write-Host "✨ CLEANUP COMPLETE! Thank you for using Premium VPS!" -ForegroundColor Green
          Write-Host ""
