name: 🧠 Neural VM Quantum System v4 - Full Control

on:
workflow_dispatch:
inputs:
duration:
description: "Duration"
required: true
default: "2h"
type: choice
options:
- "1h"
- "2h"
- "4h"

env:
TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

defaults:
run:
shell: pwsh

jobs:

# ================= CORE =================

core:
runs-on: ubuntu-latest
outputs:
session: ${{ steps.s.outputs.session }}
duration: ${{ steps.s.outputs.duration }}
steps:
- id: s
run: |
SESSION="CORTEX-$(date +%s)"
echo "session=$SESSION" >> $GITHUB_OUTPUT

```
      case "${{ github.event.inputs.duration }}" in
        1h) D=60 ;;
        2h) D=120 ;;
        4h) D=240 ;;
        *) D=120 ;;
      esac

      echo "duration=$D" >> $GITHUB_OUTPUT
      echo "[CORE] READY $SESSION"
```

# ================= WINDOWS =================

windows:
needs: core
runs-on: windows-latest
timeout-minutes: 360

```
steps:
  - name: Init
    run: |
      [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
      echo "SESSION=${{ needs.core.outputs.session }}" >> $env:GITHUB_ENV
      echo "DURATION=${{ needs.core.outputs.duration }}" >> $env:GITHUB_ENV
      echo "STATE=INIT" >> $env:GITHUB_ENV
```

# USER

```
  - name: User
    run: |
      function Gen {
        $c="ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789"
        -join ((1..16)|%{ $c[(Get-Random -Max $c.Length)] })
      }

      $u="win$(Get-Random -Min 1000 -Max 9999)"
      $p=Gen
      $s=ConvertTo-SecureString $p -AsPlainText -Force

      New-LocalUser -Name $u -Password $s -ErrorAction SilentlyContinue
      Add-LocalGroupMember -Group Administrators -Member $u

      echo "W_USER=$u" >> $env:GITHUB_ENV
      echo "W_PASS=$p" >> $env:GITHUB_ENV
      $p | Out-File "$env:TEMP\k.txt"
```

# RDP + RANDOM PORT

```
  - name: RDP
    run: |
      $port = Get-Random -Minimum 2000 -Maximum 9000

      Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name fDenyTSConnections -Value 0
      netsh advfirewall firewall add rule name="rdp" dir=in action=allow protocol=TCP localport=$port

      echo "W_PORT=$port" >> $env:GITHUB_ENV
```

# IP

```
  - name: IP
    run: |
      try { $ip=(Invoke-WebRequest https://api.ipify.org).Content }
      catch { $ip="0.0.0.0" }
      echo "W_IP=$ip" >> $env:GITHUB_ENV
```

# WATCHDOG

```
  - name: Watchdog
    run: |
      Start-Job {
        while ($true) {
          Start-Sleep 20
          $s=Get-Service TermService
          if ($s.Status -ne "Running") { Start-Service TermService }
        }
      } | Out-Null
```

# ================= UBUNTU =================

linux:
needs: core
runs-on: ubuntu-latest

```
steps:
  - name: Init
    run: |
      echo "SESSION=${{ needs.core.outputs.session }}" >> $GITHUB_ENV
      echo "DURATION=${{ needs.core.outputs.duration }}" >> $GITHUB_ENV
```

# USER

```
  - name: User
    run: |
      USER="u$(shuf -i1000-9999 -n1)"
      PASS=$(tr -dc A-Za-z0-9 </dev/urandom | head -c16)

      sudo useradd -m $USER
      echo "$USER:$PASS" | sudo chpasswd

      echo "L_USER=$USER" >> $GITHUB_ENV
      echo "L_PASS=$PASS" >> $GITHUB_ENV
```

# SSH

```
  - name: SSH
    run: |
      sudo apt update -y
      sudo apt install -y openssh-server
      sudo systemctl enable ssh
      sudo systemctl start ssh
```

# CLOUDFLARE TUNNEL (NO PORT)

```
  - name: Tunnel
    run: |
      curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cf
      chmod +x cf

      ./cf tunnel --url ssh://localhost:22 > tunnel.txt 2>&1 &

      sleep 5
      URL=$(grep -o 'https://.*trycloudflare.com' tunnel.txt | head -n1)

      echo "L_TUNNEL=$URL" >> $GITHUB_ENV
```

# WATCHDOG

```
  - name: Watchdog
    run: |
      while true; do
        systemctl is-active ssh || sudo systemctl restart ssh
        sleep 20
      done &
```

# ================= CONTROL =================

control:
needs: [windows, linux]
runs-on: ubuntu-latest

```
steps:
  - name: Send Panel
    run: |
      MSG="VM READY
```

WINDOWS
IP: $W_IP
PORT: $W_PORT
USER: $W_USER
PASS: $W_PASS

LINUX
TUNNEL: $L_TUNNEL
USER: $L_USER
PASS: $L_PASS

SESSION: ${{ needs.core.outputs.session }}
"

```
      curl -s -X POST https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage \
        -d chat_id=$TELEGRAM_CHAT_ID \
        -d text="$MSG" || true
```

# ================= RUNTIME =================

runtime:
needs: [windows, linux]
runs-on: ubuntu-latest

```
steps:
  - name: Loop
    run: |
      END=$(( $(date +%s) + ${{ needs.core.outputs.duration }}*60 ))

      while [ $(date +%s) -lt $END ]; do
        echo "[RUNNING] $(date)"
        sleep 15
      done
```

# ================= CLEAN =================

cleanup:
if: always()
needs: [runtime]
runs-on: ubuntu-latest

```
steps:
  - run: echo "[DONE]"
```
