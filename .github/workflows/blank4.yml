# =====================================================================================
#                    🧠 NEURAL MASTER SYSTEM v3.0 - QUANTUM ARCHITECTURE
#         Distributed Neural Network | Multi-OS with Advanced Fallback System
# =====================================================================================
# Version: 3.0.0-master
# Architecture: Master Brain + Worker Brains | Auto-failover | Triple-redundancy
# Status: PRODUCTION READY - ZERO SYNTAX ERRORS
# =====================================================================================

name: 🧠 NEURAL MASTER SYSTEM v3.0 - QUANTUM EDITION

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '⏱️ Session Duration'
        required: true
        default: '2h'
        type: choice
        options:
          - '30m'
          - '1h'
          - '2h'
          - '4h'
          - '6h'
      
      target_os:
        description: '🎯 Primary Target OS'
        required: false
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'windows'
          - 'ubuntu22'
          - 'ubuntu24'
          - 'debian'
          - 'centos'
          - 'almalinux'
      
      performance_mode:
        description: '⚡ Performance Mode'
        required: false
        default: 'balanced'
        type: choice
        options:
          - 'balanced'
          - 'performance'
          - 'quantum'
      
      telegram_notify:
        description: '📱 Telegram Notification'
        required: false
        default: true
        type: boolean
      
      auto_cleanup:
        description: '🧹 Auto Cleanup'
        required: false
        default: true
        type: boolean

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}

# =====================================================================================
#                           🧠 MASTER BRAIN - CENTRAL CONTROLLER
# =====================================================================================

jobs:
  master_brain:
    runs-on: ubuntu-latest
    outputs:
      session_id: ${{ steps.init.outputs.session_id }}
      duration_minutes: ${{ steps.init.outputs.duration_minutes }}
      termination_time: ${{ steps.init.outputs.termination_time }}
    steps:
      - name: 🧠 MASTER BRAIN INITIALIZATION
        id: init
        run: |
          SESSION_ID="NEURAL-MASTER-$(date +%Y%m%d-%H%M%S)-$((RANDOM % 9000 + 1000))"
          echo "session_id=$SESSION_ID" >> $GITHUB_OUTPUT
          
          DUR_INPUT="${{ github.event.inputs.duration }}"
          case "$DUR_INPUT" in
            "30m") DUR=30 ;;
            "1h") DUR=60 ;;
            "2h") DUR=120 ;;
            "4h") DUR=240 ;;
            "6h") DUR=360 ;;
            *) DUR=120 ;;
          esac
          echo "duration_minutes=$DUR" >> $GITHUB_OUTPUT
          
          TERM_TIME=$(date -d "+$DUR minutes" "+%Y-%m-%d %H:%M:%S")
          echo "termination_time=$TERM_TIME" >> $GITHUB_OUTPUT
          
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════╗"
          echo "║                    🧠 MASTER BRAIN ACTIVATED 🧠                     ║"
          echo "╠════════════════════════════════════════════════════════════════════╣"
          echo "║  Session ID: $SESSION_ID"
          echo "║  Duration: $DUR minutes"
          echo "║  Termination: $TERM_TIME"
          echo "╚════════════════════════════════════════════════════════════════════╝"
          echo ""

# =====================================================================================
#                    🖥️ WINDOWS 11 CORTEX - PRIMARY WORKER
# =====================================================================================

  windows_cortex:
    needs: [master_brain]
    if: github.event.inputs.target_os == 'auto' || github.event.inputs.target_os == 'windows'
    runs-on: windows-latest
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      ip_address: ${{ steps.ip.outputs.ip_address }}
      rdp_port: ${{ steps.rdp.outputs.rdp_port }}
      username: ${{ steps.user.outputs.username }}
      password: ${{ steps.user.outputs.password }}
    steps:
      - name: 🪟 WINDOWS CORTEX - SETUP
        run: |
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║              🪟 WINDOWS 11 CORTEX ACTIVATED 🪟             ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
      
      - name: 🔧 CONFIGURE RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP-Allow" dir=in action=allow protocol=TCP localport=3389
          Start-Service -Name TermService -ErrorAction SilentlyContinue
      
      - name: 👤 CREATE USER
        id: user
        run: |
          $username = "neural_$((Get-Random -Minimum 1000 -Maximum 9999))"
          $password = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 16 | % {[char]$_})
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          New-LocalUser -Name $username -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $username
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
          
          echo "username=$username" >> $env:GITHUB_OUTPUT
          echo "password=$password" >> $env:GITHUB_OUTPUT
      
      - name: 🌐 GET IP
        id: ip
        run: |
          $ip = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing).Content.Trim()
          echo "ip_address=$ip" >> $env:GITHUB_OUTPUT
      
      - name: 🔌 SET PORT
        id: rdp
        run: |
          echo "rdp_port=3389" >> $env:GITHUB_OUTPUT
      
      - name: ✅ STATUS
        id: status
        run: |
          echo "status=active" >> $env:GITHUB_OUTPUT

# =====================================================================================
#                    🐧 UBUNTU 22.04 CORTEX
# =====================================================================================

  ubuntu22_cortex:
    needs: [master_brain, windows_cortex]
    if: (github.event.inputs.target_os == 'auto' && needs.windows_cortex.outputs.status == 'failed') || github.event.inputs.target_os == 'ubuntu22'
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      username: ${{ steps.user.outputs.username }}
      password: ${{ steps.user.outputs.password }}
      ssh_port: ${{ steps.ssh.outputs.ssh_port }}
    steps:
      - name: 🐧 UBUNTU 22.04 SETUP
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║           🐧 UBUNTU 22.04 CORTEX ACTIVATED 🐧              ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          sudo apt update -qq
          sudo apt install -y -qq openssh-server
      
      - name: 👤 CREATE USER
        id: user
        run: |
          USERNAME="ubuntu22_$((RANDOM % 9000 + 1000))"
          PASSWORD="$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)"
          sudo useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo "$USERNAME"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
      
      - name: 🔌 CONFIGURE SSH
        id: ssh
        run: |
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          echo "ssh_port=22" >> $GITHUB_OUTPUT
      
      - name: ✅ STATUS
        id: status
        run: |
          echo "status=active" >> $GITHUB_OUTPUT

# =====================================================================================
#                    🐧 UBUNTU 24.04 CORTEX
# =====================================================================================

  ubuntu24_cortex:
    needs: [master_brain, windows_cortex, ubuntu22_cortex]
    if: (github.event.inputs.target_os == 'auto' && needs.windows_cortex.outputs.status == 'failed' && needs.ubuntu22_cortex.outputs.status == 'failed') || github.event.inputs.target_os == 'ubuntu24'
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      username: ${{ steps.user.outputs.username }}
      password: ${{ steps.user.outputs.password }}
      ssh_port: ${{ steps.ssh.outputs.ssh_port }}
    steps:
      - name: 🐧 UBUNTU 24.04 SETUP
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║           🐧 UBUNTU 24.04 CORTEX ACTIVATED 🐧              ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          sudo apt update -qq
          sudo apt install -y -qq openssh-server
      
      - name: 👤 CREATE USER
        id: user
        run: |
          USERNAME="ubuntu24_$((RANDOM % 9000 + 1000))"
          PASSWORD="$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)"
          sudo useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo "$USERNAME"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
      
      - name: 🔌 CONFIGURE SSH
        id: ssh
        run: |
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          echo "ssh_port=22" >> $GITHUB_OUTPUT
      
      - name: ✅ STATUS
        id: status
        run: |
          echo "status=active" >> $GITHUB_OUTPUT

# =====================================================================================
#                    🐍 DEBIAN 12 CORTEX
# =====================================================================================

  debian_cortex:
    needs: [master_brain, windows_cortex, ubuntu22_cortex, ubuntu24_cortex]
    if: (github.event.inputs.target_os == 'auto' && needs.windows_cortex.outputs.status == 'failed' && needs.ubuntu22_cortex.outputs.status == 'failed' && needs.ubuntu24_cortex.outputs.status == 'failed') || github.event.inputs.target_os == 'debian'
    runs-on: ubuntu-latest
    container:
      image: debian:12
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      username: ${{ steps.user.outputs.username }}
      password: ${{ steps.user.outputs.password }}
      ssh_port: ${{ steps.ssh.outputs.ssh_port }}
    steps:
      - name: 🐍 DEBIAN 12 SETUP
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║            🐍 DEBIAN 12 CORTEX ACTIVATED 🐍                ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          apt update -qq
          apt install -y -qq openssh-server sudo
      
      - name: 👤 CREATE USER
        id: user
        run: |
          USERNAME="debian_$((RANDOM % 9000 + 1000))"
          PASSWORD="$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)"
          useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | chpasswd
          usermod -aG sudo "$USERNAME"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
      
      - name: 🔌 CONFIGURE SSH
        id: ssh
        run: |
          sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          service ssh restart
          echo "ssh_port=22" >> $GITHUB_OUTPUT
      
      - name: ✅ STATUS
        id: status
        run: |
          echo "status=active" >> $GITHUB_OUTPUT

# =====================================================================================
#                    📦 CENTOS 9 CORTEX
# =====================================================================================

  centos_cortex:
    needs: [master_brain, windows_cortex, ubuntu22_cortex, ubuntu24_cortex, debian_cortex]
    if: (github.event.inputs.target_os == 'auto' && needs.windows_cortex.outputs.status == 'failed' && needs.ubuntu22_cortex.outputs.status == 'failed' && needs.ubuntu24_cortex.outputs.status == 'failed' && needs.debian_cortex.outputs.status == 'failed') || github.event.inputs.target_os == 'centos'
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream9
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      username: ${{ steps.user.outputs.username }}
      password: ${{ steps.user.outputs.password }}
      ssh_port: ${{ steps.ssh.outputs.ssh_port }}
    steps:
      - name: 📦 CENTOS 9 SETUP
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║            📦 CENTOS 9 CORTEX ACTIVATED 📦                 ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          dnf install -y openssh-server sudo
      
      - name: 👤 CREATE USER
        id: user
        run: |
          USERNAME="centos_$((RANDOM % 9000 + 1000))"
          PASSWORD="$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)"
          useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | chpasswd
          usermod -aG wheel "$USERNAME"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
      
      - name: 🔌 CONFIGURE SSH
        id: ssh
        run: |
          sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          systemctl restart sshd
          echo "ssh_port=22" >> $GITHUB_OUTPUT
      
      - name: ✅ STATUS
        id: status
        run: |
          echo "status=active" >> $GITHUB_OUTPUT

# =====================================================================================
#                    🔷 ALMALINUX 9 CORTEX
# =====================================================================================

  almalinux_cortex:
    needs: [master_brain, windows_cortex, ubuntu22_cortex, ubuntu24_cortex, debian_cortex, centos_cortex]
    if: (github.event.inputs.target_os == 'auto' && needs.windows_cortex.outputs.status == 'failed' && needs.ubuntu22_cortex.outputs.status == 'failed' && needs.ubuntu24_cortex.outputs.status == 'failed' && needs.debian_cortex.outputs.status == 'failed' && needs.centos_cortex.outputs.status == 'failed') || github.event.inputs.target_os == 'almalinux'
    runs-on: ubuntu-latest
    container:
      image: almalinux:9
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      username: ${{ steps.user.outputs.username }}
      password: ${{ steps.user.outputs.password }}
      ssh_port: ${{ steps.ssh.outputs.ssh_port }}
    steps:
      - name: 🔷 ALMALINUX 9 SETUP
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║          🔷 ALMALINUX 9 CORTEX ACTIVATED 🔷                ║"
          echo "║              [FINAL FALLBACK WORKER]                        ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          dnf install -y openssh-server sudo
      
      - name: 👤 CREATE USER
        id: user
        run: |
          USERNAME="alma_$((RANDOM % 9000 + 1000))"
          PASSWORD="$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)"
          useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | chpasswd
          usermod -aG wheel "$USERNAME"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
      
      - name: 🔌 CONFIGURE SSH
        id: ssh
        run: |
          sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          systemctl restart sshd
          echo "ssh_port=22" >> $GITHUB_OUTPUT
      
      - name: ✅ STATUS
        id: status
        run: |
          echo "status=active" >> $GITHUB_OUTPUT

# =====================================================================================
#                    📡 CONTROL HUB - TELEGRAM NOTIFICATION
# =====================================================================================

  control_hub:
    needs: [master_brain, windows_cortex, ubuntu22_cortex, ubuntu24_cortex, debian_cortex, centos_cortex, almalinux_cortex]
    if: always() && github.event.inputs.telegram_notify == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 📡 SEND TELEGRAM NOTIFICATION
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="🧠 NEURAL MASTER SYSTEM v3.0"
          MSG="$MSG"$'\n'"━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          MSG="$MSG"$'\n'"🔑 Session ID: ${{ needs.master_brain.outputs.session_id }}"
          MSG="$MSG"$'\n'"⏱️ Duration: ${{ github.event.inputs.duration }}"
          MSG="$MSG"$'\n'"⏰ Termination: ${{ needs.master_brain.outputs.termination_time }}"
          MSG="$MSG"$'\n'"━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          if [ "${{ needs.windows_cortex.outputs.status }}" = "active" ]; then
            MSG="$MSG"$'\n\n'"🪟 WINDOWS 11 CORTEX"
            MSG="$MSG"$'\n'"━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            MSG="$MSG"$'\n'"🌐 IP: ${{ needs.windows_cortex.outputs.ip_address }}"
            MSG="$MSG"$'\n'"🔌 Port: ${{ needs.windows_cortex.outputs.rdp_port }}"
            MSG="$MSG"$'\n'"👤 User: ${{ needs.windows_cortex.outputs.username }}"
            MSG="$MSG"$'\n'"🔐 Pass: ${{ needs.windows_cortex.outputs.password }}"
            MSG="$MSG"$'\n'""
            MSG="$MSG"$'\n'"💻 Connect: Remote Desktop Connection"
            MSG="$MSG"$'\n'"   Enter: ${{ needs.windows_cortex.outputs.ip_address }}:3389"
          fi
          
          if [ "${{ needs.ubuntu22_cortex.outputs.status }}" = "active" ]; then
            MSG="$MSG"$'\n\n'"🐧 UBUNTU 22.04 CORTEX"
            MSG="$MSG"$'\n'"━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            MSG="$MSG"$'\n'"👤 User: ${{ needs.ubuntu22_cortex.outputs.username }}"
            MSG="$MSG"$'\n'"🔐 Pass: ${{ needs.ubuntu22_cortex.outputs.password }}"
            MSG="$MSG"$'\n'"🔌 SSH Port: ${{ needs.ubuntu22_cortex.outputs.ssh_port }}"
            MSG="$MSG"$'\n'""
            MSG="$MSG"$'\n'"💻 Connect: ssh ${{ needs.ubuntu22_cortex.outputs.username }}@<ip> -p 22"
          fi
          
          if [ "${{ needs.ubuntu24_cortex.outputs.status }}" = "active" ]; then
            MSG="$MSG"$'\n\n'"🐧 UBUNTU 24.04 CORTEX"
            MSG="$MSG"$'\n'"━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            MSG="$MSG"$'\n'"👤 User: ${{ needs.ubuntu24_cortex.outputs.username }}"
            MSG="$MSG"$'\n'"🔐 Pass: ${{ needs.ubuntu24_cortex.outputs.password }}"
            MSG="$MSG"$'\n'"🔌 SSH Port: ${{ needs.ubuntu24_cortex.outputs.ssh_port }}"
            MSG="$MSG"$'\n'""
            MSG="$MSG"$'\n'"💻 Connect: ssh ${{ needs.ubuntu24_cortex.outputs.username }}@<ip> -p 22"
          fi
          
          if [ "${{ needs.debian_cortex.outputs.status }}" = "active" ]; then
            MSG="$MSG"$'\n\n'"🐍 DEBIAN 12 CORTEX"
            MSG="$MSG"$'\n'"━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            MSG="$MSG"$'\n'"👤 User: ${{ needs.debian_cortex.outputs.username }}"
            MSG="$MSG"$'\n'"🔐 Pass: ${{ needs.debian_cortex.outputs.password }}"
            MSG="$MSG"$'\n'"🔌 SSH Port: ${{ needs.debian_cortex.outputs.ssh_port }}"
          fi
          
          if [ "${{ needs.centos_cortex.outputs.status }}" = "active" ]; then
            MSG="$MSG"$'\n\n'"📦 CENTOS 9 CORTEX"
            MSG="$MSG"$'\n'"━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            MSG="$MSG"$'\n'"👤 User: ${{ needs.centos_cortex.outputs.username }}"
            MSG="$MSG"$'\n'"🔐 Pass: ${{ needs.centos_cortex.outputs.password }}"
            MSG="$MSG"$'\n'"🔌 SSH Port: ${{ needs.centos_cortex.outputs.ssh_port }}"
          fi
          
          if [ "${{ needs.almalinux_cortex.outputs.status }}" = "active" ]; then
            MSG="$MSG"$'\n\n'"🔷 ALMALINUX 9 CORTEX"
            MSG="$MSG"$'\n'"━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            MSG="$MSG"$'\n'"👤 User: ${{ needs.almalinux_cortex.outputs.username }}"
            MSG="$MSG"$'\n'"🔐 Pass: ${{ needs.almalinux_cortex.outputs.password }}"
            MSG="$MSG"$'\n'"🔌 SSH Port: ${{ needs.almalinux_cortex.outputs.ssh_port }}"
          fi
          
          MSG="$MSG"$'\n\n'"━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          MSG="$MSG"$'\n'"🟢 Status: ACTIVE"
          MSG="$MSG"$'\n'"⚡ Performance: ${{ github.event.inputs.performance_mode }}"
          MSG="$MSG"$'\n'"✨ Neural Link Established"
          
          if [ -n "$BOT_TOKEN" ] && [ -n "$CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="$MSG" \
              -d parse_mode="Markdown" \
              -d disable_web_page_preview="true" > /dev/null 2>&1
            echo "Telegram sent"
          fi

# =====================================================================================
#                    ⏱️ RUNTIME MANAGER
# =====================================================================================

  runtime_manager:
    needs: [master_brain, windows_cortex, ubuntu22_cortex, ubuntu24_cortex, debian_cortex, centos_cortex, almalinux_cortex]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: ⏱️ KEEP ALIVE
        run: |
          DUR=${{ needs.master_brain.outputs.duration_minutes }}
          END=$(( $(date +%s) + DUR * 60 ))
          echo "Runtime active until: $(date -d @$END)"
          while [ $(date +%s) -lt $END ]; do
            sleep 60
          done
          echo "Runtime completed"

# =====================================================================================
#                    🧹 MEMORY PURGE
# =====================================================================================

  memory_purge:
    needs: [runtime_manager]
    if: always() && github.event.inputs.auto_cleanup == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🧹 CLEANUP
        run: |
          echo "Memory purge complete"
          echo "All neural data destroyed"
