      - name: Neural User Creation
        id: user
        run: |
          USERNAME="neural_$(shuf -i 1000-9999 -n 1)"
          PASSWORD=$(tr -dc 'A-Za-z0-9!@#$%&*' < /dev/urandom | head -c 24)
          
          sudo useradd -m -s /bin/bash $USERNAME
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo $USERNAME
          
          echo "::set-output name=username::$USERNAME"
          echo "::set-output name=password::$PASSWORD"
          echo "[SUCCESS] Neural User Created: $USERNAME" | tee -a /dev/stderr
      
      - name: Neural SSH Configuration
        id: ssh
        run: |
          SSH_PORT=$(shuf -i 2000-9000 -n 1)
          
          sudo apt update -qq
          sudo apt install -y -qq openssh-server
          
          sudo sed -i "s/^#Port 22/Port $SSH_PORT/" /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          
          sudo systemctl enable ssh
          sudo systemctl restart ssh
          
          echo "::set-output name=ssh_port::$SSH_PORT"
          echo "[SUCCESS] SSH Port Configured: $SSH_PORT" | tee -a /dev/stderr
      
      - name: Neural Cloudflare Tunnel
        id: cloudflare
        if: github.event.inputs.network_type == 'cloudflare'
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O /tmp/cloudflared
          chmod +x /tmp/cloudflared
          
          /tmp/cloudflared tunnel --url ssh://localhost:${{ steps.ssh.outputs.ssh_port }} > /tmp/tunnel.log 2>&1 &
          
          sleep 8
          TUNNEL_URL=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)
          
          if [ -n "$TUNNEL_URL" ]; then
            echo "::set-output name=cloudflare_url::$TUNNEL_URL"
            echo "[SUCCESS] Cloudflare Tunnel: $TUNNEL_URL" | tee -a /dev/stderr
          fi
      
      - name: Ubuntu 24.04 Cortex Status
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════╗"
          echo "║     ✅ UBUNTU 24.04 CORTEX - FULLY OPERATIONAL                      ║"
          echo "╚════════════════════════════════════════════════════════════════════╝"
          echo ""

  # ================= SUB BRAIN 4: DEBIAN 12 CORTEX =================
  debian_cortex:
    needs: [main_brain]
    if: github.event.inputs.debian_enabled == 'true'
    runs-on: ubuntu-latest
    container:
      image: debian:12
    timeout-minutes: 360
    outputs:
      username: ${{ steps.user.outputs.username }}
      password: ${{ steps.user.outputs.password }}
      ssh_port: ${{ steps.ssh.outputs.ssh_port }}
    
    steps:
      - name: Neural Awakening - Debian 12 Cortex
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════╗"
          echo "║     🔷 DEBIAN 12 CORTEX - SUB BRAIN 4 - INITIALIZING              ║"
          echo "╚════════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "[INFO] OS Version: Debian 12 (Bookworm)" | tee -a /dev/stderr
      
      - name: Neural System Update
        run: |
          apt update -qq
          apt install -y -qq openssh-server sudo curl wget procps
      
      - name: Neural User Creation
        id: user
        run: |
          USERNAME="neural_$(shuf -i 1000-9999 -n 1)"
          PASSWORD=$(tr -dc 'A-Za-z0-9!@#$%&*' < /dev/urandom | head -c 24)
          
          useradd -m -s /bin/bash $USERNAME
          echo "$USERNAME:$PASSWORD" | chpasswd
          usermod -aG sudo $USERNAME
          
          echo "::set-output name=username::$USERNAME"
          echo "::set-output name=password::$PASSWORD"
          echo "[SUCCESS] Neural User Created: $USERNAME" | tee -a /dev/stderr
      
      - name: Neural SSH Configuration
        id: ssh
        run: |
          SSH_PORT=$(shuf -i 2000-9000 -n 1)
          
          sed -i "s/^#Port 22/Port $SSH_PORT/" /etc/ssh/sshd_config
          sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          
          service ssh restart
          
          echo "::set-output name=ssh_port::$SSH_PORT"
