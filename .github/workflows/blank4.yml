          Write-Host "║    ║     2. Enter Neural IP: ${{ env.NEURAL_IP }}                                                ║ ║" -ForegroundColor Green
          Write-Host "║    ║     3. Identity: ${{ env.NEURAL_USERNAME }}                                                 ║ ║" -ForegroundColor Green
          Write-Host "║    ║     4. Quantum Key: $password                                    ║ ║" -ForegroundColor Green
          Write-Host "║    ║     5. Click Connect → Neural Link Established                                        ║ ║" -ForegroundColor Green
          Write-Host "║    ║                                                                                      ║ ║" -ForegroundColor Green
