          $frames = @('🧠', '⚡', '🔮', '🌀', '🌌', '✨', '💫', '🌟')
          $i = 0
          
          do {
            $currentTime = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
            $remaining = $endTime - $currentTime
            
            if ($remaining.TotalSeconds -le 0) { break }
            
            $hours = [math]::Max(0, [math]::Floor($remaining.TotalHours))
            $minutes = [math]::Max(0, [math]::Floor($remaining.TotalMinutes % 60))
            $seconds = [math]::Max(0, [math]::Floor($remaining.TotalSeconds % 60))
            
            $frame = $frames[$i % $frames.Length]
            $cpuUsage = (Get-Counter '\Processor(_Total)\% Processor Time' -ErrorAction SilentlyContinue).CounterSamples.CookedValue
            $ramAvailable = (Get-Counter '\Memory\Available MBytes' -ErrorAction SilentlyContinue).CounterSamples.CookedValue
            
            if ($cpuUsage -and $ramAvailable) {
              Write-Host "`r$frame [$($currentTime.ToString('HH:mm:ss'))] Quantum Processing: $hours`h $minutes`m $seconds`s | CPU: $([math]::Round($cpuUsage,1))% | RAM Available: $ramAvailable MB" -NoNewline -ForegroundColor Cyan
            } else {
              Write-Host "`r$frame [$($currentTime.ToString('HH:mm:ss'))] Quantum Processing: $hours`h $minutes`m $seconds`s remaining" -NoNewline -ForegroundColor Cyan
            }
            
            $i++
            Start-Sleep -Seconds 5
          } while ($remaining.TotalSeconds -gt 0)
          
