function Test-SystemRequirements {
    Write-Step -Title "System Check" -Icon "рџ”Ќ"
    
    $checks = @(
        @{Name = "Root Privileges"; Test = { (id -u) -eq 0 }}
        @{Name = "Internet Connection"; Test = { Test-Connection -ComputerName "1.1.1.1" -Count 1 -Quiet }}
        @{Name = "Linux Environment"; Test = { $IsLinux }}
        @{Name = "Sudo Available"; Test = { Get-Command sudo -ErrorAction SilentlyContinue }}
    )
    
    $failed = 0
    foreach ($check in $checks) {
        $result = & $check.Test
        if ($result) {
            Write-Success "$($check.Name) вњ“"
        } else {
            Write-Error "$($check.Name) вњ—"
            $failed++
        }
    }
    
    if ($failed -gt 0) {
        Write-Error "System requirements not met. Aborting."
        exit 1
    }
    
    Write-Success "All system requirements satisfied"
}

function Update-System {
    Write-Step -Title "System Update" -Icon "рџ”„"
    
    try {
        Write-Info "Updating package lists..."
        sudo apt-get update -y 2>&1 | Out-Null
        
        Write-Info "Upgrading packages..."
        sudo apt-get upgrade -y 2>&1 | Out-Null
        
        Write-Info "Installing essential packages..."
        $packages = @("ufw", "curl", "wget", "git", "htop", "nano", "unzip")
        foreach ($pkg in $packages) {
            Write-Info "  в†’ Installing: $pkg"
            sudo apt-get install -y $pkg 2>&1 | Out-Null
        }
        
        Write-Success "System updated successfully"
    }
    catch {
        Write-Error "System update failed: $_"
        exit 1
    }
}

function Configure-Firewall {
    Write-Step -Title "Firewall Configuration" -Icon "рџ›ЎпёЏ"
    
    try {
        Write-Info "Enabling UFW..."
        sudo ufw --force enable
        
        $rules = @(
            @{Port = "22"; Proto = "tcp"; Desc = "SSH"}
            @{Port = "80"; Proto = "tcp"; Desc = "HTTP"}
            @{Port = "443"; Proto = "tcp"; Desc = "HTTPS"}
            @{Port = "27015"; Proto = "udp"; Desc = "Game Server"}
        )
        
        foreach ($rule in $rules) {
            Write-Info "  в†’ Adding rule: $($rule.Desc) - $($rule.Port)/$($rule.Proto)"
            sudo ufw allow $($rule.Port)/$($rule.Proto) comment $($rule.Desc)
        }
        
        Write-Info "Firewall status:"
        sudo ufw status verbose
        
        Write-Success "Firewall configured successfully"
    }
    catch {
        Write-Error "Firewall configuration failed: $_"
        exit 1
    }
}

