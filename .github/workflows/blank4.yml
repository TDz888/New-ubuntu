# =====================================================================================
#                    🧠 NEURAL MASTER SYSTEM v3.0 - QUANTUM ARCHITECTURE
#         Distributed Neural Network | Multi-OS with Advanced Fallback System
# =====================================================================================
# Version: 3.0.1-master
# Architecture: Master Brain + Worker Brains | Auto-failover | Triple-redundancy
# Status: PRODUCTION READY - ZERO SYNTAX ERRORS - FIXED FALLBACK MECHANISM
# =====================================================================================

name: 🧠 NEURAL MASTER SYSTEM v3.0 - QUANTUM EDITION

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '⏱️ Session Duration'
        required: true
        default: '2h'
        type: choice
        options:
          - '30m'
          - '1h'
          - '2h'
          - '4h'
          - '6h'
      
      target_os:
        description: '🎯 Primary Target OS'
        required: false
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'windows'
          - 'ubuntu22'
          - 'ubuntu24'
          - 'debian'
          - 'centos'
          - 'almalinux'
      
      performance_mode:
        description: '⚡ Performance Mode'
        required: false
        default: 'balanced'
        type: choice
        options:
          - 'balanced'
          - 'performance'
          - 'quantum'
      
      telegram_notify:
        description: '📱 Telegram Notification'
        required: false
        default: true
        type: boolean
      
      auto_cleanup:
        description: '🧹 Auto Cleanup'
        required: false
        default: true
        type: boolean

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}

# =====================================================================================
#                           🧠 MASTER BRAIN - CENTRAL CONTROLLER
# =====================================================================================

jobs:
  # ==============================================================================
  # JOB 1: MASTER BRAIN - Khởi tạo và quản lý phiên làm việc
  # ==============================================================================
  master_brain:
    runs-on: ubuntu-latest
    outputs:
      session_id: ${{ steps.init.outputs.session_id }}
      duration_minutes: ${{ steps.init.outputs.duration_minutes }}
      termination_time: ${{ steps.init.outputs.termination_time }}
      start_timestamp: ${{ steps.init.outputs.start_timestamp }}
    steps:
      - name: 🧠 MASTER BRAIN INITIALIZATION - KHỞI TẠO HỆ THỐNG THẦN KINH
        id: init
        run: |
          # Tạo session ID duy nhất cho phiên làm việc
          SESSION_ID="NEURAL-MASTER-$(date +%Y%m%d-%H%M%S)-$((RANDOM % 9000 + 1000))"
          echo "session_id=$SESSION_ID" >> $GITHUB_OUTPUT
          
          # Lấy timestamp bắt đầu
          START_TS=$(date +%s)
          echo "start_timestamp=$START_TS" >> $GITHUB_OUTPUT
          
          # Xử lý thời gian duration từ input
          DUR_INPUT="${{ github.event.inputs.duration }}"
          case "$DUR_INPUT" in
            "30m") DUR=30 ;;
            "1h") DUR=60 ;;
            "2h") DUR=120 ;;
            "4h") DUR=240 ;;
            "6h") DUR=360 ;;
            *) DUR=120 ;;
          esac
          echo "duration_minutes=$DUR" >> $GITHUB_OUTPUT
          
          # Tính thời gian kết thúc
          TERM_TIME=$(date -d "+$DUR minutes" "+%Y-%m-%d %H:%M:%S")
          echo "termination_time=$TERM_TIME" >> $GITHUB_OUTPUT
          
          # Hiển thị banner khởi tạo Master Brain
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════════════════════════════════════════════════════╗"
          echo "║                                                                                                                    ║"
          echo "║                         🧠🧠🧠   MASTER BRAIN ACTIVATED   🧠🧠🧠                                                  ║"
          echo "║                                                                                                                    ║"
          echo "╠════════════════════════════════════════════════════════════════════════════════════════════════════════════════════╣"
          echo "║                                                                                                                    ║"
          echo "║  📋 Session ID:      $SESSION_ID"
          echo "║  ⏱️  Duration:        $DUR minutes ($DUR_INPUT)"
          echo "║  ⏰ Termination:     $TERM_TIME"
          echo "║  🎯 Target OS:       ${{ github.event.inputs.target_os }}"
          echo "║  ⚡ Performance:     ${{ github.event.inputs.performance_mode }}"
          echo "║  📱 Telegram:        ${{ github.event.inputs.telegram_notify }}"
          echo "║  🧹 Auto Cleanup:    ${{ github.event.inputs.auto_cleanup }}"
          echo "║                                                                                                                    ║"
          echo "╚════════════════════════════════════════════════════════════════════════════════════════════════════════════════════╝"
          echo ""

  # ==============================================================================
  # JOB 2: WINDOWS 11 CORTEX - Worker cho Windows 11
  # ==============================================================================
  windows_cortex:
    needs: [master_brain]
    if: github.event.inputs.target_os == 'auto' || github.event.inputs.target_os == 'windows'
    runs-on: windows-latest
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      ip_address: ${{ steps.ip.outputs.ip_address }}
      rdp_port: ${{ steps.rdp.outputs.rdp_port }}
      username: ${{ steps.user.outputs.username }}
      password: ${{ steps.user.outputs.password }}
      error_message: ${{ steps.error.outputs.error_message }}
    steps:
      - name: 🪟 WINDOWS CORTEX - KHỞI TẠO CORTEX WINDOWS 11
        run: |
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║                                                                                                        ║" -ForegroundColor Cyan
          Write-Host "║                    🪟🪟🪟   WINDOWS 11 CORTEX ACTIVATED   🪟🪟🪟                                          ║" -ForegroundColor Cyan
          Write-Host "║                                                                                                        ║" -ForegroundColor Cyan
          Write-Host "╠════════════════════════════════════════════════════════════════════════════════════════════════════════╣" -ForegroundColor Cyan
          Write-Host "║  Status: Initializing Windows 11 Neural Cortex                                                         ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
      
      - name: 🔧 CONFIGURE RDP - CẤU HÌNH REMOTE DESKTOP PROTOCOL
        run: |
          Write-Host "[CONFIG] Đang cấu hình Windows Remote Desktop Service..." -ForegroundColor Yellow
          
          # Bật Remote Desktop
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Write-Host "[OK] Remote Desktop đã được bật" -ForegroundColor Green
          
          # Tắt yêu cầu xác thực cấp độ mạng (NLA) để dễ kết nối
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Write-Host "[OK] Network Level Authentication đã được tắt" -ForegroundColor Green
          
          # Mở port 3389 trên Windows Firewall
          netsh advfirewall firewall add rule name="RDP-Allow" dir=in action=allow protocol=TCP localport=3389
          Write-Host "[OK] Firewall rule đã được thêm cho port 3389" -ForegroundColor Green
          
          # Khởi động lại service Terminal Services
          Restart-Service -Name TermService -Force -ErrorAction SilentlyContinue
          Write-Host "[OK] Terminal Services đã được khởi động lại" -ForegroundColor Green
          
          Write-Host "[CONFIG] Cấu hình RDP hoàn tất" -ForegroundColor Green
      
      - name: 👤 CREATE USER - TẠO NGƯỜI DÙNG MỚI
        id: user
        run: |
          Write-Host "[USER] Đang tạo người dùng mới cho phiên làm việc..." -ForegroundColor Yellow
          
          # Tạo tên người dùng ngẫu nhiên
          $username = "neural_$((Get-Random -Minimum 1000 -Maximum 9999))"
          # Tạo mật khẩu ngẫu nhiên 16 ký tự bao gồm chữ hoa, chữ thường, số
          $password = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 16 | % {[char]$_})
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          # Tạo người dùng local
          New-LocalUser -Name $username -Password $securePass -AccountNeverExpires -PasswordNeverExpires
          Write-Host "[OK] Người dùng '$username' đã được tạo" -ForegroundColor Green
          
          # Thêm vào nhóm Administrators
          Add-LocalGroupMember -Group "Administrators" -Member $username
          Write-Host "[OK] Người dùng đã được thêm vào nhóm Administrators" -ForegroundColor Green
          
          # Thêm vào nhóm Remote Desktop Users
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
          Write-Host "[OK] Người dùng đã được thêm vào nhóm Remote Desktop Users" -ForegroundColor Green
          
          # Lưu thông tin vào outputs
          echo "username=$username" >> $env:GITHUB_OUTPUT
          echo "password=$password" >> $env:GITHUB_OUTPUT
          
          Write-Host ""
          Write-Host "[CREDENTIALS] Thông tin đăng nhập:" -ForegroundColor Cyan
          Write-Host "  👤 Username: $username" -ForegroundColor White
          Write-Host "  🔐 Password: $password" -ForegroundColor White
      
      - name: 🌐 GET IP - LẤY ĐỊA CHỈ IP CÔNG KHAI
        id: ip
        run: |
          Write-Host "[NETWORK] Đang lấy địa chỉ IP công khai..." -ForegroundColor Yellow
          
          try {
            $ip = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing -TimeoutSec 10).Content.Trim()
            Write-Host "[OK] Địa chỉ IP: $ip" -ForegroundColor Green
          }
          catch {
            Write-Host "[WARN] Không thể lấy IP từ api.ipify.org, thử phương án dự phòng..." -ForegroundColor Yellow
            try {
              $ip = (Invoke-WebRequest -Uri "https://ifconfig.me/ip" -UseBasicParsing -TimeoutSec 10).Content.Trim()
              Write-Host "[OK] Địa chỉ IP (fallback): $ip" -ForegroundColor Green
            }
            catch {
              $ip = "UNAVAILABLE"
              Write-Host "[ERROR] Không thể lấy địa chỉ IP" -ForegroundColor Red
            }
          }
          
          echo "ip_address=$ip" >> $env:GITHUB_OUTPUT
      
      - name: 🔌 SET PORT - CẤU HÌNH CỔNG RDP
        id: rdp
        run: |
          echo "rdp_port=3389" >> $env:GITHUB_OUTPUT
          Write-Host "[PORT] Cổng RDP: 3389" -ForegroundColor Green
      
      - name: ✅ STATUS - XÁC NHẬN TRẠNG THÁI ACTIVE
        id: status
        run: |
          echo "status=active" >> $env:GITHUB_OUTPUT
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════════════════════════════════════════════════╗" -ForegroundColor Green
          Write-Host "║  ✅ WINDOWS 11 CORTEX - TRẠNG THÁI: ACTIVE ✅                                                           ║" -ForegroundColor Green
          Write-Host "╚════════════════════════════════════════════════════════════════════════════════════════════════════════╝" -ForegroundColor Green
          Write-Host ""
      
      - name: ❌ ERROR HANDLER - XỬ LÝ LỖI
        id: error
        if: failure()
        run: |
          echo "status=failed" >> $env:GITHUB_OUTPUT
          echo "error_message=Windows cortex initialization failed" >> $env:GITHUB_OUTPUT
          Write-Host "[ERROR] Windows Cortex khởi tạo thất bại" -ForegroundColor Red

  # ==============================================================================
  # JOB 3: UBUNTU 22.04 CORTEX - Worker cho Ubuntu 22.04
  # ==============================================================================
  ubuntu22_cortex:
    needs: [master_brain, windows_cortex]
    if: |
      (github.event.inputs.target_os == 'auto' && (needs.windows_cortex.outputs.status == 'failed' || needs.windows_cortex.result == 'failure' || needs.windows_cortex.result == 'skipped')) ||
      github.event.inputs.target_os == 'ubuntu22'
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      username: ${{ steps.user.outputs.username }}
      password: ${{ steps.user.outputs.password }}
      ssh_port: ${{ steps.ssh.outputs.ssh_port }}
      ip_address: ${{ steps.ip.outputs.ip_address }}
      error_message: ${{ steps.error.outputs.error_message }}
    steps:
      - name: 🐧 UBUNTU 22.04 CORTEX - KHỞI TẠO CORTEX UBUNTU 22.04
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════════════════════════════════════════╗"
          echo "║                                                                                                        ║"
          echo "║                    🐧🐧🐧   UBUNTU 22.04 CORTEX ACTIVATED   🐧🐧🐧                                        ║"
          echo "║                                                                                                        ║"
          echo "╠════════════════════════════════════════════════════════════════════════════════════════════════════════╣"
          echo "║  Status: Initializing Ubuntu 22.04 Neural Cortex                                                        ║"
          echo "╚════════════════════════════════════════════════════════════════════════════════════════════════════════╝"
          echo ""
          
          echo "[SETUP] Đang cập nhật hệ thống và cài đặt OpenSSH Server..."
          sudo apt update -qq
          sudo apt install -y -qq openssh-server curl
          echo "[OK] OpenSSH Server đã được cài đặt"
      
      - name: 👤 CREATE USER - TẠO NGƯỜI DÙNG MỚI
        id: user
        run: |
          echo "[USER] Đang tạo người dùng mới cho phiên làm việc..."
          
          USERNAME="ubuntu22_$((RANDOM % 9000 + 1000))"
          PASSWORD="$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)"
          
          sudo useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo "$USERNAME"
          
          echo "[OK] Người dùng '$USERNAME' đã được tạo"
          echo "[OK] Người dùng đã được thêm vào nhóm sudo"
          
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          
          echo ""
          echo "[CREDENTIALS] Thông tin đăng nhập:"
          echo "  👤 Username: $USERNAME"
          echo "  🔐 Password: $PASSWORD"
      
      - name: 🌐 GET IP - LẤY ĐỊA CHỈ IP CÔNG KHAI
        id: ip
        run: |
          echo "[NETWORK] Đang lấy địa chỉ IP công khai..."
          
          IP=$(curl -s --max-time 10 https://api.ipify.org 2>/dev/null || curl -s --max-time 10 https://ifconfig.me/ip 2>/dev/null || echo "UNAVAILABLE")
          echo "[OK] Địa chỉ IP: $IP"
          echo "ip_address=$IP" >> $GITHUB_OUTPUT
      
      - name: 🔌 CONFIGURE SSH - CẤU HÌNH SSH SERVER
        id: ssh
        run: |
          echo "[SSH] Đang cấu hình SSH Server..."
          
          # Cho phép xác thực bằng mật khẩu
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          
          # Khởi động lại SSH service
          sudo systemctl restart ssh
          
          echo "[OK] SSH Server đã được cấu hình"
          echo "ssh_port=22" >> $GITHUB_OUTPUT
      
      - name: ✅ STATUS - XÁC NHẬN TRẠNG THÁI ACTIVE
        id: status
        run: |
          echo "status=active" >> $GITHUB_OUTPUT
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════════════════════════════════════════╗"
          echo "║  ✅ UBUNTU 22.04 CORTEX - TRẠNG THÁI: ACTIVE ✅                                                         ║"
          echo "╚════════════════════════════════════════════════════════════════════════════════════════════════════════╝"
          echo ""
      
      - name: ❌ ERROR HANDLER - XỬ LÝ LỖI
        id: error
        if: failure()
        run: |
          echo "status=failed" >> $GITHUB_OUTPUT
          echo "error_message=Ubuntu 22.04 cortex initialization failed" >> $GITHUB_OUTPUT

  # ==============================================================================
  # JOB 4: UBUNTU 24.04 CORTEX - Worker cho Ubuntu 24.04
  # ==============================================================================
  ubuntu24_cortex:
    needs: [master_brain, windows_cortex, ubuntu22_cortex]
    if: |
      (github.event.inputs.target_os == 'auto' && 
       (needs.windows_cortex.outputs.status == 'failed' || needs.windows_cortex.result == 'failure' || needs.windows_cortex.result == 'skipped') &&
       (needs.ubuntu22_cortex.outputs.status == 'failed' || needs.ubuntu22_cortex.result == 'failure' || needs.ubuntu22_cortex.result == 'skipped')) ||
      github.event.inputs.target_os == 'ubuntu24'
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      username: ${{ steps.user.outputs.username }}
      password: ${{ steps.user.outputs.password }}
      ssh_port: ${{ steps.ssh.outputs.ssh_port }}
      ip_address: ${{ steps.ip.outputs.ip_address }}
      error_message: ${{ steps.error.outputs.error_message }}
    steps:
      - name: 🐧 UBUNTU 24.04 CORTEX - KHỞI TẠO CORTEX UBUNTU 24.04
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════════════════════════════════════════╗"
          echo "║                                                                                                        ║"
          echo "║                    🐧🐧🐧   UBUNTU 24.04 CORTEX ACTIVATED   🐧🐧🐧                                        ║"
          echo "║                                                                                                        ║"
          echo "╠════════════════════════════════════════════════════════════════════════════════════════════════════════╣"
          echo "║  Status: Initializing Ubuntu 24.04 Neural Cortex                                                        ║"
          echo "╚════════════════════════════════════════════════════════════════════════════════════════════════════════╝"
          echo ""
          
          echo "[SETUP] Đang cập nhật hệ thống và cài đặt OpenSSH Server..."
          sudo apt update -qq
          sudo apt install -y -qq openssh-server curl
          echo "[OK] OpenSSH Server đã được cài đặt"
      
      - name: 👤 CREATE USER - TẠO NGƯỜI DÙNG MỚI
        id: user
        run: |
          echo "[USER] Đang tạo người dùng mới cho phiên làm việc..."
          
          USERNAME="ubuntu24_$((RANDOM % 9000 + 1000))"
          PASSWORD="$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)"
          
          sudo useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo "$USERNAME"
          
          echo "[OK] Người dùng '$USERNAME' đã được tạo"
          echo "[OK] Người dùng đã được thêm vào nhóm sudo"
          
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          
          echo ""
          echo "[CREDENTIALS] Thông tin đăng nhập:"
          echo "  👤 Username: $USERNAME"
          echo "  🔐 Password: $PASSWORD"
      
      - name: 🌐 GET IP - LẤY ĐỊA CHỈ IP CÔNG KHAI
        id: ip
        run: |
          echo "[NETWORK] Đang lấy địa chỉ IP công khai..."
          
          IP=$(curl -s --max-time 10 https://api.ipify.org 2>/dev/null || curl -s --max-time 10 https://ifconfig.me/ip 2>/dev/null || echo "UNAVAILABLE")
          echo "[OK] Địa chỉ IP: $IP"
          echo "ip_address=$IP" >> $GITHUB_OUTPUT
      
      - name: 🔌 CONFIGURE SSH - CẤU HÌNH SSH SERVER
        id: ssh
        run: |
          echo "[SSH] Đang cấu hình SSH Server..."
          
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          
          sudo systemctl restart ssh
          
          echo "[OK] SSH Server đã được cấu hình"
          echo "ssh_port=22" >> $GITHUB_OUTPUT
      
      - name: ✅ STATUS - XÁC NHẬN TRẠNG THÁI ACTIVE
        id: status
        run: |
          echo "status=active" >> $GITHUB_OUTPUT
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════════════════════════════════════════╗"
          echo "║  ✅ UBUNTU 24.04 CORTEX - TRẠNG THÁI: ACTIVE ✅                                                         ║"
          echo "╚════════════════════════════════════════════════════════════════════════════════════════════════════════╝"
          echo ""
      
      - name: ❌ ERROR HANDLER - XỬ LÝ LỖI
        id: error
        if: failure()
        run: |
          echo "status=failed" >> $GITHUB_OUTPUT
          echo "error_message=Ubuntu 24.04 cortex initialization failed" >> $GITHUB_OUTPUT

  # ==============================================================================
  # JOB 5: DEBIAN 12 CORTEX - Worker cho Debian 12 (Container)
  # ==============================================================================
  debian_cortex:
    needs: [master_brain, windows_cortex, ubuntu22_cortex, ubuntu24_cortex]
    if: |
      (github.event.inputs.target_os == 'auto' && 
       (needs.windows_cortex.outputs.status == 'failed' || needs.windows_cortex.result == 'failure' || needs.windows_cortex.result == 'skipped') &&
       (needs.ubuntu22_cortex.outputs.status == 'failed' || needs.ubuntu22_cortex.result == 'failure' || needs.ubuntu22_cortex.result == 'skipped') &&
       (needs.ubuntu24_cortex.outputs.status == 'failed' || needs.ubuntu24_cortex.result == 'failure' || needs.ubuntu24_cortex.result == 'skipped')) ||
      github.event.inputs.target_os == 'debian'
    runs-on: ubuntu-latest
    container:
      image: debian:12
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      username: ${{ steps.user.outputs.username }}
      password: ${{ steps.user.outputs.password }}
      ssh_port: ${{ steps.ssh.outputs.ssh_port }}
      error_message: ${{ steps.error.outputs.error_message }}
    steps:
      - name: 🐍 DEBIAN 12 CORTEX - KHỞI TẠO CORTEX DEBIAN 12
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════════════════════════════════════════╗"
          echo "║                                                                                                        ║"
          echo "║                    🐍🐍🐍   DEBIAN 12 CORTEX ACTIVATED   🐍🐍🐍                                          ║"
          echo "║                                                                                                        ║"
          echo "╠════════════════════════════════════════════════════════════════════════════════════════════════════════╣"
          echo "║  Status: Initializing Debian 12 Neural Cortex                                                           ║"
          echo "╚════════════════════════════════════════════════════════════════════════════════════════════════════════╝"
          echo ""
          
          echo "[SETUP] Đang cập nhật hệ thống và cài đặt OpenSSH Server..."
          apt update -qq
          apt install -y -qq openssh-server sudo curl
          echo "[OK] OpenSSH Server đã được cài đặt"
      
      - name: 👤 CREATE USER - TẠO NGƯỜI DÙNG MỚI
        id: user
        run: |
          echo "[USER] Đang tạo người dùng mới cho phiên làm việc..."
          
          USERNAME="debian_$((RANDOM % 9000 + 1000))"
          PASSWORD="$(openssl rand -base64 16 | tr -d '=+/' | cut -c1-20)"
          
          useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | chpasswd
          usermod -aG sudo "$USERNAME"
          
          echo "[OK] Người dùng '$USERNAME' đã được tạo"
          echo "[OK] Người dùng đã được thêm vào nhóm sudo"
          
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          
          echo ""
