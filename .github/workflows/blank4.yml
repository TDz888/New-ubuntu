name: 🚀 VPS CREATOR PRO

on:
  workflow_dispatch:
    inputs:
      os_type:
        description: 🖥️ Operating System
        required: true
        default: windows11
        type: choice
        options:
          - windows11
          - windows10
          - ubuntu-server
      username:
        description: 👤 Username
        required: true
        default: vpsuser
      password:
        description: 🔑 Password
        required: true
        default: Vps123456
      region:
        description: 🌍 Region
        required: true
        default: us
        type: choice
        options:
          - us
          - eu
          - asia
      instances:
        description: 🔢 Number of VPS (1-3)
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
      wallpaper_url:
        description: 🖼️ Wallpaper URL (Windows only)
        required: false
        default: ''
      duration:
        description: ⏱️ Hours
        required: true
        default: '6'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
          - '6'
      telegram_notify:
        description: 📱 Telegram Notification
        required: true
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

jobs:
  create-vps:
    runs-on: ${{ github.event.inputs.os_type == 'ubuntu-server' && 'ubuntu-latest' || 'windows-latest' }}
    timeout-minutes: 360
    strategy:
      matrix:
        instance: [1, 2, 3]
      max-parallel: 3
    steps:
      - name: Check instance count
        if: github.event.inputs.instances < matrix.instance
        run: exit 0
        shell: pwsh

      - name: System Init
        shell: ${{ github.event.inputs.os_type == 'ubuntu-server' && 'bash' || 'pwsh' }}
        run: |
          if [ "${{ github.event.inputs.os_type }}" = "ubuntu-server" ]; then
            echo ""
            echo "╔══════════════════════════════════════════════════════════════╗"
            echo "║          🐧⚡ UBUNTU SERVER - INSTANCE ${{ matrix.instance }} 🐧⚡            ║"
            echo "╚══════════════════════════════════════════════════════════════╝"
            echo ""
            echo "  🌍 Region     : ${{ github.event.inputs.region }}"
            echo "  👤 Username   : ${{ github.event.inputs.username }}"
            echo "  ⏱️  Duration   : ${{ github.event.inputs.duration }} hours"
            echo "  📱 Telegram   : ${{ github.event.inputs.telegram_notify }}"
            echo ""
          else
            $os = "${{ github.event.inputs.os_type }}"
            if ($os -eq "windows11") { $icon = "🪟✨"; $name = "WINDOWS 11 PRO" }
            else { $icon = "🪟"; $name = "WINDOWS 10 PRO" }
            Write-Host ""
            Write-Host "╔══════════════════════════════════════════════════════════════╗"
            Write-Host "║          $icon $name - INSTANCE ${{ matrix.instance }} $icon               ║"
            Write-Host "╚══════════════════════════════════════════════════════════════╝"
            Write-Host ""
            Write-Host "  🌍 Region     : ${{ github.event.inputs.region }}"
            Write-Host "  👤 Username   : ${{ github.event.inputs.username }}"
            Write-Host "  ⏱️  Duration   : ${{ github.event.inputs.duration }} hours"
            Write-Host "  📱 Telegram   : ${{ github.event.inputs.telegram_notify }}"
            Write-Host ""
          fi

      - name: Configure Services
        shell: ${{ github.event.inputs.os_type == 'ubuntu-server' && 'bash' || 'pwsh' }}
        run: |
          if [ "${{ github.event.inputs.os_type }}" = "ubuntu-server" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq openssh-server
            sudo systemctl enable ssh
            sudo systemctl start ssh
          else
            Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
            Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
            netsh advfirewall firewall add rule name="RDP-In" dir=in action=allow protocol=TCP localport=3389
            Set-Service -Name TermService -StartupType Automatic
            Start-Service -Name TermService
          fi

      - name: Create User
        shell: ${{ github.event.inputs.os_type == 'ubuntu-server' && 'bash' || 'pwsh' }}
        run: |
          if [ "${{ github.event.inputs.os_type }}" = "ubuntu-server" ]; then
            sudo useradd -m -s /bin/bash "${{ github.event.inputs.username }}" 2>/dev/null || true
            echo "${{ github.event.inputs.username}}:${{ github.event.inputs.password}}" | sudo chpasswd
            sudo usermod -aG sudo "${{ github.event.inputs.username }}"
            echo "${{ github.event.inputs.password}}" > /tmp/pass.txt
          else
            $u = "${{ github.event.inputs.username }}"
            $p = "${{ github.event.inputs.password }}"
            $sec = ConvertTo-SecureString $p -AsPlainText -Force
            try { Remove-LocalUser -Name $u -ErrorAction SilentlyContinue } catch {}
            New-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member $u
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u
            Enable-LocalUser -Name $u
            $p | Out-File -FilePath $env:TEMP\pass.txt
          fi

      - name: Wallpaper
        if: github.event.inputs.os_type != 'ubuntu-server' && github.event.inputs.wallpaper_url != ''
        shell: pwsh
        run: |
          $url = "${{ github.event.inputs.wallpaper_url }}"
          $img = "$env:TEMP\wall.jpg"
          Invoke-WebRequest -Uri $url -OutFile $img
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name Wallpaper -Value $img
          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name WallpaperStyle -Value 2

      - name: Screenshot
        if: github.event.inputs.os_type != 'ubuntu-server'
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Windows.Forms,System.Drawing
          $bmp = New-Object System.Drawing.Bitmap ([System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Width), ([System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Height)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.CopyFromScreen(0, 0, 0, 0, $bmp.Size)
          $bmp.Save("$env:TEMP\screen.png")
          $g.Dispose(); $bmp.Dispose()

      - name: Install Tailscale
        shell: ${{ github.event.inputs.os_type == 'ubuntu-server' && 'bash' || 'pwsh' }}
        env:
          KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          if [ "${{ github.event.inputs.os_type }}" = "ubuntu-server" ]; then
            curl -fsSL https://tailscale.com/install.sh | sh > /dev/null 2>&1
          else
            $msi = "$env:TEMP\ts.msi"
            Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msi
            Start-Process msiexec.exe -ArgumentList "/i", "`"$msi`"", "/quiet", "/norestart" -Wait
            Remove-Item $msi -Force
          fi

      - name: Connect Tailscale
        shell: ${{ github.event.inputs.os_type == 'ubuntu-server' && 'bash' || 'pwsh' }}
        env:
          KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          if [ "${{ github.event.inputs.os_type }}" = "ubuntu-server" ]; then
            sudo tailscale up --auth-key="$KEY" --hostname="vps-${{ matrix.instance }}"
            sleep 5
            echo "IP=$(sudo tailscale ip -4)" >> $GITHUB_ENV
          else
            & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:KEY --hostname="vps-${{ matrix.instance }}"
            Start-Sleep -Seconds 5
            $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
            echo "IP=$ip" >> $env:GITHUB_ENV
          fi

      - name: Benchmark
        shell: ${{ github.event.inputs.os_type == 'ubuntu-server' && 'bash' || 'pwsh' }}
        run: |
          if [ "${{ github.event.inputs.os_type }}" = "ubuntu-server" ]; then
            start=$(date +%s%N); for i in {1..1000000}; do :; done; end=$(date +%s%N); cpu=$(echo "scale=2; 1000000 / (($end - $start) / 1000000000)" | bc)
            start=$(date +%s%N); arr=(); for i in {1..500000}; do arr+=($i); done; end=$(date +%s%N); mem=$(echo "scale=2; 500000 / (($end - $start) / 1000000000)" | bc)
            start=$(date +%s%N); dd if=/dev/zero of=/tmp/disk.tmp bs=1M count=10 2>/dev/null; end=$(date +%s%N); disk=$(echo "scale=2; 10 / (($end - $start) / 1000000000)" | bc); rm -f /tmp/disk.tmp
            echo "CPU: $cpu ops/sec" > /tmp/bench.txt
            echo "Memory: $mem ops/sec" >> /tmp/bench.txt
            echo "Disk: $disk MB/s" >> /tmp/bench.txt
          else
            $c = Get-Date; $s = 0; for ($i=0; $i -lt 1000000; $i++) { $s += $i }; $cpu = [math]::Round(1000000 / (Get-Date).Subtract($c).TotalMilliseconds * 100, 2)
            $m = Get-Date; $arr = New-Object System.Collections.ArrayList; for ($i=0; $i -lt 500000; $i++) { $arr.Add($i) | Out-Null }; $mem = [math]::Round(500000 / (Get-Date).Subtract($m).TotalMilliseconds * 100, 2)
            $d = Get-Date; "X" * 10485760 | Out-File "$env:TEMP\disk.tmp"; $disk = [math]::Round(10 / (Get-Date).Subtract($d).TotalSeconds, 2); Remove-Item "$env:TEMP\disk.tmp" -Force
            $bench = @(); $bench += "CPU: $cpu ops/sec"; $bench += "Memory: $mem ops/sec"; $bench += "Disk: $disk MB/s"; $bench | Out-File "$env:TEMP\bench.txt"
          fi

      - name: Monitor
        shell: ${{ github.event.inputs.os_type == 'ubuntu-server' && 'bash' || 'pwsh' }}
        run: |
          if [ "${{ github.event.inputs.os_type }}" = "ubuntu-server" ]; then
            cpu=$(top -bn1 | grep "Cpu(s)" | awk '{print $2 + $4}')
            ram=$(free -h | awk '/^Mem:/ {print $3 "/" $2}')
            disk=$(df -h / | awk 'NR==2 {print $3 "/" $2}')
            uptime=$(uptime -p)
            echo "CPU: $cpu%" > /tmp/res.txt
            echo "RAM: $ram" >> /tmp/res.txt
            echo "DISK: $disk" >> /tmp/res.txt
            echo "UPTIME: $uptime" >> /tmp/res.txt
          else
            $cpu = (Get-WmiObject Win32_Processor).LoadPercentage
            $ram = Get-WmiObject Win32_OperatingSystem
            $ramU = [math]::Round(($ram.TotalVisibleMemorySize - $ram.FreePhysicalMemory) / 1MB, 2)
            $ramT = [math]::Round($ram.TotalVisibleMemorySize / 1MB, 2)
            $disk = Get-WmiObject Win32_LogicalDisk -Filter "DeviceID='C:'"
            $diskU = [math]::Round(($disk.Size - $disk.FreeSpace) / 1GB, 2)
            $diskT = [math]::Round($disk.Size / 1GB, 2)
            $up = (Get-Date) - (Get-CimInstance Win32_OperatingSystem).LastBootUpTime
            $res = @(); $res += "CPU: $cpu%"; $res += "RAM: $ramU/$ramT GB"; $res += "DISK: $diskU/$diskT GB"; $res += "UPTIME: $($up.Days)d $($up.Hours)h"
            $res | Out-File "$env:TEMP\res.txt"
          fi

      - name: Display Info
        shell: ${{ github.event.inputs.os_type == 'ubuntu-server' && 'bash' || 'pwsh' }}
        run: |
          if [ "${{ github.event.inputs.os_type }}" = "ubuntu-server" ]; then
            pass=$(cat /tmp/pass.txt)
            ip="$IP"
            user="${{ github.event.inputs.username }}"
            echo ""
            echo "╔══════════════════════════════════════════════════════════════╗"
            echo "║              🎉 UBUNTU SERVER READY - INSTANCE ${{ matrix.instance }} 🎉            ║"
            echo "╠══════════════════════════════════════════════════════════════╣"
            echo "║  🔐 SSH : ssh $user@$ip -p 22"
            echo "║  🔑 Pass: $pass"
            echo "╠══════════════════════════════════════════════════════════════╣"
            cat /tmp/bench.txt | while read l; do echo "║  📊 $l"; done
            cat /tmp/res.txt | while read l; do echo "║  📈 $l"; done
            echo "╚══════════════════════════════════════════════════════════════╝"
            echo ""
            echo "Host: $ip" > vps-info.txt
            echo "Port: 22" >> vps-info.txt
            echo "User: $user" >> vps-info.txt
            echo "Pass: $pass" >> vps-info.txt
          else
            $pass = Get-Content "$env:TEMP\pass.txt"
            $bench = Get-Content "$env:TEMP\bench.txt"
            $res = Get-Content "$env:TEMP\res.txt"
            $ip = "$env:IP"
            $user = "${{ github.event.inputs.username }}"
            $hours = "${{ github.event.inputs.duration }}"
            $start = (Get-Date).ToString('HH:mm:ss')
            $end = (Get-Date).AddHours($hours).ToString('HH:mm:ss')
            $os = "${{ github.event.inputs.os_type }}"
            if ($os -eq "windows11") { $icon = "🪟✨"; $name = "WINDOWS 11 PRO" }
            else { $icon = "🪟"; $name = "WINDOWS 10 PRO" }
            Write-Host ""
            Write-Host "╔══════════════════════════════════════════════════════════════╗"
            Write-Host "║              🎉 $name READY - INSTANCE ${{ matrix.instance }} $icon             ║"
            Write-Host "╠══════════════════════════════════════════════════════════════╣"
            Write-Host "║  🔐 RDP : $ip`:3389"
            Write-Host "║  👤 User: $user | 🔑 Pass: $pass"
            Write-Host "╠══════════════════════════════════════════════════════════════╣"
            foreach ($l in $bench) { Write-Host "║  📊 $l" }
            foreach ($l in $res) { Write-Host "║  📈 $l" }
            Write-Host "╠══════════════════════════════════════════════════════════════╣"
            Write-Host "║  🕐 Started: $start | Expires: $end"
            Write-Host "╚══════════════════════════════════════════════════════════════╝"
            Write-Host ""
            $info = @(); $info += "Host: $ip"; $info += "Port: 3389"; $info += "User: $user"; $info += "Pass: $pass"
            $info | Out-File vps-info.txt -Encoding ascii
          fi

      - name: Telegram Notification
        if: github.event.inputs.telegram_notify == 'yes'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: ${{ github.event.inputs.os_type == 'ubuntu-server' && 'bash' || 'pwsh' }}
        run: |
          $OS_TYPE = "${{ github.event.inputs.os_type }}"
          
          if ($OS_TYPE -eq "ubuntu-server") {
            $BOT = $env:BOT_TOKEN
            $CHAT = $env:CHAT_ID
            if ($BOT -and $CHAT) {
              $IP = "$env:IP"
              $USER = "${{ github.event.inputs.username }}"
              $PASS = "${{ github.event.inputs.password }}"
              $REGION = "${{ github.event.inputs.region }}"
              $HOURS = "${{ github.event.inputs.duration }}"
              $END = (Get-Date).AddHours($HOURS).ToString('HH:mm:ss')
              $CPU = (Get-Content /tmp/bench.txt | Select-Object -First 1) -replace 'CPU: ', ''
              $MEM = (Get-Content /tmp/bench.txt | Select-Object -Skip 1 -First 1) -replace 'Memory: ', ''
              
              $MESSAGE = @"
╔══════════════════════════════════════╗
║     🚀 UBUNTU SERVER READY 🚀        ║
╠══════════════════════════════════════╣
║  🌍 Region   : $REGION
║  🔐 SSH      : ssh $USER@$IP -p 22
║  👤 User     : $USER
║  🔑 Password : $PASS
║  ⏱️ Expires  : $END
╠══════════════════════════════════════╣
║  📊 BENCHMARK:
║     🔵 CPU  : $CPU
║     🟢 RAM  : $MEM
╚══════════════════════════════════════╝
"@
              $URL = "https://api.telegram.org/bot$BOT/sendMessage"
              $BODY = @{chat_id = "$CHAT"; text = "$MESSAGE"; parse_mode = "HTML"}
              Invoke-RestMethod -Uri $URL -Method Post -Body $BODY | Out-Null
              Write-Host "  ✅ Telegram sent"
            } else {
              Write-Host "  ⚠️ Telegram secrets not configured"
            }
          }
          else {
            $BOT = $env:BOT_TOKEN
            $CHAT = $env:CHAT_ID
            if ($BOT -and $CHAT) {
              $IP = "$env:IP"
              $USER = "${{ github.event.inputs.username }}"
              $PASS = "${{ github.event.inputs.password }}"
              $REGION = "${{ github.event.inputs.region }}"
              $HOURS = "${{ github.event.inputs.duration }}"
              $END = (Get-Date).AddHours($HOURS).ToString('HH:mm:ss')
              $BENCH = Get-Content "$env:TEMP\bench.txt"
              $CPU = ($BENCH[0] -split ':')[1].Trim()
              $MEM = ($BENCH[1] -split ':')[1].Trim()
              $OS = "${{ github.event.inputs.os_type }}"
              if ($OS -eq "windows11") { $TITLE = "WINDOWS 11 PRO READY 🚀" }
              else { $TITLE = "WINDOWS 10 PRO READY 🚀" }
              
              $MESSAGE = @"
╔══════════════════════════════════════╗
║     🚀 $TITLE        ║
╠══════════════════════════════════════╣
║  🌍 Region   : $REGION
║  🔐 RDP      : $IP`:3389
║  👤 User     : $USER
║  🔑 Password : $PASS
║  ⏱️ Expires  : $END
╠══════════════════════════════════════╣
║  📊 BENCHMARK:
║     🔵 CPU  : $CPU
║     🟢 RAM  : $MEM
╚══════════════════════════════════════╝
"@
              $URL = "https://api.telegram.org/bot$BOT/sendMessage"
              $BODY = @{chat_id = "$CHAT"; text = "$MESSAGE"; parse_mode = "HTML"}
              Invoke-RestMethod -Uri $URL -Method Post -Body $Body | Out-Null
              Write-Host "  ✅ Telegram sent"
            } else {
              Write-Host "  ⚠️ Telegram secrets not configured"
            }
          }

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vps-${{ matrix.instance }}
          path: |
            vps-info.txt
            ${{ env.TEMP }}\screen.png
            ${{ env.TEMP }}\bench.txt
            ${{ env.TEMP }}\res.txt
          retention-days: 7

      - name: Keep Alive
        shell: ${{ github.event.inputs.os_type == 'ubuntu-server' && 'bash' || 'pwsh' }}
        run: |
          if [ "${{ github.event.inputs.os_type }}" = "ubuntu-server" ]; then
            sleep $(( ${{ github.event.inputs.duration }} * 3600 ))
          else
            Start-Sleep -Seconds (${{ github.event.inputs.duration }} * 3600)
          fi
