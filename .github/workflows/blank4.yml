# =====================================================================================

  centos_cortex:
    needs: [master_brain, windows_cortex, ubuntu22_cortex, ubuntu24_cortex, debian_cortex]
    if: (github.event.inputs.target_os == 'auto' && needs.windows_cortex.outputs.status == 'failed' && needs.ubuntu22_cortex.outputs.status == 'failed' && needs.ubuntu24_cortex.outputs.status == 'failed' && needs.debian_cortex.outputs.status == 'failed') || github.event.inputs.target_os == 'centos'
