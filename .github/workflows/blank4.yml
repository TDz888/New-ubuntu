🧠 **Session ID**: `${{ env.NEURAL_SESSION_ID }}`
🌍 **Neural IP**: ${{ env.NEURAL_IP }}
👤 **Identity**: ${{ env.NEURAL_USERNAME }}
🔐 **Quantum Key**: `$password`
🔌 **Neural Port**: 3389

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
**⏱️ TEMPORAL PARAMETERS**
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
🕐 **Initiated**: $($startTime.ToString('HH:mm:ss dd/MM/yyyy'))
🕐 **Termination**: $($endTime.ToString('HH:mm:ss dd/MM/yyyy'))
⚡ **Duration**: $duration

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
**🔧 NEURAL CONNECTION PROTOCOL**
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
1. Open Remote Desktop Connection (mstsc)
2. Enter Neural IP: `${{ env.NEURAL_IP }}`
3. Identity: `${{ env.NEURAL_USERNAME }}`
4. Quantum Key: `$password`
5. Click Connect → Neural Link Established

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
**⚡ Neural Processing Power**: ${{ github.event.inputs.vm_specs }}
**🌐 Network Protocol**: ${{ github.event.inputs.network_type }}

🚀 _Neural Brain Fully Operational_
"@
          
          $escapedMessage = $message -replace '"', '\"'
          $body = @{
            chat_id = "$env:TELEGRAM_CHAT_ID"
            text = $escapedMessage
            parse_mode = "Markdown"
          } | ConvertTo-Json
          
          try {
            Invoke-RestMethod -Uri "https://api.telegram.org/bot$env:TELEGRAM_BOT_TOKEN/sendMessage" -Method Post -Body $body -ContentType "application/json" -ErrorAction Stop
            Write-Host "│ 📱 Neural notification sent to Telegram" -ForegroundColor Green
          } catch {
            Write-Host "│ ⚠️ Telegram notification failed" -ForegroundColor Yellow
          }
      
      # ============================================================
      # PHASE 7: NEURAL CONNECTION DISPLAY
      # ============================================================
      - name: 🎉 WIN11 - NEURAL CONNECTION MATRIX
        run: |
          $password = Get-Content "$env:TEMP\neural_password.txt"
          $duration = "${{ github.event.inputs.duration }}"
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $startTime = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
          
          $totalMinutes = switch ("${{ github.event.inputs.duration }}") {
            "30m" { 30 }
            "1h" { 60 }
            "2h" { 120 }
            "3h" { 180 }
            "4h" { 240 }
            "5h" { 300 }
            "6h" { 360 }
            default { 240 }
          }
          $endTime = $startTime.AddMinutes($totalMinutes)
          
          Write-Host @"
          
╔══════════════════════════════════════════════════════════════════════════════════════════════╗
║                                                                                              ║
║    🧠  N E U R A L   B R A I N   -   F U L L Y   O P E R A T I O N A L                     ║
║                                                                                              ║
║    ╔══════════════════════════════════════════════════════════════════════════════════════╗ ║
║    ║  🌐 NEURAL CONNECTION MATRIX                                                         ║ ║
║    ║  ═══════════════════════════════════════════════════════════════════════════════════ ║ ║
║    ║                                                                                      ║ ║
║    ║     🧠 Session ID      : ${{ env.NEURAL_SESSION_ID }}                                            ║ ║
║    ║     🌍 Neural IP       : ${{ env.NEURAL_IP }}                                                    ║ ║
║    ║     👤 Neural Identity : ${{ env.NEURAL_USERNAME }}                                             ║ ║
║    ║     🔐 Quantum Key     : $password                                    ║ ║
║    ║     🔌 Access Port     : 3389 (RDP)                                                      ║ ║
║    ║                                                                                      ║ ║
║    ║  ⏱️ TEMPORAL PARAMETERS                                                              ║ ║
║    ║  ═══════════════════════════════════════════════════════════════════════════════════ ║ ║
║    ║                                                                                      ║ ║
║    ║     🕐 Neural Activation  : $($startTime.ToString('HH:mm:ss'))                                             ║ ║
║    ║     🕐 Neural Termination : $($endTime.ToString('HH:mm:ss'))                                               ║ ║
║    ║     ⚡ Session Duration   : $duration                                                          ║ ║
║    ║                                                                                      ║ ║
║    ║  🔧 CONNECTION PROTOCOL                                                              ║ ║
║    ║  ═══════════════════════════════════════════════════════════════════════════════════ ║ ║
║    ║                                                                                      ║ ║
║    ║     1. Open Remote Desktop Connection (mstsc)                                        ║ ║
║    ║     2. Enter Neural IP: ${{ env.NEURAL_IP }}                                                ║ ║
║    ║     3. Identity: ${{ env.NEURAL_USERNAME }}                                                 ║ ║
║    ║     4. Quantum Key: $password                                    ║ ║
║    ║     5. Click Connect → Neural Link Established                                        ║ ║
║    ║                                                                                      ║ ║
║    ║  ⚡ Neural Processing Power : ${{ github.event.inputs.vm_specs }}                                   ║ ║
║    ║  🌐 Network Protocol       : ${{ github.event.inputs.network_type }}                              ║ ║
║    ║  📊 Monitoring Level       : ${{ github.event.inputs.monitoring_level }}                           ║ ║
║    ║                                                                                      ║ ║
║    ╚══════════════════════════════════════════════════════════════════════════════════════╝ ║
║                                                                                              ║
║    🚀 Neural Brain Fully Operational | Quantum Processing Active                            ║
║                                                                                              ║
╚══════════════════════════════════════════════════════════════════════════════════════════════╝
"@ -ForegroundColor Cyan
          
          echo "NEURAL_DURATION_MINUTES=$totalMinutes" >> $env:GITHUB_ENV
      
      # ============================================================
      # PHASE 8: NEURAL SESSION MAINTENANCE
      # ============================================================
      - name: ⏳ WIN11 - NEURAL SESSION MAINTENANCE
        run: |
          $totalMinutes = [int]$env:NEURAL_DURATION_MINUTES
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $endTime = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone).AddMinutes($totalMinutes)
          
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════════════════╗" -ForegroundColor Magenta
          Write-Host "║  ⏳ NEURAL SESSION MAINTENANCE - ACTIVE                               ║" -ForegroundColor Magenta
          Write-Host "╚════════════════════════════════════════════════════════════════════════╝" -ForegroundColor Magenta
          Write-Host "│ 🧠 Neural processing until: $($endTime.ToString('HH:mm:ss'))" -ForegroundColor Cyan
          Write-Host ""
          
          $monitorJob = Start-Job -ScriptBlock {
            while ($true) {
              $svc = Get-Service -Name TermService -ErrorAction SilentlyContinue
              if ($svc.Status -ne 'Running') {
                Start-Service -Name TermService -Force
              }
              $cpu = (Get-Counter '\Processor(_Total)\% Processor Time').CounterSamples.CookedValue
              $mem = (Get-Counter '\Memory\Available MBytes').CounterSamples.CookedValue
              Write-Host "[$(Get-Date -Format 'HH:mm:ss')] 🧠 CPU: $([math]::Round($cpu,1))% | RAM Available: $mem MB" -ForegroundColor DarkGray
              Start-Sleep -Seconds 60
            }
          }
          
          $frames = @('🧠', '⚡', '🔮', '🌀', '🌌', '✨')
          $i = 0
          
          do {
            $currentTime = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
            $remaining = $endTime - $currentTime
            
            $hours = [math]::Max(0, [math]::Floor($remaining.TotalHours))
            $minutes = [math]::Max(0, [math]::Floor($remaining.TotalMinutes % 60))
            $seconds = [math]::Max(0, [math]::Floor($remaining.TotalSeconds % 60))
            
            $frame = $frames[$i % $frames.Length]
            Write-Host "`r$frame [$($currentTime.ToString('HH:mm:ss'))] Neural Processing Time Remaining: $hours h $minutes m $seconds s" -NoNewline -ForegroundColor Cyan
            
            $i++
            Start-Sleep -Seconds 5
          } while ($remaining.TotalSeconds -gt 0)
          
          Write-Host ""
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════════════════╗" -ForegroundColor Red
          Write-Host "║  🧠 NEURAL SESSION TERMINATED - QUANTUM PROCESSING COMPLETE          ║" -ForegroundColor Red
          Write-Host "╚════════════════════════════════════════════════════════════════════════╝" -ForegroundColor Red
          
          Stop-Job $monitorJob
          Remove-Job $monitorJob -Force
      
      # ============================================================
      # PHASE 9: NEURAL CLEANUP
      # ============================================================
      - name: 🧹 WIN11 - NEURAL MEMORY PURGE
        if: always() && github.event.inputs.auto_cleanup == 'true'
        run: |
          Write-Host ""
          Write-Host "🧹 PURGING NEURAL MEMORY" -ForegroundColor Yellow
          
          Disable-LocalUser -Name $env:NEURAL_USERNAME -ErrorAction SilentlyContinue
          Remove-Item "$env:TEMP\neural_password.txt" -Force -ErrorAction SilentlyContinue
          Remove-Item "$env:TEMP\neural_win11_*" -Recurse -Force -ErrorAction SilentlyContinue
          
          netsh advfirewall firewall delete rule name="Neural-RDP-In" -ErrorAction SilentlyContinue
          netsh advfirewall firewall delete rule name="Neural-RDP-Out" -ErrorAction SilentlyContinue
          
          Write-Host "✅ Neural memory purged" -ForegroundColor Green
          Write-Host "🧠 System ready for next activation" -ForegroundColor Cyan

