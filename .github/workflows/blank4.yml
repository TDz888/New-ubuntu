  # ==============================================================================
  # 🐍 DEBIAN 12 - SSH ACCESS (FIXED: NO SYSTEMD)
  # ==============================================================================
  debian_deploy:
    needs: [master_brain]
    if: github.event.inputs.target_os == 'debian' || github.event.inputs.target_os == 'all'
    runs-on: ubuntu-latest
    container:
      image: debian:12
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      port: ${{ steps.ssh_port.outputs.port }}
      os_type: ${{ steps.os_info.outputs.os_type }}
    steps:
      - name: 🐍 Debian 12 Deployment Start
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════╗"
          echo "║                    🐍 DEBIAN 12 DEPLOYMENT 🐍                       ║"
          echo "╚════════════════════════════════════════════════════════════════════╝"
          echo ""

      - name: 📋 Get OS Info
        id: os_info
        run: |
          echo "os_type=Debian 12 Bookworm" >> $GITHUB_OUTPUT
          echo "✅ OS: Debian 12 Bookworm"

      - name: 🔄 Method 1 - Update Package List
        run: |
          echo "[1/6] Updating package list..."
          apt update -qq
          echo "✅ Package list updated"

      - name: 📦 Method 2 - Install SSH Server
        run: |
          echo "[2/6] Installing OpenSSH server..."
          apt install -y -qq openssh-server
          echo "✅ OpenSSH server installed"

      - name: 🔧 Method 3 - Install sudo
        run: |
          echo "[3/6] Installing sudo..."
          apt install -y -qq sudo
          echo "✅ sudo installed"

      - name: 👤 Method 4 - Create User
        id: create_user
        run: |
          echo "[4/6] Creating user account..."
          USERNAME="deb_$((RANDOM % 9000 + 1000))"
          PASSWORD=$(openssl rand -base64 20 | tr -d '=+/' | cut -c1-24)
          useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | chpasswd
          usermod -aG sudo "$USERNAME"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "✅ User created: $USERNAME"

      - name: ⚙️ Method 5 - Configure SSH (No systemd)
        id: ssh_port
        run: |
          echo "[5/6] Configuring SSH service..."
          sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "port=22" >> $GITHUB_OUTPUT
          
          # Start SSH without systemd
          /etc/init.d/ssh restart || service ssh restart
          echo "✅ SSH configured on port 22"

      - name: 🌐 Method 6 - Get IP via curl
        id: get_ip
        run: |
          echo "[6/6] Getting public IP..."
          apt install -y -qq curl
          IP=$(curl -s --max-time 10 https://api.ipify.org)
          if [ -z "$IP" ]; then
            IP=$(curl -s --max-time 10 https://ifconfig.me/ip)
