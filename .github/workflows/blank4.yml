          netsh advfirewall firewall add rule name="Neural-RDP" dir=in action=allow protocol=TCP localport=3389
          
          Install-WindowsFeature -Name Web-Server, Web-WebSockets, Web-Asp-Net45 -IncludeManagementTools -ErrorAction SilentlyContinue
          
          Write-Host "✅ Neural configuration complete" -ForegroundColor Green
      
      - name: 👤 WINSRV - NEURAL IDENTITY
        run: |
