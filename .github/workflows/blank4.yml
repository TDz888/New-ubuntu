function Test-SystemRequirements {
    Write-Step -Title "Kiểm tra hệ thống" -Icon "🔍"
    
    $checks = @(
        @{Name = "Đang chạy với quyền root"; Command = { (id -u) -eq 0 }}
        @{Name = "Kết nối Internet"; Command = { Test-Connection -ComputerName "1.1.1.1" -Count 1 -Quiet }}
        @{Name = "Hệ điều hành Linux"; Command = { $IsLinux }}
        @{Name = "Sudo đã được cài đặt"; Command = { Get-Command sudo -ErrorAction SilentlyContinue }}
    )
    
    $failed = 0
    foreach ($check in $checks) {
        $result = & $check.Command
        if ($result) {
            Write-Success "$($check.Name) ✓"
        } else {
            Write-Error "$($check.Name) ✗"
            $failed++
        }
    }
    
    if ($failed -gt 0) {
        Write-Error "Không đáp ứng đủ yêu cầu hệ thống. Dừng quá trình."
        exit 1
    }
    
    Write-Success "Tất cả yêu cầu hệ thống đã được đáp ứng"
}

function Update-System {
    Write-Step -Title "Cập nhật hệ thống" -Icon "🔄"
    
    try {
        Write-Info "Đang cập nhật danh sách package..."
        sudo apt-get update -y 2>&1 | Out-Null
        
        Write-Info "Đang nâng cấp các package..."
        sudo apt-get upgrade -y 2>&1 | Out-Null
        
        Write-Info "Đang cài đặt các package cần thiết..."
        $packages = @("ufw", "curl", "wget", "git", "htop", "nano", "unzip")
        foreach ($pkg in $packages) {
            Write-Info "  - Cài đặt: $pkg"
            sudo apt-get install -y $pkg 2>&1 | Out-Null
        }
        
        Write-Success "Hệ thống đã được cập nhật và nâng cấp thành công"
    }
    catch {
        Write-Error "Lỗi khi cập nhật hệ thống: $_"
        exit 1
    }
}

function Configure-Firewall {
    Write-Step -Title "Cấu hình Firewall" -Icon "🛡️"
    
    try {
        # Kích hoạt UFW
        Write-Info "Đang kích hoạt UFW..."
        sudo ufw --force enable
        
        # Cấu hình rules
        $rules = @(
            @{Port = "22"; Proto = "tcp"; Desc = "SSH"}
            @{Port = "80"; Proto = "tcp"; Desc = "HTTP"}
            @{Port = "443"; Proto = "tcp"; Desc = "HTTPS"}
            @{Port = "27015"; Proto = "udp"; Desc = "Game Server"}
        )
        
        foreach ($rule in $rules) {
            Write-Info "  - Thêm rule: $($rule.Desc) - $($rule.Port)/$($rule.Proto)"
            sudo ufw allow $($rule.Port)/$($rule.Proto) comment $($rule.Desc)
        }
        
        # Hiển thị trạng thái
        Write-Info "Trạng thái firewall:"
        sudo ufw status verbose
        
        Write-Success "Firewall đã được cấu hình thành công"
    }
    catch {
        Write-Error "Lỗi khi cấu hình firewall: $_"
        exit 1
    }
}

function Create-UserAccount {
    Write-Step -Title "Tạo tài khoản người dùng" -Icon "👤"
    
    try {
        # Thông tin user (có thể thay đổi)
        $username = "vpsuser"
        $password = "Vps@2026Secure"
        
        Write-Info "Tên người dùng: $username"
        
        # Kiểm tra user đã tồn tại
        $userExists = getent passwd $username 2>&1
        if ($LASTEXITCODE -eq 0) {
            Write-Warning "Người dùng $username đã tồn tại, bỏ qua bước tạo mới"
            return
        }
        
        # Tạo user với home directory
        Write-Info "Đang tạo tài khoản..."
        sudo useradd -m -s /bin/bash $username
        
        # CÁCH 1: Dùng printf - AN TOÀN NHẤT
        # Đây là cách fix lỗi chính - KHÔNG dùng : trong chuỗi biến
        Write-Info "Đang thiết lập mật khẩu..."
        printf "%s\n%s\n" "$password" "$password" | sudo passwd $username
        
        # Thêm vào group sudo
        Write-Info "Thêm vào group sudo..."
        sudo usermod -aG sudo $username
        
        # Tạo thư mục .ssh
        Write-Info "Tạo thư mục .ssh..."
        sudo mkdir -p "/home/$username/.ssh"
        sudo chmod 700 "/home/$username/.ssh"
        sudo chown "$username:$username" "/home/$username/.ssh"
        
        Write-Success "Tài khoản $username đã được tạo thành công"
        
        # Hiển thị thông tin
        Write-Host ""
        Write-Host "╔══════════════════════════════════════════════════════════════╗" -ForegroundColor Green
        Write-Host "║  📝 THÔNG TIN ĐĂNG NHẬP                                       ║" -ForegroundColor Green
        Write-Host "║  Username: $username" -ForegroundColor White
        Write-Host "║  Password: $password" -ForegroundColor White
        Write-Host "║  ⚠️  VUI LÒNG THAY ĐỔI MẬT KHẨU SAU KHI ĐĂNG NHẬP          ║" -ForegroundColor Yellow
        Write-Host "╚══════════════════════════════════════════════════════════════╝" -ForegroundColor Green
        Write-Host ""
    }
    catch {
        Write-Error "Lỗi khi tạo tài khoản: $_"
        exit 1
    }
}

function Configure-SSH {
    Write-Step -Title "Cấu hình SSH" -Icon "🔐"
    
    try {
        # Backup cấu hình hiện tại
        Write-Info "Đang backup cấu hình SSH..."
        sudo cp /etc/ssh/sshd_config /etc/ssh/sshd_config.backup
        
        # Tạo file cấu hình mới
        Write-Info "Đang cấu hình SSH nâng cao..."
        
        $sshConfig = @"
# ==========================================
# SSH Configuration - Auto generated
# ==========================================

Port 22
Protocol 2
HostKey /etc/ssh/ssh_host_rsa_key
HostKey /etc/ssh/ssh_host_ecdsa_key
HostKey /etc/ssh/ssh_host_ed25519_key

# Authentication
PermitRootLogin prohibit-password
PubkeyAuthentication yes
PasswordAuthentication yes
PermitEmptyPasswords no

# Security
MaxAuthTries 3
MaxSessions 10
ClientAliveInterval 300
ClientAliveCountMax 2

# Performance
UseDNS no
PrintMotd no
AcceptEnv LANG LC_*
"@
        
        # Ghi cấu hình mới
        echo "$sshConfig" | sudo tee /etc/ssh/sshd_config.d/99-vps.conf > $null
        
        # Restart SSH service
        Write-Info "Khởi động lại SSH service..."
        sudo systemctl restart sshd
        
        Write-Success "SSH đã được cấu hình thành công"
    }
    catch {
        Write-Error "Lỗi khi cấu hình SSH: $_"
        Write-Info "Đang khôi phục cấu hình cũ..."
        sudo cp /etc/ssh/sshd_config.backup /etc/ssh/sshd_config
        sudo systemctl restart sshd
        exit 1
    }
}

function Install-Software {
    Write-Step -Title "Cài đặt phần mềm" -Icon "📦"
    
    try {
        $software = @(
            @{Name = "Nginx"; Package = "nginx"}
            @{Name = "Docker"; Package = "docker.io"}
            @{Name = "Docker Compose"; Package = "docker-compose"}
            @{Name = "Node.js"; Package = "nodejs"}
            @{Name = "npm"; Package = "npm"}
        )
        
        foreach ($app in $software) {
            Write-Info "Đang cài đặt: $($app.Name)..."
            sudo apt-get install -y $($app.Package) 2>&1 | Out-Null
            Write-Success "  ✓ $($app.Name) đã được cài đặt"
        }
        
        # Cài đặt thêm một số công cụ
        Write-Info "Đang cài đặt công cụ bổ sung..."
        sudo apt-get install -y software-properties-common apt-transport-https ca-certificates 2>&1 | Out-Null
        
        Write-Success "Tất cả phần mềm đã được cài đặt"
    }
    catch {
        Write-Error "Lỗi khi cài đặt phần mềm: $_"
        exit 1
    }
}

function Setup-GameServer {
    Write-Step -Title "Cài đặt Game Server" -Icon "🎮"
    
    try {
        # Tạo thư mục cho game server
        $gameDir = "/opt/gameserver"
        Write-Info "Tạo thư mục game server: $gameDir"
        sudo mkdir -p $gameDir
        sudo chmod 755 $gameDir
        
        # Tạo file cấu hình mẫu
        $configFile = "$gameDir/server-config.json"
        $configJson = @"
{
    "serverName": "VPS Game Server",
    "maxPlayers": 32,
    "port": 27015,
    "gameMode": "deathmatch",
    "mapRotation": ["de_dust2", "de_inferno", "de_mirage"],
    "tickRate": 128,
    "enableVAC": true,
    "adminPassword": "admin123",
    "created": "$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
}
"@
        
        echo "$configJson" | sudo tee $configFile > $null
        Write-Success "File cấu hình game server đã được tạo"
        
        # Tạo script khởi động
        $startScript = "$gameDir/start-server.sh"
        $scriptContent = @"#!/bin/bash
# Game Server Start Script
echo "Starting Game Server..."
echo "Server running on port 27015"
echo "Configuration: $configFile"
# Thêm lệnh khởi động game server tại đây
"@
        
        echo "$scriptContent" | sudo tee $startScript > $null
        sudo chmod +x $startScript
        
        Write-Success "Game server đã được cấu hình"
        
        # Hiển thị thông tin
        Write-Host ""
        Write-Host "╔══════════════════════════════════════════════════════════════╗" -ForegroundColor Magenta
        Write-Host "║  🎮 THÔNG TIN GAME SERVER                                    ║" -ForegroundColor Magenta
        Write-Host "║  Thư mục: $gameDir" -ForegroundColor White
        Write-Host "║  Cấu hình: $configFile" -ForegroundColor White
        Write-Host "║  Script khởi động: $startScript" -ForegroundColor White
        Write-Host "║  Port: 27015 (UDP)" -ForegroundColor White
        Write-Host "╚══════════════════════════════════════════════════════════════╝" -ForegroundColor Magenta
    }
    catch {
        Write-Error "Lỗi khi cài đặt game server: $_"
        exit 1
    }
}

