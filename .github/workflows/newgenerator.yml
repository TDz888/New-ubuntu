  # ==================== DEBIAN 12 ====================
  debian_deploy:
    needs: [init]
    if: github.event.inputs.target_os == 'debian' || github.event.inputs.target_os == 'all'
    runs-on: ubuntu-latest
    container:
      image: debian:12
    timeout-minutes: 360
    outputs:
