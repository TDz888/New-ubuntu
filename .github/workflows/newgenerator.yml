            echo "║ SSH Public    : ssh ${{ steps.create_user.outputs.username }}@${{ steps.get_public_ip.outputs.public_ip }} -p 22"
            echo "║ SSH Tailscale : ssh ${{ steps.create_user.outputs.username }}@${{ steps.tailscale.outputs.tailscale_ip }} -p 22"
            echo "║ Username      : ${{ steps.create_user.outputs.username }}"
            echo "║ Password      : ${{ steps.create_user.outputs.password }}"
            echo "╚════════════════════════════════════════════════════════════╝"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi
      - name: Keep Session Alive
        run: |
          END=$(($(date +%s) + ${{ needs.init.outputs.duration_minutes }} * 60))
          while [ $(date +%s) -lt $END ]; do
            echo "[ALMALINUX] Active - $((($END - $(date +%s))/60)) minutes left"
            sleep 60
          done

  # ==================== TELEGRAM NOTIFICATION ====================
  telegram_notify:
    needs: [init, windows_deploy, ubuntu22_deploy, ubuntu24_deploy, debian_deploy, centos_deploy, almalinux_deploy]
    if: always() && github.event.inputs.telegram_notify == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Send Connection Info via Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="🚀 NEURAL MASTER SYSTEM v3.2%0A"
          MSG="${MSG}╔════════════════════════════════════════╗%0A"
          MSG="${MSG}║ Session: ${{ needs.init.outputs.session_id }}%0A"
          MSG="${MSG}║ Duration: ${{ github.event.inputs.duration }}%0A"
          MSG="${MSG}║ Expires: ${{ needs.init.outputs.termination_time }}%0A"
          MSG="${MSG}╚════════════════════════════════════════╝%0A"
          
          SENT_COUNT=0
          
          if [ "${{ needs.windows_deploy.outputs.status }}" = "active" ]; then
            MSG="${MSG}%0a🪟 WINDOWS 11%0a"
            MSG="${MSG}├─ Public RDP: ${{ needs.windows_deploy.outputs.public_ip }}:3389%0a"
            MSG="${MSG}├─ Tailscale RDP: ${{ needs.windows_deploy.outputs.tailscale_ip }}:3389%0a"
            MSG="${MSG}├─ Username: ${{ needs.windows_deploy.outputs.username }}%0a"
            MSG="${MSG}└─ Password: ${{ needs.windows_deploy.outputs.password }}%0a"
            SENT_COUNT=$((SENT_COUNT + 1))
          fi
          
          if [ "${{ needs.ubuntu22_deploy.outputs.status }}" = "active" ]; then
            MSG="${MSG}%0a🐧 UBUNTU 22.04%0a"
            MSG="${MSG}├─ Public SSH: ssh ${{ needs.ubuntu22_deploy.outputs.username }}@${{ needs.ubuntu22_deploy.outputs.public_ip }} -p 22%0a"
            MSG="${MSG}├─ Tailscale SSH: ssh ${{ needs.ubuntu22_deploy.outputs.username }}@${{ needs.ubuntu22_deploy.outputs.tailscale_ip }} -p 22%0a"
            MSG="${MSG}└─ Password: ${{ needs.ubuntu22_deploy.outputs.password }}%0a"
            SENT_COUNT=$((SENT_COUNT + 1))
          fi
          
          if [ "${{ needs.ubuntu24_deploy.outputs.status }}" = "active" ]; then
            MSG="${MSG}%0a🐧 UBUNTU 24.04%0a"
            MSG="${MSG}├─ Public SSH: ssh ${{ needs.ubuntu24_deploy.outputs.username }}@${{ needs.ubuntu24_deploy.outputs.public_ip }} -p 22%0a"
            MSG="${MSG}├─ Tailscale SSH: ssh ${{ needs.ubuntu24_deploy.outputs.username }}@${{ needs.ubuntu24_deploy.outputs.tailscale_ip }} -p 22%0a"
            MSG="${MSG}└─ Password: ${{ needs.ubuntu24_deploy.outputs.password }}%0a"
            SENT_COUNT=$((SENT_COUNT + 1))
          fi
          
          if [ "${{ needs.debian_deploy.outputs.status }}" = "active" ]; then
            MSG="${MSG}%0a🔷 DEBIAN 12%0a"
            MSG="${MSG}├─ Public SSH: ssh ${{ needs.debian_deploy.outputs.username }}@${{ needs.debian_deploy.outputs.public_ip }} -p 22%0a"
            MSG="${MSG}├─ Tailscale SSH: ssh ${{ needs.debian_deploy.outputs.username }}@${{ needs.debian_deploy.outputs.tailscale_ip }} -p 22%0a"
            MSG="${MSG}└─ Password: ${{ needs.debian_deploy.outputs.password }}%0a"
            SENT_COUNT=$((SENT_COUNT + 1))
          fi
          
          if [ "${{ needs.centos_deploy.outputs.status }}" = "active" ]; then
            MSG="${MSG}%0a📕 CENTOS 9%0a"
            MSG="${MSG}├─ Public SSH: ssh ${{ needs.centos_deploy.outputs.username }}@${{ needs.centos_deploy.outputs.public_ip }} -p 22%0a"
            MSG="${MSG}├─ Tailscale SSH: ssh ${{ needs.centos_deploy.outputs.username }}@${{ needs.centos_deploy.outputs.tailscale_ip }} -p 22%0a"
            MSG="${MSG}└─ Password: ${{ needs.centos_deploy.outputs.password }}%0a"
            SENT_COUNT=$((SENT_COUNT + 1))
          fi
          
          if [ "${{ needs.almalinux_deploy.outputs.status }}" = "active" ]; then
            MSG="${MSG}%0a📗 ALMALINUX 9%0a"
            MSG="${MSG}├─ Public SSH: ssh ${{ needs.almalinux_deploy.outputs.username }}@${{ needs.almalinux_deploy.outputs.public_ip }} -p 22%0a"
            MSG="${MSG}├─ Tailscale SSH: ssh ${{ needs.almalinux_deploy.outputs.username }}@${{ needs.almalinux_deploy.outputs.tailscale_ip }} -p 22%0a"
            MSG="${MSG}└─ Password: ${{ needs.almalinux_deploy.outputs.password }}%0a"
            SENT_COUNT=$((SENT_COUNT + 1))
          fi
          
          MSG="${MSG}%0a╔════════════════════════════════════════╗%0a"
          MSG="${MSG}║ ✅ ${SENT_COUNT} service(s) online%0a"
          MSG="${MSG}║ 🔐 Connect via Tailscale%0a"
          MSG="${MSG}╚════════════════════════════════════════╝"
          
          if [ -n "$BOT_TOKEN" ] && [ -n "$CHAT_ID" ] && [ $SENT_COUNT -gt 0 ]; then
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d chat_id="${CHAT_ID}" \
              -d text="${MSG}" \
              -d parse_mode="HTML" \
              -d disable_web_page_preview="true"
            echo "Telegram sent: $SENT_COUNT services"
          fi

  # ==================== MEMORY PURGE ====================
  memory_purge:
    needs: [init]
    if: always() && github.event.inputs.auto_cleanup == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║                    MEMORY PURGE                            ║"
          echo "╠════════════════════════════════════════════════════════════╣"
          echo "║ Session: ${{ needs.init.outputs.session_id }}"
          echo "║ Status: Credentials Destroyed"
          echo "║ Action: Network Connections Terminated"
          echo "╚════════════════════════════════════════════════════════════╝"
