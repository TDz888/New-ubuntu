      - name: Deploy CentOS 9
        run: |
          echo ""
          echo "============================================================"
          echo "              CENTOS 9 DEPLOYMENT"
          echo "============================================================"
          echo ""

      - name: Install Required Packages
        run: |
          echo "[1/6] Installing wget..." && dnf install -y wget
          echo "[2/6] Installing OpenSSH server..." && dnf install -y openssh-server --skip-broken
          echo "[3/6] Installing utilities..." && dnf install -y sudo curl --skip-broken
          echo "System prepared successfully"

      - name: Install Tailscale
        run: |
          echo "[4/6] Installing Tailscale..." && curl -fsSL https://tailscale.com/install.sh | sh
          echo "Tailscale installed successfully"

      - name: Connect Tailscale
        id: tailscale
        run: |
          echo "Connecting to Tailscale network..."
          tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --accept-routes --accept-dns --hostname=neural-centos
          sleep 3
          TAILSCALE_IP=$(tailscale ip -4)
          echo "tailscale_ip=$TAILSCALE_IP" >> $GITHUB_OUTPUT
          echo "Tailscale IP: $TAILSCALE_IP"

      - name: Create User Account
        id: create_user
        run: |
          echo "[5/6] Creating user account..."
          USERNAME="centos_$((RANDOM % 9000 + 1000))"
          PASSWORD=$(openssl rand -base64 20 | tr -d '=+/' | cut -c1-24)
          useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | chpasswd
          usermod -aG wheel "$USERNAME"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "User created: $USERNAME"

      - name: Configure SSH
        id: ssh_port
        run: |
          echo "[6/6] Configuring SSH service..."
          ssh-keygen -A
          sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "port=22" >> $GITHUB_OUTPUT
          /usr/sbin/sshd
          echo "SSH configured on port 22"

      - name: Get Public IP
        id: get_public_ip
        run: |
          echo "Fetching public IP address..."
          PUBLIC_IP=""
          for url in "https://api.ipify.org" "https://ifconfig.me/ip" "https://icanhazip.com"; do
            TEMP_IP=$(wget -qO- --timeout=5 $url 2>/dev/null | tr -d '\n\r')
            if [ -n "$TEMP_IP" ] && echo "$TEMP_IP" | grep -qE '^[0-9.]+$'; then
              PUBLIC_IP="$TEMP_IP"
              break
            fi
          done
          if [ -z "$PUBLIC_IP" ]; then PUBLIC_IP="UNAVAILABLE"; fi
          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "Public IP: $PUBLIC_IP"

      - name: Verify Deployment
        id: verify
        run: |
          if pgrep sshd > /dev/null 2>&1; then
            echo "status=active" >> $GITHUB_OUTPUT
            echo "SSH service is running"
          else
            /usr/sbin/sshd
            sleep 2
            if pgrep sshd > /dev/null 2>&1; then
              echo "status=active" >> $GITHUB_OUTPUT
              echo "SSH service started"
            else
              echo "status=failed" >> $GITHUB_OUTPUT
              echo "SSH service failed to start"
            fi
          fi
          
          echo ""
          echo "============================================================"
          echo "              CENTOS 9 READY"
          echo "============================================================"
          echo "  Public SSH    : ssh ${{ steps.create_user.outputs.username }}@${{ steps.get_public_ip.outputs.public_ip }} -p 22"
          echo "  Tailscale SSH : ssh ${{ steps.create_user.outputs.username }}@${{ steps.tailscale.outputs.tailscale_ip }} -p 22"
          echo "  Username      : ${{ steps.create_user.outputs.username }}"
          echo "  Password      : ${{ steps.create_user.outputs.password }}"
          echo "============================================================"
          echo ""

      - name: Keep Session Alive
        run: |
          DURATION=${{ needs.master_brain.outputs.duration_minutes }}
          START=${{ needs.master_brain.outputs.start_timestamp }}
          END=$((START + DURATION * 60))
          echo "Runtime counter started - Session will end automatically"
          while [ $(date +%s) -lt $END ]; do
            REMAINING=$((END - $(date +%s)))
            echo "CentOS 9 - Active | Time remaining: $((REMAINING / 60)) minutes"
            sleep 60
          done
          echo "Session expired - Shutting down"

