# =====================================================================================
#              NEURAL MASTER SYSTEM v3.2 - QUANTUM EDITION
#         Multi-OS Remote Access | Tailscale | Auto Cleanup | Telegram Bot
# =====================================================================================

name: NEURAL MASTER SYSTEM v3.2

on:
  workflow_dispatch:
    inputs:
      duration:
        description: Session Duration
        required: true
        default: '2h'
        type: choice
        options: ['30m', '1h', '2h', '4h', '6h']
      target_os:
        description: Target OS
        required: true
        default: 'windows'
        type: choice
        options: ['windows', 'ubuntu22', 'ubuntu24', 'debian', 'centos', 'almalinux', 'all']
      performance_mode:
        description: Performance Mode
        required: false
        default: 'balanced'
        type: choice
        options: ['balanced', 'performance', 'quantum']
      telegram_notify:
        description: Send Telegram Notification
        required: false
        default: true
        type: boolean
      auto_cleanup:
        description: Auto Cleanup
        required: false
        default: true
        type: boolean

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}

jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      session_id: ${{ steps.init.outputs.session_id }}
      duration_minutes: ${{ steps.init.outputs.duration_minutes }}
      termination_time: ${{ steps.init.outputs.termination_time }}
      start_timestamp: ${{ steps.init.outputs.start_timestamp }}
    steps:
      - id: init
        run: |
          SESSION_ID="NEURAL-$(date +%Y%m%d-%H%M%S)-$((RANDOM%9000+1000))"
          START_TS=$(date +%s)
          DUR_INPUT="${{ github.event.inputs.duration }}"
          case "$DUR_INPUT" in "30m") DUR=30;; "1h") DUR=60;; "2h") DUR=120;; "4h") DUR=240;; "6h") DUR=360;; *) DUR=120;; esac
          echo "session_id=$SESSION_ID" >> $GITHUB_OUTPUT
          echo "start_timestamp=$START_TS" >> $GITHUB_OUTPUT
          echo "duration_minutes=$DUR" >> $GITHUB_OUTPUT
          echo "termination_time=$(date -d "+$DUR minutes" "+%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_OUTPUT
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║              NEURAL MASTER SYSTEM v3.2 ACTIVE              ║"
          echo "╠════════════════════════════════════════════════════════════╣"
          echo "║ Session ID   : $SESSION_ID"
          echo "║ Duration     : $DUR minutes"
          echo "║ Target OS    : ${{ github.event.inputs.target_os }}"
          echo "║ Mode         : ${{ github.event.inputs.performance_mode }}"
          echo "╚════════════════════════════════════════════════════════════╝"

  # ==================== WINDOWS 11 ====================
  windows_deploy:
    needs: [init]
    if: github.event.inputs.target_os == 'windows' || github.event.inputs.target_os == 'all'
    runs-on: windows-latest
    timeout-minutes: 360
    outputs:
      status: ${{ steps.verify.outputs.status }}
      public_ip: ${{ steps.get_public_ip.outputs.public_ip }}
      tailscale_ip: ${{ steps.tailscale.outputs.tailscale_ip }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      os_type: windows
    steps:
      - run: Write-Host "╔════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
      - run: Write-Host "║                 WINDOWS 11 DEPLOYMENT                     ║" -ForegroundColor Cyan
      - run: Write-Host "╚════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
      - name: Configure RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP-In" dir=in action=allow protocol=TCP localport=3389
          Restart-Service TermService -Force -ErrorAction SilentlyContinue
      - name: Create User Account
        id: create_user
        run: |
          $username = "neural_$((Get-Random -Minimum 1000 -Maximum 9999))"
          $password = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 20 | ForEach-Object {[char]$_})
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name $username -Password $securePass -AccountNeverExpires -PasswordNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $username
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
          echo "username=$username" >> $env:GITHUB_OUTPUT
          echo "password=$password" >> $env:GITHUB_OUTPUT
          Write-Host "[+] User created: $username" -ForegroundColor Green
      - name: Install Tailscale
        run: |
          $msiPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msiPath -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i", "`"$msiPath`"", "/quiet", "/norestart" -Wait
          Write-Host "[+] Tailscale installed" -ForegroundColor Green
      - name: Connect Tailscale
        id: tailscale
        run: |
          Start-Sleep -Seconds 5
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=neural-win --accept-routes
          Start-Sleep -Seconds 3
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "tailscale_ip=$ip" >> $env:GITHUB_OUTPUT
          Write-Host "[+] Tailscale IP: $ip" -ForegroundColor Green
      - name: Get Public IP
        id: get_public_ip
        run: |
          try { $ip = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing -TimeoutSec 5).Content.Trim() } catch { $ip = "UNAVAILABLE" }
          echo "public_ip=$ip" >> $env:GITHUB_OUTPUT
          Write-Host "[+] Public IP: $ip" -ForegroundColor Green
      - name: Verify Deployment
        id: verify
        run: |
          $svc = Get-Service TermService -ErrorAction SilentlyContinue
          if ($svc.Status -eq 'Running') { 
            echo "status=active" >> $env:GITHUB_OUTPUT
            Write-Host "╔════════════════════════════════════════════════════════════╗" -ForegroundColor Green
            Write-Host "║                    WINDOWS 11 READY                       ║" -ForegroundColor Green
            Write-Host "╠════════════════════════════════════════════════════════════╣" -ForegroundColor Green
            Write-Host "║ RDP Public    : ${{ steps.get_public_ip.outputs.public_ip }}:3389" -ForegroundColor Green
            Write-Host "║ RDP Tailscale : ${{ steps.tailscale.outputs.tailscale_ip }}:3389" -ForegroundColor Green
            Write-Host "║ Username      : ${{ steps.create_user.outputs.username }}" -ForegroundColor Green
            Write-Host "║ Password      : ${{ steps.create_user.outputs.password }}" -ForegroundColor Green
            Write-Host "╚════════════════════════════════════════════════════════════╝" -ForegroundColor Green
          } else { echo "status=failed" >> $env:GITHUB_OUTPUT }
      - name: Keep Session Alive
        run: |
          $END = [int](Get-Date -UFormat %s) + ${{ needs.init.outputs.duration_minutes }} * 60
          while ([int](Get-Date -UFormat %s) -lt $END) { 
            $LEFT = (($END - [int](Get-Date -UFormat %s))/60)
            Write-Host "[WINDOWS] Session active - $([math]::Floor($LEFT)) minutes remaining" -ForegroundColor DarkCyan
            Start-Sleep 60 
          }

  # ==================== UBUNTU 22.04 ====================
  ubuntu22_deploy:
    needs: [init]
    if: github.event.inputs.target_os == 'ubuntu22' || github.event.inputs.target_os == 'all'
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    outputs:
      status: ${{ steps.verify.outputs.status }}
      public_ip: ${{ steps.get_public_ip.outputs.public_ip }}
      tailscale_ip: ${{ steps.tailscale.outputs.tailscale_ip }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      os_type: ubuntu22
    steps:
      - run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║                 UBUNTU 22.04 DEPLOYMENT                   ║"
          echo "╚════════════════════════════════════════════════════════════╝"
      - name: Install Packages
        run: |
          sudo apt update -qq
          sudo apt install -y -qq openssh-server curl wget
      - name: Install Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh
      - name: Connect Tailscale
        id: tailscale
        run: |
          sudo tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --hostname=neural-ubuntu22 --accept-routes
          echo "tailscale_ip=$(tailscale ip -4)" >> $GITHUB_OUTPUT
      - name: Create User Account
        id: create_user
        run: |
          USERNAME="ub22_$((RANDOM%9000+1000))"
          PASSWORD=$(openssl rand -base64 20 | tr -d '=+/' | cut -c1-24)
          sudo useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo "$USERNAME"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "[+] User created: $USERNAME"
      - name: Configure SSH
        run: |
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          sudo systemctl enable ssh
      - name: Get Public IP
        id: get_public_ip
        run: |
          IP=$(curl -s --max-time 5 https://api.ipify.org 2>/dev/null || echo "UNAVAILABLE")
          echo "public_ip=$IP" >> $GITHUB_OUTPUT
      - name: Verify Deployment
        id: verify
        run: |
          if sudo systemctl is-active ssh > /dev/null 2>&1; then
            echo "status=active" >> $GITHUB_OUTPUT
            echo "╔════════════════════════════════════════════════════════════╗"
            echo "║                   UBUNTU 22.04 READY                       ║"
            echo "╠════════════════════════════════════════════════════════════╣"
            echo "║ SSH Public    : ssh ${{ steps.create_user.outputs.username }}@${{ steps.get_public_ip.outputs.public_ip }} -p 22"
            echo "║ SSH Tailscale : ssh ${{ steps.create_user.outputs.username }}@${{ steps.tailscale.outputs.tailscale_ip }} -p 22"
            echo "║ Username      : ${{ steps.create_user.outputs.username }}"
            echo "║ Password      : ${{ steps.create_user.outputs.password }}"
            echo "╚════════════════════════════════════════════════════════════╝"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi
      - name: Keep Session Alive
        run: |
          END=$(($(date +%s) + ${{ needs.init.outputs.duration_minutes }} * 60))
          while [ $(date +%s) -lt $END ]; do
            echo "[UBUNTU22] Active - $((($END - $(date +%s))/60)) minutes left"
            sleep 60
          done

