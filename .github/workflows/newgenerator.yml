          echo "[1/6] Updating system packages..."
          dnf update -y
          echo "[2/6] Installing OpenSSH server..."
          dnf install -y openssh-server
          echo "[OK] SSH installed"
      
      - name: Create TUN Device for Tailscale
        run: |
          echo "[3/6] Creating TUN device..."
          mkdir -p /dev/net
          mknod /dev/net/tun c 10 200
          chmod 600 /dev/net/tun
          echo "[OK] TUN device created"
      
      - name: Install Tailscale
        run: |
          echo "[4/6] Installing Tailscale..."
          curl -fsSL https://tailscale.com/install.sh | sh
          echo "[OK] Tailscale installed"
      
      - name: Connect Tailscale
        id: tailscale
        run: |
          echo "Starting Tailscaled..."
          tailscaled --state=/var/lib/tailscale/tailscaled.state &
          sleep 5
          echo "Connecting to Tailscale network..."
          tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --hostname=neural-alma-ssh --accept-routes
          sleep 3
          TAILSCALE_IP=$(tailscale ip -4)
          echo "tailscale_ip=$TAILSCALE_IP" >> $GITHUB_OUTPUT
          echo "[OK] Tailscale IP: $TAILSCALE_IP"
      
      - name: Create User Account
        id: create_user
        run: |
          echo "[5/6] Creating user account..."
          USERNAME="almassh_$((RANDOM%9000+1000))"
          PASSWORD=$(openssl rand -base64 20 | tr -d '=+/' | cut -c1-24)
          useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | chpasswd
          usermod -aG wheel "$USERNAME"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "[OK] User created: $USERNAME"
      
      - name: Configure SSH
        run: |
          echo "[6/6] Configuring SSH..."
          ssh-keygen -A
          sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          /usr/sbin/sshd
          echo "[OK] SSH configured"
      
      - name: Get Public IP
        id: get_public_ip
        run: |
          IP=$(curl -s --max-time 5 https://api.ipify.org 2>/dev/null || echo "UNAVAILABLE")
          echo "public_ip=$IP" >> $GITHUB_OUTPUT
          echo "[OK] Public IP: $IP"
      
      - name: Verify Deployment
        id: verify
        run: |
          if pgrep sshd > /dev/null 2>&1; then
            echo "status=active" >> $GITHUB_OUTPUT
            echo ""
            echo "============================================================"
            echo "              ALMALINUX 9 WITH SSH READY"
            echo "============================================================"
            echo "  SSH Public    : ssh ${{ steps.create_user.outputs.username }}@${{ steps.get_public_ip.outputs.public_ip }} -p 22"
            echo "  SSH Tailscale : ssh ${{ steps.create_user.outputs.username }}@${{ steps.tailscale.outputs.tailscale_ip }} -p 22"
            echo "  Password      : ${{ steps.create_user.outputs.password }}"
            echo "============================================================"
            echo ""
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi
      
      - name: Keep Session Alive
        run: |
          END=$(($(date +%s) + ${{ needs.init.outputs.duration_minutes }} * 60))
          while [ $(date +%s) -lt $END ]; do
            echo "[ALMALINUX-SSH] Active - $((($END - $(date +%s))/60)) minutes left"
            sleep 60
          done

  # ==================== TELEGRAM NOTIFICATION ====================
