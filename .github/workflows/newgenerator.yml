# =====================================================================================
#                    NEURAL MASTER SYSTEM v3.0 - ULTRA STABLE
#              Multi-OS Remote Access | Tailscale Integration | Auto Cleanup
# =====================================================================================
# Version: 3.0.13
# Status: PRODUCTION READY
# Features: RDP + SSH | Tailscale | Telegram Bot | Runtime Counter
# =====================================================================================

name: NEURAL MASTER SYSTEM v3.0

on:
  workflow_dispatch:
    inputs:
      duration:
        description: Session Duration
        required: true
        default: '2h'
        type: choice
        options:
          - '30m'
          - '1h'
          - '2h'
          - '4h'
          - '6h'
      
      target_os:
        description: Target Operating System
        required: true
        default: 'windows'
        type: choice
        options:
          - 'windows'
          - 'ubuntu22'
          - 'ubuntu24'
          - 'debian'
          - 'centos'
          - 'almalinux'
          - 'all'
      
      performance_mode:
        description: Performance Mode
        required: false
        default: 'balanced'
        type: choice
        options:
          - 'balanced'
          - 'performance'
          - 'quantum'
      
      telegram_notify:
        description: Send Telegram Notification
        required: false
        default: true
        type: boolean
      
      auto_cleanup:
        description: Auto Cleanup After Session
        required: false
        default: true
        type: boolean

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}

jobs:
  master_brain:
    runs-on: ubuntu-latest
    outputs:
      session_id: ${{ steps.init.outputs.session_id }}
      duration_minutes: ${{ steps.init.outputs.duration_minutes }}
      termination_time: ${{ steps.init.outputs.termination_time }}
      start_timestamp: ${{ steps.init.outputs.start_timestamp }}
    steps:
      - name: Initialize Master Brain
        id: init
        run: |
          SESSION_ID="NEURAL-$(date +%Y%m%d-%H%M%S)-$((RANDOM % 9000 + 1000))"
          echo "session_id=$SESSION_ID" >> $GITHUB_OUTPUT
          
          START_TS=$(date +%s)
          echo "start_timestamp=$START_TS" >> $GITHUB_OUTPUT
          
          DUR_INPUT="${{ github.event.inputs.duration }}"
          case "$DUR_INPUT" in
            "30m") DUR=30 ;;
            "1h") DUR=60 ;;
            "2h") DUR=120 ;;
            "4h") DUR=240 ;;
            "6h") DUR=360 ;;
            *) DUR=120 ;;
          esac
          echo "duration_minutes=$DUR" >> $GITHUB_OUTPUT
          
          TERM_TIME=$(date -d "+$DUR minutes" "+%Y-%m-%d %H:%M:%S UTC")
          echo "termination_time=$TERM_TIME" >> $GITHUB_OUTPUT
          
          echo "============================================================"
          echo "              NEURAL MASTER ACTIVATED"
          echo "============================================================"
          echo "  Session ID    : $SESSION_ID"
          echo "  Duration      : $DUR minutes"
          echo "  Termination   : $TERM_TIME"
          echo "  Target OS     : ${{ github.event.inputs.target_os }}"
          echo "  Performance   : ${{ github.event.inputs.performance_mode }}"
          echo "============================================================"
          echo ""

  windows_deploy:
    needs: [master_brain]
    if: github.event.inputs.target_os == 'windows' || github.event.inputs.target_os == 'all'
    runs-on: windows-latest
    timeout-minutes: 360
    outputs:
      status: ${{ steps.verify.outputs.status }}
      public_ip: ${{ steps.get_public_ip.outputs.public_ip }}
      tailscale_ip: ${{ steps.tailscale.outputs.tailscale_ip }}
      port: ${{ steps.rdp_port.outputs.port }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      os_type: windows
    steps:
      - name: Deploy Windows 11
        run: |
          Write-Host ""
          Write-Host "============================================================" -ForegroundColor Cyan
          Write-Host "              WINDOWS 11 DEPLOYMENT" -ForegroundColor Cyan
          Write-Host "============================================================" -ForegroundColor Cyan
          Write-Host ""

      - name: Configure Remote Desktop
        run: |
          Write-Host "[1/6] Enabling Remote Desktop..." -ForegroundColor Yellow
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Write-Host "[2/6] Configuring Firewall..." -ForegroundColor Yellow
          netsh advfirewall firewall add rule name="RDP-In" dir=in action=allow protocol=TCP localport=3389
          netsh advfirewall firewall add rule name="RDP-Out" dir=out action=allow protocol=TCP localport=3389
          Write-Host "[3/6] Restarting Terminal Services..." -ForegroundColor Yellow
          Restart-Service -Name TermService -Force -ErrorAction SilentlyContinue
          Write-Host "Remote Desktop configured successfully" -ForegroundColor Green

      - name: Create User Account
        id: create_user
        run: |
          Write-Host "[4/6] Creating user account..." -ForegroundColor Yellow
          $username = "neural_$((Get-Random -Minimum 1000 -Maximum 9999))"
          $password = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 20 | ForEach-Object {[char]$_})
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name $username -Password $securePass -AccountNeverExpires -PasswordNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $username
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
          echo "username=$username" >> $env:GITHUB_OUTPUT
          echo "password=$password" >> $env:GITHUB_OUTPUT
          Write-Host "User created: $username" -ForegroundColor Green

      - name: Install Tailscale
        run: |
          Write-Host "[5/6] Installing Tailscale..." -ForegroundColor Yellow
          $msiPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msiPath -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i", "`"$msiPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $msiPath -Force -ErrorAction SilentlyContinue
          Write-Host "Tailscale installed successfully" -ForegroundColor Green

      - name: Connect Tailscale
        id: tailscale
        run: |
          Write-Host "Connecting to Tailscale network..." -ForegroundColor Yellow
          Start-Sleep -Seconds 5
          $tailscalePath = "$env:ProgramFiles\Tailscale\tailscale.exe"
          & $tailscalePath up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=neural-win --accept-routes --accept-dns
          Start-Sleep -Seconds 3
          $tailscale_ip = & $tailscalePath ip -4
          echo "tailscale_ip=$tailscale_ip" >> $env:GITHUB_OUTPUT
          Write-Host "Tailscale IP: $tailscale_ip" -ForegroundColor Green

      - name: Get Public IP
        id: get_public_ip
        run: |
          Write-Host "[6/6] Fetching public IP address..." -ForegroundColor Yellow
          $public_ip = ""
          $sources = @(
            "https://api.ipify.org",
            "https://ifconfig.me/ip",
            "https://icanhazip.com",
            "https://checkip.amazonaws.com"
          )
          foreach ($source in $sources) {
            try {
              $public_ip = (Invoke-WebRequest -Uri $source -UseBasicParsing -TimeoutSec 5).Content.Trim()
              if ($public_ip -match '^[0-9.]+$') { break }
            } catch { continue }
          }
          if ([string]::IsNullOrEmpty($public_ip)) { $public_ip = "UNAVAILABLE" }
          echo "public_ip=$public_ip" >> $env:GITHUB_OUTPUT
          Write-Host "Public IP: $public_ip" -ForegroundColor Green

      - name: Set RDP Port
        id: rdp_port
        run: echo "port=3389" >> $env:GITHUB_OUTPUT

      - name: Verify Deployment
        id: verify
        run: |
          $service = Get-Service -Name TermService -ErrorAction SilentlyContinue
          if ($service.Status -eq 'Running') {
            echo "status=active" >> $env:GITHUB_OUTPUT
            Write-Host "Terminal Service is running" -ForegroundColor Green
          } else {
            echo "status=failed" >> $env:GITHUB_OUTPUT
            Write-Host "Terminal Service failed to start" -ForegroundColor Red
          }
          
          Write-Host ""
          Write-Host "============================================================" -ForegroundColor Green
          Write-Host "              WINDOWS 11 READY" -ForegroundColor Green
          Write-Host "============================================================" -ForegroundColor Green
          Write-Host "  Public RDP    : ${{ steps.get_public_ip.outputs.public_ip }}:3389" -ForegroundColor Green
          Write-Host "  Tailscale RDP : ${{ steps.tailscale.outputs.tailscale_ip }}:3389" -ForegroundColor Green
          Write-Host "  Username      : ${{ steps.create_user.outputs.username }}" -ForegroundColor Green
          Write-Host "  Password      : ${{ steps.create_user.outputs.password }}" -ForegroundColor Green
          Write-Host "============================================================" -ForegroundColor Green
          Write-Host ""

      - name: Keep Session Alive
        run: |
          $DURATION = ${{ needs.master_brain.outputs.duration_minutes }}
          $START_EPOCH = [int]${{ needs.master_brain.outputs.start_timestamp }}
          $END_EPOCH = $START_EPOCH + ($DURATION * 60)
          Write-Host "Runtime counter started - Session will end automatically" -ForegroundColor Magenta
          while ([int](Get-Date -UFormat %s) -lt $END_EPOCH) {
            $REMAINING = $END_EPOCH - [int](Get-Date -UFormat %s)
            $MINUTES_LEFT = [math]::Floor($REMAINING / 60)
            Write-Host "Windows 11 - Active | Time remaining: ${MINUTES_LEFT} minutes" -ForegroundColor Green
            Start-Sleep -Seconds 60
          }
          Write-Host "Session expired - Shutting down" -ForegroundColor Red

  ubuntu22_deploy:
    needs: [master_brain]
    if: github.event.inputs.target_os == 'ubuntu22' || github.event.inputs.target_os == 'all'
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    outputs:
      status: ${{ steps.verify.outputs.status }}
      public_ip: ${{ steps.get_public_ip.outputs.public_ip }}
      tailscale_ip: ${{ steps.tailscale.outputs.tailscale_ip }}
      port: ${{ steps.ssh_port.outputs.port }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      os_type: ubuntu22
    steps:
      - name: Deploy Ubuntu 22.04
        run: |
          echo ""
          echo "============================================================"
          echo "              UBUNTU 22.04 DEPLOYMENT"
          echo "============================================================"
          echo ""

      - name: Install Required Packages
        run: |
          echo "[1/6] Updating system packages..." && sudo apt update -qq
          echo "[2/6] Installing OpenSSH server..." && sudo apt install -y -qq openssh-server
          echo "[3/6] Installing utilities..." && sudo apt install -y -qq curl wget
          echo "System prepared successfully"

      - name: Install Tailscale
        run: |
          echo "[4/6] Installing Tailscale..." && curl -fsSL https://tailscale.com/install.sh | sh
          echo "Tailscale installed successfully"

      - name: Connect Tailscale
        id: tailscale
        run: |
          echo "Connecting to Tailscale network..."
          sudo tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --accept-routes --accept-dns --hostname=neural-ubuntu22
          sleep 3
          TAILSCALE_IP=$(tailscale ip -4)
          echo "tailscale_ip=$TAILSCALE_IP" >> $GITHUB_OUTPUT
          echo "Tailscale IP: $TAILSCALE_IP"

      - name: Create User Account
        id: create_user
        run: |
          echo "[5/6] Creating user account..."
          USERNAME="ub22_$((RANDOM % 9000 + 1000))"
          PASSWORD=$(openssl rand -base64 20 | tr -d '=+/' | cut -c1-24)
          sudo useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo "$USERNAME"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "User created: $USERNAME"

      - name: Configure SSH
        id: ssh_port
        run: |
          echo "[6/6] Configuring SSH service..."
          sudo ssh-keygen -A
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "port=22" >> $GITHUB_OUTPUT
          sudo systemctl restart ssh
          sudo systemctl enable ssh
          echo "SSH configured on port 22"

      - name: Get Public IP
        id: get_public_ip
        run: |
          echo "Fetching public IP address..."
          PUBLIC_IP=""
          for url in "https://api.ipify.org" "https://ifconfig.me/ip" "https://icanhazip.com"; do
            TEMP_IP=$(curl -s --max-time 5 $url 2>/dev/null | tr -d '\n\r')
            if [ -n "$TEMP_IP" ] && [[ "$TEMP_IP" =~ ^[0-9.]+$ ]]; then
              PUBLIC_IP="$TEMP_IP"
              break
            fi
          done
          if [ -z "$PUBLIC_IP" ]; then PUBLIC_IP="UNAVAILABLE"; fi
          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "Public IP: $PUBLIC_IP"

      - name: Verify Deployment
        id: verify
        run: |
          if sudo systemctl is-active ssh > /dev/null 2>&1; then
            echo "status=active" >> $GITHUB_OUTPUT
            echo "SSH service is running"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "SSH service failed to start"
          fi
          
          echo ""
          echo "============================================================"
          echo "              UBUNTU 22.04 READY"
          echo "============================================================"
          echo "  Public SSH    : ssh ${{ steps.create_user.outputs.username }}@${{ steps.get_public_ip.outputs.public_ip }} -p 22"
          echo "  Tailscale SSH : ssh ${{ steps.create_user.outputs.username }}@${{ steps.tailscale.outputs.tailscale_ip }} -p 22"
          echo "  Username      : ${{ steps.create_user.outputs.username }}"
          echo "  Password      : ${{ steps.create_user.outputs.password }}"
          echo "============================================================"
          echo ""

      - name: Keep Session Alive
        run: |
          DURATION=${{ needs.master_brain.outputs.duration_minutes }}
          START=${{ needs.master_brain.outputs.start_timestamp }}
          END=$((START + DURATION * 60))
          echo "Runtime counter started - Session will end automatically"
          while [ $(date +%s) -lt $END ]; do
            REMAINING=$((END - $(date +%s)))
            echo "Ubuntu 22.04 - Active | Time remaining: $((REMAINING / 60)) minutes"
            sleep 60
          done
          echo "Session expired - Shutting down"

