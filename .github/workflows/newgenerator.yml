            MSG="$MSG"'----------------------------'$'\n'
            MSG="$MSG"'Public RDP: '"${{ needs.almalinux_rdp_deploy.outputs.public_ip }}:3389"$'\n'
            MSG="$MSG"'Tailscale RDP: '"${{ needs.almalinux_rdp_deploy.outputs.tailscale_ip }}:3389"$'\n'
            MSG="$MSG"'Username: '"${{ needs.almalinux_rdp_deploy.outputs.username }}"$'\n'
            MSG="$MSG"'Password: '"${{ needs.almalinux_rdp_deploy.outputs.password }}"$'\n'
            SENT_COUNT=$((SENT_COUNT + 1))
          fi
          
          if [ "${{ needs.almalinux_ssh_deploy.outputs.status }}" = "active" ]; then
            MSG="$MSG"$'\n'
            MSG="$MSG"'📗 ALMALINUX 9 (SSH)'$'\n'
            MSG="$MSG"'----------------------------'$'\n'
            MSG="$MSG"'Public SSH: ssh '"${{ needs.almalinux_ssh_deploy.outputs.username }}@${{ needs.almalinux_ssh_deploy.outputs.public_ip }} -p 22"$'\n'
            MSG="$MSG"'Tailscale SSH: ssh '"${{ needs.almalinux_ssh_deploy.outputs.username }}@${{ needs.almalinux_ssh_deploy.outputs.tailscale_ip }} -p 22"$'\n'
            MSG="$MSG"'Password: '"${{ needs.almalinux_ssh_deploy.outputs.password }}"$'\n'
            SENT_COUNT=$((SENT_COUNT + 1))
          fi
          
          MSG="$MSG"$'\n'
          MSG="$MSG"'=============================='$'\n'
          MSG="$MSG"'✅ System Online'$'\n'
          MSG="$MSG"'🔐 Connect via Tailscale for secure access'$'\n'
          MSG="$MSG"'=============================='$'\n'
          
          if [ -n "$BOT_TOKEN" ] && [ -n "$CHAT_ID" ] && [ $SENT_COUNT -gt 0 ]; then
            curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="$MSG" \
              -d disable_web_page_preview="true"
