  # ==============================================================================
  # 🐍 DEBIAN 12 - SSH ACCESS (FIXED NO SYSTEMD)
  # ==============================================================================
  debian_deploy:
    needs: [master_brain]
    if: github.event.inputs.target_os == 'debian' || github.event.inputs.target_os == 'all'
    runs-on: ubuntu-latest
    container:
      image: debian:12
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      ip: ${{ steps.get_ip.outputs.ip }}
      port: ${{ steps.ssh_port.outputs.port }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      os_type: ${{ steps.os_info.outputs.os_type }}
    steps:
      - name: 🐍 Debian 12 Deployment Start
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════╗"
          echo "║                    🐍 DEBIAN 12 DEPLOYMENT 🐍                       ║"
          echo "╚════════════════════════════════════════════════════════════════════╝"
          echo ""

      - name: 📋 Get OS Info
        id: os_info
        run: |
          echo "os_type=Debian 12 Bookworm" >> $GITHUB_OUTPUT
          echo "✅ OS: Debian 12 Bookworm"

      - name: 🔄 Method 1 - Update System
        run: |
          echo "[1/7] Updating package list..."
          apt update -qq
          echo "✅ System updated"

      - name: 📦 Method 2 - Install SSH Server
        run: |
          echo "[2/7] Installing OpenSSH server..."
          apt install -y -qq openssh-server
          echo "✅ OpenSSH installed"

      - name: 🔧 Method 3 - Install sudo and curl
        run: |
          echo "[3/7] Installing sudo and curl..."
          apt install -y -qq sudo curl
          echo "✅ Tools installed"

      - name: 👤 Method 4 - Create User
        id: create_user
        run: |
          echo "[4/7] Creating user account..."
          USERNAME="deb_$((RANDOM % 9000 + 1000))"
          PASSWORD=$(openssl rand -base64 20 | tr -d '=+/' | cut -c1-24)
          useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | chpasswd
          usermod -aG sudo "$USERNAME"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "✅ User created: $USERNAME"

      - name: 🔑 Method 5 - Generate SSH Host Keys
        run: |
          echo "[5/7] Generating SSH host keys..."
          ssh-keygen -A
          echo "✅ Host keys generated"

      - name: ⚙️ Method 6 - Configure SSH (No systemd)
        id: ssh_port
        run: |
          echo "[6/7] Configuring SSH service..."
          sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "port=22" >> $GITHUB_OUTPUT
          
          if command -v systemctl > /dev/null 2>&1; then
            systemctl restart ssh || true
          else
            /etc/init.d/ssh restart || service ssh restart
          fi
          echo "✅ SSH configured"

      - name: 🌐 Method 7 - Get Public IP
        id: get_ip
        run: |
          echo "[7/7] Getting public IP..."
          apt install -y -qq wget
          IP=""
          for url in "https://api.ipify.org" "https://ifconfig.me/ip" "https://icanhazip.com"; do
            TEMP_IP=$(wget -qO- --timeout=5 $url 2>/dev/null | tr -d '\n\r')
            if [ -n "$TEMP_IP" ] && echo "$TEMP_IP" | grep -qE '^[0-9.]+$'; then
              IP="$TEMP_IP"
              break
            fi
          done
          if [ -z "$IP" ]; then
            IP="IP_UNAVAILABLE"
          fi
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "✅ Public IP: $IP"

      - name: ✅ Verify SSH
        id: status
        run: |
          if pgrep sshd > /dev/null 2>&1; then
            echo "status=active" >> $GITHUB_OUTPUT
            echo "✅ SSH is running"
          else
            /usr/sbin/sshd
            sleep 2
            if pgrep sshd > /dev/null 2>&1; then
              echo "status=active" >> $GITHUB_OUTPUT
              echo "✅ SSH started"
            else
              echo "status=failed" >> $GITHUB_OUTPUT
              echo "❌ SSH failed"
            fi
          fi
          
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════╗"
          echo "║  ✅ DEBIAN 12 DEPLOYMENT COMPLETE                                   ║"
          echo "╠════════════════════════════════════════════════════════════════════╣"
          echo "║  🌐 SSH: ssh ${{ steps.create_user.outputs.username }}@${{ steps.get_ip.outputs.ip }} -p 22"
          echo "║  👤 User: ${{ steps.create_user.outputs.username }}"
          echo "║  🔐 Pass: ${{ steps.create_user.outputs.password }}"
          echo "╚════════════════════════════════════════════════════════════════════╝"
          echo ""

