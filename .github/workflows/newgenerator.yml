      public_ip: ${{ steps.get_public_ip.outputs.public_ip }}
      tailscale_ip: ${{ steps.tailscale.outputs.tailscale_ip }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      os_type: debian
    steps:
      - run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║                   DEBIAN 12 DEPLOYMENT                    ║"
          echo "╚════════════════════════════════════════════════════════════╝"
      - name: Install Packages
        run: |
          apt update -qq
          apt install -y -qq openssh-server sudo curl wget procps iproute2
      - name: Install Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh
      - name: Connect Tailscale
        id: tailscale
        run: |
          mkdir -p /var/run/tailscale
          tailscaled --state=/var/run/tailscale/tailscaled.state --socket=/var/run/tailscale/tailscaled.sock &
          sleep 3
          tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --hostname=neural-debian --accept-routes
          echo "tailscale_ip=$(tailscale ip -4)" >> $GITHUB_OUTPUT
      - name: Create User Account
        id: create_user
        run: |
          USERNAME="deb_$((RANDOM%9000+1000))"
          PASSWORD=$(openssl rand -base64 20 | tr -d '=+/' | cut -c1-24)
          useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | chpasswd
          usermod -aG sudo "$USERNAME"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "[+] User created: $USERNAME"
      - name: Configure SSH
        run: |
          ssh-keygen -A
          sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          /usr/sbin/sshd
      - name: Get Public IP
        id: get_public_ip
        run: |
          IP=$(curl -s --max-time 5 https://api.ipify.org 2>/dev/null || echo "UNAVAILABLE")
          echo "public_ip=$IP" >> $GITHUB_OUTPUT
      - name: Verify Deployment
        id: verify
        run: |
