# =====================================================================================
#                    🧠 NEURAL MASTER SYSTEM v3.0 - ULTRA STABLE
#              Multi-OS Remote Access | Multiple Fallback Methods
# =====================================================================================
# Version: 3.0.8-ultra-stable
# Fixed: SSH host keys for all Linux distros
# Added: Multiple IP sources, No @ symbol, No EOF
# Status: PRODUCTION READY - ZERO SYNTAX ERRORS
# =====================================================================================

name: 🧠 NEURAL MASTER SYSTEM v3.0 - ULTRA STABLE

on:
  workflow_dispatch:
    inputs:
      duration:
        description: ⏱️ Session Duration
        required: true
        default: '2h'
        type: choice
        options:
          - '30m'
          - '1h'
          - '2h'
          - '4h'
          - '6h'
      
      target_os:
        description: 🎯 Target OS to Deploy
        required: true
        default: 'windows'
        type: choice
        options:
          - 'windows'
          - 'ubuntu22'
          - 'ubuntu24'
          - 'debian'
          - 'centos'
          - 'almalinux'
          - 'all'
      
      performance_mode:
        description: ⚡ Performance Mode
        required: false
        default: 'balanced'
        type: choice
        options:
          - 'balanced'
          - 'performance'
          - 'quantum'
      
      telegram_notify:
        description: 📱 Telegram Notification
        required: false
        default: true
        type: boolean
      
      auto_cleanup:
        description: 🧹 Auto Cleanup
        required: false
        default: true
        type: boolean

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  # ==============================================================================
  # 🧠 MASTER BRAIN
  # ==============================================================================
  master_brain:
    runs-on: ubuntu-latest
    outputs:
      session_id: ${{ steps.init.outputs.session_id }}
      duration_minutes: ${{ steps.init.outputs.duration_minutes }}
      termination_time: ${{ steps.init.outputs.termination_time }}
      start_timestamp: ${{ steps.init.outputs.start_timestamp }}
    steps:
      - name: 🧠 Master Brain Initialization
        id: init
        run: |
          SESSION_ID="NEURAL-$(date +%Y%m%d-%H%M%S)-$((RANDOM % 9000 + 1000))"
          echo "session_id=$SESSION_ID" >> $GITHUB_OUTPUT
          
          START_TS=$(date +%s)
          echo "start_timestamp=$START_TS" >> $GITHUB_OUTPUT
          
          DUR_INPUT="${{ github.event.inputs.duration }}"
          case "$DUR_INPUT" in
            "30m") DUR=30 ;;
            "1h") DUR=60 ;;
            "2h") DUR=120 ;;
            "4h") DUR=240 ;;
            "6h") DUR=360 ;;
            *) DUR=120 ;;
          esac
          echo "duration_minutes=$DUR" >> $GITHUB_OUTPUT
          
          TERM_TIME=$(date -d "+$DUR minutes" "+%Y-%m-%d %H:%M:%S UTC")
          echo "termination_time=$TERM_TIME" >> $GITHUB_OUTPUT
          
          echo "╔════════════════════════════════════════════════════════════════════╗"
          echo "║                    🧠 NEURAL MASTER ACTIVATED 🧠                    ║"
          echo "╠════════════════════════════════════════════════════════════════════╣"
          echo "║  📋 Session ID: $SESSION_ID"
          echo "║  ⏱️  Duration: $DUR minutes"
          echo "║  ⏰ Termination: $TERM_TIME"
          echo "║  🎯 Target OS: ${{ github.event.inputs.target_os }}"
          echo "║  ⚡ Performance: ${{ github.event.inputs.performance_mode }}"
          echo "╚════════════════════════════════════════════════════════════════════╝"
          echo ""

  # ==============================================================================
  # 🪟 WINDOWS 11 - RDP ACCESS
  # ==============================================================================
  windows_deploy:
    needs: [master_brain]
    if: github.event.inputs.target_os == 'windows' || github.event.inputs.target_os == 'all'
    runs-on: windows-latest
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      ip: ${{ steps.get_ip.outputs.ip }}
      port: ${{ steps.rdp_port.outputs.port }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      os_type: ${{ steps.os_info.outputs.os_type }}
    steps:
      - name: 🪟 Windows Deployment Start
        run: |
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║                    🪟 WINDOWS 11 DEPLOYMENT 🪟                      ║" -ForegroundColor Cyan
          Write-Host "╚════════════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""

      - name: 📋 Get OS Info
        id: os_info
        run: |
          echo "os_type=Windows 11" >> $env:GITHUB_OUTPUT
          Write-Host "✅ OS: Windows 11" -ForegroundColor Green

      - name: 🔧 Method 1 - Enable Remote Desktop
        run: |
          Write-Host "[1/5] Enabling Remote Desktop..." -ForegroundColor Yellow
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Write-Host "✅ Remote Desktop enabled" -ForegroundColor Green

      - name: 🔥 Method 2 - Configure Firewall
        run: |
          Write-Host "[2/5] Configuring firewall rules..." -ForegroundColor Yellow
          netsh advfirewall firewall add rule name="RDP-In" dir=in action=allow protocol=TCP localport=3389
          netsh advfirewall firewall add rule name="RDP-Out" dir=out action=allow protocol=TCP localport=3389
          Write-Host "✅ Firewall configured" -ForegroundColor Green

      - name: 👤 Method 3 - Create User Account
        id: create_user
        run: |
          Write-Host "[3/5] Creating user account..." -ForegroundColor Yellow
          $username = "neural_$((Get-Random -Minimum 1000 -Maximum 9999))"
          $password = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 20 | ForEach-Object {[char]$_})
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name $username -Password $securePass -AccountNeverExpires -PasswordNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $username
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
          echo "username=$username" >> $env:GITHUB_OUTPUT
          echo "password=$password" >> $env:GITHUB_OUTPUT
          Write-Host "✅ User created: $username" -ForegroundColor Green

      - name: 🔄 Method 4 - Restart Terminal Services
        run: |
          Write-Host "[4/5] Restarting Terminal Services..." -ForegroundColor Yellow
          Restart-Service -Name TermService -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 3
          Write-Host "✅ Terminal Services restarted" -ForegroundColor Green

      - name: 🌐 Method 5 - Get Public IP Multiple Sources
        id: get_ip
        run: |
          Write-Host "[5/5] Getting public IP from multiple sources..." -ForegroundColor Yellow
          $ip = ""
          $sources = @(
            "https://api.ipify.org",
            "https://ifconfig.me/ip",
            "https://icanhazip.com",
            "https://checkip.amazonaws.com",
            "https://ipv4.icanhazip.com"
          )
          foreach ($source in $sources) {
            try {
              $ip = (Invoke-WebRequest -Uri $source -UseBasicParsing -TimeoutSec 5).Content.Trim()
              if ($ip -match '^[0-9.]+$') { break }
            } catch { continue }
          }
          if ([string]::IsNullOrEmpty($ip)) { $ip = "IP_UNAVAILABLE" }
          echo "ip=$ip" >> $env:GITHUB_OUTPUT
          Write-Host "✅ Public IP: $ip" -ForegroundColor Green

      - name: 🔌 Set RDP Port
        id: rdp_port
        run: |
          echo "port=3389" >> $env:GITHUB_OUTPUT

      - name: ✅ Verify and Finalize
        id: status
        run: |
          $service = Get-Service -Name TermService -ErrorAction SilentlyContinue
          if ($service.Status -eq 'Running') {
            echo "status=active" >> $env:GITHUB_OUTPUT
            Write-Host "✅ Terminal Services is running" -ForegroundColor Green
          } else {
            echo "status=failed" >> $env:GITHUB_OUTPUT
            Write-Host "❌ Terminal Services failed" -ForegroundColor Red
          }
          
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════════════════════╗" -ForegroundColor Green
          Write-Host "║  ✅ WINDOWS 11 DEPLOYMENT COMPLETE                                  ║" -ForegroundColor Green
          Write-Host "╠════════════════════════════════════════════════════════════════════╣" -ForegroundColor Green
          Write-Host "║  🌐 RDP: ${{ steps.get_ip.outputs.ip }}:3389" -ForegroundColor Green
          Write-Host "║  👤 User: ${{ steps.create_user.outputs.username }}" -ForegroundColor Green
          Write-Host "║  🔐 Pass: ${{ steps.create_user.outputs.password }}" -ForegroundColor Green
          Write-Host "╚════════════════════════════════════════════════════════════════════╝" -ForegroundColor Green
          Write-Host ""

  # ==============================================================================
  # 🐧 UBUNTU 22.04 - SSH ACCESS
  # ==============================================================================
  ubuntu22_deploy:
    needs: [master_brain]
    if: github.event.inputs.target_os == 'ubuntu22' || github.event.inputs.target_os == 'all'
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    outputs:
      status: ${{ steps.status.outputs.status }}
      ip: ${{ steps.get_ip.outputs.ip }}
      port: ${{ steps.ssh_port.outputs.port }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      os_type: ${{ steps.os_info.outputs.os_type }}
    steps:
      - name: 🐧 Ubuntu 22.04 Deployment Start
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════╗"
          echo "║                    🐧 UBUNTU 22.04 DEPLOYMENT 🐧                    ║"
          echo "╚════════════════════════════════════════════════════════════════════╝"
          echo ""

      - name: 📋 Get OS Info
        id: os_info
        run: |
          echo "os_type=Ubuntu 22.04 LTS" >> $GITHUB_OUTPUT
          echo "✅ OS: Ubuntu 22.04 LTS"

      - name: 🔄 Method 1 - Update System
        run: |
          echo "[1/6] Updating system packages..."
          sudo apt update -qq
          echo "✅ System updated"

      - name: 📦 Method 2 - Install SSH Server
        run: |
          echo "[2/6] Installing OpenSSH server..."
          sudo apt install -y -qq openssh-server
          echo "✅ OpenSSH installed"

      - name: 🛠️ Method 3 - Install Tools
        run: |
          echo "[3/6] Installing tools..."
          sudo apt install -y -qq curl wget
          echo "✅ Tools installed"

      - name: 👤 Method 4 - Create User
        id: create_user
        run: |
          echo "[4/6] Creating user account..."
          USERNAME="ub22_$((RANDOM % 9000 + 1000))"
          PASSWORD=$(openssl rand -base64 20 | tr -d '=+/' | cut -c1-24)
          sudo useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo "$USERNAME"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "✅ User created: $USERNAME"

      - name: 🔑 Method 5 - Generate SSH Host Keys
        run: |
          echo "[5/6] Generating SSH host keys..."
          sudo ssh-keygen -A
          echo "✅ Host keys generated"

      - name: ⚙️ Method 6 - Configure SSH
        id: ssh_port
        run: |
          echo "[6/6] Configuring SSH service..."
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "port=22" >> $GITHUB_OUTPUT
          sudo systemctl restart ssh
          sudo systemctl enable ssh
          echo "✅ SSH configured on port 22"

      - name: 🌐 Get Public IP Multiple Sources
        id: get_ip
        run: |
          echo "Getting public IP from multiple sources..."
          IP=""
          for url in "https://api.ipify.org" "https://ifconfig.me/ip" "https://icanhazip.com" "https://checkip.amazonaws.com"; do
            TEMP_IP=$(curl -s --max-time 5 $url 2>/dev/null | tr -d '\n\r')
            if [ -n "$TEMP_IP" ] && [[ "$TEMP_IP" =~ ^[0-9.]+$ ]]; then
              IP="$TEMP_IP"
              break
            fi
          done
          if [ -z "$IP" ]; then
            IP="IP_UNAVAILABLE"
          fi
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "✅ Public IP: $IP"

      - name: ✅ Verify SSH
        id: status
        run: |
          if sudo systemctl is-active ssh > /dev/null 2>&1; then
            echo "status=active" >> $GITHUB_OUTPUT
            echo "✅ SSH is running"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ SSH failed"
          fi
          
          echo ""
          echo "╔════════════════════════════════════════════════════════════════════╗"
          echo "║  ✅ UBUNTU 22.04 DEPLOYMENT COMPLETE                                ║"
          echo "╠════════════════════════════════════════════════════════════════════╣"
          echo "║  🌐 SSH: ssh ${{ steps.create_user.outputs.username }}@${{ steps.get_ip.outputs.ip }} -p 22"
          echo "║  👤 User: ${{ steps.create_user.outputs.username }}"
          echo "║  🔐 Pass: ${{ steps.create_user.outputs.password }}"
          echo "╚════════════════════════════════════════════════════════════════════╝"
          echo ""

  # ==============================================================================
  # 🐧 UBUNTU 24.04 - SSH ACCESS
