    if: always() && github.event.inputs.telegram_notify == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Send Connection Info via Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="🚀 NEURAL MASTER SYSTEM v4.1"
          MSG="$MSG"$'\n'
          MSG="$MSG"$'\n'
          MSG="$MSG"'=============================='$'\n'
          MSG="$MSG"'Session ID: '"${{ needs.init.outputs.session_id }}"$'\n'
          MSG="$MSG"'Duration: '"${{ github.event.inputs.duration }}"$'\n'
          MSG="$MSG"'Expires: '"${{ needs.init.outputs.termination_time }}"$'\n'
          MSG="$MSG"'Mode: '"${{ github.event.inputs.performance_mode }}"$'\n'
          MSG="$MSG"'=============================='$'\n'
          
          SENT_COUNT=0
          
