# =====================================================================================
#              NEURAL MASTER SYSTEM v4.1 - QUANTUM EDITION
#         Multi-OS Remote Access | RDP + SSH | Tailscale | Telegram Bot
# =====================================================================================

name: NEURAL MASTER SYSTEM v4.1

on:
  workflow_dispatch:
    inputs:
      duration:
        description: Session Duration
        required: true
        default: '2h'
        type: choice
        options: ['30m', '1h', '2h', '4h', '6h']
      target_os:
        description: Target OS
        required: true
        default: 'windows'
        type: choice
        options: ['windows', 'ubuntu-rdp', 'ubuntu-ssh', 'almalinux-rdp', 'almalinux-ssh', 'all']
      performance_mode:
        description: Performance Mode
        required: false
        default: 'balanced'
        type: choice
        options: ['balanced', 'performance', 'quantum']
      telegram_notify:
        description: Send Telegram Notification
        required: false
        default: true
        type: boolean
      auto_cleanup:
        description: Auto Cleanup
        required: false
        default: true
        type: boolean

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}

jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      session_id: ${{ steps.init.outputs.session_id }}
      duration_minutes: ${{ steps.init.outputs.duration_minutes }}
      termination_time: ${{ steps.init.outputs.termination_time }}
      start_timestamp: ${{ steps.init.outputs.start_timestamp }}
    steps:
      - id: init
        run: |
          SESSION_ID="NEURAL-$(date +%Y%m%d-%H%M%S)-$((RANDOM%9000+1000))"
          START_TS=$(date +%s)
          DUR_INPUT="${{ github.event.inputs.duration }}"
          case "$DUR_INPUT" in "30m") DUR=30;; "1h") DUR=60;; "2h") DUR=120;; "4h") DUR=240;; "6h") DUR=360;; *) DUR=120;; esac
          echo "session_id=$SESSION_ID" >> $GITHUB_OUTPUT
          echo "start_timestamp=$START_TS" >> $GITHUB_OUTPUT
          echo "duration_minutes=$DUR" >> $GITHUB_OUTPUT
          echo "termination_time=$(date -d "+$DUR minutes" "+%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_OUTPUT
          echo "============================================================"
          echo "              NEURAL MASTER SYSTEM v4.1 ACTIVE"
          echo "============================================================"
          echo "  Session ID    : $SESSION_ID"
          echo "  Duration      : $DUR minutes"
          echo "  Target OS     : ${{ github.event.inputs.target_os }}"
          echo "  Mode          : ${{ github.event.inputs.performance_mode }}"
          echo "============================================================"

  # ==================== WINDOWS 11 (RDP) ====================
  windows_deploy:
    needs: [init]
    if: github.event.inputs.target_os == 'windows' || github.event.inputs.target_os == 'all'
    runs-on: windows-latest
    timeout-minutes: 360
    outputs:
      status: ${{ steps.verify.outputs.status }}
      public_ip: ${{ steps.get_public_ip.outputs.public_ip }}
      tailscale_ip: ${{ steps.tailscale.outputs.tailscale_ip }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      os_type: windows
      connection_type: rdp
    steps:
      - run: Write-Host "=== WINDOWS 11 DEPLOYMENT ===" -ForegroundColor Cyan
      
      - name: Enable Remote Desktop
        run: |
          Write-Host "[1/5] Enabling Remote Desktop..." -ForegroundColor Yellow
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP-In" dir=in action=allow protocol=TCP localport=3389
          Restart-Service TermService -Force -ErrorAction SilentlyContinue
          Write-Host "[OK] Remote Desktop enabled" -ForegroundColor Green
      
      - name: Create User Account
        id: create_user
        run: |
          Write-Host "[2/5] Creating user account..." -ForegroundColor Yellow
          $username = "neural_$((Get-Random -Minimum 1000 -Maximum 9999))"
          $password = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 20 | ForEach-Object {[char]$_})
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name $username -Password $securePass -AccountNeverExpires -PasswordNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $username
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
          echo "username=$username" >> $env:GITHUB_OUTPUT
          echo "password=$password" >> $env:GITHUB_OUTPUT
          Write-Host "[OK] User created: $username" -ForegroundColor Green
      
      - name: Install Tailscale
        run: |
          Write-Host "[3/5] Installing Tailscale..." -ForegroundColor Yellow
          $msiPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msiPath -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i", "`"$msiPath`"", "/quiet", "/norestart" -Wait
          Write-Host "[OK] Tailscale installed" -ForegroundColor Green
      
      - name: Connect Tailscale
        id: tailscale
        run: |
          Write-Host "[4/5] Connecting to Tailscale..." -ForegroundColor Yellow
          Start-Sleep -Seconds 5
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=neural-win --accept-routes
          Start-Sleep -Seconds 3
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "tailscale_ip=$ip" >> $env:GITHUB_OUTPUT
          Write-Host "[OK] Tailscale IP: $ip" -ForegroundColor Green
      
      - name: Get Public IP
        id: get_public_ip
        run: |
          Write-Host "[5/5] Getting public IP..." -ForegroundColor Yellow
          try { $ip = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing -TimeoutSec 5).Content.Trim() } catch { $ip = "UNAVAILABLE" }
          echo "public_ip=$ip" >> $env:GITHUB_OUTPUT
          Write-Host "[OK] Public IP: $ip" -ForegroundColor Green
      
      - name: Verify Deployment
        id: verify
        run: |
          $svc = Get-Service TermService -ErrorAction SilentlyContinue
          if ($svc.Status -eq 'Running') { 
            echo "status=active" >> $env:GITHUB_OUTPUT
            Write-Host ""
            Write-Host "============================================================" -ForegroundColor Green
            Write-Host "              WINDOWS 11 READY" -ForegroundColor Green
            Write-Host "============================================================" -ForegroundColor Green
            Write-Host "  RDP Public    : ${{ steps.get_public_ip.outputs.public_ip }}:3389" -ForegroundColor Green
            Write-Host "  RDP Tailscale : ${{ steps.tailscale.outputs.tailscale_ip }}:3389" -ForegroundColor Green
            Write-Host "  Username      : ${{ steps.create_user.outputs.username }}" -ForegroundColor Green
            Write-Host "  Password      : ${{ steps.create_user.outputs.password }}" -ForegroundColor Green
            Write-Host "============================================================" -ForegroundColor Green
            Write-Host ""
          } else { echo "status=failed" >> $env:GITHUB_OUTPUT }
      
      - name: Keep Session Alive
        run: |
          $END = [int](Get-Date -UFormat %s) + ${{ needs.init.outputs.duration_minutes }} * 60
          while ([int](Get-Date -UFormat %s) -lt $END) { 
            $LEFT = (($END - [int](Get-Date -UFormat %s))/60)
            Write-Host "[WINDOWS] Active - $([math]::Floor($LEFT)) minutes remaining" -ForegroundColor DarkCyan
            Start-Sleep 60 
          }

  # ==================== UBUNTU 22.04 WITH RDP (XFCE4 + XRDP) - FIXED ====================
  ubuntu_rdp_deploy:
    needs: [init]
    if: github.event.inputs.target_os == 'ubuntu-rdp' || github.event.inputs.target_os == 'all'
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    outputs:
      status: ${{ steps.verify.outputs.status }}
      public_ip: ${{ steps.get_public_ip.outputs.public_ip }}
      tailscale_ip: ${{ steps.tailscale.outputs.tailscale_ip }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      os_type: ubuntu
      connection_type: rdp
    steps:
      - run: echo "=== UBUNTU 22.04 WITH RDP DEPLOYMENT (XFCE FIXED) ==="
      
      - name: Update System
        run: |
          echo "[1/11] Updating system packages..."
          sudo apt update -qq
          sudo apt upgrade -y -qq
          echo "[OK] System updated"
      
      - name: Install DBus and Dependencies
        run: |
          echo "[2/11] Installing DBus and dependencies..."
          sudo apt install -y -qq dbus dbus-x11 x11-utils x11-xserver-utils
          sudo systemctl enable dbus
          sudo systemctl start dbus
          echo "[OK] DBus installed and running"
      
      - name: Install Desktop Environment (XFCE4)
        run: |
          echo "[3/11] Installing XFCE4 desktop environment..."
          sudo apt install -y -qq xfce4 xfce4-goodies xfce4-session
          echo "[OK] XFCE4 installed"
      
      - name: Install XRDP Server
        run: |
          echo "[4/11] Installing XRDP server..."
          sudo apt install -y -qq xrdp
          sudo systemctl enable xrdp
          sudo systemctl start xrdp
          echo "[OK] XRDP installed and started"
      
      - name: Create ubuntu home directory if not exists
        run: |
          echo "[5/11] Ensuring ubuntu home directory exists..."
          sudo mkdir -p /home/ubuntu
          sudo chown ubuntu:ubuntu /home/ubuntu
          echo "[OK] Home directory ready"
      
      - name: Configure XRDP to use XFCE4
        run: |
          echo "[6/11] Configuring XRDP for XFCE4..."
          sudo bash -c 'echo "startxfce4" > /home/ubuntu/.xsession'
          sudo chown ubuntu:ubuntu /home/ubuntu/.xsession
          sudo chmod 644 /home/ubuntu/.xsession
          echo "[OK] XRDP configured"
      
      - name: Fix XRDP startup script
        run: |
          echo "[7/11] Fixing XRDP startup script..."
          sudo sed -i '/^test -x \/etc\/X11\/Xsession/ s/^/#/' /etc/xrdp/startwm.sh
          sudo sed -i '/^exec \/etc\/X11\/Xsession/ s/^/#/' /etc/xrdp/startwm.sh
          echo "startxfce4" | sudo tee -a /etc/xrdp/startwm.sh
          echo "[OK] Startup script updated"
      
      - name: Configure XFCE session environment
        run: |
          echo "[8/11] Configuring XFCE session environment..."
          echo "export XDG_CONFIG_DIRS=/etc/xdg" | sudo tee -a /etc/xrdp/xrdp.ini
          echo "export XDG_DATA_DIRS=/usr/share:/usr/local/share" | sudo tee -a /etc/xrdp/xrdp.ini
          echo "[OK] Environment configured"
      
      - name: Create DBus machine ID
        run: |
          echo "[9/11] Creating DBus machine ID..."
          sudo dbus-uuidgen | sudo tee /var/lib/dbus/machine-id
          echo "[OK] DBus machine ID created"
      
      - name: Restart XRDP and DBus Services
        run: |
          echo "Restarting services..."
          sudo systemctl restart dbus
          sudo systemctl restart xrdp
          echo "[OK] Services restarted"
      
      - name: Install Tailscale
        run: |
          echo "[10/11] Installing Tailscale..."
          curl -fsSL https://tailscale.com/install.sh | sh
          echo "[OK] Tailscale installed"
      
      - name: Connect Tailscale
        id: tailscale
        run: |
          echo "Connecting to Tailscale network..."
          sudo tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --hostname=neural-ubuntu-rdp --accept-routes
          sleep 3
          TAILSCALE_IP=$(tailscale ip -4)
          echo "tailscale_ip=$TAILSCALE_IP" >> $GITHUB_OUTPUT
          echo "[OK] Tailscale IP: $TAILSCALE_IP"
      
      - name: Create User Account
        id: create_user
        run: |
          echo "[11/11] Creating user account..."
          USERNAME="ubrdp_$((RANDOM%9000+1000))"
          PASSWORD=$(openssl rand -base64 20 | tr -d '=+/' | cut -c1-24)
          sudo useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo "$USERNAME"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "[OK] User created: $USERNAME"
      
      - name: Add User to XRDP and SSL Groups
        run: |
          echo "Adding user to XRDP groups..."
          sudo adduser ${{ steps.create_user.outputs.username }} ssl-cert
          sudo adduser ${{ steps.create_user.outputs.username }} xrdp
          echo "[OK] User added to groups"
      
      - name: Configure XFCE for New User
        run: |
          echo "Configuring XFCE for user..."
          sudo mkdir -p /home/${{ steps.create_user.outputs.username }}/.config/xfce4
          sudo chown -R ${{ steps.create_user.outputs.username }}:${{ steps.create_user.outputs.username }} /home/${{ steps.create_user.outputs.username }}/.config
          echo "[OK] User config created"
      
      - name: Get Public IP
        id: get_public_ip
        run: |
          IP=$(curl -s --max-time 5 https://api.ipify.org 2>/dev/null || echo "UNAVAILABLE")
          echo "public_ip=$IP" >> $GITHUB_OUTPUT
          echo "[OK] Public IP: $IP"
      
      - name: Verify Deployment
        id: verify
        run: |
          if sudo systemctl is-active xrdp > /dev/null 2>&1; then
            echo "status=active" >> $GITHUB_OUTPUT
            echo ""
            echo "============================================================"
            echo "              UBUNTU 22.04 WITH RDP READY"
            echo "============================================================"
            echo "  RDP Public    : ${{ steps.get_public_ip.outputs.public_ip }}:3389"
            echo "  RDP Tailscale : ${{ steps.tailscale.outputs.tailscale_ip }}:3389"
            echo "  Username      : ${{ steps.create_user.outputs.username }}"
            echo "  Password      : ${{ steps.create_user.outputs.password }}"
            echo "============================================================"
            echo ""
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi
      
      - name: Keep Session Alive
        run: |
          END=$(($(date +%s) + ${{ needs.init.outputs.duration_minutes }} * 60))
          while [ $(date +%s) -lt $END ]; do
            echo "[UBUNTU-RDP] Active - $((($END - $(date +%s))/60)) minutes left"
            sleep 60
          done

  # ==================== UBUNTU 22.04 WITH SSH ====================
  ubuntu_ssh_deploy:
    needs: [init]
    if: github.event.inputs.target_os == 'ubuntu-ssh' || github.event.inputs.target_os == 'all'
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    outputs:
      status: ${{ steps.verify.outputs.status }}
      public_ip: ${{ steps.get_public_ip.outputs.public_ip }}
      tailscale_ip: ${{ steps.tailscale.outputs.tailscale_ip }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      os_type: ubuntu
      connection_type: ssh
    steps:
      - run: echo "=== UBUNTU 22.04 WITH SSH DEPLOYMENT ==="
      
      - name: Update System and Install SSH
        run: |
          echo "[1/5] Updating system packages..."
          sudo apt update -qq
          echo "[2/5] Installing OpenSSH server..."
          sudo apt install -y -qq openssh-server
          echo "[OK] SSH installed"
      
      - name: Install Tailscale
        run: |
          echo "[3/5] Installing Tailscale..."
          curl -fsSL https://tailscale.com/install.sh | sh
          echo "[OK] Tailscale installed"
      
      - name: Connect Tailscale
        id: tailscale
        run: |
          echo "Connecting to Tailscale network..."
          sudo tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --hostname=neural-ubuntu-ssh --accept-routes
          sleep 3
          TAILSCALE_IP=$(tailscale ip -4)
          echo "tailscale_ip=$TAILSCALE_IP" >> $GITHUB_OUTPUT
          echo "[OK] Tailscale IP: $TAILSCALE_IP"
      
      - name: Create User Account
        id: create_user
        run: |
          echo "[4/5] Creating user account..."
          USERNAME="ubssh_$((RANDOM%9000+1000))"
          PASSWORD=$(openssl rand -base64 20 | tr -d '=+/' | cut -c1-24)
          sudo useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo "$USERNAME"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "[OK] User created: $USERNAME"
      
      - name: Configure SSH
        run: |
          echo "[5/5] Configuring SSH..."
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          echo "[OK] SSH configured"
      
      - name: Get Public IP
        id: get_public_ip
        run: |
          IP=$(curl -s --max-time 5 https://api.ipify.org 2>/dev/null || echo "UNAVAILABLE")
          echo "public_ip=$IP" >> $GITHUB_OUTPUT
          echo "[OK] Public IP: $IP"
      
      - name: Verify Deployment
        id: verify
        run: |
          if sudo systemctl is-active ssh > /dev/null 2>&1; then
            echo "status=active" >> $GITHUB_OUTPUT
            echo ""
            echo "============================================================"
            echo "              UBUNTU 22.04 WITH SSH READY"
            echo "============================================================"
            echo "  SSH Public    : ssh ${{ steps.create_user.outputs.username }}@${{ steps.get_public_ip.outputs.public_ip }} -p 22"
            echo "  SSH Tailscale : ssh ${{ steps.create_user.outputs.username }}@${{ steps.tailscale.outputs.tailscale_ip }} -p 22"
            echo "  Password      : ${{ steps.create_user.outputs.password }}"
            echo "============================================================"
            echo ""
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi
      
      - name: Keep Session Alive
        run: |
          END=$(($(date +%s) + ${{ needs.init.outputs.duration_minutes }} * 60))
          while [ $(date +%s) -lt $END ]; do
            echo "[UBUNTU-SSH] Active - $((($END - $(date +%s))/60)) minutes left"
            sleep 60
          done

  # ==================== ALMALINUX 9 WITH RDP (XFCE4 + XRDP) ====================
  almalinux_rdp_deploy:
    needs: [init]
    if: github.event.inputs.target_os == 'almalinux-rdp' || github.event.inputs.target_os == 'all'
    runs-on: ubuntu-latest
    container:
      image: almalinux:9
    timeout-minutes: 360
    outputs:
      status: ${{ steps.verify.outputs.status }}
      public_ip: ${{ steps.get_public_ip.outputs.public_ip }}
      tailscale_ip: ${{ steps.tailscale.outputs.tailscale_ip }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
      os_type: almalinux
      connection_type: rdp
    steps:
      - run: echo "=== ALMALINUX 9 WITH RDP DEPLOYMENT (XFCE FIXED) ==="
      
      - name: Update System
        run: |
          echo "[1/12] Updating system packages..."
          dnf update -y
          echo "[OK] System updated"
      
      - name: Install EPEL Repository
        run: |
          echo "[2/12] Installing EPEL repository..."
          dnf install -y epel-release
          echo "[OK] EPEL installed"
      
      - name: Install DBus and Dependencies
        run: |
          echo "[3/12] Installing DBus and dependencies..."
          dnf install -y dbus dbus-x11 xorg-x11-xauth xorg-x11-server-utils
          systemctl enable dbus
          systemctl start dbus
          echo "[OK] DBus installed and running"
      
      - name: Install Desktop Environment (XFCE4)
        run: |
          echo "[4/12] Installing XFCE4 desktop environment..."
          dnf groupinstall -y "Xfce"
          dnf install -y xfce4-session
          echo "[OK] XFCE4 installed"
      
      - name: Install XRDP Server
        run: |
          echo "[5/12] Installing XRDP server..."
          dnf install -y xrdp
          systemctl enable xrdp
          systemctl start xrdp
          echo "[OK] XRDP installed and started"
      
      - name: Configure XRDP for XFCE4
        run: |
          echo "[6/12] Configuring XRDP for XFCE4..."
          echo "startxfce4" > ~/.xsession
          echo "[OK] XRDP configured"
      
      - name: Fix XRDP startup script
        run: |
          echo "Fixing XRDP startup script..."
          sed -i '/test -x \/etc\/X11\/Xsession/ s/^/#/' /etc/xrdp/startwm.sh
          sed -i '/exec \/etc\/X11\/Xsession/ s/^/#/' /etc/xrdp/startwm.sh
          echo "startxfce4" >> /etc/xrdp/startwm.sh
          echo "[OK] Startup script updated"
      
      - name: Create TUN Device for Tailscale
        run: |
          echo "[7/12] Creating TUN device..."
          mkdir -p /dev/net
          mknod /dev/net/tun c 10 200
          chmod 600 /dev/net/tun
          echo "[OK] TUN device created"
      
      - name: Install Tailscale
        run: |
          echo "[8/12] Installing Tailscale..."
          curl -fsSL https://tailscale.com/install.sh | sh
          echo "[OK] Tailscale installed"
      
      - name: Connect Tailscale
        id: tailscale
        run: |
          echo "Starting Tailscaled..."
          tailscaled --state=/var/lib/tailscale/tailscaled.state &
          sleep 5
          echo "Connecting to Tailscale network..."
          tailscale up --auth-key="$TAILSCALE_AUTH_KEY" --hostname=neural-alma-rdp --accept-routes
          sleep 3
          TAILSCALE_IP=$(tailscale ip -4)
          echo "tailscale_ip=$TAILSCALE_IP" >> $GITHUB_OUTPUT
          echo "[OK] Tailscale IP: $TAILSCALE_IP"
      
      - name: Create User Account
        id: create_user
        run: |
          echo "[9/12] Creating user account..."
          USERNAME="almardp_$((RANDOM%9000+1000))"
          PASSWORD=$(openssl rand -base64 20 | tr -d '=+/' | cut -c1-24)
          useradd -m -s /bin/bash "$USERNAME"
          echo "$USERNAME:$PASSWORD" | chpasswd
          usermod -aG wheel "$USERNAME"
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "[OK] User created: $USERNAME"
      
      - name: Add User to XRDP and SSL Groups
        run: |
          echo "[10/12] Adding user to XRDP groups..."
          usermod -aG xrdp ${{ steps.create_user.outputs.username }}
          usermod -aG wheel ${{ steps.create_user.outputs.username }}
          echo "[OK] User added to groups"
      
      - name: Get Public IP
        id: get_public_ip
        run: |
          echo "[11/12] Getting public IP..."
          IP=$(curl -s --max-time 5 https://api.ipify.org 2>/dev/null || echo "UNAVAILABLE")
          echo "public_ip=$IP" >> $GITHUB_OUTPUT
          echo "[OK] Public IP: $IP"
      
      - name: Verify Deployment
        id: verify
        run: |
          echo "[12/12] Verifying deployment..."
          if pgrep xrdp > /dev/null 2>&1; then
            echo "status=active" >> $GITHUB_OUTPUT
            echo ""
            echo "============================================================"
            echo "              ALMALINUX 9 WITH RDP READY"
            echo "============================================================"
            echo "  RDP Public    : ${{ steps.get_public_ip.outputs.public_ip }}:3389"
            echo "  RDP Tailscale : ${{ steps.tailscale.outputs.tailscale_ip }}:3389"
            echo "  Username      : ${{ steps.create_user.outputs.username }}"
            echo "  Password      : ${{ steps.create_user.outputs.password }}"
            echo "============================================================"
            echo ""
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi
      
      - name: Keep Session Alive
        run: |
          END=$(($(date +%s) + ${{ needs.init.outputs.duration_minutes }} * 60))
          while [ $(date +%s) -lt $END ]; do
            echo "[ALMALINUX-RDP] Active - $((($END - $(date +%s))/60)) minutes left"
            sleep 60
          done

  # ==================== ALMALINUX 9 WITH SSH ====================
  almalinux_ssh_deploy:
