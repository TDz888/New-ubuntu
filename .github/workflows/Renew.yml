name: Auto Renew VPS

on:
  schedule:
    # Chạy lúc 55 phút mỗi 5 giờ (tức 5h55, 11h55, 17h55, 23h55)
    - cron: '55 */5 * * *'
  workflow_dispatch:  # Cho phép chạy thủ công

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger new VPS
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/vps.yml/dispatches \
            -d '{
              "ref": "main",
              "inputs": {
                "username": "ubuntu",
                "password": "hieudz",
                "duration": "6"
              }
            }'
          echo ""
          echo "=========================================="
          echo "✅ New VPS triggered at $(date)"
          echo "=========================================="

      - name: Show status
        run: |
          echo ""
          echo "🔄 Auto-renew completed"
          echo "📡 Tailscale IP will remain the same"
          echo "⏱️  New VPS will be ready in 2-3 minutes"
