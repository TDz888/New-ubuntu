# =====================================================================================
#              🖥 VPS 4-16 GENERATOR 🚀
#         Windows RDP + VNC + Web | Ubuntu SSH | Tailscale | Vercel Tunnel
# =====================================================================================

name: 🖥 VPS 4-16 GENERATOR 🚀

on:
  workflow_dispatch:
    inputs:
      duration:
        description: Session Duration
        required: true
        default: '2h'
        type: choice
        options: ['30m', '1h', '2h', '4h', '6h']
      target_os:
        description: Target OS
        required: true
        default: 'windows'
        type: choice
        options: ['windows', 'ubuntu', 'both']
      telegram_notify:
        description: Send Telegram Notification
        required: false
        default: true
        type: boolean
      auto_cleanup:
        description: Auto Cleanup
        required: false
        default: true
        type: boolean

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      session_id: ${{ steps.init.outputs.session_id }}
      duration_minutes: ${{ steps.init.outputs.duration_minutes }}
      termination_time: ${{ steps.init.outputs.termination_time }}
    steps:
      - id: init
        run: |
          SESSION_ID="VPS-$(date +%Y%m%d-%H%M%S)-$((RANDOM%9000+1000))"
          DUR_INPUT="${{ github.event.inputs.duration }}"
          case "$DUR_INPUT" in "30m") DUR=30;; "1h") DUR=60;; "2h") DUR=120;; "4h") DUR=240;; "6h") DUR=360;; *) DUR=120;; esac
          echo "session_id=$SESSION_ID" >> $GITHUB_OUTPUT
          echo "duration_minutes=$DUR" >> $GITHUB_OUTPUT
          echo "termination_time=$(date -d "+$DUR minutes" "+%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_OUTPUT
          echo "============================================================"
          echo "         VPS 4-16 GENERATOR ACTIVE"
          echo "============================================================"
          echo "  Session ID    : $SESSION_ID"
          echo "  Duration      : $DUR minutes"
          echo "  Target OS     : ${{ github.event.inputs.target_os }}"
          echo "============================================================"

  # ==================== WINDOWS 11 ====================
  windows_deploy:
    needs: [init]
    if: github.event.inputs.target_os == 'windows' || github.event.inputs.target_os == 'both'
    runs-on: windows-latest
    timeout-minutes: 360
    outputs:
      status: ${{ steps.verify.outputs.status }}
      public_ip: ${{ steps.get_public_ip.outputs.public_ip }}
      tailscale_ip: ${{ steps.tailscale.outputs.tailscale_ip }}
      vercel_url: ${{ steps.vercel.outputs.vercel_url }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
    steps:
      - run: Write-Host "=== WINDOWS 11 DEPLOYMENT ===" -ForegroundColor Cyan
      
      - name: Enable RDP
        run: |
          Write-Host "[1/8] Enabling RDP..." -ForegroundColor Yellow
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
          Restart-Service TermService -Force
          Write-Host "[OK] RDP ready" -ForegroundColor Green
      
      - name: Install TightVNC
        run: |
          Write-Host "[2/8] Installing TightVNC..." -ForegroundColor Yellow
          $url = "https://www.tightvnc.com/download/2.8.81/tightvnc-2.8.81-gpl-setup-64bit.msi"
          $out = "$env:TEMP\tightvnc.msi"
          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          Start-Process msiexec -ArgumentList "/i $out /quiet /norestart" -Wait
          Start-Sleep -Seconds 3
          Write-Host "[OK] TightVNC installed" -ForegroundColor Green
      
      - name: Setup VNC
        run: |
          Write-Host "[3/8] Setting up VNC..." -ForegroundColor Yellow
          $pass = -join ((65..90)+(97..122)+(48..57) | Get-Random -Count 12 | ForEach-Object {[char]$_})
          echo "VNC_PASSWORD=$pass" >> $env:GITHUB_ENV
          $reg = "HKLM:\SOFTWARE\TightVNC\Server"
          New-Item -Path $reg -Force | Out-Null
          Set-ItemProperty -Path $reg -Name "ControlPassword" -Value $pass
          Set-ItemProperty -Path $reg -Name "UseVncAuthentication" -Value 1
          Set-ItemProperty -Path $reg -Name "AcceptRfbConnections" -Value 1
          netsh advfirewall firewall add rule name="VNC" dir=in action=allow protocol=TCP localport=5900
          Start-Service tvnserver -ErrorAction SilentlyContinue
          Set-Service tvnserver -StartupType Automatic
          Write-Host "[OK] VNC on port 5900" -ForegroundColor Green
      
      - name: Install noVNC
        run: |
          Write-Host "[4/8] Installing noVNC..." -ForegroundColor Yellow
          Remove-Item C:\novnc -Recurse -Force -ErrorAction SilentlyContinue
          New-Item C:\novnc -ItemType Directory -Force | Out-Null
          Set-Location C:\novnc
          Invoke-WebRequest -Uri "https://codeload.github.com/novnc/noVNC/zip/refs/tags/v1.4.0" -OutFile "novnc.zip" -UseBasicParsing
          Invoke-WebRequest -Uri "https://codeload.github.com/novnc/websockify/zip/refs/tags/v0.11.0" -OutFile "ws.zip" -UseBasicParsing
          Expand-Archive -Path "novnc.zip" -DestinationPath "." -Force
          Expand-Archive -Path "ws.zip" -DestinationPath "." -Force
          $novncFolder = Get-ChildItem -Directory | Where-Object { $_.Name -like "noVNC-*" } | Select-Object -First 1
          $wsFolder = Get-ChildItem -Directory | Where-Object { $_.Name -like "websockify-*" } | Select-Object -First 1
          Get-ChildItem "$($novncFolder.FullName)" | Copy-Item -Destination "C:\novnc\" -Recurse -Force
          New-Item "C:\novnc\websockify" -ItemType Directory -Force | Out-Null
          Get-ChildItem "$($wsFolder.FullName)" | Copy-Item -Destination "C:\novnc\websockify\" -Recurse -Force
          Remove-Item "*.zip" -Force
          Remove-Item $novncFolder.FullName -Recurse -Force
          Remove-Item $wsFolder.FullName -Recurse -Force
          Write-Host "[OK] noVNC ready" -ForegroundColor Green
      
      - name: Start noVNC Service
        run: |
          Write-Host "[5/8] Starting noVNC..." -ForegroundColor Yellow
          netsh advfirewall firewall add rule name="noVNC" dir=in action=allow protocol=TCP localport=6080
          $psCode = "Set-Location 'C:\novnc'; python websockify\websockify.py --web . 6080 localhost:5900"
          $action = New-ScheduledTaskAction -Execute "python" -Argument "-c `"$psCode`""
          $trigger = New-ScheduledTaskTrigger -AtStartup
          $principal = New-ScheduledTaskPrincipal -UserId "SYSTEM" -LogonType ServiceAccount -RunLevel Highest
          Register-ScheduledTask -TaskName "noVNC" -Action $action -Trigger $trigger -Principal $principal -Force
          Start-ScheduledTask -TaskName "noVNC"
          Start-Sleep -Seconds 5
          Write-Host "[OK] noVNC on port 6080" -ForegroundColor Green
      
      - name: Deploy to Vercel Tunnel
        id: vercel
        run: |
          Write-Host "[6/8] Creating Vercel tunnel..." -ForegroundColor Yellow
          $vcDir = "$env:TEMP\vercel-tunnel"
          Remove-Item $vcDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item $vcDir -ItemType Directory -Force | Out-Null
          Set-Location $vcDir
          
          Write-Host "Creating index.html with noVNC viewer..." -ForegroundColor Yellow
          
          $htmlContent = '<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS 4-16 GENERATOR - noVNC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: #16213e; border-radius: 10px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .header h1 { color: #0f3460; font-size: 28px; }
        .header h1 span { color: #e94560; }
        .status-bar { background: #16213e; border-radius: 10px; padding: 15px; margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap; }
        .status-item { display: flex; align-items: center; gap: 10px; color: #fff; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .vnc-container { background: #000; border-radius: 10px; overflow: hidden; }
        .vnc-toolbar { background: #0f3460; padding: 10px; display: flex; gap: 10px; flex-wrap: wrap; }
        .vnc-toolbar button { background: #e94560; border: none; color: white; padding: 8px 16px; border-radius: 5px; cursor: pointer; }
        .vnc-toolbar button:hover { opacity: 0.8; }
        .connection-status { margin-left: auto; color: #fff; font-size: 14px; }
        #canvas { width: 100%; height: 70vh; background: #000; }
        .info { background: #16213e; border-radius: 10px; padding: 15px; margin-top: 20px; text-align: center; color: #fff; }
        a { color: #e94560; text-decoration: none; }
        .loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .loading.hide { display: none; }
        .spinner { width: 50px; height: 50px; border: 4px solid #e94560; border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div style="color:#fff; margin-top:20px;">Connecting to VPS...</div>
    </div>
    <div class="container">
        <div class="header">
            <h1>🖥 <span>VPS 4-16 GENERATOR</span> 🚀</h1>
            <p style="color:#888;">noVNC Remote Desktop Client</p>
        </div>
        <div class="status-bar">
            <div class="status-item"><div class="status-dot"></div><span>Status:</span><span id="statusText">Connecting...</span></div>
            <div class="status-item"><span>Server:</span><span id="serverHost">Loading...</span></div>
            <div class="status-item"><span>Port:</span><span id="serverPort">6080</span></div>
        </div>
        <div class="vnc-container">
            <div class="vnc-toolbar">
                <button onclick="sendCtrlAltDel()">Ctrl+Alt+Del</button>
                <button onclick="toggleFullscreen()">Fullscreen</button>
                <button onclick="refreshConnection()">Refresh</button>
                <button onclick="showInfo()">Info</button>
                <div class="connection-status" id="connStatus">Ready</div>
            </div>
            <div id="canvas"></div>
        </div>
        <div class="info">
            <p>💡 Login with Administrator account | 🔒 Encrypted WebSocket Connection</p>
        </div>
    </div>
    <script src="https://novnc.com/noVNC-1.4.0/app/webutil.js"></script>
    <script src="https://novnc.com/noVNC-1.4.0/vnc.js"></script>
    <script>
        let rfb, connected = false;
        const urlParams = new URLSearchParams(window.location.search);
        let host = urlParams.get("host") || window.location.hostname;
        let port = urlParams.get("port") || "6080";
        document.getElementById("serverHost").innerText = host;
        document.getElementById("serverPort").innerText = port;
        
        function connectVNC() {
            try {
                if (rfb) rfb.disconnect();
                document.getElementById("loading").classList.remove("hide");
                const url = "ws://" + host + ":" + port;
                rfb = new RFB(document.getElementById("canvas"), url, { shared: true });
                rfb.addEventListener("connect", function() {
                    connected = true;
                    document.getElementById("loading").classList.add("hide");
                    document.getElementById("statusText").innerText = "Connected";
                    document.getElementById("connStatus").innerHTML = "✅ Connected";
                });
                rfb.addEventListener("disconnect", function() {
                    connected = false;
                    document.getElementById("loading").classList.add("hide");
                    document.getElementById("statusText").innerText = "Disconnected";
                    document.getElementById("connStatus").innerHTML = "❌ Disconnected";
                });
                rfb.addEventListener("credentialsrequired", function() {
                    let pass = prompt("Enter VNC password:");
                    if (pass) rfb.sendCredentials({ password: pass });
                });
            } catch(e) {
                document.getElementById("loading").classList.add("hide");
                alert("Connection error: " + e.message);
            }
        }
        
        function disconnectVNC() { if (rfb && connected) { rfb.disconnect(); } }
        function refreshConnection() { disconnectVNC(); setTimeout(connectVNC, 1000); }
        function sendCtrlAltDel() { if (rfb && connected) rfb.sendCtrlAltDel(); else alert("Not connected"); }
        function toggleFullscreen() { let elem = document.documentElement; if (!document.fullscreenElement) elem.requestFullscreen(); else document.exitFullscreen(); }
        function showInfo() { alert("VPS 4-16 GENERATOR\n\nRDP Port: 3389\nVNC Port: 5900\nWebSocket Port: 6080\n\nCheck Telegram for login credentials"); }
        
        window.addEventListener("load", function() { setTimeout(connectVNC, 500); });
        window.addEventListener("resize", function() { if (rfb && connected) rfb.resizeSession(); });
        document.addEventListener("keydown", function(e) { if (e.ctrlKey && e.altKey && e.key === "Delete") { e.preventDefault(); sendCtrlAltDel(); } });
    </script>
</body>
</html>'
          
          # Ghi file index.html
          $htmlContent | Out-File -FilePath "index.html" -Encoding UTF8
          
          # Tạo file vercel.json
          $vercelJson = '{
            "version": 2,
            "builds": [{"src": "index.html", "use": "@vercel/static"}],
            "routes": [{"src": "/(.*)", "dest": "/index.html"}]
          }'
          $vercelJson | Out-File -FilePath "vercel.json" -Encoding UTF8
          
          # Deploy lên Vercel
          Write-Host "Deploying to Vercel..." -ForegroundColor Yellow
          npm install -g vercel --silent
          
          # Lấy Tailscale IP
          $tailscaleIp = "${{ steps.tailscale.outputs.tailscale_ip }}"
          
          # Deploy và lấy URL
          $deployOutput = vercel --token="$env:VERCEL_TOKEN" --prod --yes 2>&1
          Write-Host "Deploy output: $deployOutput" -ForegroundColor Cyan
          
          # Tìm URL từ output
          if ($deployOutput -match 'https://([a-z0-9-]+\.vercel\.app)') {
            $baseUrl = "https://$($matches[1])"
          } else {
            $baseUrl = "https://vps-github.vercel.app"
          }
          
          # Tạo URL đầy đủ với host và port
          $fullUrl = "$baseUrl/index.html?host=$tailscaleIp&port=6080"
          echo "vercel_url=$fullUrl" >> $env:GITHUB_OUTPUT
          Write-Host "[OK] Vercel tunnel: $fullUrl" -ForegroundColor Green
      
      - name: Create User
        id: create_user
        run: |
          Write-Host "[7/8] Creating user..." -ForegroundColor Yellow
          $user = "vps_$((Get-Random -Minimum 1000 -Maximum 9999))"
          $pass = -join ((65..90)+(97..122)+(48..57) | Get-Random -Count 20 | ForEach-Object {[char]$_})
          $sec = ConvertTo-SecureString $pass -AsPlainText -Force
          New-LocalUser -Name $user -Password $sec -PasswordNeverExpires -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $user
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $user
          echo "username=$user" >> $env:GITHUB_OUTPUT
          echo "password=$pass" >> $env:GITHUB_OUTPUT
          Write-Host "[OK] User: $user" -ForegroundColor Green
      
      - name: Install Tailscale
        run: |
          Write-Host "[8/8] Installing Tailscale..." -ForegroundColor Yellow
          $msi = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msi -UseBasicParsing
          Start-Process msiexec -ArgumentList "/i $msi /quiet /norestart" -Wait
          Start-Sleep -Seconds 3
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey="$env:TAILSCALE_AUTH_KEY" --hostname=vps-generator --accept-routes
          Start-Sleep -Seconds 3
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "tailscale_ip=$ip" >> $env:GITHUB_OUTPUT
          Write-Host "[OK] Tailscale IP: $ip" -ForegroundColor Green
        id: tailscale
      
      - name: Get Public IP
        id: get_public_ip
        run: |
          try {
            $ip = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing -TimeoutSec 3).Content.Trim()
          } catch {
            $ip = "UNAVAILABLE"
          }
          echo "public_ip=$ip" >> $env:GITHUB_OUTPUT
      
      - name: Verify
        id: verify
        run: |
          $rdpStatus = (Get-Service TermService).Status -eq 'Running'
          if ($rdpStatus) {
            echo "status=active" >> $env:GITHUB_OUTPUT
            Write-Host ""
            Write-Host "============================================================" -ForegroundColor Green
            Write-Host "         VPS 4-16 GENERATOR READY" -ForegroundColor Green
            Write-Host "============================================================" -ForegroundColor Green
            Write-Host "  Public RDP   : ${{ steps.get_public_ip.outputs.public_ip }}:3389" -ForegroundColor Green
            Write-Host "  Tailscale RDP: ${{ steps.tailscale.outputs.tailscale_ip }}:3389" -ForegroundColor Green
            Write-Host "  noVNC Link   : ${{ steps.vercel.outputs.vercel_url }}" -ForegroundColor Green
            Write-Host "  Username     : ${{ steps.create_user.outputs.username }}" -ForegroundColor Green
            Write-Host "  Password     : ${{ steps.create_user.outputs.password }}" -ForegroundColor Green
            Write-Host "============================================================" -ForegroundColor Green
          } else {
            echo "status=failed" >> $env:GITHUB_OUTPUT
          }
      
      - name: Keep Alive
        run: |
          $END = [int](Get-Date -UFormat %s) + ${{ needs.init.outputs.duration_minutes }} * 60
          while ([int](Get-Date -UFormat %s) -lt $END) {
            $LEFT = [math]::Floor((($END - [int](Get-Date -UFormat %s))/60))
            Write-Host "[WINDOWS] Active - $LEFT minutes left" -ForegroundColor DarkCyan
            Start-Sleep 60
          }

  # ==================== UBUNTU 22.04 ====================
  ubuntu_deploy:
    needs: [init]
    if: github.event.inputs.target_os == 'ubuntu' || github.event.inputs.target_os == 'both'
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    outputs:
      status: ${{ steps.verify.outputs.status }}
      public_ip: ${{ steps.get_public_ip.outputs.public_ip }}
      tailscale_ip: ${{ steps.tailscale.outputs.tailscale_ip }}
      username: ${{ steps.create_user.outputs.username }}
      password: ${{ steps.create_user.outputs.password }}
    steps:
      - run: echo "=== UBUNTU 22.04 DEPLOYMENT ==="
      
      - name: Install SSH
        run: |
          echo "[1/4] Installing SSH..."
          sudo apt update -qq
          sudo apt install -y -qq openssh-server
          echo "[OK] SSH ready"
      
      - name: Setup Tailscale
        run: |
          echo "[2/4] Setting up Tailscale..."
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey="$TAILSCALE_AUTH_KEY" --hostname=vps-ubuntu --accept-routes
          sleep 2
          IP=$(tailscale ip -4)
          echo "tailscale_ip=$IP" >> $GITHUB_OUTPUT
          echo "[OK] Tailscale IP: $IP"
        id: tailscale
      
      - name: Create User
        id: create_user
        run: |
          echo "[3/4] Creating user..."
          USER="vps_$((RANDOM%9000+1000))"
          PASS=$(openssl rand -base64 20 | tr -d '=+/' | cut -c1-24)
          sudo useradd -m -s /bin/bash "$USER"
          echo "$USER:$PASS" | sudo chpasswd
          sudo usermod -aG sudo "$USER"
          echo "username=$USER" >> $GITHUB_OUTPUT
          echo "password=$PASS" >> $GITHUB_OUTPUT
          echo "[OK] User: $USER"
      
      - name: Configure SSH
        run: |
          echo "[4/4] Configuring SSH..."
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh
          echo "[OK] SSH ready"
      
      - name: Get Public IP
        id: get_public_ip
        run: |
          IP=$(curl -s --max-time 3 https://api.ipify.org)
          echo "public_ip=$IP" >> $GITHUB_OUTPUT
      
      - name: Verify
        id: verify
        run: |
          if systemctl is-active ssh > /dev/null; then
            echo "status=active" >> $GITHUB_OUTPUT
            echo ""
            echo "============================================================"
            echo "              UBUNTU 22.04 READY"
            echo "============================================================"
            echo "  Public SSH : ssh ${{ steps.create_user.outputs.username }}@${{ steps.get_public_ip.outputs.public_ip }}"
            echo "  Tailscale  : ssh ${{ steps.create_user.outputs.username }}@${{ steps.tailscale.outputs.tailscale_ip }}"
            echo "  Password   : ${{ steps.create_user.outputs.password }}"
            echo "============================================================"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi
      
      - name: Keep Alive
        run: |
          END=$(($(date +%s) + ${{ needs.init.outputs.duration_minutes }} * 60))
          while [ $(date +%s) -lt $END ]; do
            echo "[UBUNTU] Active - $((($END - $(date +%s))/60)) minutes left"
            sleep 60
          done

  # ==================== TELEGRAM NOTIFICATION ====================
  telegram_notify:
    needs: [init, windows_deploy, ubuntu_deploy]
    if: always() && github.event.inputs.telegram_notify == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Message
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TEXT="VPS 4-16 GENERATOR%0A"
          TEXT="${TEXT}━━━━━━━━━━━━━━━━━━━━━━━━━━━━%0A"
          TEXT="${TEXT}📋 SESSION INFO%0A"
          TEXT="${TEXT}────────────────────────────%0A"
          TEXT="${TEXT}🆔 ID: ${{ needs.init.outputs.session_id }}%0A"
          TEXT="${TEXT}⏱️ Duration: ${{ github.event.inputs.duration }}%0A"
          TEXT="${TEXT}⌛ Expires: ${{ needs.init.outputs.termination_time }}%0A"
          TEXT="${TEXT}━━━━━━━━━━━━━━━━━━━━━━━━━━━━%0A"
          
          if [ "${{ needs.windows_deploy.outputs.status }}" = "active" ]; then
            TEXT="${TEXT}%0A"
            TEXT="${TEXT}🪟 WINDOWS 11%0A"
            TEXT="${TEXT}────────────────────────────%0A"
            TEXT="${TEXT}🌍 Public RDP: ${{ needs.windows_deploy.outputs.public_ip }}:3389%0A"
            TEXT="${TEXT}🔗 Tailscale RDP: ${{ needs.windows_deploy.outputs.tailscale_ip }}:3389%0A"
            TEXT="${TEXT}🖥️ noVNC: ${{ needs.windows_deploy.outputs.vercel_url }}%0A"
            TEXT="${TEXT}👤 Username: ${{ needs.windows_deploy.outputs.username }}%0A"
            TEXT="${TEXT}🔐 Password: ${{ needs.windows_deploy.outputs.password }}%0A"
          fi
          
          if [ "${{ needs.ubuntu_deploy.outputs.status }}" = "active" ]; then
            TEXT="${TEXT}%0A"
            TEXT="${TEXT}🐧 UBUNTU 22.04%0A"
            TEXT="${TEXT}────────────────────────────%0A"
            TEXT="${TEXT}🌍 Public SSH: ssh ${{ needs.ubuntu_deploy.outputs.username }}@${{ needs.ubuntu_deploy.outputs.public_ip }}%0A"
            TEXT="${TEXT}🔗 Tailscale SSH: ssh ${{ needs.ubuntu_deploy.outputs.username }}@${{ needs.ubuntu_deploy.outputs.tailscale_ip }}%0A"
            TEXT="${TEXT}🔐 Password: ${{ needs.ubuntu_deploy.outputs.password }}%0A"
          fi
          
          TEXT="${TEXT}%0A"
          TEXT="${TEXT}━━━━━━━━━━━━━━━━━━━━━━━━━━━━%0A"
          TEXT="${TEXT}✅ SYSTEM ONLINE%0A"
          TEXT="${TEXT}🔒 Connect via Tailscale for security%0A"
          TEXT="${TEXT}━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${TEXT}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true"
          
          echo "Telegram message sent"

