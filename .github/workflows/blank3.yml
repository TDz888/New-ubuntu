name: VPS Creator - Windows & Ubuntu RDP

on:
  workflow_dispatch:
    inputs:
      os_type:
        description: 'Operating System'
        required: true
        default: 'windows11'
        type: choice
        options:
          - 'windows11'
          - 'windows10'
          - 'ubuntu-desktop'
      username:
        description: 'Username'
        required: true
        default: 'vpsuser'
      password:
        description: 'Password'
        required: true
        default: 'Vps@123456'
      duration:
        description: 'Hours to run'
        required: true
        default: '6'

jobs:
  create-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server curl wget qemu-utils qemu-system-x86_64
          
      - name: Create user
        run: |
          sudo useradd -m -s /bin/bash "${{ github.event.inputs.username }}" 2>/dev/null || true
          echo "${{ github.event.inputs.username}}:${{ github.event.inputs.password}}" | sudo chpasswd
          sudo usermod -aG sudo "${{ github.event.inputs.username }}"
          
      - name: Configure SSH
        run: |
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart sshd || sudo systemctl restart ssh
          
      - name: Install Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh
        
      - name: Connect Tailscale
        run: |
          if [ -z "${{ secrets.TAILSCALE_AUTH_KEY }}" ]; then
            echo "Missing TAILSCALE_AUTH_KEY"
            exit 1
          fi
          sudo tailscale up --auth-key="${{ secrets.TAILSCALE_AUTH_KEY }}" --hostname="vps-rdp"
          sleep 5
          echo "TAILSCALE_IP=$(sudo tailscale ip -4)" >> $GITHUB_ENV
          
      - name: Setup Windows 11
        if: github.event.inputs.os_type == 'windows11'
        run: |
          echo "Setting up Windows 11 VM..."
          qemu-img create -f qcow2 windows11.qcow2 50G
          
          echo "Creating startup script..."
          cat > start-vm.sh << 'SCRIPT'
          #!/bin/bash
          qemu-system-x86_64 \
            -drive file=windows11.qcow2,format=qcow2 \
            -cdrom /tmp/win11.iso \
            -m 4096 \
            -smp 2 \
            -vga qxl \
            -netdev user,id=net0,hostfwd=tcp::3389-:3389 \
            -device virtio-net-pci,netdev=net0 \
            -enable-kvm \
            -daemonize
SCRIPT
          chmod +x start-vm.sh
          
      - name: Setup Windows 10
        if: github.event.inputs.os_type == 'windows10'
        run: |
          echo "Setting up Windows 10 VM..."
          qemu-img create -f qcow2 windows10.qcow2 40G
          
          cat > start-vm.sh << 'SCRIPT'
          #!/bin/bash
          qemu-system-x86_64 \
            -drive file=windows10.qcow2,format=qcow2 \
            -cdrom /tmp/win10.iso \
            -m 3072 \
            -smp 2 \
            -vga qxl \
            -netdev user,id=net0,hostfwd=tcp::3389-:3389 \
            -device virtio-net-pci,netdev=net0 \
            -enable-kvm \
            -daemonize
SCRIPT
          chmod +x start-vm.sh
          
      - name: Setup Ubuntu Desktop
        if: github.event.inputs.os_type == 'ubuntu-desktop'
        run: |
          echo "Setting up Ubuntu Desktop VM..."
          qemu-img create -f qcow2 ubuntu.qcow2 30G
          
          cat > start-vm.sh << 'SCRIPT'
          #!/bin/bash
          qemu-system-x86_64 \
            -drive file=ubuntu.qcow2,format=qcow2 \
            -cdrom /tmp/ubuntu.iso \
            -m 4096 \
            -smp 2 \
            -vga qxl \
            -netdev user,id=net0,hostfwd=tcp::3389-:3389 \
            -device virtio-net-pci,netdev=net0 \
            -enable-kvm \
            -daemonize
SCRIPT
          chmod +x start-vm.sh
          
      - name: Install xRDP for Ubuntu
        if: github.event.inputs.os_type == 'ubuntu-desktop'
        run: |
          sudo apt-get install -y xrdp ubuntu-desktop
          sudo systemctl enable xrdp
          sudo systemctl start xrdp
          
      - name: Get public IP
        run: echo "PUBLIC_IP=$(curl -s ifconfig.me)" >> $GITHUB_ENV
        
      - name: Save connection info
        run: |
          OS_NAME="${{ github.event.inputs.os_type }}"
          if [ "$OS_NAME" = "windows11" ]; then OS_DISPLAY="Windows 11 Pro"; fi
          if [ "$OS_NAME" = "windows10" ]; then OS_DISPLAY="Windows 10 Pro"; fi
          if [ "$OS_NAME" = "ubuntu-desktop" ]; then OS_DISPLAY="Ubuntu Desktop 22.04"; fi
          
          echo "============================================================" > vps-info.txt
          echo "VPS READY - RDP CONNECTION" >> vps-info.txt
          echo "============================================================" >> vps-info.txt
          echo "" >> vps-info.txt
          echo "Operating System: $OS_DISPLAY" >> vps-info.txt
          echo "" >> vps-info.txt
          echo "LOGIN CREDENTIALS:" >> vps-info.txt
          echo "  Username: ${{ github.event.inputs.username }}" >> vps-info.txt
          echo "  Password: ${{ github.event.inputs.password }}" >> vps-info.txt
          echo "" >> vps-info.txt
          echo "TAILSCALE CONNECTION:" >> vps-info.txt
          echo "  Host: $TAILSCALE_IP" >> vps-info.txt
          echo "  Port: 3389" >> vps-info.txt
          echo "" >> vps-info.txt
          echo "RDP COMMANDS:" >> vps-info.txt
          echo "  Windows: mstsc /v:$TAILSCALE_IP:3389" >> vps-info.txt
          echo "  Mac: open vnc://$TAILSCALE_IP:3389" >> vps-info.txt
          echo "" >> vps-info.txt
          echo "IPHONE SETUP (Microsoft Remote Desktop):" >> vps-info.txt
          echo "  1. Install Tailscale from App Store - Turn ON VPN" >> vps-info.txt
          echo "  2. Install Microsoft Remote Desktop from App Store" >> vps-info.txt
          echo "  3. Add PC -> PC name: $TAILSCALE_IP:3389" >> vps-info.txt
          echo "  4. Username: ${{ github.event.inputs.username }}" >> vps-info.txt
          echo "  5. Password: ${{ github.event.inputs.password }}" >> vps-info.txt
          echo "" >> vps-info.txt
          echo "Created: $(date '+%Y-%m-%d %H:%M:%S')" >> vps-info.txt
          echo "Duration: ${{ github.event.inputs.duration }} hours" >> vps-info.txt
          echo "============================================================" >> vps-info.txt
          
      - name: Upload connection info
        uses: actions/upload-artifact@v4
        with:
          name: vps-rdp-connection
          path: vps-info.txt
          retention-days: 7
          
      - name: Keep VPS alive
        run: |
          HOURS=${{ github.event.inputs.duration }}
          OS_NAME="${{ github.event.inputs.os_type }}"
          
          echo ""
          echo "============================================================"
          echo "VPS IS RUNNING"
          echo "============================================================"
          echo ""
          echo "OS: $OS_NAME"
          echo "Tailscale IP: $TAILSCALE_IP"
          echo "RDP Port: 3389"
          echo "Username: ${{ github.event.inputs.username }}"
          echo "Password: ${{ github.event.inputs.password }}"
          echo ""
          echo "Connect via Microsoft Remote Desktop: $TAILSCALE_IP:3389"
          echo ""
          echo "VPS will run for: $HOURS hours"
          echo "Auto-shutdown at: $(date -d "+$HOURS hours" '+%H:%M:%S')"
          echo ""
          echo "============================================================"
          sleep $((HOURS * 3600))
