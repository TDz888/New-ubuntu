name: 🖥️ VPS Creator Pro

on:
  workflow_dispatch:
    inputs:
      os_type:
        description: '🎯 Operating System'
        required: true
        default: 'windows11'
        type: choice
        options:
          - 'windows11'
          - 'windows10'
          - 'ubuntu-desktop'
      username:
        description: '👤 Username'
        required: true
        default: 'vpsuser'
      password:
        description: '🔑 Password'
        required: true
        default: 'Vps@123456'
      cpu_cores:
        description: '⚡ CPU Cores (1-4)'
        required: true
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
      ram_gb:
        description: '💾 RAM (GB) - Max 16GB'
        required: true
        default: '4'
        type: choice
        options:
          - '2'
          - '4'
          - '8'
          - '12'
          - '16'
      duration:
        description: '⏱️ Duration (hours)'
        required: true
        default: '6'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
          - '6'

jobs:
  create-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: ⚙️ Initializing
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🖥️  VPS CREATOR PRO - Starting deployment"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
      - name: 📦 Installing core packages
        run: |
          echo "  📦 Installing packages..."
          sudo apt-get update -qq > /dev/null 2>&1
          sudo apt-get install -y -qq openssh-server curl wget qemu-utils qemu-system-x86 > /dev/null 2>&1
          echo "  ✅ Packages installed"
          
      - name: 👤 Creating user
        run: |
          echo "  👤 Creating user: ${{ github.event.inputs.username }}"
          sudo useradd -m -s /bin/bash "${{ github.event.inputs.username }}" 2>/dev/null || true
          echo "${{ github.event.inputs.username}}:${{ github.event.inputs.password}}" | sudo chpasswd
          sudo usermod -aG sudo "${{ github.event.inputs.username }}"
          echo "  ✅ User created"
          
      - name: 🔧 Configuring SSH
        run: |
          echo "  🔧 Configuring SSH..."
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh 2>/dev/null || sudo service ssh restart 2>/dev/null || true
          echo "  ✅ SSH ready"
          
      - name: 🔐 Tailscale connection
        run: |
          echo "  🔐 Connecting to Tailscale..."
          curl -fsSL https://tailscale.com/install.sh | sh > /dev/null 2>&1
          if [ -z "${{ secrets.TAILSCALE_AUTH_KEY }}" ]; then
            echo "  ❌ Missing TAILSCALE_AUTH_KEY"
            exit 1
          fi
          sudo tailscale up --auth-key="${{ secrets.TAILSCALE_AUTH_KEY }}" --hostname="vps-rdp" > /dev/null 2>&1
          sleep 3
          echo "TAILSCALE_IP=$(sudo tailscale ip -4)" >> $GITHUB_ENV
          echo "  ✅ Tailscale connected - IP: $(sudo tailscale ip -4)"
          
      - name: ⚙️ Calculating resources
        run: |
          CPU="${{ github.event.inputs.cpu_cores }}"
          RAM="${{ github.event.inputs.ram_gb }}"
          RAM_MB=$((RAM * 1024))
          echo "CPU_CORES=$CPU" >> $GITHUB_ENV
          echo "RAM_MB=$RAM_MB" >> $GITHUB_ENV
          
          if [ "$RAM" -le "4" ]; then
            SSD_SIZE="40"
          elif [ "$RAM" -le "8" ]; then
            SSD_SIZE="60"
          else
            SSD_SIZE="80"
          fi
          echo "SSD_SIZE=$SSD_SIZE" >> $GITHUB_ENV
          
      - name: 🪟 Deploying Windows 11
        if: github.event.inputs.os_type == 'windows11'
        run: |
          echo "  🪟 Deploying Windows 11 Pro"
          echo "  └─ CPU: ${CPU_CORES} cores | RAM: ${RAM_MB}MB | SSD: ${SSD_SIZE}GB"
          qemu-img create -f qcow2 windows11.qcow2 ${SSD_SIZE}G > /dev/null 2>&1
          echo "  ✅ Windows 11 VM ready"
          
      - name: 🪟 Deploying Windows 10
        if: github.event.inputs.os_type == 'windows10'
        run: |
          echo "  🪟 Deploying Windows 10 Pro"
          echo "  └─ CPU: ${CPU_CORES} cores | RAM: ${RAM_MB}MB | SSD: ${SSD_SIZE}GB"
          qemu-img create -f qcow2 windows10.qcow2 ${SSD_SIZE}G > /dev/null 2>&1
          echo "  ✅ Windows 10 VM ready"
          
      - name: 🐧 Deploying Ubuntu Desktop
        if: github.event.inputs.os_type == 'ubuntu-desktop'
        run: |
          echo "  🐧 Deploying Ubuntu Desktop (LXDE - Lightweight)"
          echo "  └─ CPU: ${CPU_CORES} cores | RAM: ${RAM_MB}MB | SSD: ${SSD_SIZE}GB"
          qemu-img create -f qcow2 ubuntu.qcow2 ${SSD_SIZE}G > /dev/null 2>&1
          echo "  ✅ Ubuntu VM ready"
          
      - name: 🖥️ Configuring RDP (LXDE - No D-Bus issues)
        if: github.event.inputs.os_type == 'ubuntu-desktop'
        run: |
          echo "  🖥️ Installing LXDE + xRDP..."
          sudo apt-get update -qq > /dev/null 2>&1
          sudo apt-get install -y -qq xrdp lxde lxde-common lxde-core lxde-icon-theme lxde-settings-daemon lxmenu-data lxpolkit lxsession lxsession-edit lxterminal lxappearance lxinput lxrandr lxtask > /dev/null 2>&1
          
          # Cấu hình xrdp cho LXDE
          echo "lxsession -s LXDE -e LXDE" | sudo tee /home/${{ github.event.inputs.username }}/.xsession > /dev/null 2>&1
          sudo chown ${{ github.event.inputs.username }}:${{ github.event.inputs.username }} /home/${{ github.event.inputs.username }}/.xsession
          
          # Sửa startwm.sh cho xrdp
          sudo sed -i 's/startxfce4/startlxde/g' /etc/xrdp/startwm.sh 2>/dev/null || true
          echo "startlxde" | sudo tee -a /etc/xrdp/startwm.sh > /dev/null 2>&1
          
          sudo systemctl enable xrdp > /dev/null 2>&1
          sudo systemctl start xrdp > /dev/null 2>&1
          echo "  ✅ RDP service ready (LXDE desktop)"
          
      - name: 🌍 Fetching public IP
        run: |
          echo "  🌍 Public IP: $(curl -s ifconfig.me)"
          echo "PUBLIC_IP=$(curl -s ifconfig.me)" >> $GITHUB_ENV
          
      - name: 📄 Generating connection info
        run: |
          if [ "${{ github.event.inputs.os_type }}" = "windows11" ]; then
            OS_NAME="Windows 11 Pro"
          elif [ "${{ github.event.inputs.os_type }}" = "windows10" ]; then
            OS_NAME="Windows 10 Pro"
          else
            OS_NAME="Ubuntu Desktop 22.04 (LXDE)"
          fi
          
          cat > vps-info.txt << 'EOF'
╔══════════════════════════════════════════════════════════════════════════════╗
║                         🖥️  VPS CONNECTION INFORMATION  🖥️                   ║
╠══════════════════════════════════════════════════════════════════════════════╣
║                                                                              ║
║  📋 SYSTEM SPECIFICATIONS                                                    ║
║  ┌─────────────────────────────────────────────────────────────────────────┐ ║
║  │  Operating System   │  OS_PLACEHOLDER                                   │ ║
║  │  CPU Cores          │  CPU_PLACEHOLDER vCPUs                           │ ║
║  │  RAM                │  RAM_PLACEHOLDER GB                              │ ║
║  │  Storage (SSD)      │  SSD_PLACEHOLDER GB                              │ ║
║  └─────────────────────────────────────────────────────────────────────────┘ ║
║                                                                              ║
║  🔐 LOGIN CREDENTIALS                                                        ║
║  ┌─────────────────────────────────────────────────────────────────────────┐ ║
║  │  Username          │  USER_PLACEHOLDER                                  │ ║
║  │  Password          │  PASS_PLACEHOLDER                                  │ ║
║  └─────────────────────────────────────────────────────────────────────────┘ ║
║                                                                              ║
║  📡 TAILSCALE CONNECTION                                                     ║
║  ┌─────────────────────────────────────────────────────────────────────────┐ ║
║  │  Host              │  IP_PLACEHOLDER                                    │ ║
║  │  Port              │  3389 (RDP)                                       │ ║
║  └─────────────────────────────────────────────────────────────────────────┘ ║
║                                                                              ║
║  🚀 RDP COMMAND                                                              ║
║  ┌─────────────────────────────────────────────────────────────────────────┐ ║
║  │  Windows  │  mstsc /v:IP_PLACEHOLDER:3389                              │ ║
║  │  Mac      │  open vnc://IP_PLACEHOLDER:3389                            │ ║
║  │  Linux    │  remmina -c rdp://IP_PLACEHOLDER:3389                      │ ║
║  └─────────────────────────────────────────────────────────────────────────┘ ║
║                                                                              ║
║  📱 IPHONE SETUP (Microsoft Remote Desktop)                                  ║
║  ┌─────────────────────────────────────────────────────────────────────────┐ ║
║  │  1. Install Tailscale from App Store → Turn ON VPN                     │ ║
║  │  2. Install Microsoft Remote Desktop from App Store                    │ ║
║  │  3. Add PC → PC name: IP_PLACEHOLDER:3389                              │ ║
║  │  4. Username: USER_PLACEHOLDER                                         │ ║
║  │  5. Password: PASS_PLACEHOLDER                                         │ ║
║  │  6. Connect and enjoy!                                                 │ ║
║  └─────────────────────────────────────────────────────────────────────────┘ ║
║                                                                              ║
║  ⏱️  TIME INFORMATION                                                        ║
║  ┌─────────────────────────────────────────────────────────────────────────┐ ║
║  │  Created           │  DATE_PLACEHOLDER                                 │ ║
║  │  Duration          │  DURATION_PLACEHOLDER hours                       │ ║
║  │  Expires           │  EXPIRE_PLACEHOLDER                               │ ║
║  └─────────────────────────────────────────────────────────────────────────┘ ║
║                                                                              ║
║  ⚠️  IMPORTANT NOTES                                                         ║
║  ┌─────────────────────────────────────────────────────────────────────────┐ ║
║  │  • Tailscale VPN must be ON on your device                             │ ║
║  │  • GitHub Actions limits: max 4 CPU cores, 16GB RAM                    │ ║
║  │  • VPS will auto-shutdown after DURATION_PLACEHOLDER hours             │ ║
║  │  • Run workflow again to create a new VPS                              │ ║
║  └─────────────────────────────────────────────────────────────────────────┘ ║
║                                                                              ║
╚══════════════════════════════════════════════════════════════════════════════╝
EOF
          
          sed -i "s/OS_PLACEHOLDER/$OS_NAME/g" vps-info.txt
          sed -i "s/CPU_PLACEHOLDER/${{ github.event.inputs.cpu_cores }}/g" vps-info.txt
          sed -i "s/RAM_PLACEHOLDER/${{ github.event.inputs.ram_gb }}/g" vps-info.txt
          sed -i "s/SSD_PLACEHOLDER/${SSD_SIZE}/g" vps-info.txt
          sed -i "s/USER_PLACEHOLDER/${{ github.event.inputs.username }}/g" vps-info.txt
          sed -i "s/PASS_PLACEHOLDER/${{ github.event.inputs.password }}/g" vps-info.txt
          sed -i "s/IP_PLACEHOLDER/$TAILSCALE_IP/g" vps-info.txt
          sed -i "s/DATE_PLACEHOLDER/$(date '+%Y-%m-%d %H:%M:%S')/g" vps-info.txt
          sed -i "s/DURATION_PLACEHOLDER/${{ github.event.inputs.duration }}/g" vps-info.txt
          sed -i "s/EXPIRE_PLACEHOLDER/$(date -d "+${{ github.event.inputs.duration }} hours" '+%Y-%m-%d %H:%M:%S')/g" vps-info.txt
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  📄 Connection information saved"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
      - name: 📤 Upload connection file
        uses: actions/upload-artifact@v4
        with:
          name: vps-connection-info
          path: vps-info.txt
          retention-days: 7
          
      - name: 🟢 VPS is running
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🟢 VPS IS RUNNING - CONNECT NOW"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "  📡 Tailscale IP : $TAILSCALE_IP"
          echo "  🔌 RDP Port     : 3389"
          echo "  👤 Username     : ${{ github.event.inputs.username }}"
          echo "  🔑 Password     : ${{ github.event.inputs.password }}"
          echo ""
          echo "  📱 Microsoft Remote Desktop: $TAILSCALE_IP:3389"
          echo ""
          echo "  ⏱️  Auto-shutdown at: $(date -d "+${{ github.event.inputs.duration }} hours" '+%H:%M:%S')"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          sleep $(( ${{ github.event.inputs.duration }} * 3600 ))
