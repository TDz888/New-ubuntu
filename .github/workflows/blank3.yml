name: VPS Creator - Windows & Ubuntu RDP

on:
  workflow_dispatch:
    inputs:
      os_type:
        description: 'Operating System'
        required: true
        default: 'windows11'
        type: choice
        options:
          - 'windows11'
          - 'windows10'
          - 'ubuntu-desktop'
      username:
        description: 'Username'
        required: true
        default: 'vpsuser'
      password:
        description: 'Password'
        required: true
        default: 'Vps@123456'
      cpu_cores:
        description: 'CPU Cores (1-4)'
        required: true
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
      ram_gb:
        description: 'RAM (GB) - Max 16GB'
        required: true
        default: '4'
        type: choice
        options:
          - '2'
          - '4'
          - '8'
          - '12'
          - '16'
      duration:
        description: 'Hours to run'
        required: true
        default: '6'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
          - '6'

jobs:
  create-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssh-server curl wget qemu-utils qemu-system-x86 > /dev/null 2>&1
          
      - name: Create user
        run: |
          sudo useradd -m -s /bin/bash "${{ github.event.inputs.username }}" 2>/dev/null || true
          echo "${{ github.event.inputs.username}}:${{ github.event.inputs.password}}" | sudo chpasswd
          sudo usermod -aG sudo "${{ github.event.inputs.username }}"
          
      - name: Configure SSH
        run: |
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart sshd || sudo systemctl restart ssh
          
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh > /dev/null 2>&1
          
      - name: Connect Tailscale
        run: |
          if [ -z "${{ secrets.TAILSCALE_AUTH_KEY }}" ]; then
            echo "Missing TAILSCALE_AUTH_KEY"
            exit 1
          fi
          sudo tailscale up --auth-key="${{ secrets.TAILSCALE_AUTH_KEY }}" --hostname="vps-rdp"
          sleep 5
          echo "TAILSCALE_IP=$(sudo tailscale ip -4)" >> $GITHUB_ENV
          
      - name: Set configuration
        run: |
          CPU="${{ github.event.inputs.cpu_cores }}"
          RAM="${{ github.event.inputs.ram_gb }}"
          RAM_MB=$((RAM * 1024))
          echo "CPU_CORES=$CPU" >> $GITHUB_ENV
          echo "RAM_MB=$RAM_MB" >> $GITHUB_ENV
          
          if [ "$RAM" -le "4" ]; then
            SSD_SIZE="40"
          elif [ "$RAM" -le "8" ]; then
            SSD_SIZE="60"
          else
            SSD_SIZE="80"
          fi
          echo "SSD_SIZE=$SSD_SIZE" >> $GITHUB_ENV
          
      - name: Setup Windows 11
        if: github.event.inputs.os_type == 'windows11'
        run: |
          echo ">> Creating Windows 11 VM (${CPU_CORES} cores, ${RAM_MB}MB RAM, ${SSD_SIZE}GB SSD)..."
          qemu-img create -f qcow2 windows11.qcow2 ${SSD_SIZE}G > /dev/null 2>&1
          echo "#!/bin/bash" > start-vm.sh
          echo "qemu-system-x86_64 \\" >> start-vm.sh
          echo "  -drive file=windows11.qcow2,format=qcow2 \\" >> start-vm.sh
          echo "  -cdrom /tmp/win11.iso \\" >> start-vm.sh
          echo "  -m ${RAM_MB} \\" >> start-vm.sh
          echo "  -smp ${CPU_CORES} \\" >> start-vm.sh
          echo "  -vga qxl \\" >> start-vm.sh
          echo "  -netdev user,id=net0,hostfwd=tcp::3389-:3389 \\" >> start-vm.sh
          echo "  -device virtio-net-pci,netdev=net0 \\" >> start-vm.sh
          echo "  -enable-kvm \\" >> start-vm.sh
          echo "  -daemonize" >> start-vm.sh
          chmod +x start-vm.sh
          echo "✅ Windows 11 VM created"
          
      - name: Setup Windows 10
        if: github.event.inputs.os_type == 'windows10'
        run: |
          echo ">> Creating Windows 10 VM (${CPU_CORES} cores, ${RAM_MB}MB RAM, ${SSD_SIZE}GB SSD)..."
          qemu-img create -f qcow2 windows10.qcow2 ${SSD_SIZE}G > /dev/null 2>&1
          echo "#!/bin/bash" > start-vm.sh
          echo "qemu-system-x86_64 \\" >> start-vm.sh
          echo "  -drive file=windows10.qcow2,format=qcow2 \\" >> start-vm.sh
          echo "  -cdrom /tmp/win10.iso \\" >> start-vm.sh
          echo "  -m ${RAM_MB} \\" >> start-vm.sh
          echo "  -smp ${CPU_CORES} \\" >> start-vm.sh
          echo "  -vga qxl \\" >> start-vm.sh
          echo "  -netdev user,id=net0,hostfwd=tcp::3389-:3389 \\" >> start-vm.sh
          echo "  -device virtio-net-pci,netdev=net0 \\" >> start-vm.sh
          echo "  -enable-kvm \\" >> start-vm.sh
          echo "  -daemonize" >> start-vm.sh
          chmod +x start-vm.sh
          echo "✅ Windows 10 VM created"
          
      - name: Setup Ubuntu Desktop
        if: github.event.inputs.os_type == 'ubuntu-desktop'
        run: |
          echo ">> Creating Ubuntu Desktop VM (${CPU_CORES} cores, ${RAM_MB}MB RAM, ${SSD_SIZE}GB SSD)..."
          qemu-img create -f qcow2 ubuntu.qcow2 ${SSD_SIZE}G > /dev/null 2>&1
          echo "#!/bin/bash" > start-vm.sh
          echo "qemu-system-x86_64 \\" >> start-vm.sh
          echo "  -drive file=ubuntu.qcow2,format=qcow2 \\" >> start-vm.sh
          echo "  -cdrom /tmp/ubuntu.iso \\" >> start-vm.sh
          echo "  -m ${RAM_MB} \\" >> start-vm.sh
          echo "  -smp ${CPU_CORES} \\" >> start-vm.sh
          echo "  -vga qxl \\" >> start-vm.sh
          echo "  -netdev user,id=net0,hostfwd=tcp::3389-:3389 \\" >> start-vm.sh
          echo "  -device virtio-net-pci,netdev=net0 \\" >> start-vm.sh
          echo "  -enable-kvm \\" >> start-vm.sh
          echo "  -daemonize" >> start-vm.sh
          chmod +x start-vm.sh
          echo "✅ Ubuntu Desktop VM created"
          
      - name: Install xRDP for Ubuntu
        if: github.event.inputs.os_type == 'ubuntu-desktop'
        run: |
          echo ">> Installing xRDP and XFCE (lightweight desktop)..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq xrdp xfce4 xfce4-goodies dbus-x11 > /dev/null 2>&1
          
          # Cấu hình xrdp để dùng XFCE
          echo "xfce4-session" | sudo tee /home/${{ github.event.inputs.username }}/.xsession
          sudo chown ${{ github.event.inputs.username }}:${{ github.event.inputs.username }} /home/${{ github.event.inputs.username }}/.xsession
          
          # Cấu hình xrdp cho XFCE
          sudo sed -i 's/startxfce4/xfce4-session/' /etc/xrdp/startwm.sh 2>/dev/null || true
          echo "xfce4-session" | sudo tee -a /etc/xrdp/startwm.sh
          
          # Khởi động xrdp
          sudo systemctl enable xrdp
          sudo systemctl start xrdp
          echo "✅ xRDP + XFCE installed"
          
      - name: Get public IP
        run: |
          echo "PUBLIC_IP=$(curl -s ifconfig.me)" >> $GITHUB_ENV
          
      - name: Save connection info
        run: |
          if [ "${{ github.event.inputs.os_type }}" = "windows11" ]; then
            OS_NAME="Windows 11 Pro"
          elif [ "${{ github.event.inputs.os_type }}" = "windows10" ]; then
            OS_NAME="Windows 10 Pro"
          else
            OS_NAME="Ubuntu Desktop 22.04 (XFCE)"
          fi
          
          echo "╔══════════════════════════════════════════════════════════════╗" > vps-info.txt
          echo "║              🖥️  VPS READY - RDP CONNECTION  🖥️              ║" >> vps-info.txt
          echo "╚══════════════════════════════════════════════════════════════╝" >> vps-info.txt
          echo "" >> vps-info.txt
          echo "📋 SYSTEM SPECIFICATIONS" >> vps-info.txt
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> vps-info.txt
          echo "  Operating System : $OS_NAME" >> vps-info.txt
          echo "  CPU Cores        : ${{ github.event.inputs.cpu_cores }} vCPUs" >> vps-info.txt
          echo "  RAM              : ${{ github.event.inputs.ram_gb }} GB" >> vps-info.txt
          echo "  Storage (SSD)    : ${SSD_SIZE} GB" >> vps-info.txt
          echo "" >> vps-info.txt
          echo "🔐 LOGIN CREDENTIALS" >> vps-info.txt
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> vps-info.txt
          echo "  Username : ${{ github.event.inputs.username }}" >> vps-info.txt
          echo "  Password : ${{ github.event.inputs.password }}" >> vps-info.txt
          echo "" >> vps-info.txt
          echo "📡 TAILSCALE CONNECTION" >> vps-info.txt
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> vps-info.txt
          echo "  Host : $TAILSCALE_IP" >> vps-info.txt
          echo "  Port : 3389 (RDP)" >> vps-info.txt
          echo "" >> vps-info.txt
          echo "🚀 RDP COMMAND" >> vps-info.txt
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> vps-info.txt
          echo "  Windows : mstsc /v:$TAILSCALE_IP:3389" >> vps-info.txt
          echo "  Mac     : open vnc://$TAILSCALE_IP:3389" >> vps-info.txt
          echo "  Linux   : remmina -c rdp://$TAILSCALE_IP:3389" >> vps-info.txt
          echo "" >> vps-info.txt
          echo "📱 IPHONE SETUP (Microsoft Remote Desktop)" >> vps-info.txt
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> vps-info.txt
          echo "  1. Install Tailscale from App Store → Turn ON VPN" >> vps-info.txt
          echo "  2. Install Microsoft Remote Desktop from App Store" >> vps-info.txt
          echo "  3. Add PC → PC name: $TAILSCALE_IP:3389" >> vps-info.txt
          echo "  4. Username: ${{ github.event.inputs.username }}" >> vps-info.txt
          echo "  5. Password: ${{ github.event.inputs.password }}" >> vps-info.txt
          echo "  6. Connect and enjoy!" >> vps-info.txt
          echo "" >> vps-info.txt
          echo "⏱️  TIME INFORMATION" >> vps-info.txt
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> vps-info.txt
          echo "  Created  : $(date '+%Y-%m-%d %H:%M:%S')" >> vps-info.txt
          echo "  Duration : ${{ github.event.inputs.duration }} hours" >> vps-info.txt
          echo "  Expires  : $(date -d "+${{ github.event.inputs.duration }} hours" '+%Y-%m-%d %H:%M:%S')" >> vps-info.txt
          echo "" >> vps-info.txt
          echo "⚠️  IMPORTANT NOTES" >> vps-info.txt
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> vps-info.txt
          echo "  • Tailscale VPN must be ON on your device" >> vps-info.txt
          echo "  • GitHub Actions limits: max 4 CPU cores, 16GB RAM" >> vps-info.txt
          echo "  • VPS will auto-shutdown after ${{ github.event.inputs.duration }} hours" >> vps-info.txt
          echo "  • Run workflow again to create a new VPS" >> vps-info.txt
          echo "══════════════════════════════════════════════════════════════" >> vps-info.txt
          
      - name: Upload connection info
        uses: actions/upload-artifact@v4
        with:
          name: vps-rdp-connection
          path: vps-info.txt
          retention-days: 7
          
      - name: Keep VPS alive
        run: |
          HOURS=${{ github.event.inputs.duration }}
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║              🟢 VPS IS RUNNING 🟢                            ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  📡 Tailscale IP : $TAILSCALE_IP"
          echo "  🔌 RDP Port     : 3389"
          echo "  👤 Username     : ${{ github.event.inputs.username }}"
          echo "  🔑 Password     : ${{ github.event.inputs.password }}"
          echo ""
          echo "  ⏱️  VPS will run for : $HOURS hours"
          echo "  ⏰ Auto-shutdown at : $(date -d "+$HOURS hours" '+%H:%M:%S')"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          sleep $((HOURS * 3600))
