name: Create Ubuntu VPS with Web SSH

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username'
        required: true
        default: 'ubuntu-vps'
      duration:
        description: 'Duration (hours)'
        required: true
        default: '6'

jobs:
  create-vps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server curl wget
        
    - name: Create user
      run: |
        USERNAME="${{ github.event.inputs.username }}"
        PASSWORD=$(openssl rand -base64 12 | tr -d '=+/' | head -c 12)
        
        echo "USERNAME=$USERNAME" >> $GITHUB_ENV
        echo "PASSWORD=$PASSWORD" >> $GITHUB_ENV
        
        sudo useradd -m -s /bin/bash $USERNAME
        echo "$USERNAME:$PASSWORD" | sudo chpasswd
        sudo usermod -aG sudo $USERNAME
        
    - name: Configure SSH
      run: |
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart sshd || sudo systemctl restart ssh
        
    - name: Install ttyd (Web SSH)
      run: |
        wget -q https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64
        chmod +x ttyd.x86_64
        sudo mv ttyd.x86_64 /usr/local/bin/ttyd
        nohup ttyd -p 8080 -c "$USERNAME:$PASSWORD" login > ttyd.log 2>&1 &
        sleep 5
        
    - name: Create tunnel with pinggy (no password)
      run: |
        # Use pinggy with simple command
        ssh -R 80:localhost:8080 a.pinggy.io > pinggy.log 2>&1 &
        sleep 12
        
        # Get URL
        PINGGY_URL=$(grep -o 'https://[a-z0-9.-]*\.pinggy\.io' pinggy.log | head -1)
        
        if [ -z "$PINGGY_URL" ]; then
          sleep 5
          PINGGY_URL=$(grep -o 'https://[a-z0-9.-]*\.pinggy\.io' pinggy.log | head -1)
        fi
        
        echo "WEB_URL=$PINGGY_URL" >> $GITHUB_ENV
        echo "✅ Tunnel URL: $PINGGY_URL"
        
    - name: Save connection info
      run: |
        echo ""
        echo "============================================================"
        echo "✅ UBUNTU VPS READY!"
        echo "============================================================"
        echo ""
        echo "🔐 LOGIN CREDENTIALS:"
        echo "   Username: $USERNAME"
        echo "   Password: $PASSWORD"
        echo ""
        echo "🌐 OPEN IN SAFARI (NO PASSWORD NEEDED):"
        echo "   $WEB_URL"
        echo ""
        echo "📱 STEPS:"
        echo "   1. Copy URL above"
        echo "   2. Open Safari on iPhone"
        echo "   3. Paste URL and press Enter"
        echo "   4. Enter username: $USERNAME"
        echo "   5. Enter password: $PASSWORD"
        echo "   6. Start using terminal!"
        echo ""
        echo "⏱️ VPS runs for: ${{ github.event.inputs.duration }} hours"
        echo "============================================================"
        
        {
          echo "========================================"
          echo "UBUNTU VPS CONNECTION INFO"
          echo "========================================"
          echo ""
          echo "Username: $USERNAME"
          echo "Password: $PASSWORD"
          echo ""
          echo "Web SSH URL: $WEB_URL"
          echo ""
          echo "Open in Safari:"
          echo "$WEB_URL"
          echo ""
          echo "========================================"
        } > vps-info.txt
        
    - name: Upload connection info
      uses: actions/upload-artifact@v4
      with:
        name: vps-info
        path: vps-info.txt
        
    - name: Keep VPS alive
      run: |
        HOURS=${{ github.event.inputs.duration }}
        echo ""
        echo "🟢 VPS IS RUNNING"
        echo "🔗 Web SSH: $WEB_URL"
        echo "⏰ Will stop after $HOURS hours"
        echo ""
        sleep $((HOURS * 3600))
