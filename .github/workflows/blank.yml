name: Create Ubuntu VPS

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username'
        required: true
        default: 'ubuntu-vps'
      duration:
        description: 'Duration (hours)'
        required: true
        default: '6'

jobs:
  create-vps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server curl wget
        
    - name: Create user
      run: |
        USERNAME="${{ github.event.inputs.username }}"
        PASSWORD=$(openssl rand -base64 12 | tr -d '=+/' | head -c 12)
        
        echo "USERNAME=$USERNAME" >> $GITHUB_ENV
        echo "PASSWORD=$PASSWORD" >> $GITHUB_ENV
        
        sudo useradd -m -s /bin/bash $USERNAME
        echo "$USERNAME:$PASSWORD" | sudo chpasswd
        sudo usermod -aG sudo $USERNAME
        
    - name: Configure SSH
      run: |
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart sshd || sudo systemctl restart ssh
        
    - name: Install cloudflared
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
        
    - name: Start Cloudflare Tunnel
      run: |
        nohup cloudflared tunnel --url ssh://localhost:22 > cloudflared.log 2>&1 &
        sleep 12
        
        TUNNEL_URL=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
        
        if [ -n "$TUNNEL_URL" ]; then
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
        fi
        
    - name: Save connection info
      run: |
        echo ""
        echo "============================================================"
        echo "✅ UBUNTU VPS READY"
        echo "============================================================"
        echo ""
        echo "🔐 LOGIN:"
        echo "   User: $USERNAME"
        echo "   Pass: $PASSWORD"
        echo ""
        echo "🌐 CONNECT VIA BROWSER:"
        echo "   $TUNNEL_URL"
        echo ""
        echo "💻 CONNECT VIA SSH (Terminal):"
        echo "   cloudflared access ssh --hostname $TUNNEL_URL"
        echo ""
        echo "⏱️ Duration: ${{ github.event.inputs.duration }} hours"
        echo "============================================================"
        
        {
          echo "User: $USERNAME"
          echo "Pass: $PASSWORD"
          echo "URL: $TUNNEL_URL"
          echo ""
          echo "Open in Safari: $TUNNEL_URL"
        } > vps-info.txt
        
    - name: Upload info
      uses: actions/upload-artifact@v4
      with:
        name: vps-info
        path: vps-info.txt
        
    - name: Keep alive
      run: |
        HOURS=${{ github.event.inputs.duration }}
        echo "VPS running for $HOURS hours"
        sleep $((HOURS * 3600))
