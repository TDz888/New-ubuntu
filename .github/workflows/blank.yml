name: Create Ubuntu VPS with Web SSH

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username'
        required: true
        default: 'ubuntu-vps'
      duration:
        description: 'Duration (hours)'
        required: true
        default: '6'

jobs:
  create-vps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server curl wget
        
    - name: Create user
      run: |
        USERNAME="${{ github.event.inputs.username }}"
        PASSWORD=$(openssl rand -base64 12 | tr -d '=+/' | head -c 12)
        
        echo "USERNAME=$USERNAME" >> $GITHUB_ENV
        echo "PASSWORD=$PASSWORD" >> $GITHUB_ENV
        
        sudo useradd -m -s /bin/bash $USERNAME
        echo "$USERNAME:$PASSWORD" | sudo chpasswd
        sudo usermod -aG sudo $USERNAME
        
    - name: Configure SSH
      run: |
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart sshd || sudo systemctl restart ssh
        
    - name: Install ttyd (Web SSH)
      run: |
        wget -q https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64
        chmod +x ttyd.x86_64
        sudo mv ttyd.x86_64 /usr/local/bin/ttyd
        nohup ttyd -p 8080 -c "$USERNAME:$PASSWORD" login > ttyd.log 2>&1 &
        sleep 5
        
    - name: Install localtunnel (FREE, no account needed)
      run: |
        sudo apt-get install -y npm
        sudo npm install -g localtunnel
        
        # Start localtunnel
        nohup lt --port 8080 --subdomain vps${{ github.run_id }} > lt.log 2>&1 &
        sleep 10
        
        # Get URL
        LT_URL=$(grep -o 'https://[a-z0-9.-]*\.loca\.lt' lt.log | head -1)
        echo "WEB_URL=$LT_URL" >> $GITHUB_ENV
        
    - name: Save info
      run: |
        echo ""
        echo "============================================================"
        echo "✅ UBUNTU VPS READY!"
        echo "============================================================"
        echo ""
        echo "🔐 LOGIN:"
        echo "   Username: $USERNAME"
        echo "   Password: $PASSWORD"
        echo ""
        echo "🌐 OPEN IN SAFARI:"
        echo "   $WEB_URL"
        echo ""
        echo "📱 HOW TO USE:"
        echo "   1. Copy URL above"
        echo "   2. Open Safari on iPhone"
        echo "   3. Paste URL and go"
        echo "   4. Login with username/password"
        echo ""
        echo "============================================================"
        
        {
          echo "Username: $USERNAME"
          echo "Password: $PASSWORD"
          echo "URL: $WEB_URL"
          echo ""
          echo "Open in Safari: $WEB_URL"
        } > vps-info.txt
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: vps-info
        path: vps-info.txt
        
    - name: Keep alive
      run: |
        HOURS=${{ github.event.inputs.duration }}
        echo "🟢 VPS running for $HOURS hours"
        echo "🔗 $WEB_URL"
        sleep $((HOURS * 3600))
