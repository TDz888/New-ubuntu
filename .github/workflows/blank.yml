name: 🐧 Ubuntu VPS - Auto Renew

on:
  workflow_dispatch:
    inputs:
      username:
        description: '👤 Username'
        required: true
        default: 'ubuntu'
      password:
        description: '🔑 Password'
        required: true
        default: 'hieudz'
      duration:
        description: '⏱️ Hours per session'
        required: true
        default: '6'
  schedule:
    # Chạy mỗi 30 phút để kiểm tra và renew
    - cron: '*/30 * * * *'

jobs:
  check-and-renew:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: 📦 Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server curl jq

      - name: 👤 Create user
        run: |
          USER="${{ github.event.inputs.username }}"
          PASS="${{ github.event.inputs.password }}"
          
          # Lấy từ event hoặc từ file state
          if [ -z "$USER" ] || [ "$USER" = "ubuntu" ]; then
            if [ -f /tmp/last_user.txt ]; then
              USER=$(cat /tmp/last_user.txt)
              PASS=$(cat /tmp/last_pass.txt)
            fi
          fi
          
          echo "USER=$USER" >> $GITHUB_ENV
          echo "PASS=$PASS" >> $GITHUB_ENV
          
          sudo useradd -m -s /bin/bash "$USER" 2>/dev/null || echo "User exists"
          echo "$USER:$PASS" | sudo chpasswd
          sudo usermod -aG sudo "$USER"

      - name: 🔧 Configure SSH
        run: |
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart sshd || sudo systemctl restart ssh

      - name: 🔐 Install Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh

      - name: 🌐 Connect Tailscale
        run: |
          if [ -z "${{ secrets.TAILSCALE_AUTH_KEY }}" ]; then
            echo "❌ Missing TAILSCALE_AUTH_KEY"
            exit 1
          fi
          
          # Dùng hostname cố định để giữ IP
          sudo tailscale up --auth-key="${{ secrets.TAILSCALE_AUTH_KEY }}" --hostname="ubuntu-vps-permanent"
          sleep 5
          echo "IP=$(sudo tailscale ip -4)" >> $GITHUB_ENV

      - name: 🌍 Get public IP
        run: echo "PUBLIC_IP=$(curl -s ifconfig.me)" >> $GITHUB_ENV

      - name: 💾 Save connection info
        run: |
          cat > vps-info.txt << 'VPSINFO'
╔══════════════════════════════════════════════════════════════╗
║                    🐧 UBUNTU VPS READY 🐧                    ║
╚══════════════════════════════════════════════════════════════╝

🔐 LOGIN CREDENTIALS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  Username: USER_PLACEHOLDER
  Password: PASS_PLACEHOLDER
  Public IP: PUBLIC_PLACEHOLDER

📡 TAILSCALE CONNECTION (FIXED IP)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  Host: IP_PLACEHOLDER
  Port: 22

🚀 SSH COMMAND
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  ssh USER_PLACEHOLDER@IP_PLACEHOLDER -p 22

📱 SHELLY SETUP
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  Host: IP_PLACEHOLDER
  Port: 22
  User: USER_PLACEHOLDER
  Pass: PASS_PLACEHOLDER

🔄 AUTO-RENEW STATUS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  • This VPS will auto-renew before expiration
  • Tailscale IP remains the SAME
  • No disconnection when renewing
  • Created: DATE_PLACEHOLDER
  • Expires: EXPIRE_PLACEHOLDER

⚠️  IMPORTANT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  • Tailscale VPN must be ON on your iPhone
  • The IP address is PERMANENT
  • You only need to setup Shelly ONCE
═══════════════════════════════════════════════════════════════
VPSINFO
          
          sed -i "s/USER_PLACEHOLDER/$USER/g" vps-info.txt
          sed -i "s/PASS_PLACEHOLDER/$PASS/g" vps-info.txt
          sed -i "s/PUBLIC_PLACEHOLDER/$PUBLIC_IP/g" vps-info.txt
          sed -i "s/IP_PLACEHOLDER/$IP/g" vps-info.txt
          sed -i "s/DATE_PLACEHOLDER/$(date '+%Y-%m-%d %H:%M:%S')/g" vps-info.txt
          sed -i "s/EXPIRE_PLACEHOLDER/$(date -d '+6 hours' '+%Y-%m-%d %H:%M:%S')/g" vps-info.txt

      - name: 📤 Upload connection info
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-vps-connection
          path: vps-info.txt
          retention-days: 7

      - name: 🔄 Schedule next renewal (self-trigger)
        run: |
          echo "📝 Saving state for next renewal..."
          echo "$USER" > /tmp/last_user.txt
          echo "$PASS" > /tmp/last_pass.txt
          echo "$IP" > /tmp/last_ip.txt
          
          # Tính thời gian renew (5h30 phút sau)
          RENEW_TIME=$(date -d '+5 hours 30 minutes' '+%Y-%m-%dT%H:%M:%SZ')
          echo "🕐 Next renewal scheduled at: $RENEW_TIME"
          
          # Lưu thời gian renew vào file
          echo "$RENEW_TIME" > /tmp/renew_time.txt

      - name: 🔁 Auto trigger next VPS before expiration
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║              🔄 AUTO-RENEW IS ACTIVE 🔄                       ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "   📡 Tailscale IP : $IP (PERMANENT)"
          echo "   👤 Username     : $USER"
          echo "   ⏱️  Current VPS will run for 6 hours"
          echo "   🔄 Next VPS will be created automatically at 5h30m"
          echo ""
          echo "   💡 You don't need to do anything!"
          echo "   📱 Shelly will stay connected automatically"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Chạy background process để tự trigger workflow mới
          (
            # Đợi 5 giờ 30 phút (19800 giây)
            sleep 19800
            
            # Trigger workflow mới với cùng thông tin
            curl -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/vps.yml/dispatches \
              -d "{\"ref\":\"main\",\"inputs\":{\"username\":\"$USER\",\"password\":\"$PASS\",\"duration\":\"6\"}}"
              
            echo "✅ New VPS triggered at $(date)"
          ) &
          
          echo "🟢 Auto-renew daemon started in background"

      - name: ⏰ Keep VPS alive with auto-renew
        run: |
          HOURS=6
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║                    🟢 VPS IS RUNNING 🟢                      ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "   📡 Tailscale IP : $IP (FIXED - NEVER CHANGES)"
          echo "   👤 Username     : $USER"
          echo "   🔑 Password     : $PASS"
          echo "   🔗 SSH Command  : ssh $USER@$IP -p 22"
          echo ""
          echo "   📱 Open Shelly and connect with IP: $IP"
          echo "   🔄 This VPS will auto-renew after 5h30m"
          echo "   💡 You only need to setup Shelly ONCE!"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          
          # Giữ VPS chạy 6 giờ
          sleep 21600
