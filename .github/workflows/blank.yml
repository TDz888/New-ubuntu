name: Create Ubuntu VPS

on:
  workflow_dispatch:
    inputs:
      user:
        description: 'Username'
        required: true
        default: 'ubuntu'
      pass:
        description: 'Password'
        required: true
        default: '123456'
      hours:
        description: 'Hours to run'
        required: true
        default: '6'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install SSH
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server curl
        
    - name: Create user
      run: |
        sudo useradd -m -s /bin/bash ${{ github.event.inputs.user }}
        echo "${{ github.event.inputs.user}}:${{ github.event.inputs.pass}}" | sudo chpasswd
        sudo usermod -aG sudo ${{ github.event.inputs.user }}
        
    - name: Setup SSH
      run: |
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        
    - name: Create Serveo Tunnel
      run: |
        # Tạo tunnel với serveo
        ssh -R 0:localhost:22 serveo.net > serveo.log 2>&1 &
        sleep 15
        
        # Lấy hostname từ log
        cat serveo.log
        
        # Lấy URL
        HOSTNAME=$(grep -o '[a-z0-9.-]*\.serveo\.net' serveo.log | head -1)
        
        if [ -z "$HOSTNAME" ]; then
          # Thử cách khác
          sleep 10
          HOSTNAME=$(grep -o '[a-z0-9.-]*\.serveo\.net' serveo.log | head -1)
        fi
        
        echo "HOSTNAME=$HOSTNAME" >> $GITHUB_ENV
        
    - name: Show connection info
      run: |
        echo ""
        echo "========================================="
        echo "✅ UBUNTU VPS READY!"
        echo "========================================="
        echo ""
        echo "🔐 SSH CONNECTION:"
        echo "   Host: $HOSTNAME"
        echo "   Port: 22"
        echo "   User: ${{ github.event.inputs.user }}"
        echo "   Pass: ${{ github.event.inputs.pass }}"
        echo ""
        echo "📱 SSH COMMAND:"
        echo "   ssh ${{ github.event.inputs.user }}@$HOSTNAME -p 22"
        echo ""
        echo "========================================="
        
        # Lưu vào file
        {
          echo "========================================="
          echo "UBUNTU VPS CONNECTION INFO"
          echo "========================================="
          echo "Host: $HOSTNAME"
          echo "Port: 22"
          echo "User: ${{ github.event.inputs.user }}"
          echo "Pass: ${{ github.event.inputs.pass }}"
          echo ""
          echo "SSH: ssh ${{ github.event.inputs.user }}@$HOSTNAME -p 22"
          echo "========================================="
        } > vps-info.txt
        
    - name: Upload info
      uses: actions/upload-artifact@v4
      with:
        name: vps-info
        path: vps-info.txt
        
    - name: Keep alive
      run: |
        echo "🟢 VPS running for ${{ github.event.inputs.hours }} hours"
        echo "🔗 SSH: ssh ${{ github.event.inputs.user }}@$HOSTNAME -p 22"
        sleep ${{ github.event.inputs.hours }}h
