name: Create Ubuntu VPS with Web SSH

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username'
        required: true
        default: 'ubuntu-vps'
      duration:
        description: 'Duration (hours)'
        required: true
        default: '6'

jobs:
  create-vps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server curl wget
        
    - name: Create user
      run: |
        USERNAME="${{ github.event.inputs.username }}"
        PASSWORD=$(openssl rand -base64 12 | tr -d '=+/' | head -c 12)
        
        echo "USERNAME=$USERNAME" >> $GITHUB_ENV
        echo "PASSWORD=$PASSWORD" >> $GITHUB_ENV
        
        sudo useradd -m -s /bin/bash $USERNAME
        echo "$USERNAME:$PASSWORD" | sudo chpasswd
        sudo usermod -aG sudo $USERNAME
        
    - name: Configure SSH
      run: |
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart sshd || sudo systemctl restart ssh
        
    - name: Install and run Web SSH (wssh)
      run: |
        # Install Python and pip
        sudo apt-get install -y python3-pip
        pip3 install wssh --break-system-packages
        
        # Run web SSH server on port 8080
        nohup wssh --address=0.0.0.0 --port=8080 > wssh.log 2>&1 &
        sleep 5
        
    - name: Install cloudflared
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        chmod +x cloudflared-linux-amd64
        sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
        
    - name: Create HTTP tunnel (for web SSH)
      run: |
        # Tunnel HTTP port 8080
        nohup cloudflared tunnel --url http://localhost:8080 > cloudflared.log 2>&1 &
        sleep 12
        
        WEB_URL=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' cloudflared.log | head -1)
        
        if [ -n "$WEB_URL" ]; then
          echo "WEB_URL=$WEB_URL" >> $GITHUB_ENV
          echo "✅ Web SSH URL: $WEB_URL"
        fi
        
    - name: Save connection info
      run: |
        echo ""
        echo "============================================================"
        echo "✅ UBUNTU VPS READY - Web SSH"
        echo "============================================================"
        echo ""
        echo "🔐 LOGIN CREDENTIALS:"
        echo "   Username: $USERNAME"
        echo "   Password: $PASSWORD"
        echo ""
        echo "🌐 WEB SSH URL (OPEN IN SAFARI):"
        echo "   $WEB_URL"
        echo ""
        echo "📱 HOW TO USE:"
        echo "   1. Open Safari"
        echo "   2. Go to: $WEB_URL"
        echo "   3. Login with username and password"
        echo ""
        echo "⏱️ Duration: ${{ github.event.inputs.duration }} hours"
        echo "============================================================"
        
        {
          echo "Username: $USERNAME"
          echo "Password: $PASSWORD"
          echo "Web SSH URL: $WEB_URL"
          echo ""
          echo "Open in Safari: $WEB_URL"
        } > vps-info.txt
        
    - name: Upload info
      uses: actions/upload-artifact@v4
      with:
        name: vps-info
        path: vps-info.txt
        
    - name: Keep alive
      run: |
        HOURS=${{ github.event.inputs.duration }}
        echo "🟢 VPS running for $HOURS hours"
        echo "🔗 Web SSH: $WEB_URL"
        sleep $((HOURS * 3600))
