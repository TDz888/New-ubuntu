name: Create Ubuntu VPS with SSH (TCP)

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username'
        required: true
        default: 'ubuntu-vps'
      duration:
        description: 'Duration (hours)'
        required: true
        default: '6'

jobs:
  create-vps:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server curl wget sshpass
        
    - name: Create SSH user
      run: |
        USERNAME="${{ github.event.inputs.username }}"
        PASSWORD=$(openssl rand -base64 12 | tr -d '=+/' | head -c 12)
        
        echo "USERNAME=$USERNAME" >> $GITHUB_ENV
        echo "PASSWORD=$PASSWORD" >> $GITHUB_ENV
        
        sudo useradd -m -s /bin/bash $USERNAME
        echo "$USERNAME:$PASSWORD" | sudo chpasswd
        sudo usermod -aG sudo $USERNAME
        
    - name: Configure SSH
      run: |
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart sshd || sudo systemctl restart ssh
        
    - name: Install localhost.run (free TCP tunnel)
      run: |
        # Install ssh client
        sudo apt-get install -y ssh-client
        
        # Create SSH key for localhost.run
        ssh-keygen -t rsa -b 2048 -f ~/.ssh/id_rsa -N ""
        
        # Start tunnel in background
        ssh -R 80:localhost:22 localhost.run > tunnel.log 2>&1 &
        sleep 8
        
        # Get URL
        TUNNEL_URL=$(grep -o 'https://[a-z0-9.-]*\.localhost\.run' tunnel.log | head -1)
        TCP_URL=$(grep -o '[a-z0-9.-]*\.localhost\.run' tunnel.log | head -1)
        
        if [ -n "$TCP_URL" ]; then
          echo "TCP_HOST=$TCP_URL" >> $GITHUB_ENV
          echo "TCP_PORT=22" >> $GITHUB_ENV
          echo "✅ TCP Tunnel: $TCP_URL:22"
        fi
        
    - name: Get public IP
      run: |
        PUBLIC_IP=$(curl -s ifconfig.me)
        echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_ENV
        
    - name: Save connection info
      run: |
        echo ""
        echo "============================================================"
        echo "              ✅ UBUNTU VPS IS READY ✅"
        echo "============================================================"
        echo ""
        echo "🔐 LOGIN CREDENTIALS:"
        echo "   Username: $USERNAME"
        echo "   Password: $PASSWORD"
        echo ""
        
        if [ -n "$TCP_HOST" ]; then
          echo "📡 SSH CONNECTION (FOR SHELLY / TERMIUS / PUTTY):"
          echo "   Host: $TCP_HOST"
          echo "   Port: $TCP_PORT"
          echo ""
          echo "🚀 SSH COMMAND:"
          echo "   ssh $USERNAME@$TCP_HOST -p $TCP_PORT"
          echo ""
        fi
        
        echo "⏱️ VPS will run for: ${{ github.event.inputs.duration }} hours"
        echo "============================================================"
        
        # Save to file
        {
          echo "============================================================"
          echo "              UBUNTU VPS CONNECTION INFORMATION"
          echo "============================================================"
          echo ""
          echo "Username: $USERNAME"
          echo "Password: $PASSWORD"
          echo ""
          echo "SSH CONNECTION DETAILS:"
          echo "Host: $TCP_HOST"
          echo "Port: $TCP_PORT"
          echo "SSH Command: ssh $USERNAME@$TCP_HOST -p $TCP_PORT"
          echo ""
          echo "Created: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Duration: ${{ github.event.inputs.duration }} hours"
          echo "============================================================"
        } > vps-info.txt
        
        # Simple file for easy copy
        {
          echo "$TCP_HOST"
          echo "$TCP_PORT"
          echo "$USERNAME"
          echo "$PASSWORD"
        } > vps-connect.txt
        
    - name: Upload connection files
      uses: actions/upload-artifact@v4
      with:
        name: vps-connection-info
        path: |
          vps-info.txt
          vps-connect.txt
        
    - name: Keep VPS alive
      run: |
        HOURS=${{ github.event.inputs.duration }}
        echo "🟢 VPS running for $HOURS hours"
        echo "📥 Download artifact 'vps-connection-info'"
        echo "🔗 SSH: ssh $USERNAME@$TCP_HOST -p $TCP_PORT"
        sleep $((HOURS * 3600))
