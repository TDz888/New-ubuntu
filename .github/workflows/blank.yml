name: Create Ubuntu VPS with Tailscale

on:
  workflow_dispatch:
    inputs:
      user:
        description: 'Username'
        required: true
        default: 'ubuntu'
      pass:
        description: 'Password'
        required: true
        default: '123456'
      hours:
        description: 'Hours to run'
        required: true
        default: '6'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install SSH
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server
        
    - name: Create user
      run: |
        sudo useradd -m -s /bin/bash ${{ github.event.inputs.user }}
        echo "${{ github.event.inputs.user}}:${{ github.event.inputs.pass}}" | sudo chpasswd
        sudo usermod -aG sudo ${{ github.event.inputs.user }}
        
    - name: Configure SSH
      run: |
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        
    - name: Install Tailscale
      run: |
        curl -fsSL https://tailscale.com/install.sh | sh
        
    - name: Connect to Tailscale
      run: |
        sudo tailscale up --auth-key=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-vps
        sleep 5
        
    - name: Get Tailscale IP
      run: |
        TAILSCALE_IP=$(sudo tailscale ip -4)
        echo "TAILSCALE_IP=$TAILSCALE_IP" >> $GITHUB_ENV
        echo "✅ VPS IP: $TAILSCALE_IP"
        
    - name: Show connection info
      run: |
        echo ""
        echo "========================================="
        echo "✅ UBUNTU VPS READY!"
        echo "========================================="
        echo ""
        echo "🔐 SSH CONNECTION (via Tailscale):"
        echo "   IP: $TAILSCALE_IP"
        echo "   Port: 22"
        echo "   User: ${{ github.event.inputs.user }}"
        echo "   Pass: ${{ github.event.inputs.pass }}"
        echo ""
        echo "📱 SSH COMMAND:"
        echo "   ssh ${{ github.event.inputs.user }}@$TAILSCALE_IP -p 22"
        echo ""
        echo "========================================="
        
        # Lưu vào file
        {
          echo "========================================="
          echo "UBUNTU VPS CONNECTION INFO"
          echo "========================================="
          echo "IP: $TAILSCALE_IP"
          echo "Port: 22"
          echo "User: ${{ github.event.inputs.user }}"
          echo "Pass: ${{ github.event.inputs.pass }}"
          echo ""
          echo "SSH Command:"
          echo "ssh ${{ github.event.inputs.user }}@$TAILSCALE_IP -p 22"
          echo ""
          echo "📱 Tailscale app must be ON on your iPhone"
          echo "========================================="
        } > vps-info.txt
        
    - name: Upload info
      uses: actions/upload-artifact@v4
      with:
        name: vps-info
        path: vps-info.txt
        
    - name: Keep alive
      run: |
        echo "🟢 VPS running for ${{ github.event.inputs.hours }} hours"
        echo "🔗 SSH: ssh ${{ github.event.inputs.user }}@$TAILSCALE_IP -p 22"
        sleep ${{ github.event.inputs.hours }}h
