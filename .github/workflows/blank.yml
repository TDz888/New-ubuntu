name: 🐧 Ubuntu VPS - Tailscale

on:
  workflow_dispatch:
    inputs:
      username:
        description: '👤 Username'
        required: true
        default: 'ubuntu'
      password:
        description: '🔑 Password'
        required: true
        default: '123456'
      duration:
        description: '⏱️ Hours to run'
        required: true
        default: '6'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
          - '6'
          - '12'
          - '24'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 4320

    steps:
      - name: 📦 Install SSH
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server curl jq

      - name: 👤 Create user
        run: |
          sudo useradd -m -s /bin/bash "${{ github.event.inputs.username }}"
          echo "${{ github.event.inputs.username}}:${{ github.event.inputs.password}}" | sudo chpasswd
          sudo usermod -aG sudo "${{ github.event.inputs.username }}"

      - name: 🔧 Configure SSH
        run: |
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart sshd || sudo systemctl restart ssh

      - name: 🔐 Install Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh

      - name: 🌐 Connect Tailscale
        run: |
          if [ -z "${{ secrets.TAILSCALE_AUTH_KEY }}" ]; then
            echo "❌ Missing TAILSCALE_AUTH_KEY secret"
            exit 1
          fi
          sudo tailscale up --auth-key="${{ secrets.TAILSCALE_AUTH_KEY }}" --hostname="ubuntu-vps"
          sleep 3
          echo "IP=$(sudo tailscale ip -4)" >> $GITHUB_ENV

      - name: 🌍 Get public IP
        run: echo "PUBLIC_IP=$(curl -s ifconfig.me)" >> $GITHUB_ENV

      - name: 📋 Show connection info
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════╗"
          echo "║            ✅ UBUNTU VPS IS READY ✅               ║"
          echo "╚════════════════════════════════════════════════════╝"
          echo ""
          echo "🔐 LOGIN CREDENTIALS"
          echo "  • Username : ${{ github.event.inputs.username }}"
          echo "  • Password : ${{ github.event.inputs.password }}"
          echo "  • Public IP: $PUBLIC_IP"
          echo ""
          echo "📡 TAILSCALE CONNECTION"
          echo "  • Host     : $IP"
          echo "  • Port     : 22"
          echo ""
          echo "🚀 SSH COMMAND"
          echo "  ssh ${{ github.event.inputs.username }}@$IP -p 22"
          echo ""
          echo "📱 SHELLY SETUP"
          echo "  • Host : $IP"
          echo "  • Port : 22"
          echo "  • User : ${{ github.event.inputs.username }}"
          echo "  • Pass : ${{ github.event.inputs.password }}"
          echo ""
          echo "⏱️  VPS runs for ${{ github.event.inputs.duration }} hours"
          echo "⚠️  Tailscale VPN must be ON on your iPhone"

      - name: 💾 Save connection file
        run: |
          echo "════════════════════════════════════════════════════" > vps-info.txt
          echo "🐧 UBUNTU VPS CONNECTION INFO" >> vps-info.txt
          echo "════════════════════════════════════════════════════" >> vps-info.txt
          echo "" >> vps-info.txt
          echo "🔐 LOGIN" >> vps-info.txt
          echo "  Username : ${{ github.event.inputs.username }}" >> vps-info.txt
          echo "  Password : ${{ github.event.inputs.password }}" >> vps-info.txt
          echo "  Public IP: $PUBLIC_IP" >> vps-info.txt
          echo "" >> vps-info.txt
          echo "📡 TAILSCALE" >> vps-info.txt
          echo "  Host     : $IP" >> vps-info.txt
          echo "  Port     : 22" >> vps-info.txt
          echo "" >> vps-info.txt
          echo "🚀 SSH COMMAND" >> vps-info.txt
          echo "  ssh ${{ github.event.inputs.username }}@$IP -p 22" >> vps-info.txt
          echo "" >> vps-info.txt
          echo "📱 SHELLY" >> vps-info.txt
          echo "  Host: $IP" >> vps-info.txt
          echo "  Port: 22" >> vps-info.txt
          echo "  User: ${{ github.event.inputs.username }}" >> vps-info.txt
          echo "  Pass: ${{ github.event.inputs.password }}" >> vps-info.txt
          echo "" >> vps-info.txt
          echo "⏱️  Expires after ${{ github.event.inputs.duration }} hours" >> vps-info.txt
          echo "════════════════════════════════════════════════════" >> vps-info.txt

      - name: 📤 Upload connection files
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-vps-connection
          path: vps-info.txt

      - name: ⏰ Keep alive
        run: |
          H=${{ github.event.inputs.duration }}
          echo ""
          echo "🟢 VPS RUNNING — $H hours remaining"
          echo "🔗 ssh ${{ github.event.inputs.username }}@$IP -p 22"
          echo "📱 Open Shelly and connect now"
          echo ""
          sleep $((H * 3600))
