name: Ubuntu VPS

on:
  workflow_dispatch:
    inputs:
      user:
        description: 'Username'
        required: true
        default: 'ubuntu'
      pass:
        description: 'Password'
        required: true
        default: '123456'
      hours:
        description: 'Hours to run'
        required: true
        default: '6'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install SSH
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server curl
        
    - name: Create user
      run: |
        sudo useradd -m -s /bin/bash ${{ github.event.inputs.user }}
        echo "${{ github.event.inputs.user}}:${{ github.event.inputs.pass}}" | sudo chpasswd
        sudo usermod -aG sudo ${{ github.event.inputs.user }}
        
    - name: Configure SSH
      run: |
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
        sudo systemctl restart ssh
        
    - name: Create tunnel
      run: |
        # Dùng pinggy free, không cần token
        ssh -R 0:localhost:22 a.pinggy.io > pinggy.log 2>&1 &
        sleep 12
        
        # Lấy host và port
        HOST=$(grep -o '[a-z0-9.-]*\.pinggy\.io' pinggy.log | head -1)
        PORT=$(grep -o ':[0-9]\+' pinggy.log | head -1 | tr -d ':')
        
        echo "HOST=$HOST" >> $GITHUB_ENV
        echo "PORT=$PORT" >> $GITHUB_ENV
        
    - name: Show info
      run: |
        echo ""
        echo "========================================="
        echo "✅ UBUNTU VPS READY!"
        echo "========================================="
        echo ""
        echo "Host: $HOST"
        echo "Port: $PORT"
        echo "User: ${{ github.event.inputs.user }}"
        echo "Pass: ${{ github.event.inputs.pass }}"
        echo ""
        echo "SSH: ssh ${{ github.event.inputs.user }}@$HOST -p $PORT"
        echo ""
        echo "========================================="
        
        # Lưu file
        echo "Host: $HOST" > vps-info.txt
        echo "Port: $PORT" >> vps-info.txt
        echo "User: ${{ github.event.inputs.user }}" >> vps-info.txt
        echo "Pass: ${{ github.event.inputs.pass }}" >> vps-info.txt
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: vps-info
        path: vps-info.txt
        
    - name: Keep alive
      run: |
        sleep ${{ github.event.inputs.hours }}h
